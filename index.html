examine not just what we would do, but why—and whether our reasons are consistent.", "qs": [{"q": "What is the main purpose of the trolley problem?", "ch": ["To improve transportation safety", "To test emergency decision-making", "To expose inconsistencies in moral intuition", "To determine the best trolley routes"], "an": 2}, {"q": "What is utilitarian ethics, as described in the passage?", "ch": ["Rules that must never be broken", "Always following instinct", "The belief that actions should maximize overall wellbeing", "Treating all people equally"], "an": 2}, {"q": "Why do most people react differently to the bridge variant?", "ch": ["The math is different", "Pushing a person feels like using them as a tool", "Bridges are scarier than levers", "The trolley moves faster"], "an": 1}, {"q": "What are deontological principles, according to the passage?", "ch": ["Rules based only on outcomes", "Calculations about consequences", "Rules that apply regardless of consequences", "Personal preferences about behavior"], "an": 2}, {"q": "What does the inconsistency between the lever and bridge responses reveal?", "ch": ["People are always selfish", "Humans use both rules and consequences to reason about ethics", "Utilitarianism is always correct", "People cannot make moral decisions"], "an": 1}], "vocab": [{"w": "utilitarian", "d": "relating to the idea that actions are right if they benefit the majority"}, {"w": "deontological", "d": "relating to moral duties and rules, regardless of consequences"}]}, {"id": "8S2", "title": "The Oppenheimer Question", "cat": "History & Ethics", "text": "On July 16, 1945, in the New Mexico desert, the United States detonated the first nuclear weapon in history — a test codenamed Trinity.\nThe man who led its development, J. Robert Oppenheimer, watched the fireball rise and later recalled a verse from the Hindu scripture the Bhagavad Gita: 'Now I am become Death, the destroyer of worlds.'\nThree weeks later, the US dropped atomic bombs on Hiroshima and Nagasaki, killing an estimated 200,000 people.\nOppenheimer spent the rest of his life wrestling with what he had created.\nHe lobbied for international control of nuclear weapons and opposed developing the even more destructive hydrogen bomb.\nIn 1954, during the McCarthy era, the government revoked his security clearance, essentially ending his career, on grounds that he had associated with communists.\nThe case became a symbol of the conflict between scientific freedom and national security.\nOppenheimer's story raises questions that have not gone away.\nShould scientists be held responsible for the applications of their discoveries?\nCan a technological advance be moral in itself while its application is catastrophic?\nIs it ethical to destroy 200,000 lives to save — as American officials claimed — millions who would die in a land invasion of Japan?\nThese are not historical curiosities but live questions: as AI, biotechnology, and synthetic biology advance, the Oppenheimer question recurs in new forms.\nWhat do creators owe the things they create?", "qs": [{"q": "What did Oppenheimer recall from the Bhagavad Gita after the Trinity test?", "ch": ["A prayer for peace", "'Now I am become Death, the destroyer of worlds'", "A celebration of victory", "A warning to future generations"], "an": 1}, {"q": "What did Oppenheimer advocate for after the war?", "ch": ["Building more powerful weapons", "Sharing nuclear technology with allies", "International control of nuclear weapons and opposition to the hydrogen bomb", "Withdrawing the US from international agreements"], "an": 2}, {"q": "Why did the government revoke Oppenheimer's security clearance?", "ch": ["He leaked classified information", "He publicly opposed the government", "He had associated with communists during the McCarthy era", "He tried to sell nuclear technology"], "an": 2}, {"q": "What moral question does the bombing of Hiroshima and Nagasaki raise?", "ch": ["Whether the US had the right technology", "Whether 200,000 deaths could be justified to prevent a larger number of deaths in an invasion", "Whether Japan was responsible for starting the war", "Whether nuclear weapons should be legal"], "an": 1}, {"q": "Why does the author say the 'Oppenheimer question' recurs in new forms?", "ch": ["Because nuclear weapons are still being built", "Because Oppenheimer's case was never resolved legally", "Because advances in AI and biotechnology raise the same questions about creator responsibility", "Because more scientists are building weapons"], "an": 2}], "vocab": [{"w": "detonated", "d": "caused to explode"}, {"w": "revoked", "d": "officially cancelled or withdrew"}]}, {"id": "8S3", "title": "The Architecture of Inequality", "cat": "Economics & Social Studies", "text": "In 2021, the three wealthiest Americans — Elon Musk, Jeff Bezos, and Mark Zuckerberg — held more wealth than the bottom 50 percent of American adults combined.\nThis concentration of wealth is not new, but its current scale is unprecedented in modern history.\nEconomists use a measure called the Gini coefficient to quantify inequality within a country — where 0 represents perfect equality and 1 represents total inequality.\nThe United States currently has one of the highest Gini coefficients among developed nations.\nThe causes of rising inequality are genuinely debated among economists.\nSome point to technological change: automation displaces routine jobs, while technology amplifies the productivity of highly skilled workers, increasing the gap between them.\nOthers emphasize policy choices: the decline of union membership, reductions in top marginal tax rates since the 1980s, and reduced government investment in public goods.\nStill others focus on globalization: the offshoring of manufacturing jobs to lower-wage countries depressed wages for less-educated workers in wealthy nations.\nThe consequences of inequality are also contested.\nSome argue that inequality is an inevitable byproduct of a dynamic economy and that the correct metric is absolute living standards, not relative inequality.\nOthers cite research linking high inequality to reduced social mobility, worse health outcomes, and weakened democratic institutions.\nNobel laureate Joseph Stiglitz argues that extreme inequality is not just an ethical problem but a structural one: 'A house divided cannot stand — and neither can an economy.'", "qs": [{"q": "What is the Gini coefficient?", "ch": ["A measure of economic growth", "A measure of trade between nations", "A measure of wealth concentration within a country", "A measure of unemployment"], "an": 2}, {"q": "How does technological change contribute to inequality according to the passage?", "ch": ["It creates equal opportunities for all workers", "It automates high-skill jobs while creating low-skill ones", "It displaces routine jobs while amplifying productivity of skilled workers", "It has no significant effect on wages"], "an": 2}, {"q": "What policy changes since the 1980s does the passage link to rising inequality?", "ch": ["Increased union membership and higher taxes", "Reduced union membership and lower top tax rates", "Greater government investment in infrastructure", "More immigration and trade deals"], "an": 1}, {"q": "What do those who downplay inequality argue?", "ch": ["Inequality doesn't exist", "The US is the most equal country", "Absolute living standards matter more than relative inequality", "Rich people deserve their wealth"], "an": 2}, {"q": "What does Stiglitz mean by 'a house divided cannot stand — and neither can an economy'?", "ch": ["Buildings should be structurally sound", "Extreme economic division eventually undermines the whole system", "Inequality only affects the poor", "Economic systems should be simple"], "an": 1}], "vocab": [{"w": "unprecedented", "d": "never done or known before"}, {"w": "offshoring", "d": "moving business operations to another country to reduce costs"}]}, {"id": "8S4", "title": "What Makes a Hero: The Mythology of Joseph Campbell", "cat": "Literature & Philosophy", "text": "In 1949, literature professor Joseph Campbell published The Hero with a Thousand Faces, arguing that virtually all hero stories across all cultures share a single underlying structure he called the monomyth or the Hero's Journey.\nThe pattern begins with the hero in an ordinary world.\nA call to adventure disrupts this world — an invitation, a crisis, a challenge.\nThe hero initially refuses the call, overwhelmed by fear or obligation.\nA mentor figure appears, offering wisdom or tools.\nThe hero crosses a threshold into an unknown world of trials and enemies.\nThrough a series of tests, the hero confronts their deepest fear or flaw in an ordeal.\nThey obtain a reward — a treasure, a truth, a transformation.\nThe hero then makes a perilous road back to the ordinary world, often pursued by forces of the unknown.\nThey return transformed, bringing something of value — a boon — to their community.\nCampbell traced this pattern in the Epic of Gilgamesh (2100 BCE), the Odyssey, the story of Buddha, the life of Jesus, and hundreds of myths worldwide.\nGeorge Lucas has said the Hero's Journey directly shaped Star Wars.\nChristopher Vogler adapted Campbell's framework into a Hollywood screenwriting guide still used today.\nCritics note that Campbell's framework can impose Western narrative structures onto non-Western stories, and that it centers predominantly male heroes.\nBut the framework endures because it maps onto something psychologists also recognize: that growth requires leaving comfort, facing difficulty, and returning changed.", "qs": [{"q": "What is the monomyth?", "ch": ["A specific Greek myth", "Campbell's term for the universal underlying structure of hero stories", "A type of epic poem", "A framework for studying religion"], "an": 1}, {"q": "In the Hero's Journey, what happens after the hero refuses the call?", "ch": ["The story ends", "The hero receives punishment", "A mentor appears offering wisdom or tools", "The hero immediately begins the journey"], "an": 2}, {"q": "According to Campbell, where does the Hero's Journey appear?", "ch": ["Only in Western European myths", "Only in ancient texts", "In myths, religious stories, and narratives across virtually all cultures", "Only in stories with male heroes"], "an": 2}, {"q": "What criticism is made of Campbell's framework?", "ch": ["It is too complicated for filmmakers", "It was never actually used in modern storytelling", "It can impose Western structures on non-Western stories and centers male heroes", "It doesn't apply to ancient myths"], "an": 2}, {"q": "Why does the passage say the framework 'endures'?", "ch": ["Because Campbell was a famous professor", "Because Hollywood requires its use", "Because it maps onto the psychological reality of how growth actually works", "Because it's the only storytelling framework that exists"], "an": 2}], "vocab": [{"w": "monomyth", "d": "Campbell's term for the universal narrative pattern found in hero stories across cultures"}, {"w": "boon", "d": "a benefit or gift brought back from a journey or experience"}]}, {"id": "8S5", "title": "The Algorithm Problem", "cat": "Technology & Ethics", "text": "In 2018, researchers at MIT's Media Lab published a study called Gender Shades that tested facial recognition systems from three major tech companies.\nThe systems achieved 99% accuracy for white men.\nFor dark-skinned women, the error rate was as high as 35%.\nThis disparity occurred not because engineers were intentionally biased but because the systems were trained on datasets that overrepresented white faces.\nThe algorithm learned from what it was given.\nAlgorithmic bias is not limited to facial recognition.\nRecidivism prediction software used in US courts — which predicts whether someone is likely to reoffend — has been shown to incorrectly flag Black defendants as high-risk at twice the rate of white defendants with similar criminal histories.\nMortgage-approval algorithms have been documented denying loans to qualified minority applicants more frequently.\nHiring algorithms trained on historical data reproduce the biases of past decisions.\nThe fundamental issue is that algorithms do not create fairness from bias; they systematize and scale it.\nWhen human bias was applied case-by-case, its harm was limited and correctable in individual instances.\nAlgorithmic bias is applied to millions of decisions simultaneously, invisibly.\nSome researchers advocate for algorithmic auditing — independent review of AI systems for discriminatory outcomes.\nOthers argue that some algorithms should be banned outright from high-stakes decisions.\nThe debate reflects a deeper question: when we build systems to replace human judgment, whose values do we encode into the machine?", "qs": [{"q": "Why did the facial recognition systems in the Gender Shades study perform worse on dark-skinned women?", "ch": ["The engineers were intentionally biased", "The technology was newer", "Training datasets overrepresented white faces", "Dark-skinned faces are more complex to analyze"], "an": 2}, {"q": "What has recidivism prediction software been shown to do?", "ch": ["Accurately predict who will reoffend", "Flag Black defendants as high-risk at twice the rate of comparable white defendants", "Reduce racial disparities in sentencing", "Replace human judges in courts"], "an": 1}, {"q": "What is the key difference between human bias and algorithmic bias?", "ch": ["Human bias is less harmful", "Human bias is impossible to detect", "Algorithmic bias is applied to millions of decisions simultaneously and invisibly", "Algorithmic bias affects only technology decisions"], "an": 2}, {"q": "What do some researchers advocate to address algorithmic bias?", "ch": ["Stopping all AI development", "Only using human decision-makers", "Independent auditing of AI systems for discriminatory outcomes", "Training algorithms with smaller datasets"], "an": 2}, {"q": "What deeper question does this debate raise, according to the passage?", "ch": ["Whether AI is too expensive", "Whether algorithms are faster than humans", "Whose values are encoded into machines when we replace human judgment", "Whether privacy is important"], "an": 2}], "vocab": [{"w": "algorithm", "d": "a set of rules or instructions that a computer follows to complete a task"}, {"w": "recidivism", "d": "the tendency of a criminal to reoffend after being released"}]}, {"id":"8S6","title":"The Ship of Theseus","cat":"Philosophy","text":"The ship that carried the hero Theseus was preserved in Athens as a monument. Over centuries, rotting planks were replaced one by one. Eventually, every single plank had been replaced.\nThe question philosophers have asked for 2,000 years: Is it still the same ship?\nIf you say no — at what point did it stop being Theseus's ship? When the first plank was replaced? The hundredth?\nNow consider: your body replaces most of its cells over seven years. Are you the same person you were at seven years old?\nThis problem reveals that 'identity' is not about physical material but about continuity — pattern, history, and memory.\nThe philosopher Derek Parfit spent his career arguing that personal identity is not what matters — what matters is psychological continuity: your memories, values, and personality persisting.","qs":[{"q":"Why is the Ship of Theseus considered a philosophical problem?","ch":["Ships were very valuable in ancient Athens","It questions whether identity can survive when all physical components are replaced","Theseus was a famous hero","The ship was eventually lost at sea"],"an":1},{"q":"What body fact does the author use to connect the ship problem to personal identity?","ch":["The brain never changes","We lose memories as we age","The body replaces most cells over seven years","Humans live longer than ships"],"an":2},{"q":"What does Parfit argue is MORE important than physical identity?","ch":["DNA continuity","Physical appearance","Psychological continuity — memories, values, personality persisting","Legal identity documents"],"an":2},{"q":"What does the question 'at what point did it stop being Theseus's ship?' reveal about the problem?","ch":["The answer is obvious","There is no clear single moment, making the concept of identity more fluid than simple","The first plank changed was the key moment","The answer depends on the ship's size"],"an":1},{"q":"What broader concept does this passage use the Ship of Theseus to explore?","ch":["Ancient Greek mythology","Maritime history","The nature of identity, continuity, and what makes something the same over time","Why preservation matters"],"an":2}],"vocab":[{"w":"continuity","d":"an unbroken or consistent connection or sequence"},{"w":"identity","d":"the characteristics, beliefs, and qualities that make a person or thing distinct"}]},
{"id":"8S7","title":"The Economics of Attention","cat":"Technology & Society","text":"In the attention economy, your focus is the product. Every free app, every social media platform, every news website earns money by capturing your attention and selling it to advertisers.\nThis creates a fundamental misalignment: you want information, connection, and entertainment. The platform wants you to stay longer. The longer you stay, the more ads you see. The most effective tool for keeping you engaged is not quality content — it is outrage, anxiety, and curiosity gaps.\nB.J. Fogg at Stanford developed a framework called 'captology' — the design of products to change human behavior. His students went on to design the core engagement features of Facebook, Instagram, and Gmail.\nFogg himself later expressed concern about what his research enabled.\nThe question is not whether technology is neutral. It is not. The question is whose values are encoded in the design, and whether you choose to be aware of that.","qs":[{"q":"In the attention economy, what is the actual product being sold?","ch":["Social media apps","News articles","Your attention and time, sold to advertisers","Subscription services"],"an":2},{"q":"Why does outrage work better than quality content for keeping users engaged?","ch":["Outrage is more truthful","Quality content is too expensive","Outrage and anxiety trigger more emotional reactions that keep users on the platform longer","People prefer being angry"],"an":2},{"q":"What is 'captology'?","ch":["The study of social media addiction","The design of products specifically intended to change human behavior","A new type of social media platform","Fogg's name for internet advertising"],"an":1},{"q":"What is significant about Fogg's later concern?","ch":["He wanted to sell more apps","The researcher who helped create engagement techniques later worried about their impact","He believed social media was entirely positive","He designed Facebook himself"],"an":1},{"q":"What does the author argue in the final paragraph?","ch":["Technology is dangerous and should be avoided","Social media is always harmful","Technology is not neutral — it encodes values, and awareness of this matters","Users cannot control their technology use"],"an":2}],"vocab":[{"w":"misalignment","d":"a situation where two parties' goals or interests do not match"},{"w":"captology","d":"the study and design of technology to change people's attitudes and behaviors"}]},
{"id":"8S8","title":"What the Stoics Knew","cat":"Philosophy & History","text":"The Stoic philosophers of ancient Greece and Rome — including Epictetus, Marcus Aurelius, and Seneca — developed a philosophy for living under conditions you cannot control.\nEpictetus was a slave. Marcus Aurelius was an emperor facing plague and war. Seneca was one of the wealthiest men in Rome, also its most famous philosopher.\nTheir shared insight: the only thing you fully control is your response to events. You do not control the economy, other people, illness, or death. You control only your judgment and your will.\n'You have power over your mind, not outside events,' wrote Marcus Aurelius. 'Realize this, and you will find strength.'\nStoicism has been revived in modern therapy — Cognitive Behavioral Therapy directly applies Stoic ideas about separating events from our interpretation of them.\nTwo thousand years later, the insight holds: we suffer less from events themselves than from the stories we tell about them.","qs":[{"q":"What did the three Stoics mentioned have in common, despite very different circumstances?","ch":["They were all Roman citizens","They all wrote books about philosophy","They developed a philosophy for responding to circumstances beyond their control","They lived in the same era"],"an":2},{"q":"What is the central Stoic principle described in this passage?","ch":["Wealth brings happiness","Avoiding emotion leads to wisdom","You only fully control your response to events, not events themselves","Power is the path to virtue"],"an":2},{"q":"How is Stoicism connected to modern psychology?","ch":["CBT borrowed Stoic ideas about separating events from our interpretation of them","Stoics invented therapy","Modern psychologists have disproved Stoicism","Therapy replaced philosophy"],"an":0},{"q":"What does 'we suffer less from events themselves than from the stories we tell about them' mean?","ch":["Events don't really happen","Our interpretation of events causes more suffering than the events themselves","We should avoid telling stories","Stoics believed in ignoring problems"],"an":1},{"q":"What is ironic about the three Stoics the author describes?","ch":["None of them actually wrote about Stoicism","Their circumstances were extremely different — slave, emperor, wealthy man — yet they reached the same insights","They disagreed about everything","They all died young"],"an":1}],"vocab":[{"w":"Stoicism","d":"an ancient philosophy teaching that virtue and reason matter more than pleasure or pain"},{"w":"virtue","d":"moral excellence; a quality considered morally good"}]},
{"id":"8S9","title":"The Two Einsteins","cat":"Biography & Physics","text":"Albert Einstein is remembered as a lone genius thinking brilliant thoughts. The reality is more complicated — and more human.\nIn 1905, Einstein published four papers that each changed physics forever. He was working at a Swiss patent office, not a university. He lacked access to the latest journals. His wife, Mileva Maric, was a trained physicist, and scholars still debate how much she contributed to the early papers.\nEinstein's genius was also social: he obsessively discussed ideas with friends, especially Michele Besso. In his 1905 special relativity paper, he thanked only Besso — not a single academic.\nLater in life, Einstein struggled with quantum mechanics, refusing to accept that the universe could be fundamentally probabilistic. 'God does not play dice,' he argued. Physics proved him wrong.\nGenius is not a solitary lightning bolt. It is built, questioned, and sometimes overturned.","qs":[{"q":"Where was Einstein working when he published his landmark 1905 papers?","ch":["A German university","A physics laboratory","A Swiss patent office","His home in Berlin"],"an":2},{"q":"What question do scholars debate about Mileva Maric?","ch":["Whether she was Einstein's student","How much she contributed to his early papers","Whether she was a physicist","Why she didn't publish her own work"],"an":1},{"q":"What does Einstein thanking only Besso in his 1905 paper suggest?","ch":["Besso wrote the paper","Conversation and collaboration were more important than academic credentials to Einstein","Academic tradition required thanking friends","Besso was also a physicist"],"an":1},{"q":"What was Einstein's argument against quantum mechanics, and what happened?","ch":["He said it was too complicated; he was right","He said God does not play dice; physics proved him wrong","He accepted quantum mechanics reluctantly","He invented quantum mechanics himself"],"an":1},{"q":"What does 'Genius is not a solitary lightning bolt. It is built, questioned, and sometimes overturned' mean?","ch":["Genius is impossible to achieve","Even Einstein's ideas required collaboration, took time, and could be wrong","Geniuses work alone","Lightning is an example of genius"],"an":1}],"vocab":[{"w":"probabilistic","d":"based on probability or chance, rather than certainty"},{"w":"solitary","d":"done or existing alone, without others"}]},
{"id":"8S10","title":"How Revolutions Happen","cat":"History & Political Science","text":"Historian Crane Brinton studied four major revolutions — English, American, French, Russian — and found surprising patterns.\nRevolutions rarely start when things are at their worst. They start when conditions improve, then stall. People who have experienced better lives are less willing to accept the old conditions returning.\nBefore each revolution, there is a period of financial crisis for the government. There is an alienated intellectual class producing revolutionary ideas. The existing order loses confidence in its own right to rule.\nAll four revolutions went through a 'Reign of Terror' phase — a period of extreme violence and radicalism before moderating. All four eventually produced a military leader who stabilized the new order.\nBrinton was not predicting. He was describing. But his patterns appear again and again in history — and sometimes in the present.","qs":[{"q":"What is surprising about when revolutions typically begin?","ch":["At the absolute worst moment of oppression","When new leaders arrive","When conditions improve but then stall — not at the worst point","When foreign countries intervene"],"an":2},{"q":"What three conditions does Brinton identify before revolutions?","ch":["War, famine, and plague","Government financial crisis, alienated intellectuals, and ruling class losing confidence","New technology, migration, and cultural change","A strong leader, a weak government, and a large army"],"an":1},{"q":"What pattern did all four revolutions share after they began?","ch":["They were all immediately successful","They all resulted in democracies","A violent radical phase followed by moderation and a military stabilizer","They were defeated by foreign armies"],"an":2},{"q":"What does 'Brinton was not predicting. He was describing.' mean?","ch":["Brinton was guessing about the future","He was analyzing historical patterns, not claiming revolutions are inevitable","Brinton was a bad historian","He wanted revolutions to happen"],"an":1},{"q":"What does 'sometimes in the present' suggest at the end?","ch":["Brinton is still alive","The author implies these patterns may apply to contemporary events","Revolutions are happening now","Present-day revolutions are worse"],"an":1}],"vocab":[{"w":"alienated","d":"feeling isolated and estranged from society or the mainstream"},{"w":"radicalism","d":"belief in or support for extreme political or social change"}]}]};

/* Master credentials — change these */
var MASTER_USER = 'ricky';
var MASTER_PASS = 'Smart2025!';

/* Current session */
var SESSION = {
  familyId: null,
  familyName: null,
  isMaster: false,
  maxKids: 3
};

/* ── Session persistence ── */
function saveSession(){
  try{sessionStorage.setItem('smart_session', JSON.stringify(SESSION));}catch(e){}
}
function loadSession(){
  try{
    var s=sessionStorage.getItem('smart_session');
    if(s){var d=JSON.parse(s);SESSION.familyId=d.familyId;SESSION.familyName=d.familyName;SESSION.isMaster=d.isMaster;SESSION.maxKids=d.maxKids||3;return true;}
  }catch(e){}
  return false;
}
function clearSession(){
  try{sessionStorage.removeItem('smart_session');}catch(e){}
  SESSION={familyId:null,familyName:null,isMaster:false,maxKids:3};
}

/* ── Login ── */
/* ── Load families into dropdown on login screen ── */
function initLoginScreen(){
  var db=window._smartDB;
  var wrap=document.getElementById('li-family-wrap');
  if(!wrap)return;
  if(!db){
    /* Try one more time */
    try{ initFirebase(); db=window._smartDB; }catch(e){}
    if(!db){
      wrap.innerHTML='<div style="color:#EF4444;font-size:13px;padding:12px;text-align:center">Cannot connect to server.<br>Check your internet connection.<br><br><button onclick="initLoginScreen()" style="background:#FF5C35;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer">Retry</button></div>';
      return;
    }
  }
  wrap.innerHTML='<div style="text-align:center;padding:16px;color:var(--text-tertiary);font-size:14px">Loading…</div>';
  /* Timeout so login screen never gets stuck */
  var _ilsTimer=setTimeout(function(){
    var wr=document.getElementById('fam-list-wrap');
    if(wr&&wr.innerHTML.indexOf('Retry')<0)wr.innerHTML='<div style="text-align:center;padding:20px"><div style="color:var(--text-tertiary);font-size:13px">Connection slow. <button onclick="initLoginScreen()" style="background:none;border:none;color:var(--brand);cursor:pointer;font-size:13px;font-weight:700">Retry</button></div></div>';
  },6000);
  db.collection('families').get()
    .then(function(snap){clearTimeout(_ilsTimer);
      if(snap.empty){
        wrap.innerHTML='<div style="color:var(--text-tertiary);font-size:13px;text-align:center;padding:12px">No family accounts yet.<br>Use master login to create one.</div>';
        return;
      }
      /* filter out deactivated accounts client-side — no index needed */
      window._loginFamilies=snap.docs.map(function(d){return d.data();}).filter(function(f){return f.active!==false;}).sort(function(a,b){return a.name.localeCompare(b.name);});
      /* Build dropdown + family cards */
      var h='<label style="font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:0.5px;display:block;margin-bottom:8px">SELECT YOUR FAMILY</label>';
      h+='<div style="display:grid;gap:10px">';
      for(var fi=0;fi<window._loginFamilies.length;fi++){
        var fam=window._loginFamilies[fi];
        var initials=fam.name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
        h+='<button onclick="selectLoginFamily('+fi+')" id="lf-btn-'+fi+'"';
        h+=' style="background:var(--bg);border:2px solid #E4E7EC;border-radius:16px;padding:14px 16px;cursor:pointer;text-align:left;transition:all 0.15s;display:flex;align-items:center;gap:12px;width:100%">';
        h+='<div style="width:42px;height:42px;background:#FF5C3518;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:Sora,sans-serif;font-size:15px;font-weight:800;color:#FF5C35;flex-shrink:0">'+initials+'</div>';
        h+='<div style="text-align:left"><div style="font-family:Sora,sans-serif;font-size:15px;font-weight:700;color:var(--text-primary)">'+fam.name+'</div>';
        h+='<div style="font-size:11px;color:var(--text-tertiary);margin-top:1px">'+fam.maxKids+' kids · '+fam.plan+'</div></div>';
        h+='<div style="margin-left:auto;font-size:18px;color:#CBD5E1">›</div>';
        h+='</button>';
      }
      h+='</div>';
      wrap.innerHTML=h;
    })
    .catch(function(e){
      wrap.innerHTML='<div style="color:#EF4444;font-size:13px;padding:12px;text-align:center">Failed to load families.<br>Check your internet connection.<br><br><button onclick="initLoginScreen()" style="background:#FF5C35;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px">Try Again</button></div>';
    });
}

var _selectedFamilyIdx=-1;

function selectLoginFamily(idx){
  _selectedFamilyIdx=idx;
  /* highlight selected card */
  var fams=window._loginFamilies||[];
  for(var fi=0;fi<fams.length;fi++){
    var btn=document.getElementById('lf-btn-'+fi);
    if(!btn)continue;
    if(fi===idx){
      btn.style.borderColor='#FF5C35';
      btn.style.background='#FFF7ED';
    } else {
      btn.style.borderColor='#E4E7EC';
      btn.style.background='#F8FAFC';
    }
  }
  /* show password field */
  var pw=document.getElementById('li-pass-wrap');
  var loginBtn=document.getElementById('li-btn');
  if(pw){pw.style.display='block';}
  if(loginBtn){loginBtn.style.display='block';}
  /* focus password */
  var passEl=document.getElementById('li-pass');
  if(passEl){passEl.value='';setTimeout(function(){passEl.focus();},100);}
}

function doLogin(){
  var errEl=document.getElementById('li-err');
  var pass=(document.getElementById('li-pass').value||'').trim();
  if(_selectedFamilyIdx<0){ return;
    errEl.style.display='block';errEl.textContent='Please select your family first.';return;
  }
  if(!pass){errEl.style.display='block';errEl.textContent='Please enter your password.';return;}
  errEl.style.display='none';
  var fam=(window._loginFamilies||[])[_selectedFamilyIdx];
  if(!fam){errEl.style.display='block';errEl.textContent='Family not found. Please reload.';return;}
  if(fam.password!==pass){
    errEl.style.display='block';errEl.textContent='Incorrect password. Try again.';
    document.getElementById('li-pass').value='';
    document.getElementById('li-pass').focus();
    return;
  }
  if(fam.active===false){errEl.style.display='block';errEl.textContent='This account has been deactivated.';return;}
  SESSION={familyId:fam.id,familyName:fam.name,isMaster:false,maxKids:fam.maxKids||3};
  saveSession();
  window._autoRecoveryAttempted=false;
  if(db){db.collection('families').doc(fam.id).update({lastActive:firebase.firestore.FieldValue.serverTimestamp(),loginCount:firebase.firestore.FieldValue.increment(1)}).catch(function(){});}
  renderHome();
}


function doMasterLogin(){
  var muEl=document.getElementById('li-muser');
  var mpEl=document.getElementById('li-mpass');
  var errEl=document.getElementById('li-merr');
  if(!muEl||!mpEl){console.error('Master login inputs not found');return;}
  var user=(muEl.value||'').trim().toLowerCase();
  var pass=(mpEl.value||'').trim();
  if(!user||!pass){if(errEl){errEl.style.display='block';errEl.textContent='Please enter both fields.';}return;}
  if(user===MASTER_USER.toLowerCase()&&pass===MASTER_PASS){
    SESSION={familyId:'master',familyName:'Master Account',isMaster:true,maxKids:99};
    saveSession();
    if(!window._smartDB){try{initFirebase();}catch(e){}}
    renderHome();
  } else {
    if(errEl){errEl.style.display='block';errEl.textContent='Incorrect credentials. Try again.';}
  }
}


function showMasterLogin(){
  document.getElementById('li-family-mode').style.display='none';
  document.getElementById('li-master-mode').style.display='block';
}

function showFamilyLogin(){
  document.getElementById('li-master-mode').style.display='none';
  document.getElementById('li-family-mode').style.display='block';
}

function doLogout(){
  window._autoRecoveryAttempted=false;
  clearSession();
  _selectedFamilyIdx=-1;
  var p=document.getElementById('li-pass');if(p)p.value='';
  var e=document.getElementById('li-err');if(e)e.style.display='none';
  /* reset to family mode */
  showFamilyLogin();
  go('s-login');
  /* re-init login screen */
  setTimeout(initLoginScreen,200);
}

/* ── Storage key scoping by family ── */
function familyKey(key){
  return SESSION.familyId ? 'smart_'+SESSION.familyId+'_'+key : 'smart_'+key;
}

/* ── Master: create a family ── */
function createFamily(name, username, password, maxKids, plan){
  var db=window._smartDB;if(!db)return Promise.reject('no db');
  var id='fam_'+Date.now();
  var famData={id:id,name:name,username:username.toLowerCase(),password:password,maxKids:parseInt(maxKids)||3,plan:plan||'family',active:true,createdAt:new Date().toISOString()};
  return db.collection('families').doc(id).set(famData).then(function(){return famData;});
}

/* ── Master: load all families ── */
function loadAllFamilies(){
  var db=window._smartDB;if(!db)return Promise.resolve([]);
  return db.collection('families').orderBy('name').get().then(function(snap){
    return snap.docs.map(function(d){return d.data();});
  });
}

/* ── Master: update a family ── */
function updateFamily(id, updates){
  var db=window._smartDB;if(!db)return Promise.reject('no db');
  return db.collection('families').doc(id).update(updates);
}

/* ── Master: delete a family ── */
function deleteFamily(id){
  var db=window._smartDB;if(!db)return Promise.reject('no db');
  return db.collection('families').doc(id).delete();
}

function adminLoginAs(famId, famName){
  SESSION.familyId = famId;
  SESSION.familyName = famName;
  SESSION.isMaster = true;
  saveSession();

  /* Check if this family's data is already on this device */
  var localKey = 'smart_'+famId+'_profiles';
  var localRaw = localStorage.getItem(localKey);
  var hasLocal = localRaw && JSON.parse(localRaw).length > 0;

  if(hasLocal){
    renderHome();
    return;
  }

  /* Not on this device — fetch from Firestore (admin needs cross-device access) */
  if(!db){ renderHome(); return; }

  var done = false;
  function finish(){ if(done) return; done = true; renderHome(); }

  /* 5 second max — never get stuck */
  var t = setTimeout(finish, 5000);

  db.collection('families').doc(famId).collection('profiles').get()
    .then(function(snap){
      clearTimeout(t);
      if(snap && !snap.empty){
        var profs = [];
        snap.docs.forEach(function(doc){
          var d = doc.data();
          if(d.id && d.name) profs.push({id:d.id, name:d.name, grade:d.grade||1, grades:d.grades||[d.grade||1], avatar:d.avatar||''});
        });
        if(profs.length > 0) localStorage.setItem(localKey, JSON.stringify(profs));
      }
      finish();
    })
    .catch(function(){ clearTimeout(t); finish(); });
}

function adminMigrateProfiles(famId, famName){
  /* Move profiles stored under master to this family's storage key */
  var masterKey = 'smart_master_profiles';
  var familyKey = 'smart_'+famId+'_profiles';

  var masterData = localStorage.getItem(masterKey);
  var familyData = localStorage.getItem(familyKey);

  if(!masterData){
    alert('No profiles found in master account to migrate.');
    return;
  }

  var masterProfiles = JSON.parse(masterData);
  if(!masterProfiles || !masterProfiles.length){
    alert('Master account has no profiles to migrate.');
    return;
  }

  var familyProfiles = familyData ? JSON.parse(familyData) : [];
  var names = masterProfiles.map(function(p){return p.name;}).join(', ');
  var msg = 'Move '+names+' to '+famName+'? Master account keeps a copy.';











  if(!confirm(msg)) return;

  /* Merge: add master profiles that don't already exist in family */
  var existingIds = familyProfiles.map(function(p){return p.id;});
  var added = 0;
  masterProfiles.forEach(function(p){
    if(existingIds.indexOf(p.id) < 0){
      familyProfiles.push(p);
      added++;
      /* Copy progress and history for each profile */
      ['p','h','av'].forEach(function(suffix){
        var val = localStorage.getItem('smart_'+p.id+'_'+suffix);
        if(val) localStorage.setItem('smart_'+p.id+'_'+suffix, val);
      });
    }
  });

  localStorage.setItem(familyKey, JSON.stringify(familyProfiles));

  /* Update maxKids in Firestore to match profile count if needed */
  var db = window._smartDB;
  if(db && familyProfiles.length > 0){
    db.collection('families').doc(famId).update({
      maxKids: Math.max(familyProfiles.length, 3)
    }).catch(function(){});
  }

  alert('Done! Moved '+added+' profile(s) to '+famName+'. Click View as Family to see them.');


}

/* Migrate profiles from one storage key to another */
function migrateProfilesToFamily(fromKey, toKey){
  var data = localStorage.getItem(fromKey);
  if(!data){ alert('No profiles found at: '+fromKey); return false; }
  var profiles = JSON.parse(data);
  if(!profiles || !profiles.length){ alert('No profiles to migrate.'); return false; }
  /* Also migrate each profile's progress and history */
  profiles.forEach(function(p){
    var pid = p.id;
    ['p','h','av'].forEach(function(suffix){
      var oldK = 'smart_'+pid+'_'+suffix;
      var val = localStorage.getItem(oldK);
      if(val) localStorage.setItem(oldK, val); /* same key, already correct */
    });
  });
  localStorage.setItem(toKey, data);
  return profiles.length;
}

/* ── Profile Recovery ── */
function recoverProfiles(){
  var famId=SESSION.familyId||'master';
  var key='smart_'+famId+'_profiles';
  var candidates=[key,'smart_master_profiles','smart_profiles'];
  for(var ci=0;ci<candidates.length;ci++){
    try{var raw=localStorage.getItem(candidates[ci]);
      if(raw){var parsed=JSON.parse(raw);
        if(parsed&&parsed.length>0){
          localStorage.setItem(key,raw);
          alert('Recovered '+parsed.length+' profile(s)!');
          renderHome();return;
        }
      }
    }catch(e){}
  }
  if(!db){alert('Cannot connect to cloud. Please add profiles manually.');return;}
  db.collection('profiles').get().then(function(snap){
    if(snap.empty){alert('No profiles found in cloud. Please add manually.');return;}
    var profiles=[];
    snap.docs.forEach(function(doc){
      var d=doc.data();
      if(d.id&&d.name){
        profiles.push({id:d.id,name:d.name,grade:d.grade||1,grades:d.grades||[d.grade||1],avatar:d.avatar||''});
        if(d.progress){try{localStorage.setItem('smart_'+(d.grade||1)+'_'+d.id+'_p',d.progress);}catch(e){}}
        if(d.history){try{localStorage.setItem('smart_'+(d.grade||1)+'_'+d.id+'_h',d.history);}catch(e){}}
      }
    });
    if(profiles.length>0){
      localStorage.setItem(key,JSON.stringify(profiles));
      alert('Recovered '+profiles.length+' profile(s) from cloud!');
      renderHome();
    } else {
      alert('No profiles found. Please add manually.');
    }
  }).catch(function(e){alert('Recovery error: '+e.message);});
}

/* ── Delete Profile ── */
function confirmDeleteProfile(pid, name){
  if(!confirm('Delete '+name+'? This will remove all their progress and history. This cannot be undone.')){
    return;
  }
  deleteProfile(pid);
}

function deleteProfile(pid){
  /* Remove from profiles array */
  var profiles = loadProfiles();
  var newProfiles = profiles.filter(function(p){ return p.id !== pid; });
  saveProfiles(newProfiles);

  /* Clear all localStorage data for this profile */
  var keysToRemove = [];
  for(var i=0; i<localStorage.length; i++){
    var k = localStorage.key(i);
    if(k && k.indexOf(pid) >= 0){
      keysToRemove.push(k);
    }
  }
  keysToRemove.forEach(function(k){ localStorage.removeItem(k); });

  /* Remove from Firestore */
  if(db){
    var famId = SESSION.familyId||'master';
    db.collection('families').doc(famId).collection('profiles').doc(pid).delete()
      .catch(function(e){ console.log('Delete from cloud error:', e); });
    db.collection('profiles').doc(pid).delete()
      .catch(function(e){ console.log('Flat delete error:', e); });
  }

  renderHome();
}

document.addEventListener('keydown', function(e){
  var screen = document.querySelector('.screen.active');
  if(!screen) return;
  var sid = screen.id;
  /* Drill mode keyboard */
  if(sid === 's-drill'){
    if(e.key >= '0' && e.key <= '9'){ni(parseInt(e.key,10));e.preventDefault();}
    else if(e.key === 'Backspace'){nd();e.preventDefault();}
    else if(e.key === 'Enter'){subDrill();e.preventDefault();}
    else if(e.key === '-'){toggleNeg();e.preventDefault();}
  }
  /* Concept mode keyboard */
  if(sid === 's-concept'){
    if(e.key === '1' || e.key === 'a') answerByKey(0);
    else if(e.key === '2' || e.key === 'b') answerByKey(1);
    else if(e.key === '3' || e.key === 'c') answerByKey(2);
    else if(e.key === '4' || e.key === 'd') answerByKey(3);
  }
  /* Login screen keyboard */
  var loginScreen = document.getElementById('s-login');
  if(loginScreen && loginScreen.classList.contains('active')){
    if(e.key>='0'&&e.key<='9'){
      var pw=document.getElementById('li-pass');
      if(pw&&document.activeElement!==pw){pw.focus();}
    }
  }
  /* PIN modal keyboard */
  var pinModal = document.getElementById('pin-modal');
  if(pinModal){
    if(e.key >= '0' && e.key <= '9'){pinPress(parseInt(e.key,10));e.preventDefault();}
    else if(e.key === 'Backspace'){pinClear();e.preventDefault();}
    else if(e.key === 'Escape'){pinCancel();e.preventDefault();}
  }
});

var READING_ST = {
  grade:1, storyIdx:0, questionIdx:0,
  score:0, total:0, mode:'story',
  profileId:null, answered:false, startTime:0,
  storyPool:[], usedStories:[]
};

function getStoriesForGrade(g){
  var gs=String(g);
  if(STORIES[gs]&&STORIES[gs].length) return STORIES[gs];
  /* fallback to adjacent grade */
  for(var d=1;d<=3;d++){
    if(STORIES[String(g-d)]&&STORIES[String(g-d)].length) return STORIES[String(g-d)];
    if(STORIES[String(g+d)]&&STORIES[String(g+d)].length) return STORIES[String(g+d)];
  }
  return [];
}

function startReadingMode(grade, pid, mode){
  READING_ST.grade = grade||ST.grade||1;
  READING_ST.profileId = pid||ST.profileId||'';
  READING_ST.mode = mode||'story';
  READING_ST.score = 0;
  READING_ST.total = 0;
  READING_ST.answered = false;
  READING_ST.startTime = Date.now();
  if(mode==='vocab')      { startVocabMode(); return; }
  if(mode==='analogy')    { startAnalogyMode(); return; }
  if(mode==='grammar')    { startGrammarMode(grade,pid); return; }
  if(mode==='phonics')    { startPhonicsMode(grade,pid); return; }
  if(mode==='skills')     { startSkillsMode(grade,pid); return; }
  /* story mode */
  var pool = getStoriesForGrade(READING_ST.grade);
  if(!pool.length){ alert('No stories yet for this grade. Coming soon!'); return; }
  READING_ST.storyPool = pool.slice().sort(function(){return Math.random()-0.5;});
  READING_ST.storyIdx = 0;
  READING_ST.questionIdx = 0;
  renderReadingQuestion();
}

/* ─── READING COMPREHENSION ─────────────────── */
function renderReadingQuestion(){
  var pool  = READING_ST.storyPool;
  var story = pool[READING_ST.storyIdx];
  if(!story){ finishReading(); return; }
  var q = story.qs[READING_ST.questionIdx];
  if(!q){ finishReading(); return; }

  READING_ST.answered = false;
  var gc  = gradeConf(READING_ST.grade);
  var qNum = READING_ST.questionIdx+1;
  var qTot = story.qs.length;
  var prog = Math.round((qNum-1)/qTot*100);

  var h='<div class="hdr">'
      +'<div style="float:left"><button class="bbtn" onclick="finishReading()">✕ Exit</button></div>'
      +'<div style="text-align:center;padding-top:6px;font-size:13px;font-weight:700;color:'+gc.color+'">📖 Reading · '+qNum+' / '+qTot+'</div>'
      +'<div style="clear:both"></div>'
      +'<div style="height:4px;background:var(--bg-subtle);border-radius:2px;margin-top:8px">'
      +'<div style="height:4px;width:'+prog+'%;background:'+gc.color+';border-radius:2px;transition:width .3s"></div>'
      +'</div></div>';

  /* passage */
  h+='<div class="reading-card">'
     +'<div class="story-title">'+story.title+'</div>'
     +'<div style="font-size:14px;line-height:1.9;color:var(--text-primary)">'+story.text.replace(/\n/g,'<br>')+'</div>';
  if(story.vocab&&story.vocab.length){
    h+='<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">'
       +'<div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text-tertiary);margin-bottom:6px">VOCABULARY</div>';
    story.vocab.forEach(function(v){
      h+='<div style="font-size:13px;margin-bottom:3px;color:var(--text-secondary)"><b style="color:var(--brand)">'+v.w+'</b> — '+v.d+'</div>';
    });
    h+='</div>';
  }
  h+='</div>';

  /* question + choices */
  h+='<div class="card" style="text-align:left;margin-bottom:12px">'
     +'<div style="font-size:15px;font-weight:600;color:var(--text-primary);line-height:1.5;margin-bottom:14px">'+q.q+'</div>';
  q.ch.forEach(function(choice,ci){
    var ltr=['A','B','C','D'][ci];
    h+='<button class="reading-choice" id="rc-'+ci+'" onclick="answerReading('+ci+','+q.an+')">'
       +'<span style="background:var(--bg-subtle);border-radius:6px;padding:2px 8px;font-weight:700;margin-right:8px;font-size:12px;flex-shrink:0">'+ltr+'</span>'
       +choice+'</button>';
  });
  h+='</div><div id="reading-feedback"></div>';

  el('s-reading').innerHTML=h;
  go('s-reading');
  READING_ST.total++;
}

function answerReading(chosen, correct){
  if(READING_ST.answered)return;
  READING_ST.answered=true;
  var ok=(chosen===correct);
  if(ok)READING_ST.score++;
  for(var i=0;i<4;i++){
    var b=document.getElementById('rc-'+i);
    if(!b)continue;
    if(i===correct)b.className='reading-choice correct';
    else if(i===chosen&&!ok)b.className='reading-choice wrong';
    b.onclick=null;
  }
  var story=READING_ST.storyPool[READING_ST.storyIdx];
  var q=story.qs[READING_ST.questionIdx];
  var fb=document.getElementById('reading-feedback');
  if(fb){
    fb.innerHTML='<div style="background:'+(ok?'var(--green-light)':'var(--red-light)')+';border:1.5px solid '+(ok?'var(--green)':'var(--red)')+';border-radius:12px;padding:12px 16px;margin-bottom:12px">'
      +'<div style="font-weight:700;color:'+(ok?'var(--green)':'var(--red)')+'">'+(ok?'✓ Correct!':'✗ Not quite')+'</div>'
      +(ok?'':'<div style="font-size:13px;color:var(--text-secondary);margin-top:4px">Answer: <b>'+q.ch[correct]+'</b></div>')
      +'</div>'
      +'<button onclick="nextReadingQ()" class="btn btn-primary">Next →</button>';
  }
}

function nextReadingQ(){
  READING_ST.questionIdx++;
  var story=READING_ST.storyPool[READING_ST.storyIdx];
  if(READING_ST.questionIdx>=story.qs.length){ finishReading(); return; }
  renderReadingQuestion();
}

/* ─── VOCABULARY DRILL ──────────────────────── */
var _vocabPool=[], _vocabIdx=0;

function startVocabMode(){
  var g=READING_ST.grade;
  var gKey=g>=8?'8':g>=6?'67':g>=4?'45':g>=2?'23':'k1';
  var bank=(VOCAB_BANK[gKey]||VOCAB_BANK['k1']).slice();
  /* shuffle and build question pool with mixed types */
  _vocabPool=buildVocabPool(bank);
  _vocabIdx=0;
  READING_ST.answered=false;
  renderVocabQ();
}

/* Build a pool of mixed question types from the word bank */
function buildVocabPool(bank){
  var pool=[];
  var shuffled=bank.slice().sort(function(){return Math.random()-0.5;});
  var types=['meaning','reverse','synonym','context'];
  /* For small banks use fewer types */
  var usableTypes=types.filter(function(t){
    if(t==='synonym') return bank.some(function(w){return w.syn&&w.syn.length>0;});
    if(t==='context') return bank.some(function(w){return w.ex&&w.ex.length>0;});
    return true;
  });
  shuffled.forEach(function(word,i){
    var type=usableTypes[i%usableTypes.length];
    /* fallback if this word can't support the type */
    if(type==='synonym'&&(!word.syn||!word.syn.length)) type='meaning';
    if(type==='context'&&(!word.ex||!word.ex.length)) type='meaning';
    pool.push({word:word, type:type, bank:bank});
  });
  return pool;
}

function renderVocabQ(){
  if(_vocabIdx>=_vocabPool.length){finishReading();return;}
  READING_ST.answered=false;
  var item=_vocabPool[_vocabIdx];
  var word=item.word;
  var type=item.type;
  var bank=item.bank;
  var gc=gradeConf(READING_ST.grade);
  var prog=Math.round(_vocabIdx/_vocabPool.length*100);

  var question='', promptLabel='', choices=[], correct=0, bigDisplay='';

  if(type==='meaning'){
    /* Word → Definition */
    promptLabel='WHAT DOES THIS WORD MEAN?';
    bigDisplay='<div style="font-family:Sora,sans-serif;font-size:44px;font-weight:900;color:var(--brand);letter-spacing:-1px;margin-bottom:10px">'+word.w+'</div>';
    if(word.ex) bigDisplay+='<div style="font-size:13px;color:var(--text-tertiary);font-style:italic">"'+word.ex+'"</div>';
    var wrongDefs=bank.filter(function(v){return v.w!==word.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(v){return v.def;});
    choices=[word.def].concat(wrongDefs).sort(function(){return Math.random()-0.5;});
    correct=choices.indexOf(word.def);

  } else if(type==='reverse'){
    /* Definition → Word */
    promptLabel='WHICH WORD FITS THIS MEANING?';
    bigDisplay='<div style="font-size:17px;font-weight:600;color:var(--text-primary);line-height:1.6;padding:0 4px">"'+word.def+'"</div>';
    var wrongWords=bank.filter(function(v){return v.w!==word.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(v){return v.w;});
    choices=[word.w].concat(wrongWords).sort(function(){return Math.random()-0.5;});
    correct=choices.indexOf(word.w);

  } else if(type==='synonym'){
    /* Synonym pick */
    var isSyn=Math.random()>0.5;
    if(!word.ant||!word.ant.length) isSyn=true;
    promptLabel=isSyn?'WHICH WORD IS A SYNONYM OF...':'WHICH WORD IS AN ANTONYM OF...';
    bigDisplay='<div style="font-family:Sora,sans-serif;font-size:44px;font-weight:900;color:var(--brand);letter-spacing:-1px">'+word.w+'</div>';
    var target=isSyn?word.syn:word.ant;
    /* wrong choices: other words from bank */
    var wrongSyns=bank.filter(function(v){return v.w!==word.w&&v.w!==target;}).sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(v){return v.w;});
    choices=[target].concat(wrongSyns).sort(function(){return Math.random()-0.5;});
    correct=choices.indexOf(target);

  } else {
    /* Context clue — fill in the blank */
    promptLabel='WHICH WORD COMPLETES THE SENTENCE?';
    var blank=word.ex.replace(new RegExp('\\b'+word.w+'\\b','i'),'______');
    /* if no replacement happened, use a generic sentence */
    if(blank===word.ex) blank='She showed great ______ when she faced the challenge.';
    bigDisplay='<div style="font-size:17px;font-weight:600;color:var(--text-primary);line-height:1.8;padding:4px">"'+blank+'"</div>';
    var wrongCtx=bank.filter(function(v){return v.w!==word.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(v){return v.w;});
    choices=[word.w].concat(wrongCtx).sort(function(){return Math.random()-0.5;});
    correct=choices.indexOf(word.w);
  }

  /* type badge colors */
  var typeMeta={
    meaning: {label:'Meaning',  color:'#FF5C35', bg:'#FFF7F5'},
    reverse: {label:'Definition →Word', color:'#8B5CF6', bg:'#F5F3FF'},
    synonym: {label:'Synonym / Antonym', color:'#10B981', bg:'#F0FDF4'},
    context: {label:'Context Clue', color:'#3B82F6', bg:'#EFF6FF'},
  };
  var tm=typeMeta[type]||typeMeta.meaning;

  var h='<div class="hdr">'
      +'<div style="float:left"><button class="bbtn" onclick="finishReading()">✕ Exit</button></div>'
      +'<div style="text-align:center;padding-top:6px;font-size:13px;font-weight:700;color:'+gc.color+'">📝 Vocabulary · '+(_vocabIdx+1)+'/'+_vocabPool.length+'</div>'
      +'<div style="clear:both"></div>'
      +'<div style="height:4px;background:var(--bg-subtle);border-radius:2px;margin-top:8px">'
      +'<div style="height:4px;width:'+prog+'%;background:'+gc.color+';border-radius:2px;transition:width .3s"></div>'
      +'</div></div>';

  h+='<div class="card card-raised" style="text-align:center;padding:28px 20px;margin-bottom:14px">'
     +'<div style="display:inline-block;background:'+tm.bg+';color:'+tm.color+';border-radius:99px;padding:4px 14px;font-size:11px;font-weight:800;letter-spacing:1.5px;margin-bottom:16px">'+tm.label.toUpperCase()+'</div>'
     +'<div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-tertiary);margin-bottom:14px">'+promptLabel+'</div>'
     +bigDisplay
     +'</div>';

  choices.forEach(function(ch,ci){
    var ltr=['A','B','C','D'][ci];
    h+='<button class="reading-choice" id="vc-'+ci+'" onclick="answerVocab('+ci+','+correct+')">'
       +'<span style="background:var(--bg-subtle);border-radius:6px;padding:2px 8px;font-weight:700;margin-right:8px;font-size:12px;flex-shrink:0">'+ltr+'</span>'
       +ch+'</button>';
  });
  h+='<div id="vocab-fb"></div>';
  el('s-reading').innerHTML=h; go('s-reading');
  READING_ST.total++;
}

function answerVocab(chosen,correct){
  if(READING_ST.answered)return;
  READING_ST.answered=true;
  var ok=(chosen===correct);
  if(ok)READING_ST.score++;
  for(var i=0;i<4;i++){
    var b=document.getElementById('vc-'+i);
    if(!b)continue;
    if(i===correct)b.className='reading-choice correct';
    else if(i===chosen&&!ok)b.className='reading-choice wrong';
    b.onclick=null;
  }
  var item=_vocabPool[_vocabIdx];
  var word=item.word;
  var fb=document.getElementById('vocab-fb');
  if(fb){
    var extra='';
    if(word.syn&&word.syn.length) extra+='<span style="margin-right:10px"><b>Synonym:</b> '+word.syn+'</span>';
    if(word.ant&&word.ant.length) extra+='<span><b>Antonym:</b> '+word.ant+'</span>';
    fb.innerHTML='<div style="background:'+(ok?'var(--green-light)':'var(--red-light)')+';border:1.5px solid '+(ok?'var(--green)':'var(--red)')+';border-radius:12px;padding:12px 16px;margin:12px 0">'
      +'<div style="font-weight:700;color:'+(ok?'var(--green)':'var(--red)')+'">'+(ok?'✓ Correct!':'✗ Not quite — the answer is: <b>'+item.word.w+'</b>')+'</div>'
      +(extra?'<div style="font-size:12px;color:var(--text-secondary);margin-top:6px">'+extra+'</div>':'')
      +(word.def?'<div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;font-style:italic">'+word.def+'</div>':'')
      +'</div>'
      +'<button onclick="nextVocabQ()" class="btn btn-primary">Next →</button>';
  }
}

function nextVocabQ(){
  READING_ST.answered=false;
  _vocabIdx++;
  renderVocabQ();
}
/* ─── ANALOGIES ─────────────────────────────── */

function answerAnalogy(chosen,correct){
  if(READING_ST.answered)return;

/* ═══════════════════════════════════════════
   GRAMMAR MODE
═══════════════════════════════════════════ */

function getGrammarPool(grade){
  /* Map grade number to band key */
  var g=parseInt(grade)||1;
  var band=g<=1?'k1':g<=3?'23':g<=5?'45':g<=7?'67':'8';
  var pool=[];
  /* Include current band + previous band for variety */
  var bands=['k1','23','45','67','8'];
  var bIdx=bands.indexOf(band);
  for(var bi=0;bi<=bIdx&&bi<bands.length;bi++){
    var b=GRAMMAR_BANK[bands[bi]];
    if(b) for(var qi=0;qi<b.length;qi++) pool.push(b[qi]);
  }
  return pool;
}

var _grammarPool=[], _grammarIdx=0, _grammarScore=0;

function startGrammarMode(grade,pid){
  READING_ST.grade=grade||ST.grade||1;
  READING_ST.profileId=pid||ST.profileId||'';
  var pool=getGrammarPool(READING_ST.grade);
  /* Shuffle */
  _grammarPool=pool.slice().sort(function(){return Math.random()-0.5;}).slice(0,20);
  _grammarIdx=0;
  _grammarScore=0;
  renderGrammarQ();
}

function renderGrammarQ(){
  if(_grammarIdx>=_grammarPool.length){finishGrammar();return;}
  var item=_grammarPool[_grammarIdx];
  var gc=gradeConf(READING_ST.grade||1);
  var prog=_grammarIdx+1, total=_grammarPool.length;
  var pct=Math.round(_grammarIdx/total*100);

  var h='<div class="hdr"><div style="float:left"><button class="bbtn" onclick="renderReadingHub('+READING_ST.grade+',\''+READING_ST.profileId+'\')">‹ Back</button></div>'
    +'<div style="text-align:center;padding-top:6px;font-size:15px;font-weight:700;color:#D97706">✏️ Grammar · '+prog+'/'+total+'</div>'
    +'<div style="clear:both"></div></div>';

  /* Progress bar */
  h+='<div style="height:4px;background:var(--bg-subtle);margin:0 0 16px"><div style="height:100%;width:'+pct+'%;background:#D97706;transition:width .3s"></div></div>';

  /* Category badge */
  h+='<div style="text-align:center;margin-bottom:12px"><span style="background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;letter-spacing:.5px">'+item.cat+'</span></div>';

  /* Question */
  h+='<div style="background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:24px 20px;margin:0 0 16px;text-align:center">'
    +'<div style="font-family:Sora,sans-serif;font-size:17px;font-weight:700;color:var(--text-primary);line-height:1.5">'+item.q+'</div>'
    +'</div>';

  /* Answer choices */
  h+='<div id="grammar-choices">';
  for(var ci=0;ci<item.ch.length;ci++){
    h+='<button class="reading-choice" id="gc-'+ci+'" onclick="answerGrammar('+ci+','+item.an+')">'
      +'<span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:#D9770618;color:#D97706;font-weight:800;font-size:13px;line-height:28px;margin-right:10px">'+['A','B','C','D'][ci]+'</span>'
      +item.ch[ci]+'</button>';
  }
  h+='</div>';
  h+='<div id="grammar-fb" style="margin-top:16px"></div>';

  el('s-reading').innerHTML=h;
  go('s-reading');
}

function answerGrammar(chosen,correct){
  /* Disable all buttons */
  for(var i=0;i<4;i++){
    var btn=document.getElementById('gc-'+i);
    if(!btn) continue;
    btn.onclick=null;
    if(i===correct){
      btn.style.background='#ECFDF5';
      btn.style.borderColor='#10B981';
      btn.style.color='#065F46';
    } else if(i===chosen && chosen!==correct){
      btn.style.background='#FEF2F2';
      btn.style.borderColor='#EF4444';
      btn.style.color='#991B1B';
    } else {
      btn.style.opacity='0.45';
    }
  }

  var ok=(chosen===correct);
  if(ok) _grammarScore++;

  /* Record to history */
  var now=Date.now();
  READING_ST.history=READING_ST.history||[];
  READING_ST.history.push({lid:'READING_GRAMMAR',date:now,time:0,ok:ok?1:0});

  /* Explanation */
  var item=_grammarPool[_grammarIdx];
  var fb=document.getElementById('grammar-fb');
  if(fb){
    fb.innerHTML='<div style="background:'+(ok?'#ECFDF5':'#FEF2F2')+';border:1.5px solid '+(ok?'#10B981':'#EF4444')+';border-radius:16px;padding:16px;text-align:left">'
      +'<div style="font-weight:800;font-size:15px;color:'+(ok?'#065F46':'#991B1B')+';margin-bottom:6px">'+(ok?'✓ Correct!':'✗ Not quite')+'</div>'
      +'<div style="font-size:14px;color:var(--text-secondary);line-height:1.5">'+item.exp+'</div>'
      +'</div>'
      +'<button class="btn" style="margin-top:14px;background:#D97706;color:#fff" onclick="nextGrammarQ()">Next Question →</button>';
  }

  _grammarIdx++;
}

function nextGrammarQ(){
  renderGrammarQ();
}

function finishGrammar(){
  var total=_grammarPool.length;
  var pct=Math.round(_grammarScore/total*100);
  var grade=READING_ST.grade||1;
  var pid=READING_ST.profileId||'';

  /* Save to history */
  if(pid){
    var h4=loadHist(grade,pid)||[];
    h4.push({lid:'READING_GRAMMAR',date:Date.now(),time:0,score:_grammarScore,total:total,ok:pct>=70?1:0});
    saveHist(grade,h4,pid);
  }

  var gc=gradeConf(grade);
  var emoji=pct>=90?'🏆':pct>=70?'⭐':'📚';
  var msg=pct>=90?'Outstanding! Grammar master!':pct>=70?'Great work! Keep it up!':'Good effort — keep practicing!';

  var h='<div class="hdr"><button class="bbtn" onclick="renderReadingHub('+grade+',\''+pid+'\')">‹ Back</button></div>';
  h+='<div style="text-align:center;padding:40px 20px 24px">';
  h+='<div style="font-size:56px;margin-bottom:12px">'+emoji+'</div>';
  h+='<div style="font-family:Sora,sans-serif;font-size:28px;font-weight:900;color:var(--text-primary);margin-bottom:6px">'+pct+'%</div>';
  h+='<div style="font-size:15px;color:var(--text-secondary);margin-bottom:4px">'+_grammarScore+' / '+total+' correct</div>';
  h+='<div style="font-size:14px;color:var(--text-tertiary)">'+msg+'</div>';
  h+='</div>';

}

/* ═══════════════════════════════════════════
   SOUND ENGINE — Web Audio API, no files needed
═══════════════════════════════════════════ */
var _audioCtx = null;
function getAudioCtx(){
  if(!_audioCtx){
    try{ _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  return _audioCtx;
}

function playTone(freq, duration, type, vol, delay){
  var ctx = getAudioCtx(); if(!ctx) return;
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, ctx.currentTime + (delay||0));
  gain.gain.linearRampToValueAtTime(vol||0.3, ctx.currentTime + (delay||0) + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (delay||0) + duration);
  osc.start(ctx.currentTime + (delay||0));
  osc.stop(ctx.currentTime + (delay||0) + duration + 0.05);
}

function soundCorrect(){
  /* Quick ascending ding — two notes */
  playTone(523, 0.12, 'sine', 0.25, 0);    /* C5 */
  playTone(659, 0.18, 'sine', 0.25, 0.1);  /* E5 */
}

function soundWrong(){
  /* Short descending buzz */
  playTone(220, 0.08, 'sawtooth', 0.15, 0);
  playTone(180, 0.18, 'sawtooth', 0.12, 0.08);
}

function soundCheer5(){
  /* Ascending fanfare — 5 in a row */
  var notes = [523, 587, 659, 784, 1047]; /* C D E G C */
  notes.forEach(function(f, i){ playTone(f, 0.18, 'sine', 0.3, i*0.1); });
}

function soundCheer10(){
  /* Victory fanfare — 10 in a row */
  var notes = [523,659,784,1047,1047,784,1047];
  notes.forEach(function(f,i){ playTone(f, 0.22, 'sine', 0.35, i*0.09); });
  /* Add harmony */
  var harm = [659,784,988,1319,1319,988,1319];
  harm.forEach(function(f,i){ playTone(f, 0.18, 'triangle', 0.15, i*0.09 + 0.04); });
}

function soundPerfect(){
  /* Full celebration — ascending run + held chord */
  var run = [523,587,659,698,784,880,988,1047];
  run.forEach(function(f,i){ playTone(f, 0.15, 'sine', 0.3, i*0.07); });
  /* Held chord after */
  [523,659,784,1047].forEach(function(f){
    playTone(f, 0.8, 'sine', 0.2, run.length*0.07 + 0.05);
  });
}

function manualSync(){
  var btn=document.getElementById('sync-btn');
  if(btn){btn.innerHTML='☁ Syncing...';btn.disabled=true;btn.style.opacity='0.7';}
  if(!db){
    if(btn){btn.innerHTML='✗ No cloud connection';btn.style.color='#DC2626';btn.disabled=false;}
    return;
  }
  var profiles=loadProfiles();
  if(!profiles.length||!SESSION.familyId||SESSION.familyId==='master'){
    if(btn){btn.innerHTML='✗ Nothing to sync';btn.disabled=false;}
    return;
  }
  var famId=SESSION.familyId;

  /* ONLY sync profiles that have actual history on THIS device */
  /* This prevents Jaivin's tablet from touching Harveen's cloud data */
  var toSync=profiles.filter(function(p){
    if(!p.id||!p.name) return false;
    var hist=localStorage.getItem('smart_pr_'+p.id+'_h');
    var prog=localStorage.getItem('smart_pr_'+p.id+'_p');
    return (hist&&hist.length>10)||(prog&&prog.length>10);
  });

  if(!toSync.length){
    if(btn){btn.innerHTML='✗ No local data to sync';btn.disabled=false;}
    return;
  }

  var writes=0, errors=0, total=toSync.length;

  toSync.forEach(function(p){
    var hist=localStorage.getItem('smart_pr_'+p.id+'_h');
    var prog=localStorage.getItem('smart_pr_'+p.id+'_p');
    /* Build the Firestore document — only include fields we actually have */
    var fsData={id:p.id, name:p.name, grade:p.grade||1, familyId:famId, lastSync:Date.now()};
    if(hist){ fsData.history=hist; fsData['hist_g'+(p.grade||1)]=hist; }
    if(prog){ fsData.progress=prog; fsData['prog_g'+(p.grade||1)]=prog; }

    function onWrite(){ writes++; checkDone(); }
    function onError(e){ errors++; console.log('Sync error:',e); checkDone(); }
    function checkDone(){
      if(writes+errors<total) return;
      if(btn){
        if(errors===0){
          btn.innerHTML='✓ Synced '+writes+' profile'+(writes>1?'s':'');
          btn.style.background='#ECFDF5';btn.style.color='#065F46';btn.style.borderColor='#6EE7B7';
        } else {
          btn.innerHTML='⚠ '+writes+' ok, '+errors+' failed';
          btn.style.color='#DC2626';
        }
        btn.disabled=false;btn.style.opacity='1';
      }
    }

    /* Write to flat path (most reliable) */
    db.collection('smart_progress').doc(famId+'_'+p.id)
      .set(fsData,{merge:true}).then(onWrite).catch(onError);

    /* Also write to nested path (used by parent dashboard) */
    db.collection('families').doc(famId).collection('profiles').doc(p.id)
      .set(fsData,{merge:true}).catch(function(){});
  });
}

initDarkMode();
try{
  if(loadSession()){
    renderHome();
  } else {
    go('s-login');
    setTimeout(initLoginScreen,300);
  }
}
catch(e){
  document.body.style.cssText='background:#0d1117;color:#fff;padding:30px;font-family:sans-serif;';
  document.body.innerHTML='<h2 style="color:#ff5050">Error</h2><pre style="color:#FFD700;font-size:11px;margin-top:12px;white-space:pre-wrap">'+String(e)+'\n'+(e.stack||'')+'</pre>';
}
</script>
<button class="dark-toggle" onclick="toggleDark()" id="dark-btn" title="Toggle dark mode">🌙</button>
</body>
