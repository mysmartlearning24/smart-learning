s from a phenomenon called persistence of vision.\nThe human eye retains an image for about 1/30th of a second after it disappears.\nWhen still images change fast enough, the brain fills in the gaps and perceives smooth movement.\nThis is the same principle behind flip books: when you flip through pages quickly, still drawings seem to animate.\nModern CGI (computer-generated imagery) has transformed animation.\nInstead of drawing on paper, artists build three-dimensional digital models and program their movements.\nA single frame of a CGI film like Monsters University can take up to 100 hours of computer processing time to render.\nThe movie has about 110,000 frames.\nDespite this technological shift, the fundamental challenge remains: creating movement and emotion so convincing that audiences forget they're watching a machine-made illusion.\nPixar animator John Lasseter once said the goal is always to make audiences cry at toys.", "qs": [{"q": "How many drawings are needed for one minute of traditional animation?", "ch": ["720", "1,440", "2,880", "24"], "an": 1}, {"q": "What is persistence of vision?", "ch": ["How long a movie lasts", "The eye briefly retaining an image after it disappears", "The brain creating new images", "How animators plan their drawings"], "an": 1}, {"q": "How long can one frame of a CGI film take to render?", "ch": ["One second", "One hour", "Up to 100 hours", "One minute"], "an": 2}, {"q": "What does Lasseter mean by 'make audiences cry at toys'?", "ch": ["Animation should be sad", "The goal is to create such convincing emotion that audiences connect with fictional characters", "Toys are the best subject for animation", "Pixar only makes movies about toys"], "an": 1}, {"q": "What has remained constant despite changes in animation technology?", "ch": ["The number of artists needed", "Drawing by hand", "Creating convincing movement and emotion", "The cost of production"], "an": 2}], "vocab": [{"w": "painstaking", "d": "requiring great care and effort"}, {"w": "render", "d": "to process digital information into a final image"}]}, {"id": "5S4", "title": "Serena Williams: Built Different", "cat": "Sports Biography", "text": "Serena Williams grew up in Compton, California, practicing tennis on cracked public courts where sometimes drug deals happened nearby.\nHer father Richard Williams had a plan: he would turn his daughters into champions using instructional videos and sheer determination, despite having no formal tennis background.\nSerena turned professional at fourteen.\nOver the next three decades, she would win 23 Grand Slam singles titles — more than any other player in the Open Era — and redefine what athletic excellence could look like.\nShe played through injuries that would have ended most careers: a pulmonary embolism in 2011, a knee surgery in 2017, and dangerous health complications after the birth of her daughter.\nShe returned to competition months after each setback.\nWilliams also fought battles beyond the court.\nShe spoke openly about experiencing racial bias in tennis and in American healthcare.\nShe advocated for equal pay and equal treatment.\nSports analysts note that she raised the technical ceiling of women's tennis — her serve speeds, groundstroke power, and mental fortitude were previously thought impossible for women.\nWhen she announced her retirement in 2022, she chose to call it an 'evolution' rather than a farewell.\nHer legacy is not just the trophies — it is the generation of players she inspired and the doors she refused to let stay closed.", "qs": [{"q": "Where did Serena grow up practicing tennis?", "ch": ["Private tennis academies", "Cracked public courts in Compton", "A country club", "Her backyard"], "an": 1}, {"q": "What was unusual about how Richard Williams trained his daughters?", "ch": ["He hired famous coaches", "He had no formal tennis background but used videos and determination", "He sent them to tennis schools in Europe", "He focused only on Serena"], "an": 1}, {"q": "How many Grand Slam singles titles did Serena win?", "ch": ["15", "19", "23", "30"], "an": 2}, {"q": "Why did Serena call her retirement an 'evolution' rather than a farewell?", "ch": ["She planned to return to playing", "She wasn't truly retiring", "She was moving to a new phase of life, not an ending", "She disliked the word retirement"], "an": 2}, {"q": "According to the passage, what is Serena's legacy beyond trophies?", "ch": ["Her service speed records", "Her fashion line", "The players she inspired and the doors she refused to let stay closed", "Her coaching career"], "an": 2}], "vocab": [{"w": "embolism", "d": "a blockage in a blood vessel, often life-threatening"}, {"w": "fortitude", "d": "mental and emotional strength in the face of difficulty"}]}, {"id": "5S5", "title": "Einstein's Thought Experiments", "cat": "Science & Biography", "text": "Albert Einstein did not make his greatest discoveries in a laboratory.\nHe made them in his imagination.\nEinstein developed the practice of what he called Gedankenexperiment — German for 'thought experiment.' He would imagine a scenario in vivid detail and think through its consequences using pure logic and mathematics.\nWhen he was sixteen, he imagined riding alongside a beam of light.\nWhat would light look like if you could keep up with it?\nThis question troubled him for nine years.\nThe answer — that light always travels at the same speed regardless of the observer's motion — became the foundation of his Special Theory of Relativity, published in 1905.\nThe equation that emerged, E=mc², revealed that mass and energy are interchangeable.\nA tiny amount of matter contains an enormous amount of energy.\nEinstein also imagined a person in a falling elevator: they would feel weightless.\nThis led to his General Theory of Relativity, which redefined gravity not as a force but as a curvature in the fabric of space and time.\nHis theories have been confirmed by experiments again and again — including, in 2015, the first detection of gravitational waves.\nEinstein showed that imagination can be more powerful than knowledge — but only when disciplined imagination is guided by rigorous mathematics.", "qs": [{"q": "What is a Gedankenexperiment?", "ch": ["A German physics laboratory", "A type of scientific equipment", "A thought experiment Einstein used", "A mathematical formula"], "an": 2}, {"q": "What question troubled Einstein for nine years?", "ch": ["What is the speed of sound", "What would light look like if you could keep up with it", "How does gravity work", "What is E=mc²"], "an": 1}, {"q": "What does E=mc² reveal?", "ch": ["The speed of light", "That mass and energy are interchangeable", "How gravity curves space", "The age of the universe"], "an": 1}, {"q": "What did imagining a person in a falling elevator lead Einstein to discover?", "ch": ["The Special Theory of Relativity", "That gravity is a force", "The General Theory of Relativity", "That light has no mass"], "an": 2}, {"q": "What does the passage say about imagination and knowledge?", "ch": ["Knowledge is always more powerful", "Imagination without math is useless", "Imagination disciplined by mathematics can be more powerful than knowledge", "Einstein didn't need mathematics"], "an": 2}], "vocab": [{"w": "interchangeable", "d": "able to be used in place of each other"}, {"w": "curvature", "d": "the state of being bent or curved"}]}, {"id": "5S6", "title": "The Raven: Edgar Allan Poe", "cat": "Literature & Mystery", "text": "Edgar Allan Poe was born in Boston in 1809 and became one of the most influential writers in American literary history.\nHe is credited with inventing the modern detective story, with tales like 'The Murders in the Rue Morgue' featuring the brilliant investigator C. Auguste Dupin.\nPoe's life was shadowed by tragedy.\nHis father abandoned the family when Poe was young, his mother died of tuberculosis when he was two, and he was taken in but never officially adopted by John Allan of Richmond, Virginia.\nHis most famous poem, 'The Raven,' published in 1845, tells the story of a grieving man visited at midnight by a talking raven that answers every question with the single word 'Nevermore.'\nThe poem became a sensation.\nPoe carefully described his writing process in an essay called 'The Philosophy of Composition' — he claimed to have written 'The Raven' backwards, starting with the effect he wanted and working toward the cause.\nPoe died mysteriously in 1849 at age forty.\nHe was found on a Baltimore street, delirious and wearing someone else's clothes.\nThe cause of his death remains unknown — theories include rabies, alcohol, murder, and heart disease.\nEven in death, Poe maintained the mystery he wrote about so brilliantly.", "qs": [{"q": "What type of story is Poe credited with inventing?", "ch": ["Science fiction", "Horror novels", "Modern detective stories", "Epic poetry"], "an": 2}, {"q": "What single word does the raven say in Poe's famous poem?", "ch": ["Forever", "Nevermore", "Darkness", "Nevermore"], "an": 1}, {"q": "How did Poe claim to write 'The Raven'?", "ch": ["Starting from the beginning and writing forward", "Getting inspiration from a dream", "Starting with the effect and working backward", "Copying from an old poem"], "an": 2}, {"q": "What is mysterious about Poe's death?", "ch": ["He disappeared", "He was found under strange circumstances and the cause is still unknown", "He died at sea", "He died during a writing session"], "an": 1}, {"q": "What does the last sentence mean?", "ch": ["Poe planned his own mysterious death", "Even his death had the mystery his writing was famous for", "Poe was always mysterious in life", "Death is always mysterious"], "an": 1}], "vocab": [{"w": "tuberculosis", "d": "a contagious bacterial disease mainly affecting the lungs"}, {"w": "delirious", "d": "in a state of extreme mental confusion, often from fever"}]}, {"id":"5S7","title":"The Mathematics of Music","cat":"Science & Arts","text":"Every musical note is a vibration. Middle C on a piano vibrates at 261.63 times per second. The A above it vibrates at exactly 440 times per second — which is why orchestras tune to A 440.\nWhat sounds pleasing to human ears follows mathematical patterns discovered by the ancient Greeks. Notes whose frequencies have simple ratios — like 2:1 or 3:2 — sound harmonious. The octave (do-re-mi-fa-sol-la-ti-do, back to do) has a 2:1 ratio: the high do vibrates exactly twice as fast as the low do.\nWhen frequencies don't have clean ratios, we call the sound dissonant — grating or tense. Composers use dissonance deliberately to create tension before resolving it.\nEvery song you love is mathematics your brain finds beautiful.","qs":[{"q":"How many times per second does A 440 vibrate?","ch":["261.63","440","880","2:1"],"an":1},{"q":"What makes two musical notes sound harmonious?","ch":["They are the same note","Their frequencies have simple mathematical ratios","One is louder than the other","They come from the same instrument"],"an":1},{"q":"What ratio does an octave have?","ch":["3:2","1:1","2:1","4:3"],"an":2},{"q":"Why do composers use dissonance?","ch":["Because it sounds better","To create tension that can then be resolved","To hide mistakes","Because audiences prefer it"],"an":1},{"q":"What is the main idea of the final sentence?","ch":["Math is more important than music","Music is a form of applied mathematics that our brains respond to emotionally","Only mathematicians truly understand music","Music and math are unrelated"],"an":1}],"vocab":[{"w":"dissonant","d":"having an unpleasant or tense sound caused by conflicting musical notes"},{"w":"frequency","d":"the number of vibrations per second; determines the pitch of a sound"}]},
{"id":"5S8","title":"The Luck Myth","cat":"Psychology","text":"When researchers studied 1,000 people who described themselves as lucky or unlucky, they found something surprising. Lucky people were not experiencing more fortunate events. They were noticing opportunities that unlucky people missed.\nLucky people tend to be more open, more relaxed, and more likely to talk to strangers. They build wider networks of acquaintances. These networks are more likely to contain a person who knows someone who has a job, or a connection.\nUnlucky people focus so narrowly — often due to anxiety — that they literally don't see opportunities around them. In one experiment, participants walked past a $20 bill on the sidewalk. Anxious people walked right by it. Relaxed people picked it up.\nLuck, it appears, is partially a skill.","qs":[{"q":"What did researchers find distinguished 'lucky' people?","ch":["More fortunate events happened to them","They worked harder","They noticed opportunities others missed","They had more money to start with"],"an":2},{"q":"Why do 'unlucky' people miss opportunities according to the research?","ch":["They are lazier","Anxiety causes them to focus too narrowly","They are less intelligent","They don't want to succeed"],"an":1},{"q":"What happened in the $20 bill experiment?","ch":["Everyone picked up the money","Only children noticed it","Anxious people walked past it while relaxed people picked it up","Lucky people had put it there"],"an":2},{"q":"What does 'Luck is partially a skill' mean?","ch":["You can win the lottery if you practice","Habits of mind like openness can create more 'lucky' outcomes","Luck requires no effort","Hard work is the same as luck"],"an":1},{"q":"What is the AUTHOR'S PURPOSE in this passage?","ch":["To prove luck doesn't exist","To help people feel better about being unlucky","To redefine luck as partially a learnable mindset","To explain probability and chance"],"an":2}],"vocab":[{"w":"acquaintance","d":"a person you know slightly, not a close friend"},{"w":"anxiety","d":"a feeling of worry and nervousness, often about uncertain outcomes"}]},
{"id":"5S9","title":"The Last Blockbuster","cat":"Culture & Business","text":"In 2004, there were 9,000 Blockbuster Video stores worldwide. People drove to rent a movie, paid a late fee if they kept it too long, and drove back to return it. This seemed completely normal.\nNetflix started by mailing DVDs. Blockbuster laughed. Then Netflix introduced streaming — watching movies instantly over the internet. Blockbuster still laughed.\nBy 2010, Blockbuster filed for bankruptcy. Today, exactly one Blockbuster store remains on Earth, in Bend, Oregon. It has become a tourist attraction.\nThe lesson executives extract from this story is about 'disruption' — how new technology can destroy established businesses overnight. But the deeper lesson is about arrogance: Blockbuster was offered the chance to buy Netflix for $50 million in 2000. They declined.\nNetflix is now worth $250 billion.","qs":[{"q":"How many Blockbuster stores existed in 2004?","ch":["900","9,000","90,000","90"],"an":1},{"q":"How did Netflix first compete with Blockbuster?","ch":["Opening stores nearby","Streaming movies online immediately","Mailing DVDs","Offering cheaper prices in stores"],"an":2},{"q":"What deeper lesson does the author say the Blockbuster story teaches?","ch":["Technology always wins","Streaming is better than DVDs","Arrogance — Blockbuster had the chance to buy Netflix and refused","Bankruptcy is always avoidable"],"an":2},{"q":"When Blockbuster was offered the chance to buy Netflix for $50 million, what did they do?","ch":["They accepted immediately","They negotiated a lower price","They declined","They made a counter-offer"],"an":2},{"q":"What is the TONE of the last line?","ch":["Sympathetic toward Blockbuster","Neutral and informational","Humorously ironic about Blockbuster's mistake","Critical of Netflix"],"an":2}],"vocab":[{"w":"bankruptcy","d":"a legal process where a business declares it cannot pay its debts"},{"w":"arrogance","d":"an exaggerated sense of one's own importance or ability"}]},
{"id":"5S10","title":"How Dogs Read Humans","cat":"Science","text":"Dogs are the only non-human animals that have been shown to follow human pointing gestures. Wolves, even when raised by humans, cannot reliably do this.\nResearchers believe dogs evolved this ability over 15,000 years of living alongside humans. Dogs that understood humans survived and reproduced more successfully. Over generations, they became tuned to our communication.\nDogs can distinguish human facial expressions. Studies show they respond differently to happy and angry human faces. They process face information in their brains in a region similar to where humans process faces.\nSome dogs can learn over 1,000 words. One border collie named Chaser learned the names of 1,022 objects.\nIn many ways, dogs understand humans better than any other species — including, sometimes, other humans.","qs":[{"q":"What can dogs do that even human-raised wolves cannot?","ch":["Learn words","Follow human pointing gestures","Recognize facial expressions","Run faster than humans"],"an":1},{"q":"How did dogs develop the ability to understand humans?","ch":["They were deliberately trained by ancient humans","Evolution over 15,000 years selected for dogs that understood humans","Dogs are naturally smarter than wolves","Scientists bred dogs to understand pointing"],"an":1},{"q":"What does research show about how dogs process human faces?","ch":["They ignore faces and focus on smell","They process faces in a brain region similar to where humans do","They are afraid of angry faces only","They cannot distinguish expressions"],"an":1},{"q":"What is remarkable about the border collie named Chaser?","ch":["She is the oldest dog alive","She learned 1,022 object names","She follows 1,000 commands","She was raised by wolves"],"an":1},{"q":"What does the final sentence suggest?","ch":["Dogs are smarter than humans","Dogs sometimes understand human emotions better than other humans do","Humans should learn from dogs","Other animals understand us too"],"an":1}],"vocab":[{"w":"evolved","d":"changed gradually over generations through natural selection"},{"w":"distinguish","d":"to recognize as different or separate"}]},
{"id":"5S11","title":"The Children Who Changed Child Labor Laws","cat":"History","text":"In 1903, a woman named Mother Jones led a march of child workers from Philadelphia to President Roosevelt's home in New York — 125 miles on foot.\nThe children carried signs: 'We want to go to school.' Many were missing fingers lost in factory accidents. Some were eight years old.\nAt the time, 2 million children worked in American factories, mines, and farms. It was legal. Many families depended on their wages.\nRoosevelt refused to meet with them. The newspapers covered the march anyway, and public opinion shifted.\nThe National Child Labor Committee documented working conditions with photographs. The images were shocking. Congress passed the first federal child labor law in 1916.\nIt was struck down by the Supreme Court. But eventually, in 1938, child labor laws finally held.\nThe children who marched were adults by then. But they had changed the world for the children who came after.","qs":[{"q":"What did the signs carried by child workers say?","ch":["We want higher wages","We want to go to school","Stop the factories","Give us shorter hours"],"an":1},{"q":"Why did many families support child labor at the time?","ch":["They wanted their children to learn skills","Families depended on the children's wages","School was not available","The work was considered safe"],"an":1},{"q":"What helped shift public opinion against child labor?","ch":["President Roosevelt's speeches","Newspaper coverage and shocking photographs","A change in the law","Children going on strike"],"an":2},{"q":"What is significant about the 1938 law?","ch":["It was the first law ever passed","It was the first child labor law that actually held up in court","Roosevelt finally signed it","It ended all labor laws"],"an":1},{"q":"What does the last paragraph suggest about how change happens?","ch":["Change happens quickly when enough people care","Important change can take decades and the people who start it may not see it finish","Only presidents can make change","Marches are always successful"],"an":1}],"vocab":[{"w":"federal","d":"relating to the national government, as opposed to state or local"},{"w":"documented","d":"recorded with evidence such as photographs or written reports"}]}], "6": [{"id": "6S1", "title": "The Paradox of Choice", "text": "In the summer of 2000, psychologist Sheena Iyengar set up a jam-tasting booth at a grocery store in California.\nOn some days, she offered shoppers a selection of 6 jams to taste.\nOn other days, she offered 24 jams.\nThe large display attracted more shoppers—60 percent of people stopped when 24 jams were available, compared to 40 percent when only 6 were offered.\nBut here is the surprising result: people who stopped at the table with 6 choices were ten times more likely to buy jam.\nThis experiment revealed what psychologist Barry Schwartz later called 'the paradox of choice.'\nThe theory suggests that while humans seek out more options, having too many choices can actually prevent us from making decisions.\nToo many options lead to 'analysis paralysis'—we become so overwhelmed evaluating possibilities that we make no choice at all.\nEven when we do choose, we feel less satisfied, because we are haunted by all the options we didn't pick.\nThis phenomenon appears in many areas of modern life.\nResearch shows that retirement accounts with fewer fund options have higher enrollment rates.\nOnline stores that show fewer products often sell more.\nNetflix found that a shorter list of recommendations led to more viewing than an overwhelming catalog.\nThe lesson isn't that choice is bad—having some control over our lives is essential to wellbeing.\nRather, as Schwartz argues, when it comes to options, more is not always better.", "qs": [{"q": "What was the surprising result of the jam experiment?", "ch": ["People bought more from the large display", "People bought more when given fewer choices", "People preferred expensive jams", "People did not buy any jam"], "an": 1}, {"q": "What does 'analysis paralysis' mean?", "ch": ["Making a quick decision", "Being unable to decide because of too many options", "Choosing the wrong option", "Ignoring all choices"], "an": 1}, {"q": "What does the Netflix finding suggest?", "ch": ["People want more shows to watch", "Fewer recommendations led to more viewing", "Quality matters more than quantity", "People don't watch enough TV"], "an": 1}, {"q": "What is the main message of the passage?", "ch": ["More choices always make people happier", "Choice is harmful and should be avoided", "Having too many options can reduce satisfaction and decision-making", "People are bad at making decisions"], "an": 2}, {"q": "Which word best describes the 'paradox' in the title?", "ch": ["A confusing contradiction", "A scientific experiment", "A type of food choice", "A mathematical problem"], "an": 0}], "vocab": [{"w": "paradox", "d": "a statement that seems contradictory but may be true"}, {"w": "phenomenon", "d": "a fact or event that can be observed, especially one that is unusual"}]}, {"id": "6S2", "title": "The Psychology of Color", "text": "Colors are never just colors.\nFor centuries, painters, designers, marketers, and scientists have recognized that colors have powerful psychological effects—influencing mood, behavior, perception, and even physical responses.\nRed is the most stimulating color in the visible spectrum.\nResearch shows that people in red rooms have elevated heart rates and perceive time as moving faster.\nRed is used in restaurants because it can stimulate appetite and encourage faster eating—which turns tables more quickly.\nBlue has nearly opposite effects: it is calming, associated with trust and reliability, which is why so many corporations, banks, and social media platforms use it in their logos.\nExposure to blue light actually lowers blood pressure.\nYellow is the first color detected by the human eye—it triggers the release of serotonin, producing feelings of happiness.\nBut too much yellow can cause anxiety; studies show babies cry more in yellow rooms.\nGreen is easiest on the eyes because it requires no adjustment from the lens.\nIt is associated with nature and balance.\nHospital walls were repainted green in the 1990s when research showed patients recovered faster in green environments.\nHowever, color psychology is not universal.\nCultural associations vary dramatically: white symbolizes purity in Western cultures but mourning in many East Asian cultures.\nRed means luck in China but danger in many Western contexts.\nThis means that understanding color psychology requires understanding the culture of your audience as well as the science.", "qs": [{"q": "What effect does red have on people?", "ch": ["Calming and relaxing", "Elevated heart rate and sense of faster time", "Feelings of sadness", "Trust and reliability"], "an": 1}, {"q": "Why is blue used by many corporations and banks?", "ch": ["It is the cheapest color", "It stimulates productivity", "It is associated with trust and reliability", "It looks better on screens"], "an": 2}, {"q": "What warning does the passage give about yellow?", "ch": ["Yellow fades quickly", "Too much yellow can cause anxiety", "Yellow doesn't work in design", "Yellow is hard to see"], "an": 1}, {"q": "Why was green chosen for hospital walls?", "ch": ["It is the cheapest paint", "Patients recovered faster in green environments", "Doctors requested it", "It matches hospital equipment"], "an": 2}, {"q": "What does the last paragraph's message suggest about applying color psychology?", "ch": ["Color science applies the same way everywhere", "Red should always be avoided", "Cultural context must be considered alongside science", "Green is the most important color"], "an": 2}], "vocab": [{"w": "perception", "d": "the way something is understood or interpreted through the senses"}, {"w": "stimulating", "d": "causing activity or excitement; energizing"}]}, {"id": "6S3", "title": "The Physics of Music", "cat": "Science & Arts", "text": "Music and physics are more closely related than most people realize — in fact, music is physics made beautiful.\nEvery sound, including musical notes, is a vibration: a rapid back-and-forth movement that travels through the air as a wave.\nThe frequency of vibration — how many times per second it oscillates — determines the pitch we hear.\nHigh frequency means high pitch; low frequency means low pitch.\nA concert pitch A note vibrates at exactly 440 cycles per second (Hertz).\nWhen two notes are played together, the relationship between their frequencies determines whether they sound harmonious or dissonant.\nThe ancient Greek mathematician Pythagoras discovered that notes whose frequencies have simple ratios — like 2:1 or 3:2 — sound pleasing together.\nThis is why the octave (2:1 frequency ratio) sounds so natural to human ears.\nDifferent instruments produce the same note differently.\nA guitar string vibrates in a complex pattern that creates not just the fundamental frequency but also overtones — higher frequencies that color the sound.\nThese overtones are why a violin and a flute playing the same note sound completely different.\nIn modern music production, engineers use equalizers to adjust the balance of frequencies, literally sculpting sound using physics.\nEvery song you hear is a carefully constructed architecture of vibrations — physics in its most emotional form.", "qs": [{"q": "What determines the pitch of a sound?", "ch": ["The volume of the sound", "The frequency of vibration", "The material the instrument is made from", "The size of the room"], "an": 1}, {"q": "What did Pythagoras discover about music?", "ch": ["The fastest instruments sound best", "Notes with simple frequency ratios sound pleasing", "Louder music is more harmonious", "Greek music is mathematically perfect"], "an": 1}, {"q": "Why do a violin and flute sound different playing the same note?", "ch": ["They are different sizes", "One is louder", "Different overtones color the sound", "One uses strings and one uses air"], "an": 2}, {"q": "What do music engineers use equalizers for?", "ch": ["To make music louder", "To adjust the balance of frequencies", "To record music more quickly", "To tune instruments automatically"], "an": 1}, {"q": "What does the author mean by 'physics in its most emotional form'?", "ch": ["Physics makes people sad", "Music uses physical principles to create feelings and beauty", "Physics is more important than music", "Emotions are not physical"], "an": 1}], "vocab": [{"w": "frequency", "d": "the number of vibrations per second; determines pitch"}, {"w": "dissonant", "d": "producing a harsh or unpleasant sound when notes are combined"}]}, {"id": "6S4", "title": "The Boy Who Harnessed the Wind", "cat": "Biography & Technology", "text": "William Kamkwamba was born in 1987 in Malawi, one of the poorest countries in sub-Saharan Africa.\nWhen he was thirteen, a devastating famine struck the country, and his family could no longer afford the eighty-dollar school fee required to continue his education.\nForced to drop out, William refused to abandon his desire to learn.\nHe visited the local library and discovered a tattered textbook called Using Energy, which contained a diagram of a windmill generating electricity.\nWith no budget, no tools, and no formal training in engineering, William began gathering scrap materials — a broken bicycle, blue gum trees, strips of PVC pipe, and pieces of metal salvaged from junkyards.\nNeighbors mocked him and called him misala — crazy.\nHis own family questioned whether he had lost his mind.\nNevertheless, after months of trial and error, William connected his handmade windmill to a car battery, which in turn powered a single light bulb.\nWhen the bulb illuminated, his family's home had electricity for the first time.\nHe later built a second windmill to pump water for irrigation, transforming his village's capacity to survive future droughts.\nWilliam's story reached an international audience when he described his work at a TED conference in 2007, leading to scholarships that allowed him to study in South Africa and the United States.\nHis autobiography, The Boy Who Harnessed the Wind, became a bestselling book and Netflix film.\nWilliam's journey illustrates a principle that transcends his specific circumstances: genuine curiosity and persistence can create solutions that experts with far more resources fail to imagine.", "qs": [{"q": "Why did William drop out of school?", "ch": ["He wasn't interested", "His family couldn't afford the fees", "His school closed", "He preferred to work"], "an": 1}, {"q": "What gave William the idea to build a windmill?", "ch": ["A TV show", "His teacher told him about it", "He found a diagram in a library book", "He saw one in a neighboring village"], "an": 2}, {"q": "What did William's neighbors think of his project?", "ch": ["They were supportive", "They were curious", "They called him crazy", "They tried to help"], "an": 2}, {"q": "How did William's windmill help his village beyond providing electricity?", "ch": ["It attracted tourists", "It powered a school", "He built one to pump water for crops during drought", "It helped build roads"], "an": 2}, {"q": "What is the main message of William's story?", "ch": ["Money is needed to succeed", "Poverty and lack of education make success impossible", "Curiosity and determination can overcome poverty", "Africa needs more foreign help"], "an": 2}], "vocab": [{"w": "famine", "d": "an extreme scarcity of food affecting a large area"}, {"w": "determined", "d": "having firm resolve to achieve something despite obstacles"}]}, {"id": "6S5", "title": "Black Holes: Where Physics Breaks Down", "cat": "Space & Science", "text": "A black hole is a region of space where gravity is so extreme that nothing — not even light — can escape.\nThey form when massive stars collapse at the end of their lives in an explosion called a supernova.\nThe star's core is crushed into an impossibly dense point called a singularity, surrounded by a boundary called the event horizon.\nAnything that crosses the event horizon cannot return.\nBlack holes cannot be seen directly — we detect them by observing their effects on surrounding matter and light.\nNearby gas spirals inward, heating to millions of degrees and glowing brightly, forming an accretion disk.\nIn 2019, scientists published the first image of a black hole — the supermassive black hole at the center of galaxy M87, 6.5 billion times the mass of our sun.\nThe image was created by linking radio telescopes across the Earth to form a planet-sized telescope called the Event Horizon Telescope.\nBlack holes challenge our understanding of physics.\nAt the singularity, Einstein's general relativity and quantum mechanics both break down — they give incompatible answers.\nSolving this incompatibility is one of the great unsolved problems in physics.\nHawking radiation — proposed by Stephen Hawking — suggests black holes slowly emit energy and eventually evaporate, but this has never been directly observed.", "qs": [{"q": "What is a singularity?", "ch": ["The event horizon of a black hole", "An impossibly dense point at the core of a black hole", "A type of star explosion", "The boundary no light can cross"], "an": 1}, {"q": "How do scientists detect black holes?", "ch": ["By directly photographing them", "By measuring their temperature", "By observing their effects on surrounding matter and light", "By sending probes inside them"], "an": 2}, {"q": "What was significant about the 2019 scientific achievement?", "ch": ["The first spacecraft reached a black hole", "Scientists traveled into a black hole", "The first image of a black hole was published", "A new type of black hole was discovered"], "an": 2}, {"q": "What great scientific problem do black holes create?", "ch": ["How to travel faster than light", "General relativity and quantum mechanics give incompatible answers at the singularity", "How to prevent black holes from forming", "Whether black holes create new universes"], "an": 1}, {"q": "What does Hawking radiation propose?", "ch": ["Black holes grow forever", "Black holes slowly emit energy and eventually evaporate", "Black holes are hollow inside", "Black holes can be used for time travel"], "an": 1}], "vocab": [{"w": "singularity", "d": "a point of infinite density where known physics breaks down"}, {"w": "quantum mechanics", "d": "the branch of physics dealing with behavior at the atomic and subatomic scale"}]}, {"id": "6S6", "title": "The Gladiators of Rome", "cat": "History", "text": "The Colosseum in Rome, completed in 80 CE, could hold between 50,000 and 80,000 spectators who came to watch gladiatorial combat.\nBut the reality of gladiatorial life was far more complex than the Hollywood image of constant slaughter.\nMost gladiators were enslaved people, prisoners of war, or criminals sentenced to the arena.\nSome, however, were free volunteers who chose gladiatorial life for fame and money — similar in some ways to professional athletes today.\nGladiators were trained in special schools called ludi, where they received good food, medical care, and expert coaching.\nPromoters wanted skilled entertainers, not dead fighters — dead gladiators were expensive to replace and failed to provide the dramatic spectacle crowds craved.\nResearch on gladiatorial remains shows that most died from single decisive blows rather than drawn-out battles, suggesting fights ended at specific dramatic moments.\nThe crowd's opinion influenced outcomes: a downed gladiator could appeal to the crowd, who would signal mercy or death to the organizing official.\nThe famous thumbs-up and thumbs-down symbols are actually a modern invention — ancient sources describe the crowd's signal as waving handkerchiefs or pressing thumbs against fists.\nGladiatorial combat ended in 404 CE when Emperor Honorius banned it, reportedly after a monk died trying to stop a fight.", "qs": [{"q": "How many people could the Colosseum hold?", "ch": ["10,000-20,000", "50,000-80,000", "100,000-150,000", "30,000-40,000"], "an": 1}, {"q": "Why did promoters prefer gladiators not to die?", "ch": ["They were too valuable as friends", "Dead gladiators were expensive and reduced future entertainment", "It was against Roman law", "The crowd preferred bloodless fights"], "an": 1}, {"q": "What does research on gladiatorial remains show?", "ch": ["Gladiators were always poorly nourished", "They were injured constantly", "Most died from single decisive blows, not drawn-out battles", "All gladiators were enslaved people"], "an": 2}, {"q": "What is surprising about the thumbs-up thumbs-down signals?", "ch": ["Romans didn't use hand signals", "They were invented by modern filmmakers, not used in ancient Rome", "Only emperors could use them", "They had the opposite meaning in ancient times"], "an": 1}, {"q": "When and why did gladiatorial combat end?", "ch": ["100 CE, due to public outcry", "404 CE, after a monk died trying to stop a fight", "500 CE, when Rome fell", "300 CE, when Christianity spread"], "an": 1}], "vocab": [{"w": "spectators", "d": "people who watch an event"}, {"w": "decisive", "d": "settling something conclusively; having a clear result"}]}, {"id": "6S7", "title": "The Language of Mathematics", "cat": "Math & Philosophy", "text": "In 1623, Galileo Galilei wrote that the universe 'is written in the language of mathematics.'\nNearly four centuries later, physicists continue to discover just how right he was.\nMathematics is the only human activity that produces absolute certainty.\nA mathematical proof, once verified, is true forever — unlike scientific theories, which can always be revised by new evidence.\nYet mathematics also creates its own mysteries.\nIn 1931, Kurt Gödel proved his Incompleteness Theorems — among the most shocking results in the history of human thought.\nGödel showed that any sufficiently complex mathematical system contains true statements that cannot be proven within that system.\nIn other words, mathematics contains truths that are forever beyond proof.\nMathematics also appears in nature with uncanny consistency.\nThe Fibonacci sequence — 1, 1, 2, 3, 5, 8, 13... — appears in sunflower seed patterns, nautilus shells, hurricane shapes, and galaxy spirals.\nPrime numbers, once thought to be purely abstract, turned out to underpin modern encryption and internet security.\nThe unreasonable effectiveness of mathematics — as physicist Eugene Wigner called it — remains deeply mysterious.\nWhy should symbols invented to count sheep be the same symbols that describe black holes and quantum mechanics?\nNo one fully knows.", "qs": [{"q": "What makes mathematics unique compared to scientific theories?", "ch": ["It never changes", "It is more complex", "Mathematical proofs, once verified, are true forever", "Mathematics was invented before science"], "an": 2}, {"q": "What did Gödel's Incompleteness Theorems prove?", "ch": ["All mathematical statements can be proven", "Mathematics contains true statements that cannot be proven", "Mathematics is not useful for science", "Simple math systems are incomplete"], "an": 1}, {"q": "Where does the Fibonacci sequence appear in nature?", "ch": ["Only in flowers", "Sunflower seeds, nautilus shells, hurricanes, and galaxy spirals", "Only in plants", "In oceans and rivers"], "an": 1}, {"q": "What practical application do prime numbers have?", "ch": ["Measuring distances in space", "Building bridges", "Modern encryption and internet security", "Counting populations"], "an": 2}, {"q": "What does Wigner's phrase 'unreasonable effectiveness of mathematics' refer to?", "ch": ["Mathematics is too hard to learn", "The mysterious way math invented for simple tasks perfectly describes complex nature", "Mathematics is unreliable", "Physicists use math incorrectly"], "an": 1}], "vocab": [{"w": "theorem", "d": "a mathematical statement that has been proven to be true"}, {"w": "encryption", "d": "converting data into a code to prevent unauthorized access"}]}, {"id":"6S8","title":"The Psychology of Crowds","cat":"Psychology & History","text":"In 1895, Gustave Le Bon published a book arguing that when people join crowds, they lose individual judgment and become controlled by a 'group mind.' He called this deindividuation.\nHis idea was controversial but influential. Crowd behavior puzzled observers: why would normally calm people become violent at a protest, a soccer match, or a concert?\nMore recent psychology offers a correction. People in crowds don't lose their identities — they shift to a group identity. If someone identifies strongly with their team, they behave according to that team's norms, not according to a mindless herd.\nThis explains why most fans at a game behave peacefully while a small minority can turn violent — they identify with different norms.\nThe crowd doesn't erase the self. It amplifies whichever self someone brings to it.","qs":[{"q":"What did Le Bon mean by 'deindividuation'?","ch":["People become more creative in crowds","People lose individual judgment and adopt a group mind","Crowds make people smarter","Individuals become leaders in crowds"],"an":1},{"q":"How does more recent psychology correct Le Bon's theory?","ch":["It proves crowds always make people violent","People maintain individual identity but shift to group identity","Le Bon was completely wrong about everything","Crowds have no psychological effect"],"an":1},{"q":"Why do most fans behave peacefully while some turn violent?","ch":["Peaceful fans are physically stronger","They have different identities and norms they identify with","Violent fans always sit together","The stadium design causes violence"],"an":1},{"q":"What does 'The crowd amplifies whichever self someone brings to it' mean?","ch":["Crowds create new personalities","Crowds cannot influence behavior","Groups make stronger the identity you already have","You become someone else in a crowd"],"an":2},{"q":"What is the overall STRUCTURE of this passage?","ch":["Problem and solution","Original theory, then more recent correction and explanation","Compare and contrast of two crowds","Chronological history of psychology"],"an":1}],"vocab":[{"w":"deindividuation","d":"the loss of a sense of individual identity within a group"},{"w":"controversial","d":"causing strong disagreement among people with different views"}]},
{"id":"6S9","title":"The Geometry of Sport","cat":"Sports & Math","text":"Mathematics is hiding inside every sport. Soccer has a geometric problem: given the angle of the shot and the distance to goal, what is the probability of scoring? Professional players solve this instantly through trained instinct.\nBasketball physics: the ideal arc for a free throw is between 45 and 52 degrees. A flatter throw has a smaller target window. A steeper throw is harder to control. Most great free throw shooters cluster around 49 degrees — which they've never measured, but their bodies know.\nIn swimming, coaches use computers to analyze stroke efficiency measured to hundredths of a degree. The difference between gold and silver at the Olympics is often 0.01 seconds — smaller than a human blink.\nSport is the art of applying physics and geometry perfectly, under pressure, without thinking about it.","qs":[{"q":"What geometric problem does a soccer player solve?","ch":["How to run the fastest path","What angle and distance gives the best scoring chance","How to avoid opponents","Where to stand for a corner kick"],"an":1},{"q":"What is the ideal arc angle for a basketball free throw?","ch":["30-35 degrees","40-44 degrees","45-52 degrees","55-60 degrees"],"an":2},{"q":"Why is 49 degrees a good free throw angle if players never measure it?","ch":["Coaches tell them the number","Their trained bodies have found the efficient angle through repetition","It is a mathematical requirement","All good players were born with this instinct"],"an":1},{"q":"What does the author mean by 'Sport is art applied without thinking about it'?","ch":["Athletes don't need to be intelligent","Athletes internalize physics and geometry through training until it becomes instinct","Sport has nothing to do with math","Thinking makes athletes perform worse"],"an":1},{"q":"Which of these would be the BEST title for this passage?","ch":["Why Soccer Players Are Mathematicians","The Hidden Mathematics Inside Sports","How to Win at Basketball","Physics Is More Important Than Talent"],"an":1}],"vocab":[{"w":"arc","d":"a curved line or path, like the trajectory of a thrown ball"},{"w":"efficiency","d":"achieving maximum results with minimum wasted effort or energy"}]},
{"id":"6S10","title":"Marie Curie and the Element She Named After Her Country","cat":"Biography & Science","text":"When Marie Curie became the first woman to win a Nobel Prize — and later the only person in history to win a Nobel in two different sciences — her name was already being erased.\nHer husband Pierre was often credited first. When she applied to the French Academy of Sciences, she was rejected because she was a woman.\nBorn Marie Sklodowska in Warsaw, Poland, she worked as a governess to send her sister to medical school, on the agreement that her sister would do the same for her.\nHer most personal scientific discovery: polonium, named after Poland, her occupied homeland that did not appear on any map at the time.\nThe element was her act of protest — a permanent scientific record that Poland existed.\nShe died of aplastic anemia caused by decades of radiation exposure. She kept her laboratory notebooks in a lead-lined box. They are still radioactive today.","qs":[{"q":"What makes Curie uniquely accomplished in Nobel Prize history?","ch":["She was the first woman to win","She is the only person to win a Nobel in two different sciences","She won three Nobel Prizes","She won for physics and chemistry at the same time"],"an":1},{"q":"How did Marie fund her sister's education?","ch":["She won a scholarship","She worked as a governess with an agreement her sister would return the favor","She borrowed money from the university","She sold scientific discoveries"],"an":1},{"q":"Why did Curie name her discovery 'polonium'?","ch":["It was discovered in Poland","It was her favorite element","To honor her homeland which was occupied and off maps — an act of protest","Her professor suggested the name"],"an":2},{"q":"Why are Curie's notebooks kept in a lead-lined box?","ch":["They are very old and fragile","They are extremely valuable","They are still radioactive from her decades of research","Lead preserves the paper"],"an":2},{"q":"What does this passage suggest about Curie's character?","ch":["She was focused only on science","She was bitter about discrimination","She was determined, loyal, and used science to make political and personal statements","She avoided controversy"],"an":2}],"vocab":[{"w":"radioactive","d":"emitting harmful radiation from unstable atomic nuclei"},{"w":"occupied","d":"(of a country) controlled by a foreign military power"}]},
{"id":"6S11","title":"Why We Forget — And Why That Is Good","cat":"Psychology & Science","text":"Forgetting is not a failure of memory. It is a feature.\nEvery day your brain is flooded with information. If you remembered every detail of every experience — the exact position of every chair you sat in, every conversation you half-heard — your mind would be unusable. Forgetting is how the brain manages signal versus noise.\nPsychologist Hermann Ebbinghaus mapped the 'forgetting curve' in 1885: we forget roughly half of new information within an hour without review. But information that is reviewed, applied, or connected to emotion is encoded more deeply.\nA condition called hyperthymesia causes people to remember every moment of their lives with perfect detail. Researchers expected this to be a superpower. Instead, subjects report it as exhausting and sometimes debilitating — unable to escape painful memories.\nA perfect memory, it turns out, might be the most unbearable kind.","qs":[{"q":"According to the passage, why is forgetting useful?","ch":["It makes us more creative","It allows the brain to filter important signals from unimportant noise","Forgetting reduces stress","It helps us sleep better"],"an":1},{"q":"What did Ebbinghaus discover with the 'forgetting curve'?","ch":["We remember everything for one hour","We forget about half of new information within an hour without review","Emotion always prevents forgetting","Most memories are stored permanently"],"an":1},{"q":"What is hyperthymesia?","ch":["The inability to form new memories","Perfect recall of every moment of one's life","Forgetting important events","Enhanced ability to learn new skills"],"an":1},{"q":"Why is hyperthymesia described as debilitating rather than a superpower?","ch":["These people cannot learn new information","Remembering every painful moment is exhausting and overwhelming","Their memories are often wrong","They cannot remember faces"],"an":1},{"q":"What is the AUTHOR'S CLAIM that the whole passage supports?","ch":["Memory is unreliable and should not be trusted","Forgetting is a useful feature, not a flaw","Scientists understand everything about memory","We should use technology to record everything"],"an":1}],"vocab":[{"w":"debilitating","d":"making someone very weak or unable to function normally"},{"w":"encode","d":"to convert information into a form that can be stored in memory"}]},
{"id":"6S12","title":"The Trolley Problem at School","cat":"Philosophy & Ethics","text":"Your school is putting on a play. You are the director. The best actor for the lead role is also the most disruptive student — constantly late and causing problems.\nIf you cast him: the play will be better, but rehearsals will be chaotic. Other students will be frustrated.\nIf you cast someone else: rehearsals will go smoothly, but the final product will be weaker.\nPhilosophers would recognize this as a variant of a classic problem: choosing between a better outcome for the many (good rehearsals) versus the best outcome for the performance (better play).\nThere is no right answer in philosophy class. But there is a real answer you have to live with.\nThis is what makes ethics hard — it is not a test where someone tells you if you got it right.","qs":[{"q":"What is the central DILEMMA in this scenario?","ch":["Whether theater is worth doing","Choosing between a better process and a better outcome","Whether to punish disruptive students","How to direct a play"],"an":1},{"q":"What philosophical problem does the author compare this to?","ch":["The prisoner's dilemma","The trolley problem — choosing between different types of outcomes for different groups","Plato's cave allegory","The ship of Theseus"],"an":1},{"q":"What does the author say makes ethics different from a test?","ch":["Ethics has too many questions","Ethics has no textbook","No one tells you if you got the answer right — you live with the consequences","Ethics is only for philosophers"],"an":2},{"q":"What is the author's PURPOSE in using a school scenario?","ch":["To criticize theater programs","To make an abstract philosophical problem feel immediate and real","To argue that difficult students should not be in plays","To teach directing skills"],"an":1},{"q":"Which word BEST describes the TONE of this passage?","ch":["Playful and humorous","Thought-provoking and honest","Angry and critical","Optimistic and encouraging"],"an":1}],"vocab":[{"w":"dilemma","d":"a situation where a difficult choice must be made between two options"},{"w":"ethics","d":"the study of right and wrong behavior and moral principles"}]}], "7": [{"id": "7S1", "title": "The Science of Habits", "text": "Every day, without realizing it, you repeat hundreds of behaviors automatically.\nYou brush your teeth in the same order, take the same route to school, and reach for your phone at the same moments.\nThese automatic patterns are habits, and understanding how they form can help you build better ones—and break harmful ones.\nAccording to MIT researcher Ann Graybiel, habits are formed through a three-part neurological loop: cue, routine, and reward.\nThe cue is a trigger that tells your brain to enter automatic mode.\nThe routine is the behavior itself.\nThe reward is what satisfies the craving and tells the brain this pattern is worth remembering.\nOver time, this loop becomes so automatic that your brain barely has to engage.\nIn experiments, rats trained to run a maze showed dramatically reduced brain activity once the maze became routine—the brain had essentially 'chunked' the sequence into a single habit.\nThis efficiency is why habits are so hard to break: the neural pathways are deeply carved.\nCharles Duhigg, author of 'The Power of Habit,' argues that you cannot eliminate a bad habit—you can only replace it.\nThe key is to keep the same cue and reward but change the routine.\nFor example, if stress (cue) leads to eating junk food (routine) to feel better (reward), you can replace junk food with a walk or calling a friend.\nResearch also shows that habits are easier to change during major life transitions—starting college, moving, beginning a new job—when old cues are disrupted.\nKnowing the structure of habits gives you the power to redesign them deliberately.", "qs": [{"q": "According to the passage, what are the three parts of the habit loop?", "ch": ["Start, middle, end", "Cue, routine, reward", "Think, act, feel", "Plan, execute, reflect"], "an": 1}, {"q": "What did the rat maze experiments demonstrate?", "ch": ["Rats learn quickly with rewards", "Brain activity increases as habits form", "Brain activity decreases as actions become habits", "Rats cannot form habits"], "an": 2}, {"q": "What does Duhigg argue about bad habits?", "ch": ["They can be eliminated with enough willpower", "You cannot eliminate them, only replace them", "Bad habits always lead to worse habits", "Exercise removes all bad habits"], "an": 1}, {"q": "When does research suggest habits are easiest to change?", "ch": ["During summer break", "When you are young", "During major life transitions", "When you are tired"], "an": 2}, {"q": "What is the main purpose of this passage?", "ch": ["To warn about dangerous habits", "To explain the science behind habits and how to change them", "To prove that all habits are bad", "To describe a famous psychology experiment"], "an": 1}], "vocab": [{"w": "neurological", "d": "relating to the nervous system and brain"}, {"w": "deliberately", "d": "done intentionally and carefully, with full awareness"}]}, {"id": "7S2", "title": "The Game That Conquered the World", "cat": "Sports & Culture", "text": "Football — known as soccer in the United States — is the world's most popular sport by almost any measure.\nAn estimated four billion people, more than half the human population, consider themselves fans.\nThe FIFA World Cup is the most watched sporting event in history: the 2018 final alone attracted 1.1 billion television viewers.\nBut football's global dominance raises an interesting question: what makes a sport spread across cultures rather than remain local?\nSociologists point to several factors that explain football's reach.\nFirst, the equipment requirements are minimal — all you need is a round object, which explains why children worldwide play with rolled socks, coconuts, or tin cans.\nSecond, the rules are simple to learn but endlessly complex to master, creating accessible entry points for beginners and deep engagement for experts.\nThird, football's low scoring makes each goal a dramatic, game-changing event — creating shared emotional peaks for spectators.\nAnthropologists also note that football maps onto deep human instincts: territorial competition, tribal identity, and collective celebration.\nWearing your team's colors is a form of identity declaration that predates modern sport by millennia.\nYet football's globalization has not been uniform.\nThe US and Australia have strong domestic sports cultures that competed with football's spread.\nIndia, despite its massive population, strongly favors cricket — a legacy of British colonialism that shaped sporting culture at a formative moment.\nSport, it turns out, is never just a game.", "qs": [{"q": "How many people watched the 2018 World Cup final?", "ch": ["500 million", "750 million", "1.1 billion", "4 billion"], "an": 2}, {"q": "Why do sociologists say minimal equipment helps football spread?", "ch": ["Poor countries can't afford other sports", "It means anyone can play with almost any round object", "Simple equipment makes players better", "Governments encourage cheap sports"], "an": 1}, {"q": "Why does football's low scoring create strong spectator engagement?", "ch": ["Low scores mean games go longer", "Each goal becomes a dramatic, game-changing event", "Fans prefer low-scoring games", "Low scores are easier to follow"], "an": 1}, {"q": "Why hasn't football dominated India despite its large population?", "ch": ["India doesn't allow international sports", "Football was banned there", "British colonialism shaped India's sporting culture around cricket", "Indian players prefer other sports"], "an": 2}, {"q": "What does the author mean by 'sport is never just a game'?", "ch": ["Sports are too serious", "Sports involve culture, identity, history, and human psychology", "Sports should be more competitive", "Games are less important than work"], "an": 1}], "vocab": [{"w": "anthropologist", "d": "a scientist who studies human societies, culture, and behavior"}, {"w": "colonialism", "d": "the practice of one country taking control over another and settling it"}]}, {"id": "7S3", "title": "The Whistleblower", "cat": "Social Studies & Ethics", "text": "In 1971, a military analyst named Daniel Ellsberg secretly photocopied 7,000 pages of classified government documents and gave them to newspapers.\nThe documents, known as the Pentagon Papers, revealed that the US government had systematically deceived the American public about the Vietnam War for years — knowing the war was unwinnable while publicly claiming otherwise.\nEllsberg was charged with espionage and faced 115 years in prison.\nBut his case was dismissed when it emerged that government agents had illegally broken into his psychiatrist's office to find damaging information.\nThe Pentagon Papers and the subsequent Watergate scandal — unfolding simultaneously — fundamentally shook Americans' trust in their government.\nDecades later, whistleblowers continue to raise profound questions.\nEdward Snowden in 2013 leaked documents revealing that the US government was conducting mass surveillance of its own citizens and allies.\nChelsea Manning had leaked military video and diplomatic cables in 2010.\nThose who defend whistleblowers argue they serve the public interest by revealing wrongdoing that governments would prefer to conceal.\nCritics argue they damage national security and break legitimate laws.\nThe tension is real and unresolved: between transparency and security, between individual conscience and institutional authority.\nDemocracies, by their nature, need both accountability and trust.", "qs": [{"q": "What did the Pentagon Papers reveal?", "ch": ["The US was winning the Vietnam War", "Government plans for future wars", "The government had deceived the public about Vietnam while knowing the war was unwinnable", "Secret alliances with other countries"], "an": 2}, {"q": "Why was Ellsberg's case dismissed?", "ch": ["The charges were found to be exaggerated", "He agreed to return the documents", "Government agents had illegally broken into his psychiatrist's office", "He was proven innocent"], "an": 2}, {"q": "What did Edward Snowden's leaks reveal?", "ch": ["Nuclear weapon locations", "Plans for new wars", "Mass surveillance of US citizens and allies", "Corruption among politicians"], "an": 2}, {"q": "What argument do defenders of whistleblowers make?", "ch": ["Laws should never be broken", "They serve the public interest by revealing wrongdoing", "Governments always lie", "Whistleblowers deserve pardons automatically"], "an": 1}, {"q": "What tension does the passage identify as 'real and unresolved'?", "ch": ["Between Republicans and Democrats", "Between transparency and security, conscience and authority", "Between the US and other countries", "Between old and new laws"], "an": 1}], "vocab": [{"w": "espionage", "d": "the practice of spying to obtain secret information"}, {"w": "surveillance", "d": "close monitoring of a person or group, especially by authorities"}]}, {"id": "7S4", "title": "The Genetic Code", "cat": "Science", "text": "Inside nearly every cell in your body is a molecule called DNA — deoxyribonucleic acid — that contains the complete instructions for building and operating you.\nDNA's famous double helix structure was described by Watson and Crick in 1953, drawing critically on X-ray crystallography data produced by Rosalind Franklin, whose contribution went largely unrecognized during her lifetime.\nDNA is made of four chemical bases: adenine (A), thymine (T), guanine (G), and cytosine (C).\nThese bases pair up in specific ways (A with T, G with C) forming the rungs of the double helix ladder.\nThe sequence of these bases forms a code — the genetic code — that cells use to build proteins.\nProteins do virtually everything in your body: they form structures, carry oxygen, fight infection, and catalyze chemical reactions.\nThe Human Genome Project, completed in 2003 after thirteen years of international collaboration, mapped all three billion base pairs in the human genome.\nA technology called CRISPR, developed in the 2010s, allows scientists to edit specific sequences of DNA with unprecedented precision.\nCRISPR has already been used to treat sickle cell disease and is being explored for cancer treatment, eliminating genetic disorders, and even eliminating mosquito-borne diseases.\nBut CRISPR also raises profound ethical questions: if we can edit genes, should we? Who decides? What counts as a disease worth eliminating versus a human difference worth preserving?", "qs": [{"q": "What is DNA?", "ch": ["A protein that fights infection", "A molecule containing instructions for building organisms", "A type of cell in the immune system", "The outer membrane of a cell"], "an": 1}, {"q": "Why was Rosalind Franklin's contribution important?", "ch": ["She co-discovered the double helix", "She led the Human Genome Project", "Her X-ray data was critical to Watson and Crick's discovery of DNA's structure", "She invented CRISPR"], "an": 2}, {"q": "What do proteins do in the body?", "ch": ["Only carry oxygen", "Store genetic information", "Form structures, carry oxygen, fight infection, and catalyze reactions", "Create DNA sequences"], "an": 2}, {"q": "What does CRISPR allow scientists to do?", "ch": ["Create new forms of DNA", "Map the human genome", "Edit specific DNA sequences with great precision", "Copy DNA from one species to another"], "an": 2}, {"q": "What ethical questions does CRISPR raise?", "ch": ["Whether editing genes is too expensive", "Who should control science laboratories", "Whether and how gene editing should be used, and who decides", "Whether proteins should be synthesized artificially"], "an": 2}], "vocab": [{"w": "crystallography", "d": "the study of crystal structure, used to analyze molecular shapes"}, {"w": "catalyze", "d": "to speed up a chemical reaction"}]}, {"id": "7S5", "title": "Hip-Hop: A Movement Born in the Bronx", "cat": "Music & Culture", "text": "On August 11, 1973, at a back-to-school party in the Bronx, New York, a teenager named DJ Kool Herc made a decision that would change music history.\nUsing two turntables, he isolated and extended the percussive break sections of funk and soul records — the parts where the beat was most raw and energetic — creating what became known as the breakbeat.\nPartygoers called it the 'Merry Go Round' technique.\nFrom this single innovation, a cultural movement exploded.\nHip-hop grew to encompass four elements: DJing (manipulating records), MCing (rapping over beats), breakdancing (athletic dance), and graffiti art (visual expression).\nThe genre emerged from communities devastated by poverty, government neglect, and gang violence.\nHip-hop gave young people a language for their reality and a platform for creativity that required almost no financial resources.\nBy the 1990s, hip-hop had become the best-selling music genre in America.\nToday it is global — from K-hip-hop in South Korea to Afrobeats fusions across West Africa.\nCritics have long debated hip-hop's depictions of violence, materialism, and gender.\nBut scholars argue these debates often ignore the genre's dominant tradition of social commentary: from Grandmaster Flash's 'The Message' to Kendrick Lamar's Pulitzer Prize-winning album.\nHip-hop is the first art form born in the streets of America's poorest neighborhoods to dominate global popular culture.", "qs": [{"q": "What did DJ Kool Herc do that changed music history?", "ch": ["He invented the electric guitar", "He created the breakbeat by isolating percussive sections of records", "He wrote the first rap song", "He opened the first music studio in the Bronx"], "an": 1}, {"q": "What are the four elements of hip-hop?", "ch": ["Rapping, singing, dancing, and painting", "DJing, MCing, breakdancing, and graffiti", "Beatboxing, rapping, fashion, and slang", "Drums, bass, vocals, and samples"], "an": 1}, {"q": "What social conditions gave rise to hip-hop?", "ch": ["Wealth and prosperity in New York", "A vibrant arts funding program", "Poverty, government neglect, and gang violence", "Immigration from Caribbean countries"], "an": 2}, {"q": "What achievement did Kendrick Lamar receive?", "ch": ["A Grammy for best album", "A presidential medal", "A Pulitzer Prize", "First hip-hop artist on the Billboard chart"], "an": 2}, {"q": "What does the passage say about critics of hip-hop's violent themes?", "ch": ["They are completely right", "They are always wrong", "They often ignore the genre's strong tradition of social commentary", "Their criticism has improved the genre"], "an": 2}], "vocab": [{"w": "percussive", "d": "relating to rhythm and beats, as in drumming"}, {"w": "materialism", "d": "excessive focus on physical possessions and money"}]}, {"id":"7S6","title":"The Science of Sarcasm","cat":"Psychology & Language","text":"Sarcasm requires more sophisticated brain processing than straightforward language. To understand 'Great job breaking that window,' the listener must:\n1. Decode the literal meaning (a compliment)\n2. Recognize social context (an accident just happened)\n3. Infer speaker's actual meaning (the opposite of the words)\n4. Determine intent (teasing or cruel?)\nResearchers found that people with damage to the parahippocampal gyrus — a region involved in social cognition — cannot detect sarcasm. They take ironic statements literally.\nInterestingly, children under 6 rarely understand sarcasm. It develops with social sophistication. And different cultures use sarcasm at very different rates — some cultures barely use it at all, which means sarcasm is not a universal human feature.\nLanguage is never just words.","qs":[{"q":"Why does understanding sarcasm require more brain processing than literal language?","ch":["Sarcasm uses more words","It requires decoding meaning, context, intent, and the opposite of what is said","Sarcasm involves unfamiliar vocabulary","The brain avoids processing jokes"],"an":1},{"q":"What can people with damage to the parahippocampal gyrus not do?","ch":["Speak clearly","Detect sarcasm — they take ironic statements literally","Understand grammar","Remember words"],"an":1},{"q":"What does the fact that children under 6 rarely understand sarcasm suggest?","ch":["Young children are not intelligent enough","Sarcasm is too complex to be taught","Understanding sarcasm develops with social and cognitive maturity","Parents should teach sarcasm earlier"],"an":2},{"q":"What does 'sarcasm is not a universal human feature' mean?","ch":["Sarcasm was invented recently","Not all cultures use or value sarcasm equally","Sarcasm is only used by English speakers","Animals also use sarcasm"],"an":1},{"q":"What is the point of the final sentence: 'Language is never just words'?","ch":["Words have many meanings in the dictionary","Language carries social context, intent, culture, and emotion beyond the literal meaning","We should say what we mean directly","Sarcasm is more important than other speech"],"an":1}],"vocab":[{"w":"cognition","d":"mental processes involved in acquiring knowledge and understanding"},{"w":"ironic","d":"meaning the opposite of what is literally said, often for humor or emphasis"}]},
{"id":"7S7","title":"The Entrepreneur Who Went Bankrupt — Twice","cat":"Business & Biography","text":"Henry Ford did not invent the car. He invented a system for making cars affordable. Before him, cars were luxury items for the rich. After him, an ordinary worker could own one.\nBut Ford's path was not smooth. His first company failed. His second company — which he was pushed out of — later became Cadillac.\nFord's third attempt, in 1903, finally succeeded. He introduced the moving assembly line, cutting car production time from 12 hours to 93 minutes per vehicle.\nHe also paid his workers $5 a day when the going rate was $2 — not out of generosity, but strategy. He realized workers who could afford cars were workers who would buy cars.\nFord later became notoriously antisemitic, publishing hateful material that Adolf Hitler kept on his desk. Genius and moral failure can occupy the same person.","qs":[{"q":"What was Ford's greatest innovation — not the car itself, but what?","ch":["The gasoline engine","A system for making cars affordable for ordinary people","A new type of wheel","Luxury automobiles"],"an":1},{"q":"How did the assembly line change car production?","ch":["It made cars safer","It reduced production time from 12 hours to 93 minutes","It lowered the price of steel","It created better designs"],"an":1},{"q":"Why did Ford pay workers $5 a day when others paid $2?","ch":["He was generous and kind","He was legally required to","He calculated that workers who earned more would buy his cars","He wanted to attract the best workers from competitors"],"an":2},{"q":"What does the last sentence mean?","ch":["Ford should be forgotten","We should ignore his antisemitism","A person can be brilliant in one area and deeply flawed morally at the same time","Genius people are always also moral"],"an":2},{"q":"What is the AUTHOR'S PURPOSE in including Ford's antisemitism?","ch":["To make readers hate Ford","To show that historical figures must be judged fully, not only by their achievements","To prove Ford's inventions were bad","To explain World War II"],"an":1}],"vocab":[{"w":"assembly line","d":"a manufacturing system where products move through stages, each worker adding one part"},{"w":"notoriously","d":"famous for something bad or unpleasant"}]},
{"id":"7S8","title":"The Real Story of Thanksgiving","cat":"History","text":"The 1621 harvest feast at Plymouth Colony was not called Thanksgiving. It wasn't an annual event. The Pilgrims didn't invite the Wampanoag people — they heard gunfire, came to investigate with 90 warriors, and stayed for three days.\nThe Wampanoag leader Massasoit had strategic reasons for maintaining the alliance. His people had been devastated by a plague that killed 90% of the regional population. He needed the English settlers' military support against rival tribes.\nThe holiday we now call Thanksgiving was formalized by Abraham Lincoln in 1863, during the Civil War, as a unifying national observance.\nThe story most Americans are told — Pilgrims and Native Americans sharing a peaceful meal of friendship — contains a truth (there was a shared feast) embedded in a much more complex political and human story.\nHistory is rarely the simple story we were first taught.","qs":[{"q":"Why did the Wampanoag come to the 1621 feast?","ch":["They were invited as friends","They heard gunfire and came to investigate","They brought food to share","Massasoit organized the gathering"],"an":1},{"q":"What were Massasoit's strategic reasons for the alliance?","ch":["He admired European culture","His people had been devastated by plague and needed military support","He wanted to trade fur","He was curious about the settlers"],"an":1},{"q":"When was 'Thanksgiving' actually formalized as a holiday?","ch":["1621 at Plymouth","1776 during the Revolution","1863 by Lincoln during the Civil War","1900 by Congress"],"an":2},{"q":"What does the author mean by a truth 'embedded in a much more complex story'?","ch":["The feast didn't happen","The feast was real but its meaning and context are far more complicated than usually taught","Native Americans and Pilgrims were always at peace","History books are always wrong"],"an":1},{"q":"What is the MAIN IDEA of this passage?","ch":["Thanksgiving should be abolished","The familiar Thanksgiving story is simplified and leaves out important historical complexity","Pilgrims were cruel to Native Americans","Lincoln invented Thanksgiving for selfish reasons"],"an":1}],"vocab":[{"w":"formalized","d":"made official or given a recognized structure"},{"w":"alliance","d":"a relationship between groups who agree to cooperate for mutual benefit"}]},
{"id":"7S9","title":"Why Teenagers Take Risks","cat":"Psychology & Neuroscience","text":"For decades, scientists assumed teenagers took risks because their brains were simply underdeveloped. Recent research is more nuanced.\nThe teenage brain's reward system is actually more active than in adults — it responds more strongly to positive outcomes. Meanwhile, the prefrontal cortex (responsible for weighing consequences) continues developing until age 25.\nThis combination creates a brief period where rewards feel intense and risks feel manageable.\nEvolutionary psychologists argue this is not a malfunction. Adolescence is the biological moment to leave family, explore, and establish independence. A teenager who was too cautious might never take the risks necessary to build an adult life.\nThe challenge for parents is not to eliminate risk-taking — which is healthy — but to guide it toward risks that build rather than destroy.","qs":[{"q":"What does recent research say about the teenage brain's reward system?","ch":["It is less active than in adults","It responds more strongly to positive outcomes than in adults","It is completely underdeveloped","It works the same as adult brains"],"an":1},{"q":"Until what age does the prefrontal cortex continue developing?","ch":["18","20","25","30"],"an":2},{"q":"What do evolutionary psychologists say about teen risk-taking?","ch":["It is a brain malfunction","It is an evolutionary adaptation needed to build independence","It should be stopped","It decreases with education"],"an":1},{"q":"What does the passage say is the real challenge for parents?","ch":["Preventing all risk-taking","Punishing risky behavior","Guiding risk-taking toward healthy independence rather than eliminating it","Waiting until the brain is fully developed"],"an":2},{"q":"How does the author characterize the combination of a high-reward brain and underdeveloped prefrontal cortex?","ch":["Dangerous and should be fixed","A biological design for exploration and independence during adolescence","Evidence of poor parenting","The main cause of teen crime"],"an":1}],"vocab":[{"w":"nuanced","d":"having subtle distinctions; more complex than simple explanations suggest"},{"w":"prefrontal cortex","d":"the front part of the brain responsible for decision-making and impulse control"}]},
{"id":"7S10","title":"The Other Side of the Story","cat":"Media Literacy","text":"Every story has at least two sides. Every news article has choices: what to include, what to omit, which voices to quote, what to call things.\nWhen the same event is described as a 'riot' by one outlet and a 'protest' by another, readers receive different emotional signals. A 'rebel fighter' and a 'terrorist' can describe the same person — the label reflects the labeler's perspective.\nConfirmation bias means we tend to read sources that agree with us and dismiss those that don't. Studies show people rate the same article as more credible when they believe their preferred political party wrote it.\nMedia literacy doesn't mean distrusting everything. It means asking: who wrote this, for whom, and what choices did they make?\nThe most dangerous reader is one who thinks they don't have to ask.","qs":[{"q":"What do the word choices 'riot' vs 'protest' demonstrate?","ch":["Different events require different words","Language choices shape how readers emotionally interpret the same event","Journalists are always biased","Riots and protests are the same thing"],"an":1},{"q":"What is confirmation bias in the context of news reading?","ch":["Believing everything you read","Reading only sources that confirm your existing beliefs","Checking sources carefully","Preferring accurate news"],"an":1},{"q":"What does the study about political party credibility show?","ch":["One party writes better articles","People's trust is influenced by political identity, not just content quality","Only educated people have confirmation bias","Political articles are always wrong"],"an":1},{"q":"What is the author's definition of media literacy?","ch":["Distrusting all media","Reading as many sources as possible","Asking who wrote it, for whom, and what choices they made","Only reading neutral sources"],"an":2},{"q":"What does the last sentence warn against?","ch":["Reading too much news","People who read every news source","Readers who assume they are objective and don't question what they read","Journalists who don't check facts"],"an":2}],"vocab":[{"w":"confirmation bias","d":"the tendency to search for information that confirms what you already believe"},{"w":"media literacy","d":"the ability to critically analyze and evaluate media sources and messages"}]}], "8": [{"id": "8S1", "title": "The Trolley Problem and Moral Reasoning", "text": "Imagine a runaway trolley hurtling down a track toward five people who cannot move.\nYou are standing near a lever that can switch the trolley to another track—but one person is standing on that track.\nDo you pull the lever, actively redirecting the trolley to kill one person instead of five?\nThis thought experiment, formulated by philosopher Philippa Foot in 1967 and later modified by Judith Jarvis Thomson, is known as the trolley problem.\nIts purpose is not to plan for unlikely disasters but to expose the fault lines in our moral intuitions.\nMost people say they would pull the lever—a choice reflecting utilitarian ethics, which holds that the morally correct action is the one that maximizes overall wellbeing.\nBy this logic, one death is better than five.\nBut now consider a variation: you are on a bridge above the trolley track with a very large man beside you.\nYou realize the only way to stop the trolley is to push him off the bridge, using his body as a barrier.\nMathematically, the outcome is identical: one life for five.\nYet most people recoil at pushing the man, even though the arithmetic is the same.\nThis inconsistency reveals that humans don't reason about ethics purely through calculation.\nWe also operate from deontological principles—rules like 'do not use a person as a means to an end,' regardless of consequences.\nPhilosophers have used these variations to argue that moral intuition is complex and sometimes contradictory.\nThe trolley problem remains one of the most debated scenarios in ethics because it forces us to
