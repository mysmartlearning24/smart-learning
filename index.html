onal peaks for spectators.\nAnthropologists also note that football maps onto deep human instincts: territorial competition, tribal identity, and collective celebration.\nWearing your team's colors is a form of identity declaration that predates modern sport by millennia.\nYet football's globalization has not been uniform.\nThe US and Australia have strong domestic sports cultures that competed with football's spread.\nIndia, despite its massive population, strongly favors cricket — a legacy of British colonialism that shaped sporting culture at a formative moment.\nSport, it turns out, is never just a game.", "qs": [{"q": "How many people watched the 2018 World Cup final?", "ch": ["500 million", "750 million", "1.1 billion", "4 billion"], "an": 2}, {"q": "Why do sociologists say minimal equipment helps football spread?", "ch": ["Poor countries can't afford other sports", "It means anyone can play with almost any round object", "Simple equipment makes players better", "Governments encourage cheap sports"], "an": 1}, {"q": "Why does football's low scoring create strong spectator engagement?", "ch": ["Low scores mean games go longer", "Each goal becomes a dramatic, game-changing event", "Fans prefer low-scoring games", "Low scores are easier to follow"], "an": 1}, {"q": "Why hasn't football dominated India despite its large population?", "ch": ["India doesn't allow international sports", "Football was banned there", "British colonialism shaped India's sporting culture around cricket", "Indian players prefer other sports"], "an": 2}, {"q": "What does the author mean by 'sport is never just a game'?", "ch": ["Sports are too serious", "Sports involve culture, identity, history, and human psychology", "Sports should be more competitive", "Games are less important than work"], "an": 1}], "vocab": [{"w": "anthropologist", "d": "a scientist who studies human societies, culture, and behavior"}, {"w": "colonialism", "d": "the practice of one country taking control over another and settling it"}]}, {"id": "7S3", "title": "The Whistleblower", "cat": "Social Studies & Ethics", "text": "In 1971, a military analyst named Daniel Ellsberg secretly photocopied 7,000 pages of classified government documents and gave them to newspapers.\nThe documents, known as the Pentagon Papers, revealed that the US government had systematically deceived the American public about the Vietnam War for years — knowing the war was unwinnable while publicly claiming otherwise.\nEllsberg was charged with espionage and faced 115 years in prison.\nBut his case was dismissed when it emerged that government agents had illegally broken into his psychiatrist's office to find damaging information.\nThe Pentagon Papers and the subsequent Watergate scandal — unfolding simultaneously — fundamentally shook Americans' trust in their government.\nDecades later, whistleblowers continue to raise profound questions.\nEdward Snowden in 2013 leaked documents revealing that the US government was conducting mass surveillance of its own citizens and allies.\nChelsea Manning had leaked military video and diplomatic cables in 2010.\nThose who defend whistleblowers argue they serve the public interest by revealing wrongdoing that governments would prefer to conceal.\nCritics argue they damage national security and break legitimate laws.\nThe tension is real and unresolved: between transparency and security, between individual conscience and institutional authority.\nDemocracies, by their nature, need both accountability and trust.", "qs": [{"q": "What did the Pentagon Papers reveal?", "ch": ["The US was winning the Vietnam War", "Government plans for future wars", "The government had deceived the public about Vietnam while knowing the war was unwinnable", "Secret alliances with other countries"], "an": 2}, {"q": "Why was Ellsberg's case dismissed?", "ch": ["The charges were found to be exaggerated", "He agreed to return the documents", "Government agents had illegally broken into his psychiatrist's office", "He was proven innocent"], "an": 2}, {"q": "What did Edward Snowden's leaks reveal?", "ch": ["Nuclear weapon locations", "Plans for new wars", "Mass surveillance of US citizens and allies", "Corruption among politicians"], "an": 2}, {"q": "What argument do defenders of whistleblowers make?", "ch": ["Laws should never be broken", "They serve the public interest by revealing wrongdoing", "Governments always lie", "Whistleblowers deserve pardons automatically"], "an": 1}, {"q": "What tension does the passage identify as 'real and unresolved'?", "ch": ["Between Republicans and Democrats", "Between transparency and security, conscience and authority", "Between the US and other countries", "Between old and new laws"], "an": 1}], "vocab": [{"w": "espionage", "d": "the practice of spying to obtain secret information"}, {"w": "surveillance", "d": "close monitoring of a person or group, especially by authorities"}]}, {"id": "7S4", "title": "The Genetic Code", "cat": "Science", "text": "Inside nearly every cell in your body is a molecule called DNA — deoxyribonucleic acid — that contains the complete instructions for building and operating you.\nDNA's famous double helix structure was described by Watson and Crick in 1953, drawing critically on X-ray crystallography data produced by Rosalind Franklin, whose contribution went largely unrecognized during her lifetime.\nDNA is made of four chemical bases: adenine (A), thymine (T), guanine (G), and cytosine (C).\nThese bases pair up in specific ways (A with T, G with C) forming the rungs of the double helix ladder.\nThe sequence of these bases forms a code — the genetic code — that cells use to build proteins.\nProteins do virtually everything in your body: they form structures, carry oxygen, fight infection, and catalyze chemical reactions.\nThe Human Genome Project, completed in 2003 after thirteen years of international collaboration, mapped all three billion base pairs in the human genome.\nA technology called CRISPR, developed in the 2010s, allows scientists to edit specific sequences of DNA with unprecedented precision.\nCRISPR has already been used to treat sickle cell disease and is being explored for cancer treatment, eliminating genetic disorders, and even eliminating mosquito-borne diseases.\nBut CRISPR also raises profound ethical questions: if we can edit genes, should we? Who decides? What counts as a disease worth eliminating versus a human difference worth preserving?", "qs": [{"q": "What is DNA?", "ch": ["A protein that fights infection", "A molecule containing instructions for building organisms", "A type of cell in the immune system", "The outer membrane of a cell"], "an": 1}, {"q": "Why was Rosalind Franklin's contribution important?", "ch": ["She co-discovered the double helix", "She led the Human Genome Project", "Her X-ray data was critical to Watson and Crick's discovery of DNA's structure", "She invented CRISPR"], "an": 2}, {"q": "What do proteins do in the body?", "ch": ["Only carry oxygen", "Store genetic information", "Form structures, carry oxygen, fight infection, and catalyze reactions", "Create DNA sequences"], "an": 2}, {"q": "What does CRISPR allow scientists to do?", "ch": ["Create new forms of DNA", "Map the human genome", "Edit specific DNA sequences with great precision", "Copy DNA from one species to another"], "an": 2}, {"q": "What ethical questions does CRISPR raise?", "ch": ["Whether editing genes is too expensive", "Who should control science laboratories", "Whether and how gene editing should be used, and who decides", "Whether proteins should be synthesized artificially"], "an": 2}], "vocab": [{"w": "crystallography", "d": "the study of crystal structure, used to analyze molecular shapes"}, {"w": "catalyze", "d": "to speed up a chemical reaction"}]}, {"id": "7S5", "title": "Hip-Hop: A Movement Born in the Bronx", "cat": "Music & Culture", "text": "On August 11, 1973, at a back-to-school party in the Bronx, New York, a teenager named DJ Kool Herc made a decision that would change music history.\nUsing two turntables, he isolated and extended the percussive break sections of funk and soul records — the parts where the beat was most raw and energetic — creating what became known as the breakbeat.\nPartygoers called it the 'Merry Go Round' technique.\nFrom this single innovation, a cultural movement exploded.\nHip-hop grew to encompass four elements: DJing (manipulating records), MCing (rapping over beats), breakdancing (athletic dance), and graffiti art (visual expression).\nThe genre emerged from communities devastated by poverty, government neglect, and gang violence.\nHip-hop gave young people a language for their reality and a platform for creativity that required almost no financial resources.\nBy the 1990s, hip-hop had become the best-selling music genre in America.\nToday it is global — from K-hip-hop in South Korea to Afrobeats fusions across West Africa.\nCritics have long debated hip-hop's depictions of violence, materialism, and gender.\nBut scholars argue these debates often ignore the genre's dominant tradition of social commentary: from Grandmaster Flash's 'The Message' to Kendrick Lamar's Pulitzer Prize-winning album.\nHip-hop is the first art form born in the streets of America's poorest neighborhoods to dominate global popular culture.", "qs": [{"q": "What did DJ Kool Herc do that changed music history?", "ch": ["He invented the electric guitar", "He created the breakbeat by isolating percussive sections of records", "He wrote the first rap song", "He opened the first music studio in the Bronx"], "an": 1}, {"q": "What are the four elements of hip-hop?", "ch": ["Rapping, singing, dancing, and painting", "DJing, MCing, breakdancing, and graffiti", "Beatboxing, rapping, fashion, and slang", "Drums, bass, vocals, and samples"], "an": 1}, {"q": "What social conditions gave rise to hip-hop?", "ch": ["Wealth and prosperity in New York", "A vibrant arts funding program", "Poverty, government neglect, and gang violence", "Immigration from Caribbean countries"], "an": 2}, {"q": "What achievement did Kendrick Lamar receive?", "ch": ["A Grammy for best album", "A presidential medal", "A Pulitzer Prize", "First hip-hop artist on the Billboard chart"], "an": 2}, {"q": "What does the passage say about critics of hip-hop's violent themes?", "ch": ["They are completely right", "They are always wrong", "They often ignore the genre's strong tradition of social commentary", "Their criticism has improved the genre"], "an": 2}], "vocab": [{"w": "percussive", "d": "relating to rhythm and beats, as in drumming"}, {"w": "materialism", "d": "excessive focus on physical possessions and money"}]}], "8": [{"id": "8S1", "title": "The Trolley Problem and Moral Reasoning", "text": "Imagine a runaway trolley hurtling down a track toward five people who cannot move.\nYou are standing near a lever that can switch the trolley to another track—but one person is standing on that track.\nDo you pull the lever, actively redirecting the trolley to kill one person instead of five?\nThis thought experiment, formulated by philosopher Philippa Foot in 1967 and later modified by Judith Jarvis Thomson, is known as the trolley problem.\nIts purpose is not to plan for unlikely disasters but to expose the fault lines in our moral intuitions.\nMost people say they would pull the lever—a choice reflecting utilitarian ethics, which holds that the morally correct action is the one that maximizes overall wellbeing.\nBy this logic, one death is better than five.\nBut now consider a variation: you are on a bridge above the trolley track with a very large man beside you.\nYou realize the only way to stop the trolley is to push him off the bridge, using his body as a barrier.\nMathematically, the outcome is identical: one life for five.\nYet most people recoil at pushing the man, even though the arithmetic is the same.\nThis inconsistency reveals that humans don't reason about ethics purely through calculation.\nWe also operate from deontological principles—rules like 'do not use a person as a means to an end,' regardless of consequences.\nPhilosophers have used these variations to argue that moral intuition is complex and sometimes contradictory.\nThe trolley problem remains one of the most debated scenarios in ethics because it forces us to examine not just what we would do, but why—and whether our reasons are consistent.", "qs": [{"q": "What is the main purpose of the trolley problem?", "ch": ["To improve transportation safety", "To test emergency decision-making", "To expose inconsistencies in moral intuition", "To determine the best trolley routes"], "an": 2}, {"q": "What is utilitarian ethics, as described in the passage?", "ch": ["Rules that must never be broken", "Always following instinct", "The belief that actions should maximize overall wellbeing", "Treating all people equally"], "an": 2}, {"q": "Why do most people react differently to the bridge variant?", "ch": ["The math is different", "Pushing a person feels like using them as a tool", "Bridges are scarier than levers", "The trolley moves faster"], "an": 1}, {"q": "What are deontological principles, according to the passage?", "ch": ["Rules based only on outcomes", "Calculations about consequences", "Rules that apply regardless of consequences", "Personal preferences about behavior"], "an": 2}, {"q": "What does the inconsistency between the lever and bridge responses reveal?", "ch": ["People are always selfish", "Humans use both rules and consequences to reason about ethics", "Utilitarianism is always correct", "People cannot make moral decisions"], "an": 1}], "vocab": [{"w": "utilitarian", "d": "relating to the idea that actions are right if they benefit the majority"}, {"w": "deontological", "d": "relating to moral duties and rules, regardless of consequences"}]}, {"id": "8S2", "title": "The Oppenheimer Question", "cat": "History & Ethics", "text": "On July 16, 1945, in the New Mexico desert, the United States detonated the first nuclear weapon in history — a test codenamed Trinity.\nThe man who led its development, J. Robert Oppenheimer, watched the fireball rise and later recalled a verse from the Hindu scripture the Bhagavad Gita: 'Now I am become Death, the destroyer of worlds.'\nThree weeks later, the US dropped atomic bombs on Hiroshima and Nagasaki, killing an estimated 200,000 people.\nOppenheimer spent the rest of his life wrestling with what he had created.\nHe lobbied for international control of nuclear weapons and opposed developing the even more destructive hydrogen bomb.\nIn 1954, during the McCarthy era, the government revoked his security clearance, essentially ending his career, on grounds that he had associated with communists.\nThe case became a symbol of the conflict between scientific freedom and national security.\nOppenheimer's story raises questions that have not gone away.\nShould scientists be held responsible for the applications of their discoveries?\nCan a technological advance be moral in itself while its application is catastrophic?\nIs it ethical to destroy 200,000 lives to save — as American officials claimed — millions who would die in a land invasion of Japan?\nThese are not historical curiosities but live questions: as AI, biotechnology, and synthetic biology advance, the Oppenheimer question recurs in new forms.\nWhat do creators owe the things they create?", "qs": [{"q": "What did Oppenheimer recall from the Bhagavad Gita after the Trinity test?", "ch": ["A prayer for peace", "'Now I am become Death, the destroyer of worlds'", "A celebration of victory", "A warning to future generations"], "an": 1}, {"q": "What did Oppenheimer advocate for after the war?", "ch": ["Building more powerful weapons", "Sharing nuclear technology with allies", "International control of nuclear weapons and opposition to the hydrogen bomb", "Withdrawing the US from international agreements"], "an": 2}, {"q": "Why did the government revoke Oppenheimer's security clearance?", "ch": ["He leaked classified information", "He publicly opposed the government", "He had associated with communists during the McCarthy era", "He tried to sell nuclear technology"], "an": 2}, {"q": "What moral question does the bombing of Hiroshima and Nagasaki raise?", "ch": ["Whether the US had the right technology", "Whether 200,000 deaths could be justified to prevent a larger number of deaths in an invasion", "Whether Japan was responsible for starting the war", "Whether nuclear weapons should be legal"], "an": 1}, {"q": "Why does the author say the 'Oppenheimer question' recurs in new forms?", "ch": ["Because nuclear weapons are still being built", "Because Oppenheimer's case was never resolved legally", "Because advances in AI and biotechnology raise the same questions about creator responsibility", "Because more scientists are building weapons"], "an": 2}], "vocab": [{"w": "detonated", "d": "caused to explode"}, {"w": "revoked", "d": "officially cancelled or withdrew"}]}, {"id": "8S3", "title": "The Architecture of Inequality", "cat": "Economics & Social Studies", "text": "In 2021, the three wealthiest Americans — Elon Musk, Jeff Bezos, and Mark Zuckerberg — held more wealth than the bottom 50 percent of American adults combined.\nThis concentration of wealth is not new, but its current scale is unprecedented in modern history.\nEconomists use a measure called the Gini coefficient to quantify inequality within a country — where 0 represents perfect equality and 1 represents total inequality.\nThe United States currently has one of the highest Gini coefficients among developed nations.\nThe causes of rising inequality are genuinely debated among economists.\nSome point to technological change: automation displaces routine jobs, while technology amplifies the productivity of highly skilled workers, increasing the gap between them.\nOthers emphasize policy choices: the decline of union membership, reductions in top marginal tax rates since the 1980s, and reduced government investment in public goods.\nStill others focus on globalization: the offshoring of manufacturing jobs to lower-wage countries depressed wages for less-educated workers in wealthy nations.\nThe consequences of inequality are also contested.\nSome argue that inequality is an inevitable byproduct of a dynamic economy and that the correct metric is absolute living standards, not relative inequality.\nOthers cite research linking high inequality to reduced social mobility, worse health outcomes, and weakened democratic institutions.\nNobel laureate Joseph Stiglitz argues that extreme inequality is not just an ethical problem but a structural one: 'A house divided cannot stand — and neither can an economy.'", "qs": [{"q": "What is the Gini coefficient?", "ch": ["A measure of economic growth", "A measure of trade between nations", "A measure of wealth concentration within a country", "A measure of unemployment"], "an": 2}, {"q": "How does technological change contribute to inequality according to the passage?", "ch": ["It creates equal opportunities for all workers", "It automates high-skill jobs while creating low-skill ones", "It displaces routine jobs while amplifying productivity of skilled workers", "It has no significant effect on wages"], "an": 2}, {"q": "What policy changes since the 1980s does the passage link to rising inequality?", "ch": ["Increased union membership and higher taxes", "Reduced union membership and lower top tax rates", "Greater government investment in infrastructure", "More immigration and trade deals"], "an": 1}, {"q": "What do those who downplay inequality argue?", "ch": ["Inequality doesn't exist", "The US is the most equal country", "Absolute living standards matter more than relative inequality", "Rich people deserve their wealth"], "an": 2}, {"q": "What does Stiglitz mean by 'a house divided cannot stand — and neither can an economy'?", "ch": ["Buildings should be structurally sound", "Extreme economic division eventually undermines the whole system", "Inequality only affects the poor", "Economic systems should be simple"], "an": 1}], "vocab": [{"w": "unprecedented", "d": "never done or known before"}, {"w": "offshoring", "d": "moving business operations to another country to reduce costs"}]}, {"id": "8S4", "title": "What Makes a Hero: The Mythology of Joseph Campbell", "cat": "Literature & Philosophy", "text": "In 1949, literature professor Joseph Campbell published The Hero with a Thousand Faces, arguing that virtually all hero stories across all cultures share a single underlying structure he called the monomyth or the Hero's Journey.\nThe pattern begins with the hero in an ordinary world.\nA call to adventure disrupts this world — an invitation, a crisis, a challenge.\nThe hero initially refuses the call, overwhelmed by fear or obligation.\nA mentor figure appears, offering wisdom or tools.\nThe hero crosses a threshold into an unknown world of trials and enemies.\nThrough a series of tests, the hero confronts their deepest fear or flaw in an ordeal.\nThey obtain a reward — a treasure, a truth, a transformation.\nThe hero then makes a perilous road back to the ordinary world, often pursued by forces of the unknown.\nThey return transformed, bringing something of value — a boon — to their community.\nCampbell traced this pattern in the Epic of Gilgamesh (2100 BCE), the Odyssey, the story of Buddha, the life of Jesus, and hundreds of myths worldwide.\nGeorge Lucas has said the Hero's Journey directly shaped Star Wars.\nChristopher Vogler adapted Campbell's framework into a Hollywood screenwriting guide still used today.\nCritics note that Campbell's framework can impose Western narrative structures onto non-Western stories, and that it centers predominantly male heroes.\nBut the framework endures because it maps onto something psychologists also recognize: that growth requires leaving comfort, facing difficulty, and returning changed.", "qs": [{"q": "What is the monomyth?", "ch": ["A specific Greek myth", "Campbell's term for the universal underlying structure of hero stories", "A type of epic poem", "A framework for studying religion"], "an": 1}, {"q": "In the Hero's Journey, what happens after the hero refuses the call?", "ch": ["The story ends", "The hero receives punishment", "A mentor appears offering wisdom or tools", "The hero immediately begins the journey"], "an": 2}, {"q": "According to Campbell, where does the Hero's Journey appear?", "ch": ["Only in Western European myths", "Only in ancient texts", "In myths, religious stories, and narratives across virtually all cultures", "Only in stories with male heroes"], "an": 2}, {"q": "What criticism is made of Campbell's framework?", "ch": ["It is too complicated for filmmakers", "It was never actually used in modern storytelling", "It can impose Western structures on non-Western stories and centers male heroes", "It doesn't apply to ancient myths"], "an": 2}, {"q": "Why does the passage say the framework 'endures'?", "ch": ["Because Campbell was a famous professor", "Because Hollywood requires its use", "Because it maps onto the psychological reality of how growth actually works", "Because it's the only storytelling framework that exists"], "an": 2}], "vocab": [{"w": "monomyth", "d": "Campbell's term for the universal narrative pattern found in hero stories across cultures"}, {"w": "boon", "d": "a benefit or gift brought back from a journey or experience"}]}, {"id": "8S5", "title": "The Algorithm Problem", "cat": "Technology & Ethics", "text": "In 2018, researchers at MIT's Media Lab published a study called Gender Shades that tested facial recognition systems from three major tech companies.\nThe systems achieved 99% accuracy for white men.\nFor dark-skinned women, the error rate was as high as 35%.\nThis disparity occurred not because engineers were intentionally biased but because the systems were trained on datasets that overrepresented white faces.\nThe algorithm learned from what it was given.\nAlgorithmic bias is not limited to facial recognition.\nRecidivism prediction software used in US courts — which predicts whether someone is likely to reoffend — has been shown to incorrectly flag Black defendants as high-risk at twice the rate of white defendants with similar criminal histories.\nMortgage-approval algorithms have been documented denying loans to qualified minority applicants more frequently.\nHiring algorithms trained on historical data reproduce the biases of past decisions.\nThe fundamental issue is that algorithms do not create fairness from bias; they systematize and scale it.\nWhen human bias was applied case-by-case, its harm was limited and correctable in individual instances.\nAlgorithmic bias is applied to millions of decisions simultaneously, invisibly.\nSome researchers advocate for algorithmic auditing — independent review of AI systems for discriminatory outcomes.\nOthers argue that some algorithms should be banned outright from high-stakes decisions.\nThe debate reflects a deeper question: when we build systems to replace human judgment, whose values do we encode into the machine?", "qs": [{"q": "Why did the facial recognition systems in the Gender Shades study perform worse on dark-skinned women?", "ch": ["The engineers were intentionally biased", "The technology was newer", "Training datasets overrepresented white faces", "Dark-skinned faces are more complex to analyze"], "an": 2}, {"q": "What has recidivism prediction software been shown to do?", "ch": ["Accurately predict who will reoffend", "Flag Black defendants as high-risk at twice the rate of comparable white defendants", "Reduce racial disparities in sentencing", "Replace human judges in courts"], "an": 1}, {"q": "What is the key difference between human bias and algorithmic bias?", "ch": ["Human bias is less harmful", "Human bias is impossible to detect", "Algorithmic bias is applied to millions of decisions simultaneously and invisibly", "Algorithmic bias affects only technology decisions"], "an": 2}, {"q": "What do some researchers advocate to address algorithmic bias?", "ch": ["Stopping all AI development", "Only using human decision-makers", "Independent auditing of AI systems for discriminatory outcomes", "Training algorithms with smaller datasets"], "an": 2}, {"q": "What deeper question does this debate raise, according to the passage?", "ch": ["Whether AI is too expensive", "Whether algorithms are faster than humans", "Whose values are encoded into machines when we replace human judgment", "Whether privacy is important"], "an": 2}], "vocab": [{"w": "algorithm", "d": "a set of rules or instructions that a computer follows to complete a task"}, {"w": "recidivism", "d": "the tendency of a criminal to reoffend after being released"}]}]};

function doLogin(){

/* ── Storage key scoping by family ── */
function familyKey(key){
  return SESSION.familyId ? 'smart_'+SESSION.familyId+'_'+key : 'smart_'+key;
}

/* ── Master: create a family ── */
function createFamily(name, username, password, maxKids, plan){
  var db=window._smartDB;if(!db)return Promise.reject('no db');
  var id='fam_'+Date.now();
  var famData={id:id,name:name,username:username.toLowerCase(),password:password,maxKids:parseInt(maxKids)||3,plan:plan||'family',active:true,createdAt:new Date().toISOString()};
  return db.collection('families').doc(id).set(famData).then(function(){return famData;});
}

/* ── Master: load all families ── */
function loadAllFamilies(){
  var db=window._smartDB;if(!db)return Promise.resolve([]);
  return db.collection('families').orderBy('name').get().then(function(snap){
    return snap.docs.map(function(d){return d.data();});
  });
}

/* ── Master: update a family ── */
function updateFamily(id, updates){
  var db=window._smartDB;if(!db)return Promise.reject('no db');
  return db.collection('families').doc(id).update(updates);
}

/* ── Master: delete a family ── */
function deleteFamily(id){
  var db=window._smartDB;if(!db)return Promise.reject('no db');
  return db.collection('families').doc(id).delete();
}

function adminLoginAs(famId, famName){
  /* Switch into that family's context */
  SESSION.familyId=famId;
  SESSION.familyName=famName;
  SESSION.isMaster=true;
  saveSession();

  /* Show loading state */
  go('s-home');
  el('s-home').innerHTML='<div style="text-align:center;padding:60px 20px">'
    +'<div style="font-size:32px;margin-bottom:16px">⏳</div>'
    +'<div style="font-family:Sora,sans-serif;font-size:18px;font-weight:700;color:var(--text-primary)">Loading '+famName+'...</div>'
    +'<div style="font-size:14px;color:var(--text-tertiary);margin-top:8px">Fetching profiles from cloud</div>'
    +'</div>';

  if(!db){renderHome();return;}

  /* Fetch from family-scoped collection first */
  db.collection('families').doc(famId).collection('profiles').get()
    .then(function(snap){
      if(!snap.empty){
        return snap;
      }
      /* Fallback: query flat profiles collection by familyId */
      return db.collection('profiles').where('familyId','==',famId).get();
    })
    .then(function(snap){
      if(snap&&!snap.empty){
        /* Build profiles array and load into localStorage */
        var profiles=[];
        var famKey='smart_'+famId+'_profiles';
        snap.docs.forEach(function(doc){
          var d=doc.data();
          profiles.push({
            id:d.id,
            name:d.name,
            grade:d.grade,
            grades:d.grades||[d.grade],
            avatar:d.avatar||''
          });
          /* Restore progress and history */
          if(d.progress){
            try{
              var progKey='smart_'+d.grade+'_'+d.id+'_p';
              localStorage.setItem(progKey,d.progress);
            }catch(e){}
          }
          if(d.history){
            try{
              var histKey='smart_'+d.grade+'_'+d.id+'_h';
              localStorage.setItem(histKey,d.history);
            }catch(e){}
          }
        });
        localStorage.setItem('smart_'+famId+'_profiles',JSON.stringify(profiles));
        console.log('Loaded '+profiles.length+' profiles for '+famName);
      } else {
        console.log('No profiles found in Firestore for family '+famId);
        /* DON'T overwrite local data with empty Firestore result */
        /* Local profiles may exist and be newer than Firestore */
      }
      renderHome();
    })
    .catch(function(e){
      console.log('Error loading family profiles:',e);
      renderHome();
    });
}

function adminMigrateProfiles(famId, famName){
  /* Move profiles stored under master to this family's storage key */
  var masterKey = 'smart_master_profiles';
  var familyKey = 'smart_'+famId+'_profiles';

  var masterData = localStorage.getItem(masterKey);
  var familyData = localStorage.getItem(familyKey);

  if(!masterData){
    alert('No profiles found in master account to migrate.');
    return;
  }

  var masterProfiles = JSON.parse(masterData);
  if(!masterProfiles || !masterProfiles.length){
    alert('Master account has no profiles to migrate.');
    return;
  }

  var familyProfiles = familyData ? JSON.parse(familyData) : [];
  var names = masterProfiles.map(function(p){return p.name;}).join(', ');
  var msg = 'Move '+names+' to '+famName+'? Master account keeps a copy.';











  if(!confirm(msg)) return;

  /* Merge: add master profiles that don't already exist in family */
  var existingIds = familyProfiles.map(function(p){return p.id;});
  var added = 0;
  masterProfiles.forEach(function(p){
    if(existingIds.indexOf(p.id) < 0){
      familyProfiles.push(p);
      added++;
      /* Copy progress and history for each profile */
      ['p','h','av'].forEach(function(suffix){
        var val = localStorage.getItem('smart_'+p.id+'_'+suffix);
        if(val) localStorage.setItem('smart_'+p.id+'_'+suffix, val);
      });
    }
  });

  localStorage.setItem(familyKey, JSON.stringify(familyProfiles));

  /* Update maxKids in Firestore to match profile count if needed */
  var db = window._smartDB;
  if(db && familyProfiles.length > 0){
    db.collection('families').doc(famId).update({
      maxKids: Math.max(familyProfiles.length, 3)
    }).catch(function(){});
  }

  alert('Done! Moved '+added+' profile(s) to '+famName+'. Click View as Family to see them.');


}

/* Migrate profiles from one storage key to another */
function migrateProfilesToFamily(fromKey, toKey){
  var data = localStorage.getItem(fromKey);
  if(!data){ alert('No profiles found at: '+fromKey); return false; }
  var profiles = JSON.parse(data);
  if(!profiles || !profiles.length){ alert('No profiles to migrate.'); return false; }
  /* Also migrate each profile's progress and history */
  profiles.forEach(function(p){
    var pid = p.id;
    ['p','h','av'].forEach(function(suffix){
      var oldK = 'smart_'+pid+'_'+suffix;
      var val = localStorage.getItem(oldK);
      if(val) localStorage.setItem(oldK, val); /* same key, already correct */
    });
  });
  localStorage.setItem(toKey, data);
  return profiles.length;
}

/* ── Profile Recovery ── */
function recoverProfiles(){
  var famId=SESSION.familyId||'master';
  var key='smart_'+famId+'_profiles';
  var candidates=[key,'smart_master_profiles','smart_profiles'];
  for(var ci=0;ci<candidates.length;ci++){
    try{var raw=localStorage.getItem(candidates[ci]);
      if(raw){var parsed=JSON.parse(raw);
        if(parsed&&parsed.length>0){
          localStorage.setItem(key,raw);
          alert('Recovered '+parsed.length+' profile(s)!');
          renderHome();return;
        }
      }
    }catch(e){}
  }
  if(!db){alert('Cannot connect to cloud. Please add profiles manually.');return;}
  db.collection('profiles').get().then(function(snap){
    if(snap.empty){alert('No profiles found in cloud. Please add manually.');return;}
    var profiles=[];
    snap.docs.forEach(function(doc){
      var d=doc.data();
      if(d.id&&d.name){
        profiles.push({id:d.id,name:d.name,grade:d.grade||1,grades:d.grades||[d.grade||1],avatar:d.avatar||''});
        if(d.progress){try{localStorage.setItem('smart_'+(d.grade||1)+'_'+d.id+'_p',d.progress);}catch(e){}}
        if(d.history){try{localStorage.setItem('smart_'+(d.grade||1)+'_'+d.id+'_h',d.history);}catch(e){}}
      }
    });
    if(profiles.length>0){
      localStorage.setItem(key,JSON.stringify(profiles));
      alert('Recovered '+profiles.length+' profile(s) from cloud!');
      renderHome();
    } else {
      alert('No profiles found. Please add manually.');
    }
  }).catch(function(e){alert('Recovery error: '+e.message);});
}

/* ── Delete Profile ── */
function confirmDeleteProfile(pid, name){
  if(!confirm('Delete '+name+'? This will remove all their progress and history. This cannot be undone.')){
    return;
  }
  deleteProfile(pid);
}

function deleteProfile(pid){
  /* Remove from profiles array */
  var profiles = loadProfiles();
  var newProfiles = profiles.filter(function(p){ return p.id !== pid; });
  saveProfiles(newProfiles);

  /* Clear all localStorage data for this profile */
  var keysToRemove = [];
  for(var i=0; i<localStorage.length; i++){
    var k = localStorage.key(i);
    if(k && k.indexOf(pid) >= 0){
      keysToRemove.push(k);
    }
  }
  keysToRemove.forEach(function(k){ localStorage.removeItem(k); });

  /* Remove from Firestore */
  if(db){
    var famId = SESSION.familyId||'master';
    db.collection('families').doc(famId).collection('profiles').doc(pid).delete()
      .catch(function(e){ console.log('Delete from cloud error:', e); });
    db.collection('profiles').doc(pid).delete()
      .catch(function(e){ console.log('Flat delete error:', e); });
  }

  renderHome();
}

document.addEventListener('keydown', function(e){
  var screen = document.querySelector('.screen.active');
  if(!screen) return;
  var sid = screen.id;
  /* Drill mode keyboard */
  if(sid === 's-drill'){
    if(e.key >= '0' && e.key <= '9'){ni(parseInt(e.key,10));e.preventDefault();}
    else if(e.key === 'Backspace'){nd();e.preventDefault();}
    else if(e.key === 'Enter'){subDrill();e.preventDefault();}

  if(sid === 's-concept'){

    else if(e.key === '2' || e.key === 'b') answerByKey(1);
    else if(e.key === '3' || e.key === 'c') answerByKey(2);

  }
  /* Login screen keyboard */
  var loginScreen = document.getElementById('s-login');
  if(loginScreen && loginScreen.classList.contains('active')){

      var pw=document.getElementById('li-pass');

    }

    if(e.key >= '0' && e.key <= '9'){pinPress(parseInt(e.key,10));e.preventDefault();}
    else if(e.key === 'Backspace'){pinClear();e.preventDefault();}
    else if(e.key === 'Escape'){pinCancel();e.preventDefault();}
  }
});

var READING_ST = {
  grade:1, storyIdx:0, questionIdx:0,
  score:0, total:0, mode:'story',
  profileId:null, answered:false, startTime:0,
  storyPool:[], usedStories:[]
};

function getStoriesForGrade(g){
  var gs=String(g);
  if(STORIES[gs]&&STORIES[gs].length) return STORIES[gs];
  /* fallback to adjacent grade */
  for(var d=1;d<=3;d++){
    if(STORIES[String(g-d)]&&STORIES[String(g-d)].length) return STORIES[String(g-d)];
    if(STORIES[String(g+d)]&&STORIES[String(g+d)].length) return STORIES[String(g+d)];
  }
  return [];
}

function startReadingMode(grade, pid, mode){
  READING_ST.grade = grade||ST.grade||1;
  READING_ST.profileId = pid||ST.profileId||'';
  READING_ST.mode = mode||'story';
  READING_ST.score = 0;
  READING_ST.total = 0;
  READING_ST.answered = false;
  READING_ST.startTime = Date.now();
  if(mode==='vocab')      { startVocabMode(); return; }
  if(mode==='analogy')    { startAnalogyMode(); return; }
  /* story mode */
  var pool = getStoriesForGrade(READING_ST.grade);
  if(!pool.length){ alert('No stories yet for this grade. Coming soon!'); return; }
  READING_ST.storyPool = pool.slice().sort(function(){return Math.random()-0.5;});
  READING_ST.storyIdx = 0;
  READING_ST.questionIdx = 0;
  renderReadingQuestion();
}

function answerReading(chosen, correct){

function nextReadingQ(){

/* ─── VOCABULARY DRILL ──────────────────────── */
var _vocabPool=[], _vocabIdx=0;

function startVocabMode(){
  var g=READING_ST.grade;
  var gKey=g>=8?'8':g>=6?'67':g>=4?'45':g>=2?'23':'k1';
  var bank=(VOCAB_BANK[gKey]||VOCAB_BANK['k1']).slice();
  /* shuffle and build question pool with mixed types */
  _vocabPool=buildVocabPool(bank);
  _vocabIdx=0;
  READING_ST.answered=false;
  renderVocabQ();
}

/* Build a pool of mixed question types from the word bank */
function buildVocabPool(bank){
  var pool=[];
  var shuffled=bank.slice().sort(function(){return Math.random()-0.5;});
  var types=['meaning','reverse','synonym','context'];
  /* For small banks use fewer types */
  var usableTypes=types.filter(function(t){
    if(t==='synonym') return bank.some(function(w){return w.syn&&w.syn.length>0;});
    if(t==='context') return bank.some(function(w){return w.ex&&w.ex.length>0;});
    return true;
  });
  shuffled.forEach(function(word,i){
    var type=usableTypes[i%usableTypes.length];
    /* fallback if this word can't support the type */
    if(type==='synonym'&&(!word.syn||!word.syn.length)) type='meaning';
    if(type==='context'&&(!word.ex||!word.ex.length)) type='meaning';
    pool.push({word:word, type:type, bank:bank});
  });
  return pool;
}

function renderVocabQ(){
  if(_vocabIdx>=_vocabPool.length){finishReading();return;}
  READING_ST.answered=false;
  var item=_vocabPool[_vocabIdx];
  var word=item.word;
  var type=item.type;
  var bank=item.bank;
  var gc=gradeConf(READING_ST.grade);
  var prog=Math.round(_vocabIdx/_vocabPool.length*100);

  var question='', promptLabel='', choices=[], correct=0, bigDisplay='';

  if(type==='meaning'){
    /* Word → Definition */
    promptLabel='WHAT DOES THIS WORD MEAN?';
    bigDisplay='<div style="font-family:Sora,sans-serif;font-size:44px;font-weight:900;color:var(--brand);letter-spacing:-1px;margin-bottom:10px">'+word.w+'</div>';
    if(word.ex) bigDisplay+='<div style="font-size:13px;color:var(--text-tertiary);font-style:italic">"'+word.ex+'"</div>';
    var wrongDefs=bank.filter(function(v){return v.w!==word.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(v){return v.def;});
    choices=[word.def].concat(wrongDefs).sort(function(){return Math.random()-0.5;});
    correct=choices.indexOf(word.def);

  } else if(type==='reverse'){
    /* Definition → Word */
    promptLabel='WHICH WORD FITS THIS MEANING?';
    bigDisplay='<div style="font-size:17px;font-weight:600;color:var(--text-primary);line-height:1.6;padding:0 4px">"'+word.def+'"</div>';
    var wrongWords=bank.filter(function(v){return v.w!==word.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(v){return v.w;});
    choices=[word.w].concat(wrongWords).sort(function(){return Math.random()-0.5;});
    correct=choices.indexOf(word.w);

  } else if(type==='synonym'){
    /* Synonym pick */
    var isSyn=Math.random()>0.5;
    if(!word.ant||!word.ant.length) isSyn=true;
    promptLabel=isSyn?'WHICH WORD IS A SYNONYM OF...':'WHICH WORD IS AN ANTONYM OF...';
    bigDisplay='<div style="font-family:Sora,sans-serif;font-size:44px;font-weight:900;color:var(--brand);letter-spacing:-1px">'+word.w+'</div>';
    var target=isSyn?word.syn:word.ant;
    /* wrong choices: other words from bank */
    var wrongSyns=bank.filter(function(v){return v.w!==word.w&&v.w!==target;}).sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(v){return v.w;});
    choices=[target].concat(wrongSyns).sort(function(){return Math.random()-0.5;});
    correct=choices.indexOf(target);

  } else {
    /* Context clue — fill in the blank */
    promptLabel='WHICH WORD COMPLETES THE SENTENCE?';
    var blank=word.ex.replace(new RegExp('\\b'+word.w+'\\b','i'),'______');
    /* if no replacement happened, use a generic sentence */
    if(blank===word.ex) blank='She showed great ______ when she faced the challenge.';
    bigDisplay='<div style="font-size:17px;font-weight:600;color:var(--text-primary);line-height:1.8;padding:4px">"'+blank+'"</div>';
    var wrongCtx=bank.filter(function(v){return v.w!==word.w;}).sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(v){return v.w;});
    choices=[word.w].concat(wrongCtx).sort(function(){return Math.random()-0.5;});
    correct=choices.indexOf(word.w);
  }

  /* type badge colors */
  var typeMeta={
    meaning: {label:'Meaning',  color:'#FF5C35', bg:'#FFF7F5'},
    reverse: {label:'Definition →Word', color:'#8B5CF6', bg:'#F5F3FF'},
    synonym: {label:'Synonym / Antonym', color:'#10B981', bg:'#F0FDF4'},
    context: {label:'Context Clue', color:'#3B82F6', bg:'#EFF6FF'},
  };
  var tm=typeMeta[type]||typeMeta.meaning;

  var h='<div class="hdr">'
      +'<div style="float:left"><button class="bbtn" onclick="finishReading()">✕ Exit</button></div>'
      +'<div style="text-align:center;padding-top:6px;font-size:13px;font-weight:700;color:'+gc.color+'">📝 Vocabulary · '+(_vocabIdx+1)+'/'+_vocabPool.length+'</div>'
      +'<div style="clear:both"></div>'
      +'<div style="height:4px;background:var(--bg-subtle);border-radius:2px;margin-top:8px">'
      +'<div style="height:4px;width:'+prog+'%;background:'+gc.color+';border-radius:2px;transition:width .3s"></div>'
      +'</div></div>';

  h+='<div class="card card-raised" style="text-align:center;padding:28px 20px;margin-bottom:14px">'
     +'<div style="display:inline-block;background:'+tm.bg+';color:'+tm.color+';border-radius:99px;padding:4px 14px;font-size:11px;font-weight:800;letter-spacing:1.5px;margin-bottom:16px">'+tm.label.toUpperCase()+'</div>'
     +'<div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-tertiary);margin-bottom:14px">'+promptLabel+'</div>'
     +bigDisplay
     +'</div>';

  choices.forEach(function(ch,ci){
    var ltr=['A','B','C','D'][ci];
    h+='<button class="reading-choice" id="vc-'+ci+'" onclick="answerVocab('+ci+','+correct+')">'
       +'<span style="background:var(--bg-subtle);border-radius:6px;padding:2px 8px;font-weight:700;margin-right:8px;font-size:12px;flex-shrink:0">'+ltr+'</span>'
       +ch+'</button>';
  });
  h+='<div id="vocab-fb"></div>';
  el('s-reading').innerHTML=h; go('s-reading');
  READING_ST.total++;
}

function answerVocab(chosen,correct){
  if(READING_ST.answered)return;
  READING_ST.answered=true;
  var ok=(chosen===correct);
  if(ok)READING_ST.score++;
  for(var i=0;i<4;i++){
    var b=document.getElementById('vc-'+i);
    if(!b)continue;
    if(i===correct)b.className='reading-choice correct';
    else if(i===chosen&&!ok)b.className='reading-choice wrong';
    b.onclick=null;
  }
  var item=_vocabPool[_vocabIdx];
  var word=item.word;
  var fb=document.getElementById('vocab-fb');
  if(fb){
    var extra='';
    if(word.syn&&word.syn.length) extra+='<span style="margin-right:10px"><b>Synonym:</b> '+word.syn+'</span>';
    if(word.ant&&word.ant.length) extra+='<span><b>Antonym:</b> '+word.ant+'</span>';
    fb.innerHTML='<div style="background:'+(ok?'var(--green-light)':'var(--red-light)')+';border:1.5px solid '+(ok?'var(--green)':'var(--red)')+';border-radius:12px;padding:12px 16px;margin:12px 0">'
      +'<div style="font-weight:700;color:'+(ok?'var(--green)':'var(--red)')+'">'+(ok?'✓ Correct!':'✗ Not quite — the answer is: <b>'+item.word.w+'</b>')+'</div>'
      +(extra?'<div style="font-size:12px;color:var(--text-secondary);margin-top:6px">'+extra+'</div>':'')
      +(word.def?'<div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;font-style:italic">'+word.def+'</div>':'')
      +'</div>'
      +'<button onclick="nextVocabQ()" class="btn btn-primary">Next →</button>';
  }
}

function nextVocabQ(){
  READING_ST.answered=false;
  _vocabIdx++;
  renderVocabQ();
}
/* ─── ANALOGIES ─────────────────────────────── */
var _analogyPool=[], _analogyIdx=0;

function startAnalogyMode(){
  var g=READING_ST.grade;
  _analogyPool=ANALOGIES.filter(function(a){return a.grade<=g+1;})
                         .sort(function(){return Math.random()-0.5;}).slice(0,20);
  _analogyIdx=0;
  renderAnalogyQ();
}

function renderAnalogyQ(){
  if(_analogyIdx>=_analogyPool.length){finishReading();return;}
  var item=_analogyPool[_analogyIdx];
  var gc=gradeConf(READING_ST.grade);
  var others=_analogyPool.filter(function(a){return a.d!==item.d;});
  var wrongs=others.sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(a){return a.d;});
  var choices=[item.d].concat(wrongs).sort(function(){return Math.random()-0.5;});
  var correct=choices.indexOf(item.d);

  var h='<div class="hdr">'
      +'<div style="float:left"><button class="bbtn" onclick="finishReading()">✕ Exit</button></div>'
      +'<div style="text-align:center;padding-top:6px;font-size:13px;font-weight:700;color:'+gc.color+'">🔗 Analogies · '+(_analogyIdx+1)+'/'+_analogyPool.length+'</div>'
      +'<div style="clear:both"></div></div>';

  h+='<div class="card card-raised" style="text-align:center;padding:28px 20px;margin-bottom:16px">'
     +'<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text-tertiary);margin-bottom:18px">COMPLETE THE ANALOGY</div>'
     +'<div style="font-family:Sora,sans-serif;font-size:20px;font-weight:800;color:var(--text-primary);line-height:1.6">'
     +'<span style="color:var(--brand)">'+item.a+'</span> is to <span style="color:var(--brand)">'+item.b+'</span>'
     +'<br><span style="font-size:15px;color:var(--text-tertiary);font-weight:400">as</span><br>'
     +'<span style="color:#3B82F6">'+item.c+'</span> is to <span style="background:var(--bg-subtle);color:#3B82F6;padding:3px 14px;border-radius:8px;border:2px dashed #3B82F6">?</span>'
     +'</div>'
     +(item.cat?'<div style="font-size:11px;color:var(--text-tertiary);margin-top:14px;font-weight:600;letter-spacing:1px">'+item.cat.toUpperCase()+'</div>':'')
     +'</div>';

  choices.forEach(function(ch,ci){
    var ltr=['A','B','C','D'][ci];
    h+='<button class="reading-choice" id="an-'+ci+'" onclick="answerAnalogy('+ci+','+correct+')">'
       +'<span style="background:var(--bg-subtle);border-radius:6px;padding:2px 8px;font-weight:700;margin-right:8px;font-size:12px">'+ltr+'</span>'
       +ch+'</button>';
  });
  h+='<div id="analogy-fb"></div>';
  el('s-reading').innerHTML=h; go('s-reading');
  READING_ST.total++;
}

function answerAnalogy(chosen,correct){
  if(READING_ST.answered)return;
  READING_ST.answered=true;
  var ok=(chosen===correct);
  if(ok)READING_ST.score++;
  for(var i=0;i<4;i++){
    var b=document.getElementById('an-'+i);
    if(!b)continue;
    if(i===correct)b.className='reading-choice correct';
    else if(i===chosen&&!ok)b.className='reading-choice wrong';
    b.onclick=null;
  }
  var item=_analogyPool[_analogyIdx];
  var fb=document.getElementById('analogy-fb');
  if(fb){
    fb.innerHTML='<div style="background:'+(ok?'var(--green-light)':'var(--red-light)')+';border:1.5px solid '+(ok?'var(--green)':'var(--red)')+';border-radius:12px;padding:12px 16px;margin:12px 0">'
      +'<b style="color:'+(ok?'var(--green)':'var(--red)')+'">'+(ok?'✓ Correct!':'✗ Not quite')+'</b>'
      +'<div style="font-size:13px;color:var(--text-secondary);margin-top:4px">'+item.a+' → '+item.b+' &nbsp;::&nbsp; '+item.c+' → <b>'+item.d+'</b></div>'
      +'</div>'
      +'<button onclick="nextAnalogy()" class="btn btn-primary">Next →</button>';
  }
}

function nextAnalogy(){
  READING_ST.answered=false;
  _analogyIdx++;
  renderAnalogyQ();
}

/* ─── FINISH READING SESSION ────────────────── */
function finishReading(){
  var elapsed=Math.round((Date.now()-READING_ST.startTime)/1000);
  var pct=READING_ST.total>0?Math.round(READING_ST.score/READING_ST.total*100):0;
  var gc=gradeConf(READING_ST.grade);

  /* log to history */
  try{
    addHist(READING_ST.grade,{
      date:new Date().toISOString(),
      lid:'READING_'+READING_ST.mode.toUpperCase(),
      score:READING_ST.score,
      time:elapsed,
      subject:'reading',
      total:READING_ST.total
    });
    syncToCloud(READING_ST.grade);
  }catch(e){}

  var modeLabel={story:'Reading',vocab:'Vocabulary',analogy:'Analogies'}[READING_ST.mode]||'Reading';
  var emoji=pct>=80?'⭐':pct>=60?'📖':'💪';

  var h='<div class="hdr"><div style="float:left"><button class="bbtn" onclick="renderHome()">🏠 Home</button></div>'
       +'<div style="text-align:center;padding-top:6px;font-size:14px;font-weight:700;color:'+gc.color+'">'+modeLabel+' Complete</div>'
       +'<div style="clear:both"></div></div>';

  h+='<div style="text-align:center;padding:24px 0 16px">'
    +'<div style="font-size:56px;margin-bottom:8px">'+emoji+'</div>'
    +'<div style="font-family:Sora,sans-serif;font-size:72px;font-weight:900;letter-spacing:-3px;color:var(--text-primary)">'+READING_ST.score+'<span style="font-size:28px;color:var(--text-tertiary);font-weight:400">/'+READING_ST.total+'</span></div>'
    +'<div style="font-size:16px;color:var(--text-secondary);margin-top:4px">'+(pct>=80?'Excellent! 🌟':pct>=60?'Good work! Keep reading!':'Practice makes perfect!')+'</div>'
    +'</div>';

  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';
  h+='<button class="hb btn-primary" onclick="startReadingMode('+READING_ST.grade+',\''+READING_ST.profileId+'\',\'story\')">📖 Stories</button>';
  h+='<button class="hb btn-primary" onclick="startReadingMode('+READING_ST.grade+',\''+READING_ST.profileId+'\',\'vocab\')" style="background:#3B82F6">📝 Vocab</button>';
  h+='<button class="hb btn-primary" onclick="startReadingMode('+READING_ST.grade+',\''+READING_ST.profileId+'\',\'analogy\')" style="background:#8B5CF6">🔗 Analogies</button>';
  h+='<button class="hb" style="background:var(--bg-subtle);color:var(--text-secondary)" onclick="renderCurriculum('+READING_ST.grade+',\''+READING_ST.profileId+'\')">📚 Math</button>';
  h+='</div>';

  el('s-reading').innerHTML=h;
  go('s-reading');
}

/* ─── READING HUB (entry point from curriculum) ─ */
function renderReadingHub(grade, pid){
  READING_ST.grade=grade||ST.grade||1;
  READING_ST.profileId=pid||ST.profileId||'';
  var gc=gradeConf(grade);
  var stories=getStoriesForGrade(grade);

  var h='<div class="hdr"><div style="float:left"><button class="bbtn" onclick="renderCurriculum('+grade+',\''+pid+'\')">← Back</button></div>'
       +'<div style="text-align:center;padding-top:6px;font-size:16px;font-weight:700;color:'+gc.color+'">📚 Language Arts</div>'
       +'<div style="clear:both"></div></div>';

  h+='<div style="text-align:center;padding:16px 0 20px">'
    +'<div style="font-size:13px;color:var(--text-tertiary);font-weight:600;letter-spacing:1px">'+gc.label.toUpperCase()+' GRADE</div>'
    +'<div style="font-size:14px;color:var(--text-secondary);margin-top:4px">'+stories.length+' stor'+(stories.length===1?'y':'ies')+' · Vocabulary · Analogies</div>'
    +'</div>';

  /* 3 mode cards */
  var modes=[
    {key:'story',icon:'📖',title:'Reading Comprehension',sub:stories.length+' grade-level stories with questions',color:gc.color,bg:gc.color+'18'},
    {key:'vocab',icon:'📝',title:'Vocabulary',sub:'Learn definitions, synonyms & antonyms',color:'#3B82F6',bg:'#3B82F618'},
    {key:'analogy',icon:'🔗',title:'Analogies',sub:'SAT-style: A is to B as C is to ?',color:'#8B5CF6',bg:'#8B5CF618'},
  ];

  modes.forEach(function(m){
    h+='<div class="card" style="margin-bottom:12px;padding:18px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;border:1.5px solid '+m.color+'22" onclick="startReadingMode('+grade+',\''+pid+'\',\''+m.key+'\')">'
       +'<div style="width:52px;height:52px;background:'+m.bg+';border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">'+m.icon+'</div>'
       +'<div style="flex:1">'
       +'<div style="font-family:Sora,sans-serif;font-size:16px;font-weight:700;color:var(--text-primary)">'+m.title+'</div>'
       +'<div style="font-size:13px;color:var(--text-secondary);margin-top:2px">'+m.sub+'</div>'
       +'</div>'
       +'<div style="font-size:22px;color:'+m.color+'">›</div>'
       +'</div>';
  });

  el('s-reading').innerHTML=h;
  go('s-reading');
}



initDarkMode();
try{
  if(loadSession()){
    renderHome();
  } else {
    go('s-login');
    setTimeout(initLoginScreen,300);
  }
}
catch(e){
  document.body.style.cssText='background:#0d1117;color:#fff;padding:30px;font-family:sans-serif;';
  document.body.innerHTML='<h2 style="color:#ff5050">Error</h2><pre style="color:#FFD700;font-size:11px;margin-top:12px;white-space:pre-wrap">'+String(e)+'\n'+(e.stack||'')+'</pre>';
}
</script>
<button class="dark-toggle" onclick="toggleDark()" id="dark-btn" title="Toggle dark mode">🌙</button>
</body>
</html>
