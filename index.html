/* ═══════════════════════════════════════════
   PROGRESS INTELLIGENCE
═══════════════════════════════════════════ */
function analyzeProgressForGrade(grade,pid){
  pid=pid||ST.profileId;
  var h=loadHist(grade,pid),p=loadProg(grade,pid),i,j,k;
  var result={sentiment:{},insights:[],missedProblems:[]};
  var cats=getCats(grade);
  for(i=0;i<cats.length;i++){
    for(j=0;j<cats[i].lv.length;j++){
      var lv=cats[i].lv[j];var pp=p[lv.id];
      if(!pp||!pp.attempts){result.sentiment[lv.id]='not_started';continue;}
      if(pp.passed){result.sentiment[lv.id]='mastered';continue;}
      var recent=[];for(k=0;k<h.length&&recent.length<5;k++){if(h[k].lid===lv.id)recent.push(h[k]);}
      if(recent.length===0){result.sentiment[lv.id]='not_started';continue;}
      var avgS=0;for(k=0;k<recent.length;k++){avgS+=recent[k].score;}avgS=avgS/recent.length;
      var improving=recent.length>=2&&recent[0].score>recent[recent.length-1].score;
      if(avgS>=36){result.sentiment[lv.id]='on_fire';}
      else if(avgS>=28&&improving){result.sentiment[lv.id]='progressing';}
      else if(avgS>=20){result.sentiment[lv.id]='needs_work';}
      else{result.sentiment[lv.id]='struggling';}
    }
  }
  var wrongByNum={};var above20w=0,above20t=0,below20w=0,below20t=0;
  var fatigueF=0,fatigueL=0,fatTotal=0;
  for(k=0;k<h.length;k++){
    var sess=h[k];if(!sess.ans)continue;
    var ans=sess.ans;
    for(var ai=0;ai<ans.length;ai++){
      var pr=ans[ai];if(!pr||pr.a===null||pr.a===undefined)continue;
      var key=pr.a+' '+pr.o+' '+pr.b;
      if(!wrongByNum[key]){wrongByNum[key]={wrong:0,total:0,a:pr.a,b:pr.b,o:pr.o};}
      wrongByNum[key].total++;if(!pr.ok){wrongByNum[key].wrong++;}
      if(pr.o==='+'){if(pr.correct>20){above20t++;if(!pr.ok)above20w++;}else{below20t++;if(!pr.ok)below20w++;}}
      fatTotal++;var hl=Math.floor(ans.length/2);
      if(ai<hl){if(!pr.ok)fatigueF++;}else{if(!pr.ok)fatigueL++;}
    }
  }
  var missed=[];var keys2=Object.keys(wrongByNum);
  for(k=0;k<keys2.length;k++){
    var d=wrongByNum[keys2[k]];
    if(d.total>=3){var pct=Math.round(d.wrong/d.total*100);if(pct>=40){missed.push({key:keys2[k],pct:pct,wrong:d.wrong,total:d.total,a:d.a,b:d.b,o:d.o});}}
  }
  missed.sort(function(a,b){return b.pct-a.pct;});result.missedProblems=missed.slice(0,5);
  if(above20t>=10&&below20t>=10){
    var pa=Math.round(above20w/above20t*100),pb=Math.round(below20w/below20t*100);
    if(pa>pb+20){result.insights.push('Sums above 20 have a '+pa+'% miss rate vs '+pb+'% below 20 — needs more practice crossing 20');}
  }
  if(fatTotal>=40){
    var fL=Math.round(fatigueL/fatTotal*100),fF=Math.round(fatigueF/fatTotal*100);
    if(fL>fF+15){result.insights.push('Accuracy drops in the second half of sessions ('+fL+'% errors vs '+fF+'%) — possible fatigue after question 20');}
  }
  if(h.length>=10){
    var r10=h.slice(0,10),p10=h.slice(10,20);
    var r10a=0;for(k=0;k<r10.length;k++){r10a+=r10[k].score;}r10a=r10a/r10.length;
    var p10a=0;for(k=0;k<p10.length;k++){p10a+=p10[k].score;}p10a=p10a/Math.max(p10.length,1);
    if(r10a>p10a+3){result.insights.push('Scores trending UP — improved from '+p10a.toFixed(1)+' to '+r10a.toFixed(1)+' in last 10 sessions');}
    else if(r10a<p10a-3){result.insights.push('Scores have dipped recently ('+r10a.toFixed(1)+' vs previous '+p10a.toFixed(1)+') — consider reviewing recent levels');}
  }
  return result;
}

function sentimentIcon(s){
  if(s==='mastered')return'<span style="color:#10B981;font-size:11px">&#10003; Done</span>';
  if(s==='on_fire')return'<span style="color:#FFD700;font-size:11px">&#128293; Hot</span>';
  if(s==='progressing')return'<span style="color:#7C3AED;font-size:11px">&#8679; Rising</span>';
  if(s==='needs_work')return'<span style="color:#FFA500;font-size:11px">&#9888; Work</span>';
  if(s==='struggling')return'<span style="color:#ff5050;font-size:11px">&#8595; Hard</span>';
  return'<span style="color:#B0BAC8;font-size:11px">Not started</span>';
}

   INIT
═══════════════════════════════════════════ */
/* ═══════════════════════════════════════════
   CANVAS RENDERER
═══════════════════════════════════════════ */
var DRAW_W = 320;
var DRAW_H = 220;

/* polyfill for roundRect on older Safari */
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);
    this.closePath();
  };
}

function makeCanvas(){
  var wrap = document.createElement('div');
  wrap.className = 'visual-wrap';
  var cv = document.createElement('canvas');
  cv.width = DRAW_W;
  cv.height = DRAW_H;
  cv.style.maxWidth = '100%';
  cv.style.display = 'block';
  cv.style.margin = '0 auto';
  wrap.appendChild(cv);
  return {wrap:wrap, cv:cv, ctx:cv.getContext('2d')};
}

function drawVisual(pr, container){
  if(!pr || !pr.draw) return;
  var mc = makeCanvas();
  var ctx = mc.ctx;
  ctx.clearRect(0,0,DRAW_W,DRAW_H);
  
  // Common styles
  ctx.font = '13px Sora, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  switch(pr.draw){
    case 'coordinate_point': drawCoordPoint(ctx, pr.drawData); break;
    case 'coordinate_plane': drawCoordPlane(ctx, pr.drawData); break;
    case 'angle': drawAngle(ctx, pr.drawData); break;
    case 'triangle_angles': drawTriangleAngles(ctx, pr.drawData); break;
    case 'circle': drawCircle(ctx, pr.drawData); break;
    case 'rectangle': drawRectangle(ctx, pr.drawData); break;
    case 'number_line': drawNumberLine(ctx, pr.drawData); break;
    case 'scatter': drawScatter(ctx, pr.drawData); break;
    case 'parallel_lines': drawParallelLines(ctx, pr.drawData); break;
    case 'shape_sides': drawShapeSides(ctx, pr.drawData); break;
    case 'box_3d': drawBox3D(ctx, pr.drawData); break;
    case 'cylinder': drawCylinder(ctx, pr.drawData); break;
    case 'cone': drawCone(ctx, pr.drawData); break;
    case 'sphere': drawSphere(ctx, pr.drawData); break;
    case 'dot_groups': drawDotGroups(ctx, pr.drawData); break;
    case 'clock': drawClock(ctx, pr.drawData); break;
    case 'coins': drawCoins(ctx, pr.drawData); break;
    case 'percent_bar': drawPercentBar(ctx, pr.drawData); break;
    case 'balance_scale': drawBalanceScale(ctx, pr.drawData); break;
    case 'ratio_bar': drawRatioBar(ctx, pr.drawData); break;
    case 'ruler': drawRuler(ctx, pr.drawData); break;
    case 'fraction_number_line': drawFractionNumberLine(ctx, pr.drawData); break;
    case 'compare_numbers': drawCompareNums(ctx, pr.drawData); break;
    case 'fraction_bar': drawFractionBar(ctx, pr.drawData); break;
    case 'right_triangle': drawRightTriangle(ctx, pr.drawData); break;
    case 'rate_table': drawRateTable(ctx, pr.drawData); break;
    case 'probability_grid': drawProbabilityGrid(ctx, pr.drawData); break;
    case 'bar_chart': drawBarChart(ctx, pr.drawData); break;
    case 'number_line_marks': drawNumberLineMarks(ctx, pr.drawData); break;
    case 'place_value': drawPlaceValue(ctx, pr.drawData); break;
    case 'two_clocks': drawTwoClocks(ctx, pr.drawData); break;
    case 'equal_groups': drawEqualGroups(ctx, pr.drawData); break;
    case 'surface_area': drawSurfaceArea(ctx, pr.drawData); break;
    case 'exponent': drawExponent(ctx, pr.drawData); break;
    case 'decimal_grid': drawDecimalGrid(ctx, pr.drawData); break;
  }

  // Insert before numpad
  var np = container.querySelector('.np');
  if(np){ container.insertBefore(mc.wrap, np); }
  else { container.appendChild(mc.wrap); }
}

function setCtxDefaults(ctx){
  ctx.strokeStyle = '#0F172A';
  ctx.fillStyle = '#0F172A';
  ctx.lineWidth = 2;
  ctx.font = '13px Sora, sans-serif';
}

/* ── COORDINATE PLANE ── */
function drawCoordPlane(ctx, d){
  setCtxDefaults(ctx);
  var cx=DRAW_W/2, cy=DRAW_H/2, scale=d.scale||20;
  // grid
  ctx.strokeStyle='#E4E7EC'; ctx.lineWidth=1;
  for(var x=cx%scale;x<DRAW_W;x+=scale){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,DRAW_H);ctx.stroke();}
  for(var y=cy%scale;y<DRAW_H;y+=scale){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(DRAW_W,y);ctx.stroke();}
  // axes
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(DRAW_W,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,DRAW_H);ctx.stroke();
  // labels
  ctx.fillStyle='#475569'; ctx.font='11px Sora,sans-serif'; ctx.textAlign='center';
  for(var i=-6;i<=6;i++){
    if(i===0)continue;
    ctx.fillText(i, cx+i*scale, cy+14);
    ctx.fillText(-i, cx-8, cy-i*scale);
  }
  ctx.fillStyle='#0F172A'; ctx.font='bold 13px Sora,sans-serif';
  ctx.fillText('x', DRAW_W-10, cy-10);
  ctx.fillText('y', cx+10, 10);
}

function drawCoordPoint(ctx, d){
  drawCoordPlane(ctx, {scale:d.scale||25});
  var cx=DRAW_W/2, cy=DRAW_H/2, scale=d.scale||25;
  var px=cx+d.x*scale, py=cy-d.y*scale;
  // point
  ctx.fillStyle='#FF5C35';
  ctx.beginPath(); ctx.arc(px,py,6,0,Math.PI*2); ctx.fill();
  // label
  ctx.fillStyle='#FF5C35'; ctx.font='bold 13px Sora,sans-serif'; ctx.textAlign='left';
  ctx.fillText('('+d.x+', '+d.y+')', px+10, py-10);
  // question mark on quadrant
  /* showQ removed — never highlight quadrant, that gives away answer */
}

/* ── ANGLE ── */
function drawAngle(ctx, d){
  setCtxDefaults(ctx);
  var deg=d.degrees||45;
  /* supplementary/complementary: show two angles on a line */
  if(d.showBoth){
    var totalDeg=d.totalDeg||180;
    var cx=DRAW_W/2, cy=DRAW_H/2+10, len=110;
    /* base line */
    ctx.strokeStyle='#0F172A'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(cx-len,cy); ctx.lineTo(cx+len,cy); ctx.stroke();
    /* known angle ray */
    var rad=deg*Math.PI/180;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+len*Math.cos(rad), cy-len*Math.sin(rad)); ctx.stroke();
    /* known angle arc */
    ctx.beginPath(); ctx.arc(cx,cy,50,0,-rad,true);
    ctx.strokeStyle='#FF5C35'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#FF5C35'; ctx.font='bold 15px Sora,sans-serif'; ctx.textAlign='center';
    ctx.fillText(deg+'°', cx+60*Math.cos(rad/2), cy-60*Math.sin(rad/2));
    /* unknown angle arc */
    var remRad=(totalDeg-deg)*Math.PI/180;
    ctx.beginPath(); ctx.arc(cx,cy,50,-rad,-(Math.PI),true);
    ctx.strokeStyle='#3B82F6'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#3B82F6'; ctx.font='bold 15px Sora,sans-serif';
    var midAngle=rad+(remRad/2);
    ctx.fillText('?°', cx+70*Math.cos(midAngle), cy-70*Math.sin(midAngle));
    ctx.fillStyle='#64748B'; ctx.font='12px Sora,sans-serif';
    ctx.fillText((totalDeg===90?'Complementary':'Supplementary')+': '+deg+'° + ?° = '+totalDeg+'°', DRAW_W/2, DRAW_H-10);
    return;
  }
  var cx=80, cy=DRAW_H-60, len=140;
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+len,cy); ctx.stroke();
  var rad=deg*Math.PI/180;
  ctx.beginPath(); ctx.moveTo(cx,cy);
  ctx.lineTo(cx+len*Math.cos(rad), cy-len*Math.sin(rad)); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,45,0,-rad,true);
  ctx.strokeStyle='#FF5C35'; ctx.lineWidth=2; ctx.stroke();
  var midRad=rad/2;
  ctx.fillStyle='#FF5C35'; ctx.font='bold 16px Sora,sans-serif'; ctx.textAlign='left';
  ctx.fillText(deg+'°', cx+55*Math.cos(midRad)+5, cy-55*Math.sin(midRad));
  ctx.fillStyle='#64748B'; ctx.font='13px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText('This angle is ___°', DRAW_W/2, 28);
  if(deg===90){ctx.strokeStyle='#0F172A';ctx.lineWidth=2;ctx.strokeRect(cx+2,cy-22,20,20);}
}

/* ── TRIANGLE ANGLES ── */
function drawTriangleAngles(ctx, d){
  setCtxDefaults(ctx);
  var a=d.a, b=d.b, c=180-a-b;
  var x1=60, y1=DRAW_H-55;
  var x2=DRAW_W-60, y2=DRAW_H-55;
  var x3=DRAW_W/2, y3=50;
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath(); ctx.stroke();
  // angle labels
  ctx.font='bold 14px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillStyle='#FF5C35'; ctx.fillText(a+'°', x1+28, y1-18);
  ctx.fillStyle='#3B82F6'; ctx.fillText(b+'°', x2-28, y2-18);
  ctx.fillStyle=(c>0?'#10B981':'#EF4444');
  ctx.fillText(c>0?'?':'!', x3, y3+22);
  ctx.fillStyle='#64748B'; ctx.font='12px Sora,sans-serif';
  ctx.fillText('Find the missing angle', DRAW_W/2, DRAW_H-20);
}

/* ── CIRCLE ── */
function drawCircle(ctx, d){
  setCtxDefaults(ctx);
  var cx=DRAW_W/2, cy=DRAW_H/2, r=d.r||70;
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  // center dot
  ctx.fillStyle='#0F172A'; ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
  if(d.showRadius){
    // radius line
    ctx.strokeStyle='#FF5C35'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r,cy); ctx.stroke();
    ctx.fillStyle='#FF5C35'; ctx.font='bold 14px Sora,sans-serif'; ctx.textAlign='center';
    ctx.fillText('r = '+d.r, cx+r/2, cy-14);
  }
  if(d.showDiameter){
    ctx.strokeStyle='#3B82F6'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx-r,cy); ctx.lineTo(cx+r,cy); ctx.stroke();
    ctx.fillStyle='#3B82F6'; ctx.font='bold 14px Sora,sans-serif';
    ctx.fillText('d = '+(d.r*2), cx, cy-14);
  }
  ctx.fillStyle='#64748B'; ctx.font='12px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText(d.label||'Find the area or circumference', DRAW_W/2, DRAW_H-18);
}

/* ── RECTANGLE ── */
function drawRectangle(ctx, d){
  setCtxDefaults(ctx);
  var margin=50, x=margin, y=50;
  var w=DRAW_W-margin*2, h=DRAW_H-100;
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2.5;
  ctx.strokeRect(x,y,w,h);
  // dimension labels
  ctx.fillStyle='#FF5C35'; ctx.font='bold 15px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText(d.w||'?', x+w/2, y+h+22);
  ctx.save(); ctx.translate(x-22, y+h/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(d.h||'?', 0, 0);
  ctx.restore();
  ctx.fillStyle='#64748B'; ctx.font='12px Sora,sans-serif';
  ctx.fillText(d.label||'Find area or perimeter', DRAW_W/2, DRAW_H-8);
}

/* ── NUMBER LINE ── */
function drawNumberLine(ctx, d){
  setCtxDefaults(ctx);
  var cx=DRAW_W/2, cy=DRAW_H/2, len=DRAW_W-60;
  var x0=30, x1=DRAW_W-30;
  var min=d.min||0, max=d.max||10, scale=len/(max-min);
  // line
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x0,cy); ctx.lineTo(x1,cy); ctx.stroke();
  // ticks and labels
  ctx.font='12px Sora,sans-serif'; ctx.textAlign='center';
  for(var n=min;n<=max;n++){
    var px=x0+(n-min)*scale;
    ctx.strokeStyle='#0F172A';
    ctx.beginPath(); ctx.moveTo(px,cy-8); ctx.lineTo(px,cy+8); ctx.stroke();
    ctx.fillStyle='#475569';
    ctx.fillText(n, px, cy+22);
  }
  // marked point
  if(d.mark!==undefined){
    var mpx=x0+(d.mark-min)*scale;
    ctx.fillStyle='#FF5C35';
    ctx.beginPath(); ctx.arc(mpx,cy,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 12px Sora,sans-serif';
    ctx.fillText(d.mark, mpx, cy);
  }
}

/* ── SCATTER PLOT ── */
function drawScatter(ctx, d){
  setCtxDefaults(ctx);
  var margin=40, w=DRAW_W-margin*2, h=DRAW_H-margin*2;
  var x0=margin, y0=margin, x1=DRAW_W-margin, y1=DRAW_H-margin;
  // axes
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x0,y1); ctx.lineTo(x1,y1); ctx.stroke();
  // axis labels
  ctx.fillStyle='#475569'; ctx.font='11px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText('x', x1-5, y1-5); ctx.fillText('y', x0+5, y0+10);
  // generate scatter points based on correlation
  var points=[];
  var corr=d.correlation||0; // -1, 0, 1
  for(var i=0;i<12;i++){
    var px=(i/11);
    var noise=(Math.random()-0.5)*0.3;
    var py=corr>0?(px+noise):corr<0?(1-px+noise):(0.5+noise*2);
    py=Math.max(0.05,Math.min(0.95,py));
    points.push({x:x0+px*w, y:y0+py*h});
  }
  ctx.fillStyle='#FF5C35';
  for(var i=0;i<points.length;i++){
    ctx.beginPath(); ctx.arc(points[i].x, points[i].y, 5, 0, Math.PI*2); ctx.fill();
  }
  // trend line for positive/negative
  if(corr!==0){
    ctx.strokeStyle='#3B82F6'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath();
    if(corr>0){ctx.moveTo(x0+10,y1-10);ctx.lineTo(x1-10,y0+10);}
    else{ctx.moveTo(x0+10,y0+10);ctx.lineTo(x1-10,y1-10);}
    ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.fillStyle='#64748B'; ctx.font='12px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText(d.label||'What type of correlation?', DRAW_W/2, DRAW_H-8);
}

/* ── PARALLEL LINES WITH TRANSVERSAL ── */
function drawParallelLines(ctx, d){
  setCtxDefaults(ctx);
  var deg=d.angle||35;
  // parallel lines
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(30,70); ctx.lineTo(DRAW_W-30,70); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(30,160); ctx.lineTo(DRAW_W-30,160); ctx.stroke();
  // arrows
  ctx.fillText('→', DRAW_W-20, 70); ctx.fillText('→', DRAW_W-20, 160);
  // transversal
  ctx.strokeStyle='#3B82F6'; ctx.lineWidth=2;
  var rad=deg*Math.PI/180;
  var tx=DRAW_W/2, ty1=20, ty2=DRAW_H-20;
  ctx.beginPath(); ctx.moveTo(tx-80,ty2); ctx.lineTo(tx+80,ty1); ctx.stroke();
  // angle label
  ctx.fillStyle='#FF5C35'; ctx.font='bold 15px Sora,sans-serif'; ctx.textAlign='left';
  ctx.fillText(deg+'°', tx-30, 90);
  ctx.fillStyle='#10B981';
  ctx.fillText('?°', tx+10, 148);
  ctx.fillStyle='#64748B'; ctx.font='11px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText('Find the marked angle', DRAW_W/2, DRAW_H-10);
}

/* ── SHAPE SIDES ── */
function drawShapeSides(ctx, d){
  setCtxDefaults(ctx);
  var n=d.sides; /* do NOT use ||4 — circle has 0 sides */
  if(n===undefined||n===null) n=4;
  var cx=DRAW_W/2, cy=DRAW_H/2-10, r=80;
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2.5;
  if(n===0){
    /* circle - actual circle */
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  } else if(d.name==='rectangle'){
    /* rectangle - wider than tall, clearly different from square */
    var rw=r*1.6, rh=r*0.7;
    ctx.strokeRect(cx-rw, cy-rh, rw*2, rh*2);
  } else if(d.name==='square'){
    ctx.strokeRect(cx-r*0.8, cy-r*0.8, r*1.6, r*1.6);
  } else {
    /* regular polygon — start flat for even-sided shapes */
    var startAngle = (n%2===0) ? -Math.PI/2 : -Math.PI/2;
    /* square: rotate 45deg to sit flat */
    if(n===4 && d.name!=='diamond') startAngle = -Math.PI/4;
    ctx.beginPath();
    for(var i=0;i<=n;i++){
      var angle=startAngle+(i/n)*Math.PI*2;
      var x=cx+r*Math.cos(angle), y=cy+r*Math.sin(angle);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.stroke();
  }
  ctx.fillStyle='#64748B'; ctx.font='bold 14px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText(d.name||'Shape', cx, DRAW_H-14);
}

/* ── 3D BOX ── */
function drawBox3D(ctx, d){
  setCtxDefaults(ctx);
  var l=d.l||4, w=d.w||3, h=d.h||2;
  var pa=Math.PI/6;
  /* adaptive scale so box fits in canvas */
  var maxL=l, maxW=w*0.5, maxH=h;
  var scaleByW=(DRAW_W-110)/(maxL+maxW);
  var scaleByH=(DRAW_H-60)/(maxH+maxW*Math.sin(pa));
  var scale=Math.min(scaleByW,scaleByH,32);
  var pw=l*scale, ph=h*scale, pd=w*scale*0.5;
  var x0=40, y0=DRAW_H-35;
  /* front face */
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.fillStyle='#F8FAFC';
  ctx.fillRect(x0,y0-ph,pw,ph);
  ctx.strokeRect(x0,y0-ph,pw,ph);
  /* top face */
  ctx.fillStyle='#EFF6FF';
  ctx.beginPath();
  ctx.moveTo(x0,y0-ph);
  ctx.lineTo(x0+pd*Math.cos(pa),y0-ph-pd*Math.sin(pa));
  ctx.lineTo(x0+pw+pd*Math.cos(pa),y0-ph-pd*Math.sin(pa));
  ctx.lineTo(x0+pw,y0-ph);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  /* right face */
  ctx.fillStyle='#E0F2FE';
  ctx.beginPath();
  ctx.moveTo(x0+pw,y0);
  ctx.lineTo(x0+pw+pd*Math.cos(pa),y0-pd*Math.sin(pa));
  ctx.lineTo(x0+pw+pd*Math.cos(pa),y0-ph-pd*Math.sin(pa));
  ctx.lineTo(x0+pw,y0-ph);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  /* dimension labels with coloured arrows */
  ctx.font='bold 13px Sora,sans-serif'; ctx.textAlign='center';
  /* length - bottom */
  ctx.fillStyle='#FF5C35';
  ctx.fillText('l = '+l, x0+pw/2, y0+16);
  /* height - left */
  ctx.save(); ctx.translate(x0-16,y0-ph/2); ctx.rotate(-Math.PI/2);
  ctx.fillStyle='#3B82F6'; ctx.fillText('h = '+h,0,0); ctx.restore();
  /* width - diagonal */
  ctx.fillStyle='#10B981';
  ctx.fillText('w = '+w, x0+pw+pd*Math.cos(pa)/2+22, y0-pd*Math.sin(pa)/2-8);
  /* label */
  ctx.fillStyle='#64748B'; ctx.font='11px Sora,sans-serif';
  ctx.fillText(d.label||'V = l × w × h', DRAW_W/2, DRAW_H-4);
}

/* ── DOTS / GROUPS (for addition/subtraction word problems) ── */
function drawDotGroups(ctx, d){
  setCtxDefaults(ctx);
  var a=Math.min(d.a||3, 20), b=Math.min(d.b||2, 20);
  var colors=['#FF5C35','#3B82F6'];
  var emoji=d.emoji||'●';
  // Group A
  ctx.fillStyle='#F8FAFC'; ctx.strokeStyle='#E4E7EC'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(20, 40, DRAW_W/2-30, DRAW_H-80, 12); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#475569'; ctx.font='11px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText('Group A: '+a, DRAW_W/4+5, 28);
  // draw A dots
  var cols=Math.min(a,5), rows=Math.ceil(a/cols);
  for(var i=0;i<a;i++){
    var col=i%cols, row=Math.floor(i/cols);
    ctx.fillStyle=colors[0];
    ctx.beginPath();
    ctx.arc(35+col*28, 65+row*32, 11, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif';
    ctx.fillText('●', 35+col*28, 65+row*32);
  }
  // Group B
  ctx.fillStyle='#F8FAFC'; ctx.strokeStyle='#E4E7EC';
  ctx.beginPath(); ctx.roundRect(DRAW_W/2+10, 40, DRAW_W/2-30, DRAW_H-80, 12); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#475569'; ctx.font='11px Sora,sans-serif';
  ctx.fillText('Group B: '+b, DRAW_W*3/4-5, 28);
  var cols2=Math.min(b,5), rows2=Math.ceil(b/cols2);
  for(var i=0;i<b;i++){
    var col=i%cols2, row=Math.floor(i/cols2);
    ctx.fillStyle=colors[1];
    ctx.beginPath();
    ctx.arc(DRAW_W/2+25+col*28, 65+row*32, 11, 0, Math.PI*2);
    ctx.fill();
  }
  if(d.op==='+'){
    ctx.fillStyle='#FF5C35'; ctx.font='bold 20px Sora,sans-serif';
    ctx.fillText('+', DRAW_W/2, DRAW_H/2);
  } else if(d.op==='-'){
    // cross out b dots from group a
    ctx.strokeStyle='#EF4444'; ctx.lineWidth=2;
    var crossed=Math.min(b,a);
    for(var i=a-crossed;i<a;i++){
      var col=i%cols, row=Math.floor(i/cols);
      var cx2=35+col*28, cy2=65+row*32;
      ctx.beginPath(); ctx.moveTo(cx2-10,cy2-10); ctx.lineTo(cx2+10,cy2+10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx2+10,cy2-10); ctx.lineTo(cx2-10,cy2+10); ctx.stroke();
    }
  }
}

/* ── CLOCK FACE ── */
function drawClock(ctx, d){
  setCtxDefaults(ctx);
  var cx=DRAW_W/2, cy=DRAW_H/2-10, r=75;
  // face
  ctx.fillStyle='#FFFBEB'; ctx.strokeStyle='#0F172A'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // hour markers
  for(var i=1;i<=12;i++){
    var angle=(i/12)*Math.PI*2 - Math.PI/2;
    var mx=cx+r*0.85*Math.cos(angle), my=cy+r*0.85*Math.sin(angle);
    ctx.fillStyle='#0F172A'; ctx.font='bold 12px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(i, mx, my);
  }
  // hour hand
  var h=d.h||3, m=d.m||0;
  var hAngle=((h%12)+m/60)/12*Math.PI*2-Math.PI/2;
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy);
  ctx.lineTo(cx+r*0.55*Math.cos(hAngle), cy+r*0.55*Math.sin(hAngle)); ctx.stroke();
  // minute hand
  var mAngle=(m/60)*Math.PI*2-Math.PI/2;
  ctx.strokeStyle='#FF5C35'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(cx,cy);
  ctx.lineTo(cx+r*0.75*Math.cos(mAngle), cy+r*0.75*Math.sin(mAngle)); ctx.stroke();
  // center
  ctx.fillStyle='#0F172A'; ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2); ctx.fill();
  // digital time
  /* no digital readout - that would give away the answer */
}

/* ── COINS ── */
function drawCoins(ctx, d){
  setCtxDefaults(ctx);
  var coins=[
    {label:'P',val:1,color:'#CD7F32',textColor:'#fff'},
    {label:'N',val:5,color:'#9E9E9E',textColor:'#fff'},
    {label:'D',val:10,color:'#9E9E9E',textColor:'#fff'},
    {label:'Q',val:25,color:'#9E9E9E',textColor:'#fff'},
  ];
  var counts=[d.p||0,d.n||0,d.d||0,d.q||0];
  var x=20, y=50, r=24;
  for(var ci=0;ci<coins.length;ci++){
    if(counts[ci]===0) continue;
    for(var j=0;j<Math.min(counts[ci],5);j++){
      ctx.fillStyle=coins[ci].color;
      ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(x+r,y+r,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle=coins[ci].textColor; ctx.font='bold 12px Sora,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(coins[ci].label, x+r, y+r);
      x+=r*2+6;
      if(x>DRAW_W-60){x=20; y+=r*2+8;}
    }
    // label
    ctx.fillStyle='#64748B'; ctx.font='11px Sora,sans-serif'; ctx.textAlign='left';
    ctx.fillText(coins[ci].val+'¢ each', x+4, y+r);
    x+=50;
    if(x>DRAW_W-60){x=20; y+=r*2+8;}
  }
  ctx.fillStyle='#475569'; ctx.font='12px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText('Total = ? cents', DRAW_W/2, DRAW_H-10);
}

/* ── PERCENT BAR ── */
function drawPercentBar(ctx, d){
  setCtxDefaults(ctx);
  var pct=Math.min(100,Math.max(0,d.pct||50));
  var x=30, y=70, w=DRAW_W-60, h=48, r=10;
  // background bar
  ctx.fillStyle='#F1F5F9'; ctx.strokeStyle='#E4E7EC'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill(); ctx.stroke();
  // filled portion
  var fw=Math.max(0,w*pct/100);
  if(fw>0){
    ctx.fillStyle='#FF5C35';
    ctx.beginPath(); ctx.roundRect(x,y,fw,h,r); ctx.fill();
  }
  // percent text
  ctx.fillStyle='#fff'; ctx.font='bold 18px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(fw>40) ctx.fillText(pct+'%', x+fw/2, y+h/2);
  ctx.fillStyle='#475569'; ctx.font='bold 18px Sora,sans-serif';
  ctx.fillText(pct+'%', x+fw+(DRAW_W-x-fw)/2, y+h/2);
  // labels
  ctx.fillStyle='#94A3B8'; ctx.font='11px Sora,sans-serif';
  ctx.textAlign='left'; ctx.fillText('0%', x, y+h+18);
  ctx.textAlign='right'; ctx.fillText('100%', x+w, y+h+18);
  // amount label
  if(d.total){
    ctx.fillStyle='#0F172A'; ctx.font='bold 14px Sora,sans-serif'; ctx.textAlign='center';
    ctx.fillText(pct+'% of '+d.total+' = ?', DRAW_W/2, 45);
  }
}

/* ── BALANCE SCALE (equations) ── */
function drawBalanceScale(ctx, d){
  setCtxDefaults(ctx);
  var cx=DRAW_W/2, cy=110;
  // beam
  ctx.strokeStyle='#475569'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(80,cy); ctx.lineTo(DRAW_W-80,cy); ctx.stroke();
  // fulcrum
  ctx.fillStyle='#475569';
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx-20,cy+50); ctx.lineTo(cx+20,cy+50); ctx.closePath(); ctx.fill();
  ctx.strokeRect(cx-30,cy+50,60,14);
  // left pan
  ctx.strokeStyle='#475569'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(80,cy); ctx.lineTo(80,cy+45); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(60,cy+45); ctx.lineTo(100,cy+45); ctx.stroke();
  // right pan
  ctx.beginPath(); ctx.moveTo(DRAW_W-80,cy); ctx.lineTo(DRAW_W-80,cy+45); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(DRAW_W-100,cy+45); ctx.lineTo(DRAW_W-60,cy+45); ctx.stroke();
  // labels
  ctx.fillStyle='#FF5C35'; ctx.font='bold 16px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText(d.left||'?', 80, cy+40);
  ctx.fillStyle='#3B82F6';
  ctx.fillText(d.right||'?', DRAW_W-80, cy+40);
  ctx.fillStyle='#64748B'; ctx.font='13px Sora,sans-serif';
  ctx.fillText(d.eq||'Both sides are equal', cx, DRAW_H-15);
}

/* ── RATIO BOXES ── */
function drawRatioBar(ctx, d){
  setCtxDefaults(ctx);
  var a=d.a||1, b=d.b||2, total=a+b;
  var x=30, y=60, w=DRAW_W-60, h=50, r=8;
  var aw=w*a/total, bw=w*b/total;
  // part A
  ctx.fillStyle='#FF5C35'; ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(x,y,aw,h,r); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 15px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(aw>30) ctx.fillText(a, x+aw/2, y+h/2);
  // part B
  ctx.fillStyle='#3B82F6';
  ctx.beginPath(); ctx.roundRect(x+aw,y,bw,h,r); ctx.fill();
  ctx.fillStyle='#fff';
  if(bw>30) ctx.fillText(b, x+aw+bw/2, y+h/2);
  // labels
  ctx.fillStyle='#FF5C35'; ctx.font='bold 12px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText('Part A', x+aw/2, y+h+18);
  ctx.fillStyle='#3B82F6';
  ctx.fillText('Part B', x+aw+bw/2, y+h+18);
  ctx.fillStyle='#0F172A'; ctx.font='bold 15px Sora,sans-serif';
  ctx.fillText('Ratio: '+a+' : '+b, DRAW_W/2, 45);
  ctx.fillStyle='#64748B'; ctx.font='12px Sora,sans-serif';
  ctx.fillText('Total = '+d.total, DRAW_W/2, DRAW_H-12);
}

/* ── FRACTION NUMBER LINE ── */
function drawFractionNumberLine(ctx, d){
  setCtxDefaults(ctx);
  var n=d.n||1, denom=d.d||4, mark=d.mark||0.25;
  var x0=40, x1=DRAW_W-40, cy=DRAW_H/2, len=x1-x0;
  /* line */
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x0,cy); ctx.lineTo(x1,cy); ctx.stroke();
  /* fraction tick marks */
  ctx.font='11px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
  for(var fi=0;fi<=denom;fi++){
    var px=x0+fi/denom*len;
    ctx.strokeStyle='#0F172A'; ctx.lineWidth=fi===0||fi===denom?2.5:1.5;
    ctx.beginPath(); ctx.moveTo(px,cy-12); ctx.lineTo(px,cy+12); ctx.stroke();
    ctx.fillStyle='#475569';
    if(fi===0) ctx.fillText('0', px, cy+15);
    else if(fi===denom) ctx.fillText('1', px, cy+15);
    else ctx.fillText(fi+'/'+denom, px, cy+15);
  }
  /* marked point */
  var mpx=x0+mark*len;
  ctx.fillStyle='#FF5C35';
  ctx.beginPath(); ctx.arc(mpx,cy,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 11px Sora,sans-serif'; ctx.textBaseline='middle';
  ctx.fillText(n+'/'+denom, mpx, cy);
  ctx.fillStyle='#0F172A'; ctx.font='bold 14px Sora,sans-serif'; ctx.textBaseline='alphabetic';
  ctx.fillText('Where is '+n+'/'+denom+' on the number line?', DRAW_W/2, 28);
}

/* ── SIMPLE RULER ── */
function drawRuler(ctx, d){
  setCtxDefaults(ctx);
  var x=30, y=DRAW_H/2-15, w=DRAW_W-60, h=34, maxVal=d.max||10;
  // ruler body
  ctx.fillStyle='#FFFBEB'; ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);
  // tick marks
  var step=w/maxVal;
  for(var i=0;i<=maxVal;i++){
    var px=x+i*step;
    var tickH=i%5===0?h:h/2;
    ctx.beginPath(); ctx.moveTo(px,y); ctx.lineTo(px,y+tickH); ctx.stroke();
    if(i%2===0){
      ctx.fillStyle='#0F172A'; ctx.font='11px Sora,sans-serif'; ctx.textAlign='center';
      ctx.fillText(i, px, y+h+14);
    }
  }
  // object arrow
  if(d.len){
    var arrowEnd=x+d.len*step;
    ctx.strokeStyle='#FF5C35'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x,y-12); ctx.lineTo(arrowEnd,y-12); ctx.stroke();
    ctx.fillStyle='#FF5C35'; ctx.font='bold 13px Sora,sans-serif'; ctx.textAlign='center';
    ctx.fillText('?', (x+arrowEnd)/2, y-22);
  }
}

/* ── COMPARE TWO NUMBERS ── */
function drawCompareNums(ctx, d){

/* ── FRACTION BAR (single or double) ── */
function drawFractionBar(ctx, d){
  setCtxDefaults(ctx);
  var n1=Math.abs(d.n1||1), d1=Math.abs(d.d1||2);
  var n2=d.n2, d2=d.d2;
  /* cap improper fractions at 1 whole + remainder */
  var whole1=Math.floor(n1/d1), rem1=n1%d1;
  var isImproper=(n1>d1);
  var x=30, w=isImproper?(DRAW_W-80):DRAW_W-60, h=44, r=8;
  var y1=(n2!==undefined&&d2)?45:DRAW_H/2-22;
  /* draw whole number box if improper */
  if(isImproper){
    ctx.fillStyle='#FF5C35'; ctx.strokeStyle='#CC3D1F'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(x,y1,36,h,r); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 18px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(whole1, x+18, y1+h/2);
    x+=44;
  }
  /* background bar */
  ctx.fillStyle='#F1F5F9'; ctx.strokeStyle='#CBD5E1'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x,y1,w,h,r); ctx.fill(); ctx.stroke();
  /* filled portion — cap at d1 so bar never overflows */
  var fillN=isImproper?rem1:Math.min(n1,d1);
  var fw1=w*fillN/d1;
  if(fw1>0){ctx.fillStyle='#FF5C35';ctx.beginPath();ctx.roundRect(x,y1,fw1,h,r);ctx.fill();}
  /* division lines */
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2;
  for(var i=1;i<d1;i++){
    var dx=x+w*i/d1;
    ctx.beginPath(); ctx.moveTo(dx,y1); ctx.lineTo(dx,y1+h); ctx.stroke();
  }
  /* fraction label */
  ctx.fillStyle='#0F172A'; ctx.font='bold 14px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(n1+'/'+d1, x+w+26, y1+h/2);
  /* second bar for comparison */
  if(n2!==undefined&&d2){
    var n2a=Math.abs(n2||0),d2a=Math.abs(d2||1);
    var y2=y1+h+18, x2=30;
    ctx.fillStyle='#F1F5F9'; ctx.strokeStyle='#CBD5E1'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(x2,y2,DRAW_W-60,h,r); ctx.fill(); ctx.stroke();
    var fw2=(DRAW_W-60)*Math.min(n2a,d2a)/d2a;
    if(fw2>0){ctx.fillStyle='#3B82F6';ctx.beginPath();ctx.roundRect(x2,y2,fw2,h,r);ctx.fill();}
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2;
    for(var i=1;i<d2a;i++){
      var dx=x2+(DRAW_W-60)*i/d2a;
      ctx.beginPath(); ctx.moveTo(dx,y2); ctx.lineTo(dx,y2+h); ctx.stroke();
    }
    ctx.fillStyle='#3B82F6'; ctx.font='bold 14px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(n2a+'/'+d2a, x2+(DRAW_W-60)+26, y2+h/2);
    ctx.fillStyle='#94A3B8'; ctx.font='bold 20px Sora,sans-serif';
    ctx.fillText('vs', x2+(DRAW_W-60)+26, y1+h+9);
  }
}

/* ── RIGHT TRIANGLE (Pythagorean) ── */
function drawRightTriangle(ctx, d){
  setCtxDefaults(ctx);
  var x0=60, y0=DRAW_H-55, x1=DRAW_W-60, y1=DRAW_H-55, x2=60, y2=55;
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.lineTo(x2,y2); ctx.closePath(); ctx.stroke();
  // right angle box
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.strokeRect(x0+2, y0-22, 20, 20);
  // labels
  ctx.font='bold 15px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  // bottom leg
  ctx.fillStyle='#FF5C35';
  ctx.fillText(d.a||'a', (x0+x1)/2, y0+20);
  // left leg (vertical)
  ctx.fillStyle='#3B82F6';
  ctx.fillText(d.b||'b', x0-22, (y0+y2)/2);
  // hypotenuse
  ctx.fillStyle='#10B981';
  ctx.fillText(d.c||'c', (x1+x2)/2+22, (y1+y2)/2);
  ctx.fillStyle='#64748B'; ctx.font='12px Sora,sans-serif';
  ctx.fillText('a² + b² = c²', DRAW_W/2, DRAW_H-15);
}

/* ── RATE TABLE ── */
function drawRateTable(ctx, d){

/* ── PROBABILITY GRID ── */
function drawProbabilityGrid(ctx, d){
  setCtxDefaults(ctx);
  var total=d.total||6, favorable=d.favorable||1;
  var cols=Math.min(total, 6), rows=Math.ceil(total/cols);
  var size=Math.min(44, (DRAW_W-60)/cols);
  var x0=(DRAW_W-cols*size)/2, y0=35;
  ctx.font='bold 13px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(var i=0;i<total;i++){
    var col=i%cols, row=Math.floor(i/cols);
    var x=x0+col*size, y=y0+row*size;
    var isFav=i<favorable;
    ctx.fillStyle=isFav?'#DCFCE7':'#F8FAFC';
    ctx.strokeStyle=isFav?'#10B981':'#CBD5E1'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(x+2,y+2,size-4,size-4,6); ctx.fill(); ctx.stroke();
    ctx.fillStyle=isFav?'#10B981':'#94A3B8';
    ctx.fillText(i+1, x+size/2, y+size/2);
  }
  ctx.fillStyle='#0F172A'; ctx.font='bold 14px Sora,sans-serif';
  ctx.fillText('P = '+favorable+'/'+total, DRAW_W/2, y0+rows*size+22);
  ctx.fillStyle='#64748B'; ctx.font='12px Sora,sans-serif';
  ctx.fillText(d.label||'Favorable outcomes are green', DRAW_W/2, DRAW_H-10);
}

/* ── BAR CHART (data comparison) ── */
function drawBarChart(ctx, d){
  setCtxDefaults(ctx);
  var bars=d.bars||[{label:'A',val:4,color:'#FF5C35'},{label:'B',val:7,color:'#3B82F6'}];
  var maxVal=Math.max.apply(null, bars.map(function(b){return b.val;}));
  var x0=40, y0=20, w=DRAW_W-60, h=DRAW_H-70;
  var bw=Math.min(60,(w/bars.length)-16);
  // y axis
  ctx.strokeStyle='#CBD5E1'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x0,y0+h); ctx.lineTo(x0+w,y0+h); ctx.stroke();
  // bars
  for(var i=0;i<bars.length;i++){
    var bh=Math.round(bars[i].val/maxVal*h);
    var bx=x0+16+(w/bars.length)*i;
    var by=y0+h-bh;
    ctx.fillStyle=bars[i].color||'#FF5C35';
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,4); ctx.fill();
    ctx.fillStyle='#0F172A'; ctx.font='bold 13px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(bars[i].val, bx+bw/2, by-2);
    ctx.fillStyle='#475569'; ctx.font='11px Sora,sans-serif'; ctx.textBaseline='top';
    ctx.fillText(bars[i].label, bx+bw/2, y0+h+6);
  }
  if(d.label){
    ctx.fillStyle='#64748B'; ctx.font='12px Sora,sans-serif'; ctx.textBaseline='alphabetic';
    ctx.fillText(d.label, DRAW_W/2, DRAW_H-4);
  }
}

/* ── NUMBER LINE MULTI-MARK ── */
function drawNumberLineMarks(ctx, d){
  setCtxDefaults(ctx);
  var min=d.min||0, max=d.max||10;
  var x0=30, x1=DRAW_W-30, cy=DRAW_H/2, len=x1-x0;
  var scale=len/(max-min);
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x0,cy); ctx.lineTo(x1,cy); ctx.stroke();
  // ticks
  for(var n=min;n<=max;n++){
    var px=x0+(n-min)*scale;
    var major=Number.isInteger(n);
    ctx.strokeStyle=major?'#0F172A':'#CBD5E1'; ctx.lineWidth=major?2:1;
    ctx.beginPath(); ctx.moveTo(px,cy-(major?10:6)); ctx.lineTo(px,cy+(major?10:6)); ctx.stroke();
    if(major){
      ctx.fillStyle='#475569'; ctx.font='12px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(n, px, cy+13);
    }
  }
  // marks
  if(d.marks){
    var markColors=['#FF5C35','#3B82F6','#10B981'];
    for(var mi=0;mi<d.marks.length;mi++){
      var mpx=x0+(d.marks[mi]-min)*scale;
      ctx.fillStyle=markColors[mi%3];
      ctx.beginPath(); ctx.arc(mpx,cy,7,0,Math.PI*2); ctx.fill();
    }
  }
}

/* ── PLACE VALUE CHART ── */
function drawPlaceValue(ctx, d){

  for(var i=0;i<places.length;i++){

    ctx.strokeRect(x0+i*cw, y0, cw, rh);
    ctx.fillRect(x0+i*cw, y0, cw, rh);

    ctx.fillText(places[i], x0+i*cw+cw/2, y0+4);
    ctx.font='bold 22px Sora,sans-serif'; ctx.textBaseline='middle';

  }
}

/* ── TWO CLOCKS (elapsed time) ── */
function drawTwoClocks(ctx, d){
  setCtxDefaults(ctx);
  function miniClock(x, cy2, r, h, m, label){
    ctx.fillStyle='#FFFBEB'; ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(x,cy2,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    for(var i=1;i<=12;i++){
      var a=(i/12)*Math.PI*2-Math.PI/2;
      var tx=x+r*0.78*Math.cos(a), ty=cy2+r*0.78*Math.sin(a);
      ctx.fillStyle='#475569'; ctx.font='bold 8px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(i, tx, ty);
    }
    var ha=((h%12)+m/60)/12*Math.PI*2-Math.PI/2;
    ctx.strokeStyle='#0F172A'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x,cy2); ctx.lineTo(x+r*0.5*Math.cos(ha),cy2+r*0.5*Math.sin(ha)); ctx.stroke();
    var ma=(m/60)*Math.PI*2-Math.PI/2;
    ctx.strokeStyle='#FF5C35'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x,cy2); ctx.lineTo(x+r*0.7*Math.cos(ma),cy2+r*0.7*Math.sin(ma)); ctx.stroke();
    ctx.fillStyle='#0F172A'; ctx.beginPath(); ctx.arc(x,cy2,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#64748B'; ctx.font='11px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(label, x, cy2+r+16);
  }
  var r=65, cy=DRAW_H/2-5;
  miniClock(DRAW_W*0.28, cy, r, d.h1||9, d.m1||0, 'Start: '+d.h1+':'+(d.m1<10?'0':'')+d.m1);
  miniClock(DRAW_W*0.72, cy, r, d.h2||11, d.m2||30, 'End: '+d.h2+':'+(d.m2<10?'0':'')+d.m2);
  ctx.fillStyle='#94A3B8'; ctx.font='bold 22px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText('→', DRAW_W/2, cy);
}

/* ── EQUAL GROUPS ── */
function drawEqualGroups(ctx, d){
  setCtxDefaults(ctx);
  var groups=Math.min(d.groups||3,6), perGroup=Math.min(d.perGroup||4,8);
  var remainder=d.remainder||0;
  /* leave room for remainder group if needed */
  var totalGroups=groups+(remainder>0?1:0);
  var gw=Math.min(70,(DRAW_W-20)/Math.max(totalGroups,1)-10);
  var x0=(DRAW_W-(groups*(gw+10)+(remainder>0?(gw+10):0)))/2, y0=28;
  var gh=DRAW_H-60;
  for(var g=0;g<groups;g++){
    var gx=x0+g*(gw+10);
    ctx.fillStyle='#FFF7ED'; ctx.strokeStyle='#F97316'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(gx,y0,gw,gh,8); ctx.fill(); ctx.stroke();
    var cols=Math.min(perGroup,3),rows=Math.ceil(perGroup/Math.max(cols,1));
    var dr=Math.min(11,(gw-10)/cols/2);
    for(var i=0;i<perGroup;i++){
      var col=i%cols,row=Math.floor(i/cols);
      if(d.showEmpty){
        /* outline only — shows structure without revealing count */
        ctx.strokeStyle='#F97316'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(gx+dr*1.5+col*(dr*2+3),y0+dr*1.5+row*(dr*2+3),dr,0,Math.PI*2); ctx.stroke();
      } else {
        ctx.fillStyle='#FF5C35';
        ctx.beginPath(); ctx.arc(gx+dr*1.5+col*(dr*2+3),y0+dr*1.5+row*(dr*2+3),dr,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.fillStyle='#F97316'; ctx.font='bold 11px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(perGroup, gx+gw/2, y0+gh+14);
  }
  if(remainder>0){
    /* remainder group - dashed border, different color */
    var rx=x0+groups*(gw+10);
    ctx.fillStyle='#EFF6FF'; ctx.strokeStyle='#3B82F6'; ctx.lineWidth=1.5;
    ctx.setLineDash([5,3]);
    ctx.beginPath(); ctx.roundRect(rx,y0,gw,gh,8); ctx.fill(); ctx.stroke();
    ctx.setLineDash([]);
    var dr2=Math.min(11,(gw-10)/3/2);
    for(var i=0;i<remainder;i++){
      var col=i%3,row=Math.floor(i/3);
      ctx.fillStyle='#3B82F6';
      ctx.beginPath(); ctx.arc(rx+dr2*1.5+col*(dr2*2+3),y0+dr2*1.5+row*(dr2*2+3),dr2,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='#3B82F6'; ctx.font='bold 11px Sora,sans-serif'; ctx.textAlign='center';
    ctx.fillText('R:'+remainder, rx+gw/2, y0+gh+14);
  }
  ctx.fillStyle='#0F172A'; ctx.font='bold 12px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText(groups+' groups of '+perGroup+(remainder>0?' R '+remainder:''), DRAW_W/2, DRAW_H-4);
}

/* ── CYLINDER ── */
function drawCylinder(ctx, d){
  setCtxDefaults(ctx);
  var r=d.r||4, h=d.h||6;
  var scale=Math.min((DRAW_H-70)/(h+r*0.5), (DRAW_W-80)/(r*2+20), 14);
  var cr=r*scale, ch=h*scale;
  var cx=DRAW_W/2, ytop=25, ybot=ytop+ch;
  /* body */
  ctx.fillStyle='#EFF6FF'; ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.fillRect(cx-cr,ytop,cr*2,ch);
  ctx.strokeRect(cx-cr,ytop,cr*2,ch);
  /* top ellipse */
  ctx.fillStyle='#DBEAFE';
  ctx.beginPath(); ctx.ellipse(cx,ytop,cr,cr*0.35,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  /* bottom ellipse (visible arc only) */
  ctx.beginPath(); ctx.ellipse(cx,ybot,cr,cr*0.35,0,0,Math.PI); ctx.stroke();
  /* dashed top of bottom ellipse */
  ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.ellipse(cx,ybot,cr,cr*0.35,0,Math.PI,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  /* labels */
  ctx.font='bold 13px Sora,sans-serif'; ctx.textAlign='left';
  ctx.fillStyle='#FF5C35';
  ctx.fillText('r = '+r, cx+cr+8, ytop+14);
  ctx.fillStyle='#3B82F6';
  ctx.fillText('h = '+h, cx+cr+8, ytop+ch/2);
  ctx.fillStyle='#64748B'; ctx.font='11px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText('V = π × r² × h', DRAW_W/2, DRAW_H-4);
}

/* ── CONE ── */
function drawCone(ctx, d){
  setCtxDefaults(ctx);
  var r=d.r||4, h=d.h||6;
  var scale=Math.min((DRAW_H-70)/(h+r*0.5),(DRAW_W-80)/(r*2+20),14);
  var cr=r*scale, ch=h*scale;
  var cx=DRAW_W/2, ytip=20, ybase=ytip+ch;
  /* cone body */
  ctx.fillStyle='#FFF7ED'; ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(cx,ytip);
  ctx.lineTo(cx-cr,ybase);
  ctx.lineTo(cx+cr,ybase);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  /* base ellipse */
  ctx.fillStyle='#FED7AA';
  ctx.beginPath(); ctx.ellipse(cx,ybase,cr,cr*0.3,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  /* dashed height line */
  ctx.setLineDash([4,3]); ctx.strokeStyle='#94A3B8';
  ctx.beginPath(); ctx.moveTo(cx,ytip); ctx.lineTo(cx,ybase); ctx.stroke();
  ctx.setLineDash([]);
  /* labels */
  ctx.font='bold 13px Sora,sans-serif'; ctx.textAlign='left';
  ctx.fillStyle='#FF5C35';
  ctx.fillText('r = '+r, cx+cr+8, ybase-8);
  ctx.fillStyle='#3B82F6';
  ctx.fillText('h = '+h, cx+8, ytip+ch/2);
  ctx.fillStyle='#64748B'; ctx.font='11px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText('V = ⅓ × π × r² × h', DRAW_W/2, DRAW_H-4);
}

/* ── SPHERE ── */
function drawSphere(ctx, d){
  setCtxDefaults(ctx);
  var r=d.r||4;
  var scale=Math.min((DRAW_H-70)/(r*2),(DRAW_W-80)/(r*2),18);
  var cr=r*scale;
  var cx=DRAW_W/2, cy=DRAW_H/2-10;
  /* gradient fill */
  var grad=ctx.createRadialGradient(cx-cr*0.3,cy-cr*0.3,cr*0.1,cx,cy,cr);
  grad.addColorStop(0,'#DBEAFE');
  grad.addColorStop(1,'#93C5FD');
  ctx.fillStyle=grad;
  ctx.strokeStyle='#0F172A'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fill(); ctx.stroke();
  /* equator dashed ellipse */
  ctx.setLineDash([4,3]); ctx.strokeStyle='#475569';
  ctx.beginPath(); ctx.ellipse(cx,cy,cr,cr*0.3,0,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  /* radius line */
  ctx.strokeStyle='#FF5C35'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+cr,cy); ctx.stroke();
  /* labels */
  ctx.fillStyle='#FF5C35'; ctx.font='bold 13px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText('r = '+r, cx+cr/2, cy-12);
  ctx.fillStyle='#64748B'; ctx.font='11px Sora,sans-serif';
  ctx.fillText('V = ⁴⁄₃ × π × r³', DRAW_W/2, DRAW_H-4);
}

/* ── SURFACE AREA BOX ── */
function drawSurfaceArea(ctx, d){
  var l=d.l||4, w=d.w||3, h=d.h||2;
  drawBox3D(ctx, {l:l, w:w, h:h, label:'Surface Area = 2(lw + lh + wh)'});
  var sa=2*(l*w+l*h+w*h);
  ctx.fillStyle='#8B5CF6'; ctx.font='bold 13px Sora,sans-serif'; ctx.textAlign='center';
  ctx.fillText('= 2('+l+'×'+w+' + '+l+'×'+h+' + '+w+'×'+h+') = ?', DRAW_W/2, 24);
}

/* ── EXPONENT DISPLAY ── */
function drawExponent(ctx, d){
  setCtxDefaults(ctx);
  var base=d.base||2, exp=d.exp||3;
  ctx.fillStyle='#8B5CF6'; ctx.font='bold 52px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(base, DRAW_W/2-20, DRAW_H/2+10);
  ctx.font='bold 28px Sora,sans-serif';
  ctx.fillText(exp, DRAW_W/2+22, DRAW_H/2-14);
  ctx.fillStyle='#94A3B8'; ctx.font='22px Sora,sans-serif'; ctx.textBaseline='middle';
  ctx.fillText('= ?', DRAW_W/2+50, DRAW_H/2+10);
}

/* ── DECIMAL GRID ── */
function drawDecimalGrid(ctx, d){
  setCtxDefaults(ctx);
  var val=d.val||0.35;
  if(val>1){
    /* for decimals > 1, show on a number line instead */
    drawNumberLineMarks(ctx,{min:0,max:Math.ceil(val)+1,marks:[val]});
    ctx.fillStyle='#0F172A'; ctx.font='bold 14px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(d.label||String(val), DRAW_W/2, DRAW_H-6);
    return;
  }
  var safeVal=Math.max(0,Math.min(1,val));
  var cols=10, rows=10, cw=(DRAW_W-40)/cols, ch=(DRAW_H-50)/rows;
  var filled=Math.round(safeVal*100);
  for(var r=0;r<rows;r++){
    for(var c=0;c<cols;c++){
      var idx=r*cols+c;
      ctx.fillStyle=idx<filled?'#FF5C35':'#F1F5F9';
      ctx.strokeStyle='#E4E7EC'; ctx.lineWidth=0.5;
      ctx.fillRect(20+c*cw, 10+r*ch, cw-1, ch-1);
      ctx.strokeRect(20+c*cw, 10+r*ch, cw-1, ch-1);
    }
  }
  /* label each row of 10 */
  ctx.fillStyle='#94A3B8'; ctx.font='10px Sora,sans-serif'; ctx.textAlign='right'; ctx.textBaseline='middle';
  for(var r=0;r<rows;r++){
    ctx.fillText((r+1)*10+'%', 18, 10+r*ch+ch/2);
  }
  ctx.fillStyle='#0F172A'; ctx.font='bold 15px Sora,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText(d.label||safeVal+' = '+filled+'%', DRAW_W/2, DRAW_H-6);
}

/* ═══════════════════════════════════════════
   UPDATE PROBLEM GENERATORS TO INCLUDE DRAW DATA
═══════════════════════════════════════════ */
function addDrawData(lid, combos){
  function parseFrac(s){
    if(typeof s==='string'&&s.indexOf('/')>=0){var p=s.split('/');return{n:parseInt(p[0]),d:parseInt(p[1])};}
    return null;
  }
  function decodeTime(t){return{h:Math.floor(t/100),m:t%100};}

  for(var i=0;i<combos.length;i++){
    var pr=combos[i];

    /* ══ ANGLES & GEOMETRY (always helpful, never reveals answer) ══ */
    if(lid==='QG1'||lid==='QG2'){
      pr.draw='angle'; pr.drawData={degrees:pr.a||90};
    }
    else if(lid==='WG7'){
      var isComp2=pr.display&&pr.display.indexOf('omplementary')>=0;
      pr.draw='angle'; pr.drawData={degrees:pr.a||45,showBoth:true,totalDeg:isComp2?90:180};
    }
    else if(lid==='WG8'){
      var isVert2=pr.display&&pr.display.indexOf('ertical')>=0;
      pr.draw='angle'; pr.drawData={degrees:pr.a||45,showBoth:!isVert2,totalDeg:180};
    }
    else if(lid==='G1'||lid==='G2'||lid==='WG9'||lid==='LG8'){
      if(pr.a&&pr.b){pr.draw='triangle_angles';pr.drawData={a:pr.a,b:pr.b};}
    }
    else if(lid==='LG7'){
      pr.draw='parallel_lines'; pr.drawData={angle:pr.a||35};
    }
    /* Circles — show shape with radius labeled, child calculates */
    else if(lid==='WG3'||lid==='WG4'){
      pr.draw='circle'; pr.drawData={r:pr.a,showRadius:true};
    }
    /* Rectangles — show labeled dimensions, child calculates */
    else if(lid==='G3'||lid==='QG3'||lid==='ME2'||lid==='ME3'||lid==='VG5'||lid==='WG2'){
      if(pr.a&&pr.b){pr.draw='rectangle';pr.drawData={w:pr.a,h:pr.b,label:'Find area or perimeter'};}
    }
    else if(lid==='QG4'||lid==='QG5'||lid==='ME1'){
      if(pr.a&&pr.b){pr.draw='rectangle';pr.drawData={w:pr.a,h:pr.b,label:'Perimeter = 2(l+w)'};}
    }
    else if(lid==='G4'||lid==='WG1'){
      if(pr.a&&pr.b){pr.draw='rectangle';pr.drawData={w:pr.a,h:pr.b,label:'Area of triangle = base × height ÷ 2'};}
    }
    else if(lid==='G5'||lid==='G6'||lid==='QG5'){
      if(pr.a&&pr.b){pr.draw='rectangle';pr.drawData={w:pr.a,h:pr.b,label:'Find perimeter or area'};}
    }
    /* 3D shapes — show shape + dimensions, never show volume calculation */
    else if(lid==='VG1'||lid==='WG6'){
      if(pr.a&&pr.b&&pr.an){
        var bh=Math.max(1,Math.round(pr.an/(pr.a*pr.b)));
        pr.draw='box_3d'; pr.drawData={l:pr.a,w:pr.b,h:bh,label:'V = l × w × h = ?'};
      }
    }
    else if(lid==='LG3'){pr.draw='cylinder';pr.drawData={r:pr.a,h:pr.b};}
    else if(lid==='LG4'){pr.draw='cone';pr.drawData={r:pr.a,h:pr.b};}
    else if(lid==='LG6'){pr.draw='sphere';pr.drawData={r:pr.a};}
    else if(lid==='WG5'){
      if(pr.a&&pr.b){pr.draw='surface_area';pr.drawData={l:pr.a,w:pr.b,h:pr.ch||3};}
    }
    /* Pythagorean — ONLY show the two legs, never show hypotenuse */
    else if(lid==='LG1'){
      pr.draw='right_triangle';
      pr.drawData={a:pr.a,b:pr.b,c:'?'};  /* c is unknown = the answer */
    }
    else if(lid==='LG2'){
      pr.draw='right_triangle';
      pr.drawData={a:pr.b,b:'?',c:pr.a};  /* one leg unknown */
    }
    /* Congruent/similar */
    else if(lid==='LG9'||lid==='LGA'||lid==='WGA'){
      if(pr.a&&pr.b){pr.draw='rectangle';pr.drawData={w:pr.a||4,h:pr.b||3,label:'Similar/Congruent figures'};}
    }
    /* Shapes — show the shape, child counts sides */
    else if(lid==='SH1'||lid==='SH2'||lid==='G2A'||lid==='G2B'||lid==='VG6'){
      var shapeMap={circle:0,triangle:3,square:4,rectangle:4,pentagon:5,hexagon:6,octagon:8,parallelogram:4,rhombus:4,trapezoid:4};
      if(pr.display){for(var sn in shapeMap){if(pr.display.indexOf(sn)>=0){pr.draw='shape_sides';pr.drawData={sides:shapeMap[sn],name:sn};break;}}}
      if(!pr.draw){pr.draw='shape_sides';pr.drawData={sides:4,name:'shape'};}
    }
    /* K shapes */
    else if(lid==='K17'||lid==='K18'){
      var kShapeMap={circle:0,triangle:3,square:4,rectangle:4,pentagon:5};
      if(pr.display){for(var ksn in kShapeMap){if(pr.display.indexOf(ksn)>=0){pr.draw='shape_sides';pr.drawData={sides:kShapeMap[ksn],name:ksn};break;}}}
    }

    /* ══ FRACTIONS — comparison only (not computation) ══ */
    /* FR3 compare and FR5 number line: safe — shows setup, not answer */
    else if(lid==='FR3'||lid==='QFR2'){
      var fa=parseFrac(pr.a),fb=parseFrac(pr.b);
      if(fa&&fb){pr.draw='fraction_bar';pr.drawData={n1:fa.n,d1:fa.d,n2:fb.n,d2:fb.d};}
    }
    else if(lid==='FR5'){
      if(pr.a!==undefined&&pr.b){
        pr.draw='fraction_number_line';
        pr.drawData={n:pr.a,d:pr.b,mark:pr.a/pr.b};
      }
    }
    /* FR1/FR2/FR4 unit fractions — show the fraction bar */
    else if(lid==='FR1'||lid==='FR2'||lid==='FR4'||lid==='QFR1'){
      if(pr.a!==undefined&&pr.b){pr.draw='fraction_bar';pr.drawData={n1:parseInt(pr.a)||1,d1:parseInt(pr.b)||2};}
    }
    /* QFR7/QFR8 multiply fraction — show one fraction bar for reference */
    else if(lid==='QFR7'||lid==='QFR8'||lid==='V3'||lid==='V4'||lid==='V6'||lid==='V7'){
      var fa2=parseFrac(pr.a);
      if(fa2){pr.draw='fraction_bar';pr.drawData={n1:fa2.n,d1:fa2.d};}
    }

    /* ══ DECIMALS ══ */
    else if(lid==='VD1'||lid==='QDC1'){
      var v=parseFloat(pr.a)||0.35;
      if(v<=1){pr.draw='decimal_grid';pr.drawData={val:v,label:String(v)};}
    }
    else if(lid==='QDC5'){
      var v2=parseFloat(pr.a)||1.5;
      pr.draw='number_line_marks';pr.drawData={min:Math.floor(v2)-1,max:Math.ceil(v2)+1,marks:[v2]};
    }

    /* ══ PERCENTAGES ══ */
    else if(lid==='P1'||lid==='P2'||lid==='P4'||lid==='WR4'){
      if(pr.pct!==undefined){pr.draw='percent_bar';pr.drawData={pct:pr.pct,total:pr.val};}
    }
    else if(lid==='P3'||lid==='WR5'){
      pr.draw='bar_chart';
      pr.drawData={bars:[{label:'Before',val:pr.a||100,color:'#3B82F6'},{label:'After',val:pr.b||120,color:'#FF5C35'}],label:'% change'};
    }
    else if(lid==='WR6'){
      if(pr.pct!==undefined){pr.draw='percent_bar';pr.drawData={pct:pr.b||20,total:pr.a||100};}
    }
    else if(lid==='WR7'){
      pr.draw='bar_chart';
      pr.drawData={bars:[{label:'Cost',val:pr.a||50,color:'#3B82F6'},{label:'Sell',val:pr.an||60,color:'#10B981'}],label:'Markup '+(pr.b||20)+'%'};
    }

    /* ══ RATIOS & RATES ══ */
    else if(lid==='R1'||lid==='R2'||lid==='R3'){
      if(pr.a&&pr.b&&pr.a<=10&&pr.b<=10){
        pr.draw='ratio_bar';pr.drawData={a:pr.a,b:pr.b,total:pr.a+pr.b};
      }
    }
    else if(lid==='WR1'||lid==='WR2'){
      pr.draw='rate_table';
      pr.drawData={cols:['Rate','Time','Distance'],vals:[String(pr.an||'?'),String(pr.b||1),String(pr.a||'?')],label:'Find the unit rate'};
    }
    else if(lid==='WR3'){
      pr.draw='ratio_bar';pr.drawData={a:pr.a||1,b:pr.b||3,total:(pr.a||1)+(pr.b||3)};
    }
    else if(lid==='WR8'){
      pr.draw='bar_chart';
      pr.drawData={bars:[{label:'Principal',val:pr.a||100,color:'#3B82F6'},{label:'Interest',val:pr.an||10,color:'#10B981'},{label:'Total',val:(pr.a||100)+(pr.an||10),color:'#FF5C35'}]};
    }

    /* ══ TIME ══ */
    /* Clock for elapsed time only — the two clocks show setup, not answer */
    else if(lid==='ME4'){
      var t1=decodeTime(pr.a),t2=decodeTime(pr.b);
      pr.draw='two_clocks';pr.drawData={h1:t1.h,m1:t1.m,h2:t2.h,m2:t2.m};
    }
    /* For simple "what time?" levels — clock IS the question, keep it but make clear */
    else if(lid==='TI1'||lid==='TI2'||lid==='TI3'||lid==='TM1'||lid==='TM2'||lid==='TM3'||lid==='TM4'){
      pr.draw='clock'; pr.drawData={h:pr.a||3,m:pr.b||0};
    }

    /* ══ MONEY ══ */
    else if(lid==='MN1'){pr.draw='coins';pr.drawData={p:pr.a||0,n:pr.b||0,d:0,q:0};}
    else if(lid==='MN2'){pr.draw='coins';pr.drawData={p:0,n:0,d:pr.a||0,q:pr.b||0};}
    else if(lid==='MN3'||lid==='MN4'){pr.draw='coins';pr.drawData={p:1,n:1,d:1,q:1};}

    /* ══ WORD PROBLEMS — groups & comparison ══ */
    /* Dot groups for addition WP: show two separate groups, child adds */
    /* Safe because seeing Group A=5 and Group B=3 doesn't give away 8 directly */
    else if(lid==='WP1G1'||lid==='WP1G2'){
      if(pr.a<=12&&pr.b<=12){
        pr.draw='dot_groups'; pr.drawData={a:Math.min(pr.a,12),b:Math.min(pr.b,12),op:'+'};
      }
    }
    /* Subtraction word problems — show original group with some crossed out */
    else if(lid==='WP2G1'||lid==='WP2G2'){
      if(pr.a<=12&&pr.b<=12){
        pr.draw='dot_groups'; pr.drawData={a:Math.min(pr.a,12),b:Math.min(pr.b,12),op:'-'};
      }
    }
    /* Compare WPs */
    else if(lid==='WP3G1'||lid==='WP3G2'){
      if(pr.a<=15&&pr.b<=15){
        pr.draw='ratio_bar';pr.drawData={a:Math.min(pr.a,15),b:Math.min(pr.b,15),total:(pr.a||5)+(pr.b||8)};
      }
    }
    /* Division WP — only show the dividend as a group, NOT the answer groups */
    else if(lid==='QWP2'){
      pr.draw='equal_groups'; pr.drawData={groups:pr.b,perGroup:'?',total:pr.a};
    }
    /* Multiplication WP — show groups but not the filled dots (use outlines) */
    else if(lid==='QWP1'||lid==='MI5'||lid==='MI6'){
      if(pr.b&&pr.b<=6&&pr.a&&pr.a<=8){
        pr.draw='equal_groups'; pr.drawData={groups:Math.min(pr.b,6),perGroup:pr.a,showEmpty:true};
      }
    }

    /* ══ MEASUREMENT ══ */
    else if(lid==='ME2A'||lid==='ME2B'){
      pr.draw='ruler'; pr.drawData={max:Math.max(12,pr.an?pr.an+4:12),len:pr.an||6};
    }
    else if(lid==='ME2D'){
      pr.draw='number_line'; pr.drawData={min:Math.max(0,pr.a-5),max:pr.a+5,mark:pr.a};
    }
    else if(lid==='VW3'||lid==='VC4'||lid==='VC5'){
      pr.draw='rate_table';
      pr.drawData={cols:['From','×','To'],vals:[String(pr.a||'n'),String(pr.b||'?'),String(pr.an||'?')],label:'Unit conversion'};
    }

    /* ══ ROUNDING — number line shows value, child finds rounded position ══ */
    else if(lid==='RD1'||lid==='PV4'){
      var rounded1=Math.round((pr.a||50)/10)*10;
      pr.draw='number_line_marks'; pr.drawData={min:Math.max(0,rounded1-20),max:rounded1+20,marks:[pr.a||50]};
    }
    else if(lid==='RD2'||lid==='PV5'){
      var rounded2=Math.round((pr.a||500)/100)*100;
      pr.draw='number_line_marks'; pr.drawData={min:Math.max(0,rounded2-200),max:rounded2+200,marks:[pr.a||500]};
    }

    /* ══ COORDINATE PLANE ══ */
    /* Show the plane with the point plotted — child must identify quadrant */
    /* The point is visible but the quadrant label is NOT shown */
    else if(lid==='C1'||lid==='VG3'||lid==='VG4'){
      var maxAbs=Math.max(Math.abs(pr.a||2),Math.abs(pr.b||3),1);
      var adaptScale=Math.min(25,Math.floor(90/maxAbs));
      pr.draw='coordinate_point'; pr.drawData={x:pr.a||2,y:pr.b||3,scale:adaptScale,showQ:false}; /* showQ:false = don't highlight */
    }

    /* ══ STATISTICS ══ */
    else if(lid==='WS1'||lid==='VW4'){
      pr.draw='bar_chart';
      pr.drawData={bars:[{label:'A',val:pr.a||4,color:'#FF5C35'},{label:'B',val:Math.round(pr.a*1.4)||6,color:'#3B82F6'},{label:'C',val:Math.round(pr.a*0.8)||3,color:'#10B981'}],label:'Find mean, median, mode'};
    }
    else if(lid==='WS3'||lid==='WS4'||lid==='WS5'){
      pr.draw='bar_chart';
      pr.drawData={bars:[{label:'Sample',val:pr.a||10,color:'#3B82F6'},{label:'Predicted',val:pr.an||50,color:'#10B981'}],label:'Scale up the prediction'};
    }
    else if(lid==='LS1'){
      pr.draw='scatter'; pr.drawData={correlation:pr.an-2,label:'What type of correlation?'};
    }
    else if(lid==='LS2'){
      pr.draw='scatter'; pr.drawData={correlation:pr.a||1,label:'Line of best fit'};
    }
    else if(lid==='LS3'||lid==='LS4'||lid==='LS5'){
      pr.draw='bar_chart';
      pr.drawData={bars:[{label:'Group A',val:pr.a||30,color:'#FF5C35'},{label:'Group B',val:pr.b||20,color:'#3B82F6'}],label:'Interpret the data'};
    }

    /* ══ PROBABILITY ══ */
    else if(lid==='WP1'||lid==='WP2'||lid==='WP3'||lid==='WP4'||lid==='WP5'){
      pr.draw='probability_grid';
      pr.drawData={total:Math.min(pr.b||6,20),favorable:Math.min(pr.a||1,pr.b||6),label:'Green = favorable'};
    }

    /* ══ PLACE VALUE ══ */
    else if(lid==='Q6'||lid==='QD5'){
      pr.draw='place_value';
      pr.drawData={places:['Th','H','T','O'],values:[null,null,pr.a?pr.a%100:3,0]};
    }

    /* ══ BALANCE SCALE — equations only where setup helps ══ */
    else if(lid==='E6'||lid==='WE6'||lid==='L7'){
      pr.draw='balance_scale';
      pr.drawData={left:'?',right:String(pr.an||'?'),eq:'Both sides equal'};
    }
    else if(lid==='H7'||lid==='DV8'||lid==='QD6'){
      pr.draw='balance_scale';
      pr.drawData={left:String(pr.a)+' ÷ ?',right:String(pr.b),eq:'Find the missing value'};
    }
    else if(lid==='WGA'||lid==='WR3'){
      pr.draw='ratio_bar';
      pr.drawData={a:pr.a||1,b:pr.b||3,total:(pr.a||1)+(pr.b||3)};
    }

    /* ══ 3RD GRADE WORD PROBLEMS ══ */
    else if(lid==='WP3D'){
      var fa3=parseFrac(pr.a);
      if(fa3){pr.draw='fraction_bar';pr.drawData={n1:fa3.n,d1:fa3.d};}
    }
  }
  return combos;

  /* G3P4/G3P5 area — show grid shape */
  if(lid==='G3P4'||lid==='G3P5'){pr.draw='rectangle';pr.drawData={w:pr.b,h:pr.a,label:'?'};}
  /* G4L2 classify triangle by angles */
  if(lid==='G4L2'){pr.draw='triangle';pr.drawData={type:'classify_angle',an:pr.an};}
  /* G7A1 parallel lines and transversal */
  if(lid==='G7A1'){pr.draw='parallelLines';pr.drawData={angle:pr.a||55};}
  /* G8T9 Pythagorean theorem */
  if(lid==='G8T9'){pr.draw='rightTriangle';pr.drawData={a:pr.a,b:pr.b,c:pr.an};pr.geoQ=true;}

  /* ── MISSING VISUAL FIX PASS ── */
  /* G2D8 clock */
  if(lid==='G2D8'){pr.draw='clock';pr.drawData={h:pr.a||3,m:pr.b||0};}
  /* KA4 3D shapes */
  if(lid==='KA4'){
    var d47=(pr.display||'').toLowerCase();
    if(d47.indexOf('cube')>=0){pr.draw='box3d';pr.drawData={w:3,h:3,d:3,label:''};}
    else if(d47.indexOf('sphere')>=0){pr.draw='sphere';pr.drawData={r:50};}
    else if(d47.indexOf('cone')>=0){pr.draw='cone';pr.drawData={r:40,h:70};}
    else if(d47.indexOf('cylinder')>=0){pr.draw='cylinder';pr.drawData={r:35,h:70};}
    pr.geoQ=true;
  }
  /* G1M1 ruler */
  if(lid==='G1M1'){pr.draw='ruler';pr.drawData={len:pr.a||5,unit:'in'};}
  /* G5E2 coordinate point */

  /* G8T1 translation — show original point */

  /* ME2C number line */

  /* K17/K18 shape sides */
  if(lid==='K17'||lid==='K18'){
    var shMap={circle:0,triangle:3,square:4,rectangle:4,pentagon:5,hexagon:6};

  }

var STORIES = {"0": [{"id": "KS1", "title": "The Big Red Ball", "text": "Tom has a big red ball.\nHe throws it up high.\nThe ball comes back down.\nTom catches the ball.\nHe is very happy.", "qs": [{"q": "What color is Tom's ball?", "ch": ["Blue", "Green", "Red", "Yellow"], "an": 2}, {"q": "What does Tom do with the ball?", "ch": ["Eats it", "Throws it", "Hides it", "Loses it"], "an": 1}, {"q": "How does Tom feel?", "ch": ["Sad", "Angry", "Scared", "Happy"], "an": 3}], "vocab": [{"w": "catch", "d": "to grab something that is moving"}]}, {"id": "KS2", "title": "My Dog Spot", "text": "I have a dog named Spot.\nSpot has black and white spots.\nHe likes to run and play.\nEvery day I feed Spot his food.\nSpot wags his tail when I come home.", "qs": [{"q": "What is the dog's name?", "ch": ["Rex", "Buddy", "Spot", "Max"], "an": 2}, {"q": "What colors are on Spot?", "ch": ["Red and blue", "Black and white", "Brown and yellow", "Green and purple"], "an": 1}, {"q": "What does Spot do when the child comes home?", "ch": ["Barks loudly", "Runs away", "Wags his tail", "Goes to sleep"], "an": 2}], "vocab": [{"w": "wag", "d": "to move back and forth quickly"}]}, {"id": "KS3", "title": "Rain Day", "text": "It is raining outside.\nThe sky is dark and grey.\nI put on my yellow boots.\nI jump in a big puddle.\nSplash! Water goes everywhere!\nRain days can be fun.", "qs": [{"q": "What color are the boots?", "ch": ["Red", "Blue", "Yellow", "Green"], "an": 2}, {"q": "What does the child jump in?", "ch": ["A lake", "A puddle", "A pool", "A river"], "an": 1}, {"q": "How does the child feel about rain days?", "ch": ["Scared", "Bored", "They think they can be fun", "Sad"], "an": 2}], "vocab": [{"w": "puddle", "d": "a small pool of water on the ground"}]}, {"id": "KS4", "title": "Apple Tree", "text": "There is a big apple tree in our yard.\nThe apples are red and round.\nI pick one apple from the tree.\nIt is sweet and crunchy.\nMom makes a pie with the apples.\nThe pie smells wonderful!", "qs": [{"q": "Where is the apple tree?", "ch": ["In the park", "At school", "In their yard", "At a farm"], "an": 2}, {"q": "What does Mom make with the apples?", "ch": ["Juice", "A salad", "A pie", "Applesauce"], "an": 2}, {"q": "How does the apple taste?", "ch": ["Sour and soft", "Sweet and crunchy", "Bitter and hard", "Salty and chewy"], "an": 0}], "vocab": [{"w": "wonderful", "d": "very good or pleasant"}]}, {"id": "KS5", "title": "Bedtime", "text": "The sun goes down.\nThe stars come out.\nMom reads me a story.\nI brush my teeth.\nI get into my soft bed.\nMom gives me a hug.\nI close my eyes and dream.", "qs": [{"q": "What comes out when the sun goes down?", "ch": ["The moon only", "Clouds", "Stars", "Rain"], "an": 2}, {"q": "What does Mom do at bedtime?", "ch": ["Makes dinner", "Reads a story", "Watches TV", "Plays outside"], "an": 1}, {"q": "What does the child do in bed?", "ch": ["Plays games", "Cries", "Closes eyes and dreams", "Reads a book"], "an": 2}], "vocab": [{"w": "dream", "d": "pictures and stories your mind makes while you sleep"}]}, {"id": "KS6", "title": "The Garden", "text": "Grandma has a garden.\nShe grows tomatoes and carrots.\nEvery morning she waters the plants.\nThe sun helps them grow big and strong.\nWe eat the vegetables for dinner.\nThey taste so good!", "qs": [{"q": "Whose garden is it?", "ch": ["Mom's", "Dad's", "Grandma's", "The neighbor's"], "an": 2}, {"q": "What does Grandma do every morning?", "ch": ["Plants seeds", "Waters the plants", "Picks vegetables", "Digs the soil"], "an": 1}, {"q": "When do they eat the vegetables?", "ch": ["For breakfast", "For lunch", "For dinner", "For a snack"], "an": 2}], "vocab": [{"w": "vegetables", "d": "plants that people grow and eat as food"}]}, {"id": "KS7", "title": "The Snowman", "text": "Jake and his sister went outside.\nThere was snow everywhere!\nThey rolled three big snowballs.\nThey stacked them up high.\nThey put a carrot for a nose.\nTwo buttons for eyes.\nJake put his scarf around the snowman.\n'Hello, Snowman!' said Jake.", "qs": [{"q": "How many snowballs did they roll?", "ch": ["One", "Two", "Three", "Four"], "an": 2}, {"q": "What did they use for the snowman's nose?", "ch": ["A stick", "A carrot", "A rock", "A button"], "an": 1}, {"q": "What did Jake put around the snowman?", "ch": ["A hat", "His coat", "His scarf", "A bow"], "an": 2}], "vocab": [{"w": "stacked", "d": "placed one on top of another"}]}, {"id": "KS8", "title": "The Farm Visit", "text": "Our class went to a farm.\nWe saw cows, pigs, and chickens.\nA cow said moo!\nA pig rolled in the mud.\nI fed a carrot to a horse.\nThe horse had a big soft nose.\nFarm animals are so interesting!", "qs": [{"q": "Where did the class go?", "ch": ["A park", "A zoo", "A farm", "A beach"], "an": 2}, {"q": "What did the child feed the horse?", "ch": ["An apple", "A carrot", "Hay", "Corn"], "an": 1}, {"q": "What did the pig do?", "ch": ["Made noise", "Rolled in mud", "Ate hay", "Ran away"], "an": 1}], "vocab": [{"w": "interesting", "d": "making you want to know more about something"}]}, {"id": "KS9", "title": "Lost Tooth", "text": "Maya had a wiggly tooth.\nShe wiggled it every day.\nOne day, it fell out!\nShe put it under her pillow.\nIn the morning, the tooth was gone.\nInstead there was a shiny coin!\nMaya smiled her big gap smile.", "qs": [{"q": "What happened to Maya's tooth?", "ch": ["She pulled it out", "It fell out", "The dentist took it", "She lost it"], "an": 1}, {"q": "Where did Maya put her tooth?", "ch": ["In a box", "In her pocket", "Under her pillow", "On her desk"], "an": 2}, {"q": "What did Maya find in the morning?", "ch": ["Another tooth", "A toy", "A shiny coin", "A note"], "an": 2}], "vocab": [{"w": "wiggly", "d": "moving back and forth, not staying still"}]}, {"id": "KS10", "title": "The Big Race", "cat": "Sports", "text": "Jake wanted to run in the school race.\nHe practiced every morning.\nHe ran around the yard three times.\nOn race day his legs felt fast.\nThe whistle blew and }, {"q": "What shape did the Big Dipper look like?", "ch": ["A star", "A moon", "A spoon", "A bucket"], "an": 2}, {"q": "What did the child wish for?", "ch": ["A toy", "A pet", "To see a rocket", "To look at stars every night"], "an": 3}], "vocab": [{"w": "shooting star", "d": "a bright streak of light that moves fast across the sky"}]}, {"id": "KS13", "title": "The Little Drummer", "cat": "Music", "text": "Maya found two sticks in the yard.\nShe tapped them on the porch.\nTap tap tap!\nShe tapped on a pot.\nBoom boom boom!\nShe tapped on a bucket.\nDong dong dong!\nEach thing made a different sound.\nMom came outside.\n'You are a drummer!' said Mom.\nMaya smiled and kept playing.", "qs": [{"q": "What did Maya use to make music?", "ch": ["A piano", "Two sticks", "A drum", "A guitar"], "an": 1}, {"q": "Why did each thing sound different?", "ch": ["Maya hit them differently", "They were made of different materials", "Maya moved around", "They were the same"], "an": 1}, {"q": "What did Mom call Maya?", "ch": ["A dancer", "A singer", "A drummer", "A musician"], "an": 2}], "vocab": [{"w": "sound", "d": "something you hear; what music is made of"}]}], "1": [{"id": "1S1", "title": "The New Puppy", "text": "Lily got a new puppy for her birthday.\nThe puppy was small and fuzzy.\nShe named him Biscuit because he was golden brown.\nBiscuit loved to chew on shoes and socks.\nLily had to hide all her shoes under the bed.\nEvery night, Biscuit slept next to Lily's feet.\nLily loved her new puppy very much.", "qs": [{"q": "Why did Lily get a puppy?", "ch": ["For Christmas", "For her birthday", "She found it", "Her friend gave it"], "an": 1}, {"q": "Why did Lily name the puppy Biscuit?", "ch": ["He liked biscuits", "He was golden brown", "He was small", "He was fuzzy"], "an": 1}, {"q": "What did Biscuit like to chew?", "ch": ["Bones and toys", "Pillows and blankets", "Shoes and socks", "Books and papers"], "an": 2}, {"q": "Where did Lily put her shoes to keep them safe?", "ch": ["In the closet", "On a high shelf", "Under the bed", "In a box"], "an": 2}], "vocab": [{"w": "fuzzy", "d": "covered with soft, fine hair"}, {"w": "golden", "d": "bright yellow color like gold"}]}, {"id": "1S2", "title": "The Lost Kite", "text": "Marcus flew his kite at the park on a windy day.\nThe kite was blue with a long yellow tail.\nSuddenly a strong gust of wind came.\nThe string snapped and the kite flew away!\nMarcus ran after it but couldn't catch it.\nHe felt sad and sat on a bench.\nThen he saw the kite stuck in a tree nearby.\nHe climbed up carefully and got it back.\nMarcus smiled and flew his kite again.", "qs": [{"q": "What color was Marcus's kite?", "ch": ["Red with green tail", "Blue with yellow tail", "Yellow with blue tail", "Green with red tail"], "an": 1}, {"q": "Why did the kite fly away?", "ch": ["Marcus let go", "A bird grabbed it", "The string snapped", "It got too high"], "an": 2}, {"q": "Where did Marcus find his kite?", "ch": ["In a pond", "On a roof", "Stuck in a tree", "Behind a bench"], "an": 2}, {"q": "How did Marcus get his kite back?", "ch": ["He used a stick", "He asked for help", "He climbed the tree", "He waited for it to fall"], "an": 2}], "vocab": [{"w": "gust", "d": "a sudden strong rush of wind"}, {"w": "snapped", "d": "broke suddenly with a sharp sound"}]}, {"id": "1S3", "title": "Making Pancakes", "text": "On Saturday mornings, Dad and I make pancakes together.\nFirst, we mix flour, eggs, and milk in a big bowl.\nDad lets me stir the batter until it is smooth.\nThen he pours circles of batter onto the hot pan.\nWe wait for bubbles to appear on top.\nThen Dad flips them over.\nWe top them with butter and maple syrup.\nMaking breakfast together is my favorite thing to do.", "qs": [{"q": "When do they make pancakes?", "ch": ["Every morning", "On Sunday", "On Saturday mornings", "After school"], "an": 2}, {"q": "What is the child's job?", "ch": ["Pouring the batter", "Stirring the batter", "Flipping the pancakes", "Getting the plates"], "an": 1}, {"q": "How do you know the pancakes are ready to flip?", "ch": ["They turn brown", "Bubbles appear on top", "They smell good", "They shrink"], "an": 1}, {"q": "What do they put on top of their pancakes?", "ch": ["Jam and honey", "Fruit and cream", "Butter and maple syrup", "Sugar and cinnamon"], "an": 2}], "vocab": [{"w": "batter", "d": "a liquid mixture used for making pancakes or cakes"}, {"w": "smooth", "d": "having no lumps or bumps"}]}, {"id": "1S4", "title": "The Sunflower Seed", "text": "Elena planted a sunflower seed in a paper cup.\nShe put the cup on a sunny windowsill.\nEvery day she gave it a little water.\nAfter a week, a tiny green shoot appeared.\nBy summer, the sunflower was taller than Elena!\nIt had a big golden face that turned to follow the sun.\nElena's teacher said sunflowers do this to get as much sunlight as possible.\nElena felt proud that she had grown something so beautiful.", "qs": [{"q": "Where did Elena put the cup with the seed?", "ch": ["In the garage", "Outside in the garden", "On a sunny windowsill", "In the basement"], "an": 2}, {"q": "What appeared after one week?", "ch": ["A flower", "A tiny green shoot", "A full-grown plant", "Nothing"], "an": 1}, {"q": "Why do sunflowers turn to follow the sun?", "ch": ["They are bored", "To get as much sunlight as possible", "To see who is watching", "It's random"], "an": 1}, {"q": "How did Elena feel about her sunflower?", "ch": ["Disappointed", "Confused", "Scared", "Proud"], "an": 3}], "vocab": [{"w": "windowsill", "d": "the shelf at the bottom of a window"}, {"w": "shoot", "d": "a new stem or bud growing from a plant"}]}, {"id": "1S5", "title": "The Secret Club", "text": "Sam and his neighbor Priya made a secret club.\nThey used a big cardboard box for their clubhouse.\nThey made a password: 'banana sunshine.'\nThey wrote their own rules on a piece of paper.\nRule one: be kind.\nRule two: share snacks.\nRule three: no adults allowed.\nEvery afternoon they met to draw comics and tell stories.\nOne rainy day, they invited Sam's little brother.\nHe was only four, but he was very funny.\nThey changed rule three: no grumpy people allowed.", "qs": [{"q": "What did Sam and Priya use for their clubhouse?", "ch": ["A tent", "A treehouse", "A big cardboard box", "Their garage"], "an": 2}, {"q": "What was the secret password?", "ch": ["Secret friends", "Banana sunshine", "Magic club", "Sunshine banana"], "an": 1}, {"q": "Why did they change rule three?", "ch": ["Adults complained", "Sam's brother was too loud", "Sam's brother was funny and they liked him", "Rules don't matter"], "an": 2}, {"q": "What did they do at the club every afternoon?", "ch": ["Play video games", "Draw comics and tell stories", "Do homework", "Watch movies"], "an": 1}], "vocab": [{"w": "password", "d": "a secret word or phrase needed to enter a group"}, {"w": "grumpy", "d": "easily annoyed or bad-tempered"}]}, {"id": "1S6", "title": "Ocean Creatures", "text": "The ocean is home to amazing creatures.\nJellyfish float gently and have long, trailing arms called tentacles.\nOctopuses can change color to blend into rocks and sand.\nSea turtles swim thousands of miles across the ocean every year.\nThe blue whale is the largest animal that has ever lived on Earth.\nIt is bigger than any dinosaur!\nEven its heart is as big as a small car.\nScientists are still discovering new creatures in the deep sea every year.\nThe ocean is like a world we have not fully explored.", "qs": [{"q": "What do jellyfish have that trail behind them?", "ch": ["Fins", "Wings", "Tentacles", "Tails"], "an": 2}, {"q": "Why do octopuses change color?", "ch": ["To show emotions", "To communicate", "To blend into rocks and sand", "To attract food"], "an": 2}, {"q": "How does the blue whale compare to dinosaurs?", "ch": ["It is smaller", "It is the same size", "It is bigger than any dinosaur", "Scientists don't know"], "an": 2}, {"q": "What does the author mean by 'a world we have not fully explored'?", "ch": ["The ocean is dangerous", "Much of the ocean is still unknown to us", "The ocean is boring", "No one studies the ocean"], "an": 1}], "vocab": [{"w": "tentacles", "d": "long flexible body parts used for grabbing or stinging"}, {"w": "exploring", "d": "traveling to discover new or unknown places"}]}, {"id": "1S7", "title": "LeBron's First Basketball", "cat": "Sports", "text": "When LeBron James was a young boy in Akron, Ohio, his family did not have much money.\nHe did not have a basketball of his own.\nBut he practiced with whatever he could find.\nHe shot crumpled paper into trash cans.\nHe bounced a tennis ball off walls.\nHis school coach noticed how hard he worked.\nThe coach gave him his first real basketball.\nLeBron practiced every single day, even in the rain.\nHe always believed that hard work was more important than talent alone.\nToday LeBron James is one of the greatest basketball players who ever lived.\nBut he will tell you: it started with that one basketball and a whole lot of practice.", "qs": [{"q": "Where did LeBron James grow up?", "ch": ["Los Angeles", "Chicago", "Akron Ohio", "New York"], "an": 2}, {"q": "How did LeBron practice before he had a basketball?", "ch": ["He watched games on TV", "He shot paper into trash cans", "He played video games", "He read books about basketball"], "an": 1}, {"q": "Who gave LeBron his first real basketball?", "ch": ["His mom", "A famous player", "His school coach", "His best friend"], "an": 2}, {"q": "What does LeBron believe is more important than talent?", "ch": ["Being tall", "Having good shoes", "Hard work", "Natural ability"], "an": 2}], "vocab": [{"w": "talent", "d": "a natural ability to do something well"}, {"w": "practice", "d": "to do something over and over to improve"}]}, {"id": "1S8", "title": "The Magic Library Book", "cat": "Fantasy", "text": "Zara found a dusty book on the bottom shelf of the library.\nThe cover was purple with gold stars.\nWhen she opened it, the words glowed faintly.\nShe read the first line: 'To travel far, just read with your heart.'\nSuddenly the library disappeared.\nShe was standing on a beach with pink sand and three moons in the sky!\nA small creature with wings landed on her shoulder.\n'Welcome,' it said. 'We have been waiting for the Reader.'\nZara looked around, amazed.\nShe closed the book with a snap and was back in the library.\nThe librarian looked up. 'Good book?' she asked.\n'The best,' said Zara. 'I'll be back tomorrow.'", "qs": [{"q": "What was unusual about the book Zara found?", "ch": ["It was very long", "The words glowed", "It had no pictures", "It was too heavy"], "an": 1}, {"q": "What happened when Zara read the first line?", "ch": ["She fell asleep", "The book fell apart", "She was transported to another world", "The lights went out"], "an": 2}, {"q": "What made the beach different from a normal beach?", "ch": ["It had no water", "It had pink sand and three moons", "It was inside a cave", "It was very cold"], "an": 1}, {"q": "What does the creature say that suggests Zara is special?", "ch": ["It asks for help", "It says she is lost", "It says they have been waiting for the Reader", "It tries to take her book"], "an": 2}], "vocab": [{"w": "glowed", "d": "gave off a soft, steady light"}, {"w": "amazed", "d": "feeling great surprise and wonder"}]}, {"id": "1S9", "title": "A Visit to the Space Museum", "cat": "Space", "text": "Our class went to the space museum on a field trip.\nThe first room had a real moon rock behind glass.\nIt was grey and bumpy and billions of years old.\nIn the next room we sat inside a pretend space shuttle.\nThe lights flashed and the floor shook a little to feel like a real launch.\nI gripped my seat!\nThen we watched a movie on a dome ceiling above us.\nStars and galaxies flew past as if we were really moving through space.\nAt the end I bought a postcard of the Milky Way.\nMy teacher said our sun is just one of 200 billion stars in our galaxy.\nI could not imagine a number that big.", "
