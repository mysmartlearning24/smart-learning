ce"], "an": 2}, {"q": "What word best describes the setting of this story?", "ch": ["Scary", "Magical", "Dangerous", "Boring"], "an": 1}], "vocab": [{"w": "enchanted", "d": "placed under a magical spell; full of magic"}, {"w": "honest", "d": "truthful and not deceitful"}]}, {"id": "2S7", "title": "Mae Jemison: First to the Stars", "cat": "Biography", "text": "Mae Jemison always had two great passions: science and dance.\nAs a child growing up in Chicago, she loved to read about space and dreamed of becoming an astronaut.\nBut in the 1960s and 70s, she had never seen an astronaut who looked like her.\nShe refused to let that stop her.\nShe studied hard, became a doctor, and then applied to NASA.\nAt first she was turned down.\nShe applied again.\nIn 1992, Mae Jemison became the first African American woman to travel to space.\nAbove Earth, she carried a photo of Bessie Coleman — the first African American woman to fly a plane — as a tribute.\nShe also brought a West African art statue to represent all cultures.\nAfter leaving NASA, Dr. Jemison started a program to inspire children of all backgrounds to love science.\n'Don't let anyone rob you of your imagination,' she says.", "qs": [{"q": "What were Mae's two great passions?", "ch": ["Math and music", "Science and dance", "Reading and sports", "Art and cooking"], "an": 1}, {"q": "What obstacle did Mae face that could have stopped her dreams?", "ch": ["She was afraid of flying", "She failed her exams", "She never saw astronauts who looked like her", "She didn't like science"], "an": 2}, {"q": "What did Mae bring to space as a tribute?", "ch": ["A flag", "A letter from the President", "A photo of Bessie Coleman", "Her dance costume"], "an": 2}, {"q": "What message does Mae give to children?", "ch": ["Science is only for certain people", "Don't let anyone rob you of your imagination", "Space travel is too dangerous", "Always follow the rules"], "an": 1}], "vocab": [{"w": "tribute", "d": "something done to honor or show respect for someone"}, {"w": "inspire", "d": "to fill someone with the desire to do something great"}]}, {"id": "2S8", "title": "How Volcanoes Work", "cat": "Science", "text": "Deep inside the Earth it is incredibly hot — so hot that rock melts into a liquid called magma.\nMagma collects in underground chambers, and when pressure builds up, it forces its way to the surface through cracks in the Earth's crust.\nWhen magma reaches the surface, it is called lava.\nLava can flow like a slow river, cooling and hardening into new rock.\nSome volcanoes erupt explosively, shooting ash and gases high into the atmosphere.\nThe largest volcanic eruption in modern history happened in 1815 in Indonesia.\nIt shot so much ash into the sky that the following year was called 'The Year Without a Summer' — temperatures worldwide dropped and crops failed.\nYet volcanoes also create new land.\nThe Hawaiian Islands were formed entirely by volcanic eruptions on the ocean floor.\nVolcanoes remind us that the Earth is always changing beneath our feet.", "qs": [{"q": "What is magma?", "ch": ["A type of gas", "Melted rock beneath the Earth's surface", "Frozen lava", "A kind of mineral"], "an": 1}, {"q": "What is lava?", "ch": ["Underground melted rock", "Magma that reaches the Earth's surface", "A type of earthquake", "Hot gas"], "an": 1}, {"q": "What happened after the 1815 volcanic eruption?", "ch": ["New islands formed", "The world got hotter", "The next year was called the Year Without a Summer", "Nothing unusual happened"], "an": 2}, {"q": "How were the Hawaiian Islands formed?", "ch": ["By earthquakes", "By meteor impacts", "By volcanic eruptions under the ocean", "By wind and rain over millions of years"], "an": 2}, {"q": "What is the main message of the last sentence?", "ch": ["Volcanoes are dangerous", "The Earth is always changing", "We should avoid volcanoes", "Lava destroys everything"], "an": 1}], "vocab": [{"w": "magma", "d": "melted rock found beneath the Earth's surface"}, {"w": "erupt", "d": "to burst out suddenly with great force"}]}, {"id": "2S9", "title": "Amelia's Robot", "cat": "Technology", "text": "Amelia built her first robot when she was eight years old.\nIt was made from cardboard, rubber bands, and her dad's old flashlight.\nThe robot could not walk or talk.\nBut it had a claw that opened and closed.\nAmelia used it to pick up her socks from the floor.\n'This is the most useful invention I have ever seen,' said Dad.\nAmelia laughed. 'It is just the beginning,' she said.\nShe started reading books about engineering and coding.\nShe learned that real robots have sensors that help them feel, cameras that help them see, and computers for brains.\nBy the time she was twelve, Amelia had entered three robotics competitions.\nHer school team won second place at the state level.\nAmelia already knew what she wanted to be: a robotics engineer.\nShe had known it since the day her cardboard robot picked up those socks.", "qs": [{"q": "What was Amelia's first robot made from?", "ch": ["Metal and wires", "Plastic and circuits", "Cardboard, rubber bands, and a flashlight", "Wood and nails"], "an": 2}, {"q": "What could the robot do?", "ch": ["Walk and talk", "Pick things up with a claw", "Solve math problems", "Fly"], "an": 1}, {"q": "What three things do real robots have, according to the story?", "ch": ["Arms, legs, and heads", "Sensors, cameras, and computers", "Wheels, wings, and claws", "Eyes, ears, and mouths"], "an": 1}, {"q": "What does Amelia want to be when she grows up?", "ch": ["A teacher", "A scientist", "A robotics engineer", "A programmer"], "an": 2}], "vocab": [{"w": "engineering", "d": "using math and science to design and build things"}, {"w": "sensor", "d": "a device that detects something in its environment"}]}, {"id": "2S10", "title": "The Midnight Garden", "cat": "Fantasy", "text": "Every night at exactly midnight, the garden behind the old house came alive.\nFlowers that were closed all day opened their petals to reveal tiny lights inside, like candles.\nThe stone fountain began to play music — gentle notes that floated through the dark.\nMia discovered the garden by accident when she couldn't sleep one night.\nShe pressed her nose against the cold glass and gasped.\nShe crept outside in her socks.\nA moth with wings like stained glass landed on her hand.\n'Do you come every night?' Mia asked it.\nThe moth vibrated its wings — once for yes, twice for no.\nIt vibrated once.\n'Then I will too,' Mia whispered.\nAnd she did — it became their secret, shared between a girl and a moth and a garden that only lived after dark.", "qs": [{"q": "When did the garden come alive?", "ch": ["At sunrise", "At noon", "At midnight", "After rain"], "an": 2}, {"q": "How did Mia discover the garden?", "ch": ["Her mom told her", "She couldn't sleep and looked out the window", "She found a map", "A neighbor showed her"], "an": 1}, {"q": "How does the moth communicate?", "ch": ["It speaks", "It writes in the air", "It vibrates its wings", "It moves in circles"], "an": 2}, {"q": "What does the story suggest about Mia's character?", "ch": ["She is afraid of new things", "She is curious and open to wonder", "She does not like being outside", "She tells everyone her secrets"], "an": 1}], "vocab": [{"w": "vibrate", "d": "to move back and forth very quickly"}, {"w": "whispered", "d": "spoke very softly so only someone close could hear"}]}], "3": [{"id": "3S1", "title": "The Monarch Butterfly Migration", "text": "Every autumn, something incredible happens in North America.\nMillions of monarch butterflies begin an extraordinary journey.\nThese delicate orange and black insects travel over 3,000 miles from Canada all the way to the mountains of central Mexico.\nWhat makes this migration so remarkable is that no single butterfly makes the trip twice.\nThe butterflies that return north in spring are the great-grandchildren of those that flew south the previous fall.\nScientists still wonder how the butterflies know exactly where to go.\nThey appear to use the sun as a compass and have a chemical clock that adjusts for the time of day.\nWhen they finally arrive in Mexico, millions of butterflies cover the trees like a living blanket of orange.\nThe trees themselves seem to glow with warmth.\nSadly, monarch populations have dropped by more than 80 percent in recent decades.\nHabitat loss and climate change are the main causes.\nMany schools and communities are now planting milkweed, the only plant monarchs use to lay their eggs, to help the butterflies survive.", "qs": [{"q": "How far do monarch butterflies travel each year?", "ch": ["1,000 miles", "Over 3,000 miles", "500 miles", "10,000 miles"], "an": 1}, {"q": "What is remarkable about the migration?", "ch": ["It happens in spring", "No butterfly makes the trip twice", "The butterflies travel by night", "They fly over the ocean"], "an": 1}, {"q": "How do butterflies seem to navigate their journey?", "ch": ["They follow rivers", "They use the sun as a compass", "Older butterflies lead them", "They follow the wind"], "an": 1}, {"q": "Why have monarch populations declined?", "ch": ["Predators eat them", "Habitat loss and climate change", "Cold winters", "Disease"], "an": 1}, {"q": "How are communities helping monarchs?", "ch": ["Building butterfly houses", "Planting milkweed", "Capturing and releasing them", "Creating butterfly museums"], "an": 1}], "vocab": [{"w": "migration", "d": "the seasonal movement of animals from one place to another"}, {"w": "remarkable", "d": "extraordinary; worthy of being noticed"}]}, {"id": "3S2", "title": "Thomas Edison's Failures", "text": "Thomas Edison is remembered as one of the greatest inventors in history.\nHe invented the light bulb, the phonograph, and made movies possible.\nBut what most people don't know is how many times he failed before he succeeded.\nWhen Edison was working on the light bulb, he tried over 1,000 different materials for the filament—the thin wire inside the bulb that glows.\nA reporter once asked him, 'How did it feel to fail 1,000 times?'\nEdison replied, 'I didn't fail 1,000 times. The light bulb was an invention with 1,000 steps.'\nEdison believed that every failed attempt taught him something valuable.\nHe kept detailed notebooks recording every experiment, including the ones that didn't work.\nHe once said, 'Genius is one percent inspiration and ninety-nine percent perspiration.'\nThis means that great ideas require mostly hard work, not just brilliant thinking.\nEdison's attitude toward failure is one reason he was able to change the world.", "qs": [{"q": "How many materials did Edison try for the light bulb filament?", "ch": ["100", "500", "Over 1,000", "Exactly 1,000"], "an": 2}, {"q": "How did Edison describe his 1,000 attempts?", "ch": ["As 1,000 failures", "As 1,000 mistakes", "As 1,000 steps toward the invention", "As a waste of time"], "an": 2}, {"q": "What does Edison's quote about genius mean?", "ch": ["Smart people don't need to work hard", "Great ideas require mostly hard work", "Inspiration is more important than effort", "All inventors are born geniuses"], "an": 1}, {"q": "What did Edison record in his notebooks?", "ch": ["Only successful experiments", "Every experiment, including failures", "His daily schedule", "Letters to other inventors"], "an": 1}], "vocab": [{"w": "filament", "d": "a thin thread or wire, especially one that glows inside a light bulb"}, {"w": "perspiration", "d": "sweat; also used to mean hard work and effort"}]}, {"id": "3S3", "title": "The Gold Rush", "text": "In January 1848, a carpenter named James Marshall was building a sawmill on the American River in California.\nWhile checking the water channel, he noticed something glittering on the riverbed.\nIt was gold.\nAlthough Marshall and his employer, John Sutter, tried to keep the discovery secret, word spread quickly.\nBy 1849, people from all over the world were streaming into California, hoping to strike it rich.\nThese fortune-seekers were called the 'forty-niners,' named for the year most of them arrived.\nThey came from the eastern United States, from Europe, from China, and from Latin America.\nCalifornia's population exploded from about 14,000 in 1848 to 100,000 by the end of 1849.\nThe gold rush transformed San Francisco from a small village to a booming city almost overnight.\nMost miners did not become rich.\nThe gold was difficult to find and the conditions were brutal—long hours, cold water, and intense competition.\nInterestingly, the people who made the most reliable fortunes were merchants who sold supplies to the miners.\nLevi Strauss, for example, came to California to sell canvas for tents.\nWhen he noticed miners needed durable pants, he made work pants reinforced with metal rivets.\nThis invention became known as blue jeans—still worn by millions of people today.", "qs": [{"q": "What did James Marshall discover?", "ch": ["Silver", "Gold", "Diamonds", "A new river"], "an": 1}, {"q": "Why were fortune-seekers called 'forty-niners'?", "ch": ["There were 49 of them", "They paid $49 to enter", "Most arrived in 1849", "Gold was found 49 feet deep"], "an": 2}, {"q": "Who actually made the most reliable money during the gold rush?", "ch": ["The most experienced miners", "Lucky beginners", "Merchants who sold supplies", "Gold rush guides"], "an": 2}, {"q": "How did Levi Strauss become successful?", "ch": ["He found the most gold", "He made durable work pants for miners", "He owned the sawmill", "He ran a successful hotel"], "an": 1}, {"q": "How did the gold rush affect California's population?", "ch": ["It decreased slightly", "It stayed the same", "It grew from 14,000 to 100,000 in one year", "It doubled every month"], "an": 2}], "vocab": [{"w": "fortune", "d": "a large amount of money or wealth"}, {"w": "durable", "d": "strong and able to last a long time without breaking"}]}, {"id": "3S4", "title": "Michael Jordan: Cut from the Team", "cat": "Sports Biography", "text": "In 1978, a fifteen-year-old boy named Michael Jordan tried out for his high school varsity basketball team in Wilmington, North Carolina.\nHe was cut.\nThe coaches felt he was not good enough.\nMichael was devastated.\nHe went home and cried in his room.\nBut the next day he got up and started practicing.\nHe practiced for hours every single day.\nHe focused on speed, skill, and mental toughness.\nBy his senior year, he was so remarkable that colleges recruited him eagerly.\nHe went on to play for the University of North Carolina and eventually became a Chicago Bull.\nMichael Jordan won six NBA championships, five MVP awards, and is widely considered the greatest basketball player of all time.\nWhen asked about being cut from his high school team, Jordan said it was the best thing that ever happened to him — it ignited a fire that never went out.", "qs": [{"q": "Why was Michael Jordan cut from the varsity team?", "ch": ["He was too old", "The coaches felt he wasn't good enough", "He missed tryouts", "He refused to practice"], "an": 1}, {"q": "What did Michael do the day after being cut?", "ch": ["He quit basketball", "He transferred to another school", "He got up and started practicing", "He complained to the coach"], "an": 2}, {"q": "How many NBA championships did Jordan win?", "ch": ["Three", "Four", "Five", "Six"], "an": 3}, {"q": "What does Jordan say about being cut from the team?", "ch": ["It was the worst thing ever", "It made him want to quit", "It ignited a fire that never went out", "It was unfair"], "an": 2}, {"q": "What is the main theme of this story?", "ch": ["Natural talent is all you need", "Rejection can motivate you to work harder", "High school coaches are always wrong", "Basketball is the best sport"], "an": 1}], "vocab": [{"w": "devastated", "d": "overwhelmed by grief or disappointment"}, {"w": "recruited", "d": "sought out and invited to join a team or organization"}]}, {"id": "3S5", "title": "The Last Dragon", "cat": "Fantasy", "text": "The last dragon in the world lived in a cave on the top of Mount Vereth.\nHer name was Ash, and she was very old and very lonely.\nShe hadn't seen another dragon in three hundred years.\nOne morning a girl named Petra climbed the mountain.\nShe carried no weapon, only a satchel of bread and cheese.\n'I heard you were lonely,' Petra said.\n'Who told you that?' growled Ash, and smoke curled from her nostrils.\n'Everyone in the valley. They can see your flame every night — they think it looks like you are searching for something.'\nAsh was quiet for a long time.\n'I am,' she said at last. 'I am searching for someone to remember me when I am gone. Dragons carry the memory of the world inside their scales.'\n'Then tell me everything,' said Petra, sitting down on a rock.\nAnd the last dragon began to speak.", "qs": [{"q": "Why was Ash lonely?", "ch": ["Her cave was too small", "She hadn't seen another dragon in 300 years", "She couldn't fly anymore", "Humans were afraid of her"], "an": 1}, {"q": "Why did Petra carry no weapon?", "ch": ["She forgot it", "Weapons weren't allowed", "She came in peace", "She didn't own one"], "an": 2}, {"q": "What do people in the valley think Ash's flame means?", "ch": ["She is angry", "She is sending signals", "She is searching for something", "She is showing off"], "an": 2}, {"q": "What does Ash say dragons carry inside their scales?", "ch": ["Fire", "Magic", "The memory of the world", "Ancient treasure"], "an": 2}, {"q": "What do you think will happen next in the story?", "ch": ["Ash will chase Petra away", "Ash will tell Petra about the world's history", "Petra will try to steal from Ash", "Ash will fly away"], "an": 1}], "vocab": [{"w": "satchel", "d": "a bag carried over the shoulder"}, {"w": "loneliness", "d": "the feeling of being alone and sad about it"}]}, {"id": "3S6", "title": "How the Internet Works", "cat": "Technology", "text": "When you search for something online, it feels like magic.\nBut the internet is really a huge web of computers connected by cables and wireless signals.\nWhen you send a message, your computer breaks it into tiny pieces called packets.\nThese packets travel across the internet through different paths.\nWhen they arrive, they are put back together in the right order.\nThink of it like sending a puzzle through the mail, one piece at a time.\nEvery device on the internet has its own address called an IP address.\nIt works like a home address but for computers.\nA scientist named Tim Berners-Lee invented the World Wide Web in 1989.\nThe web is what lets us visit websites and share information.\nThe internet is the network of computers.\nThe web is just one way to use it.\nToday more than five billion people use the internet every day.", "qs": [{"q": "What are packets in terms of the internet?", "ch": ["Small computers", "Tiny pieces of information that travel across the internet", "Special wires that carry data", "A type of wireless signal"], "an": 1}, {"q": "What does an IP address do?", "ch": ["Speeds up the internet", "Protects your computer", "Acts like a home address for your device", "Stores your passwords"], "an": 2}, {"q": "Who invented the World Wide Web?", "ch": ["Steve Jobs", "Bill Gates", "Tim Berners-Lee", "Albert Einstein"], "an": 2}, {"q": "What is the difference between the internet and the web?", "ch": ["They are the same thing", "The internet is the network; the web is one way to use it", "The web is faster than the internet", "The internet is newer"], "an": 1}], "vocab": [{"w": "network", "d": "a system of connected computers or devices"}, {"w": "protocol", "d": "a set of rules for how something is done"}]}, {"id": "3S7", "title": "The Bermuda Triangle Mystery", "cat": "Mystery & Science", "text": "In the Atlantic Ocean, there is a stretch of water between Miami, Bermuda, and Puerto Rico.\nPeople call it the Bermuda Triangle.\nOver the years, some ships and planes have disappeared there.\nThe most famous case was in 1945. Five Navy planes called Flight 19 took off from Florida and were never found.\nFor a long time, people blamed mysterious forces — sea monsters, aliens, or even underwater whirlpools.\nBut scientists looked at the facts carefully.\nThey found that the Bermuda Triangle does not have more accidents than other busy parts of the ocean.\nThe US Coast Guard does not even mark it as a danger zone.\nExperts say that bad storms, strong ocean currents, and human error can explain most of what happened.\nThe real lesson of the Bermuda Triangle is this: scary stories spread faster than boring facts.\nBut good thinking means asking for proof before believing something mysterious.", "qs": [{"q": "Where is the Bermuda Triangle located?", "ch": ["Pacific Ocean", "Between Miami, Bermuda, and Puerto Rico", "Near Iceland", "In the Indian Ocean"], "an": 1}, {"q": "What happened to Flight 19 in 1945?", "ch": ["It landed safely", "It was found years later", "Five Navy bombers disappeared without trace", "The pilots survived"], "an": 2}, {"q": "What do modern scientists conclude about the Bermuda Triangle?", "ch": ["It has magical properties", "Aliens are responsible", "It doesn't have more disappearances than other ocean areas", "It is extremely dangerous"], "an": 2}, {"q": "What does the last sentence teach us?", "ch": ["Mysteries are always unsolvable", "Evidence and facts are more important than exciting stories", "We should avoid the ocean", "Scientists are always right"], "an": 1}], "vocab": [{"w": "supernatural", "d": "unable to be explained by natural causes; beyond science"}, {"w": "debris", "d": "scattered pieces of wreckage or waste"}]}, {"id": "3S8", "title": "The Art of Frida Kahlo", "cat": "Arts & Biography", "text": "Frida Kahlo was born in Mexico City in 1907.\nWhen she was eighteen, a terrible bus accident left her badly injured, and she spent months recovering in a body cast.\nTo pass the time, she began to paint — first small self-portraits she could see in a mirror attached to her bed.\nShe painted her pain, her culture, her dreams, and her Mexican heritage.\nHer work was unusual for the time: bold, colorful, and deeply personal.\nShe painted monkeys, hummingbirds, and images from indigenous Mexican traditions.\nThe famous surrealist artist André Breton called her work 'a ribbon around a bomb.'\nFrida once said, 'I never painted dreams. I painted my own reality.'\nShe exhibited in New York and Paris, becoming internationally famous before she died in 1954.\nToday she is considered one of the most important artists of the 20th century.\nHer face appears on the 500-peso Mexican banknote, and millions of people around the world find courage in her story.", "qs": [{"q": "What caused Frida Kahlo to start painting?", "ch": ["Her mother taught her", "She studied at art school", "A bus accident left her recovering with little to do", "She was inspired by Picasso"], "an": 2}, {"q": "What kinds of subjects did Frida paint?", "ch": ["Landscapes and seascapes", "Historical events", "Her pain, culture, dreams, and heritage", "Abstract shapes only"], "an": 2}, {"q": "What did Frida mean by 'I painted my own reality'?", "ch": ["She made everything up", "Her paintings showed her real feelings and experiences", "She only painted things she could see", "She painted photographs"], "an": 1}, {"q": "How is Frida Kahlo remembered today?", "ch": ["As a minor local artist", "As one of the most important artists of the 20th century", "As primarily a photographer", "As a writer"], "an": 1}], "vocab": [{"w": "heritage", "d": "the traditions and values passed down through generations"}, {"w": "indigenous", "d": "originally from a place; native to a region"}]}], "4": [{"id": "4S1", "title": "The Water Cycle", "text": "Water is one of the most important substances on Earth, and it is constantly on the move.\nThe water you drink today may have once been part of an ancient ocean, fallen as snow on a mountain, or been carried through the roots of a towering tree.\nThis continuous movement of water is called the water cycle.\nThe cycle begins when the sun heats water in oceans, lakes, and rivers.\nThis causes the water to evaporate, turning from a liquid into an invisible gas called water vapor.\nWater vapor rises into the atmosphere, where it cools and condenses into tiny droplets, forming clouds.\nThis process is called condensation.\nAs more water droplets join together, they become heavy and fall back to Earth as precipitation—rain, snow, sleet, or hail.\nWhen precipitation falls on land, some water soaks into the ground, some runs off into rivers and streams, and some is absorbed by plants.\nPlants release water vapor back into the air through a process called transpiration.\nThis completes the cycle and begins it again.\nThe water cycle is essential because it distributes fresh water around our planet and regulates temperature and weather patterns.\nWithout it, life on Earth could not exist.", "qs": [{"q": "What starts the water cycle?", "ch": ["Rain falling", "The moon's gravity", "The sun heating water", "Wind blowing"], "an": 2}, {"q": "What is evaporation?", "ch": ["Water turning to ice", "Liquid water turning to water vapor", "Water falling as rain", "Clouds forming"], "an": 1}, {"q": "What is condensation?", "ch": ["Water soaking into the ground", "Water vapor cooling and forming droplets", "Plants releasing water", "Rain hitting the ground"], "an": 1}, {"q": "What is transpiration?", "ch": ["Water evaporating from oceans", "Rain falling on plants", "Plants releasing water vapor", "Water soaking into soil"], "an": 2}, {"q": "Why is the water cycle essential?", "ch": ["It creates mountains", "It distributes fresh water and regulates weather", "It produces oxygen", "It shapes the oceans"], "an": 1}], "vocab": [{"w": "evaporate", "d": "to change from liquid to vapor, especially through heat"}, {"w": "precipitation", "d": "water that falls from clouds as rain, snow, sleet, or hail"}]}, {"id": "4S2", "title": "Harriet Tubman: The Conductor", "text": "Harriet Tubman was born into slavery around 1822 in Dorchester County, Maryland.\nShe endured brutal conditions throughout her childhood, including being hit on the head with a heavy metal weight, which caused her to have sudden sleeping spells for the rest of her life.\nIn 1849, fearing she would be sold and separated from her family, Tubman escaped to Philadelphia, traveling about 90 miles on foot.\nBut she did not feel free while her family remained enslaved.\nShe returned south 13 times over the next decade to rescue approximately 70 enslaved people, using the Underground Railroad—a secret network of safe houses and supporters.\nShe was known as Moses because, like the biblical figure, she led her people to freedom.\nTubman was so skilled that she was never caught and never lost a passenger.\nDuring the Civil War, she served as a spy for the Union Army, gathering intelligence behind enemy lines.\nShe was the first woman to lead an armed raid, freeing more than 700 enslaved people in South Carolina.\nIn her later years, she became active in the women's suffrage movement.\nHarriet Tubman once said, 'I never ran my train off the track and I never lost a passenger.'", "qs": [{"q": "Why did Harriet Tubman decide to escape in 1849?", "ch": ["She wanted adventure", "She feared being sold and separated from family", "Her master told her to go", "A friend invited her"], "an": 1}, {"q": "Why was Tubman called Moses?", "ch": ["That was her real name", "Like Moses, she led people to freedom", "She crossed a sea", "She wrote laws"], "an": 1}, {"q": "How many enslaved people did Tubman rescue on her 13 missions?", "ch": ["About 20", "About 700", "About 70", "Exactly 13"], "an": 2}, {"q": "What did Tubman do during the Civil War?", "ch": ["She fought on the front lines", "She served as a spy and led a raid", "She took care of wounded soldiers", "She stayed home"], "an": 1}, {"q": "What does Tubman's quote mean?", "ch": ["She was a real train conductor", "She never made a mistake or lost someone she was rescuing", "She always traveled by train", "She was always on time"], "an": 1}], "vocab": [{"w": "enslaved", "d": "forced to work as a slave, without freedom"}, {"w": "suffrage", "d": "the right to vote in political elections"}]}, {"id": "4S3", "title": "The Human Brain", "text": "The human brain is the most complex object known in the universe.\nIt contains about 86 billion neurons — tiny cells that send messages using electrical and chemical signals.\nEach neuron can connect with up to 10,000 others.\nThis creates more connections than any computer ever built.\nThe brain has three main parts.\nThe largest part is called the cerebrum.\nIt handles thinking, language, memory, and movement.\nIt is split into a left side and a right side, connected by a bundle of nerve fibers.\nThe cerebellum is the second part.\nIt controls balance and fine movement — like playing piano or catching a ball.\nThe brainstem is the third part.\nIt controls breathing, heart rate, and digestion automatically, without you thinking about it.\nOne amazing thing about the brain is that it can change.\nWhen you learn something new, your brain actually forms new connections.\nScientists call this neuroplasticity.\nThis means that the more you practice something, the better your brain gets at it.\nProfessional musicians have a larger cerebellum than most people because years of practice shaped their brains.\nYour brain keeps developing until about age 25.\nThe last part to finish growing handles decision-making and self-control.", "qs": [{"q": "Approximately how many neurons does the human brain contain?", "ch": ["86 million", "860 million", "86 billion", "860 billion"], "an": 2}, {"q": "What does the cerebellum control?", "ch": ["Thinking and language", "Balance, movement, and fine motor skills", "Breathing and heart rate", "Memory and emotions"], "an": 1}, {"q": "What does neuroplasticity mean?", "ch": ["The brain is made of plastic", "The brain can physically change and adapt", "The brain shrinks with age", "The brain stops growing at birth"], "an": 1}, {"q": "Why do professional musicians have a larger cerebellum?", "ch": ["They were born with larger brains", "Their brains grew in response to years of practice", "Music is processed in the cerebellum", "Scientists don't know why"], "an": 1}, {"q": "Which part of the brain is last to fully develop?", "ch": ["The cerebrum", "The brainstem", "The cerebellum", "The prefrontal cortex"], "an": 3}], "vocab": [{"w": "neurons", "d": "nerve cells that transmit signals throughout the brain and body"}, {"w": "neuroplasticity", "d": "the brain's ability to change and form new connections throughout life"}]}, {"id": "4S4", "title": "The Physics of Skateboarding", "cat": "Sports & Science", "text": "Skateboarding may look like pure rebellious fun, but it is secretly a physics lesson in motion.\nEvery trick a skater performs involves forces, energy, and momentum working together.\nWhen a skater pushes off the ground, they convert chemical energy from their muscles into kinetic energy — the energy of movement.\nThe ollie, skateboarding's most fundamental trick, seems to defy gravity.\nThe skater snaps the tail of the board against the ground, creating a sharp upward force.\nSimultaneously, their front foot slides forward and up along the board, leveling it mid-air.\nGravity then brings both skater and board down together.\nThe key insight is that the skater is not really jumping 'with' the board — they are using the board as a lever and the ground as a fulcrum.\nFriction also plays a crucial role: the rough grip tape on the board's surface creates the friction needed for the foot to control the board's direction.\nSkateboarding parks are built with curved walls called half-pipes that allow skaters to convert kinetic energy into potential energy (height) and back again.\nPhysics, it turns out, is everywhere — even at the skate park.", "qs": [{"q": "What type of energy does a skater create when pushing off the ground?", "ch": ["Potential energy", "Solar energy", "Kinetic energy", "Chemical energy"], "an": 2}, {"q": "What does grip tape do for the skateboarder?", "ch": ["Decorates the board", "Makes the board waterproof", "Creates friction for foot control", "Reduces weight"], "an": 2}, {"q": "What does a half-pipe allow a skater to do?", "ch": ["Perform faster spins", "Convert kinetic and potential energy back and forth", "Jump higher than anywhere else", "Practice ollies safely"], "an": 1}, {"q": "What is the main idea of this passage?", "ch": ["Skateboarding is dangerous and should be avoided", "Skateboarding tricks are impossible without special shoes", "Physics principles explain how skateboarding works", "Only scientists should try skateboarding"], "an": 2}], "vocab": [{"w": "kinetic energy", "d": "the energy of an object in motion"}, {"w": "momentum", "d": "the force of a moving object based on its mass and speed"}]}, {"id": "4S5", "title": "Malala's Pen", "cat": "Biography", "text": "Malala Yousafzai grew up in the Swat Valley of Pakistan, where she loved school with a passion that most children take for granted.\nIn 2009, the Taliban, a militant group, took control of her region and banned girls from attending school.\nMalala refused to be silent.\nShe began writing an anonymous blog for the BBC describing life under Taliban rule and her determination to keep learning.\nIn 2012, when she was fifteen, a Taliban gunman shot her on her school bus.\nThe bullet entered her head, but incredibly, she survived after extensive surgeries in Pakistan and the UK.\nMalala's recovery became a global story of resilience and courage.\nInstead of silencing her, the attack made her voice louder.\nShe established the Malala Fund to advocate for girls' education worldwide.\nIn 2014 at age seventeen, she became the youngest person ever to receive the Nobel Peace Prize.\nMalala says, 'One child, one teacher, one book, one pen can change the world.'\nFor Malala, education is not just a right — it is the most powerful weapon against injustice.", "qs": [{"q": "Why was Malala at risk?", "ch": ["She lived in a dangerous neighborhood", "The Taliban banned girls from school and she refused to be silent", "She was writing stories that offended people", "She was too outspoken at home"], "an": 1}, {"q": "How did Malala first resist the Taliban?", "ch": ["She organized protests", "She wrote an anonymous blog for the BBC", "She fled the country", "She started an underground school"], "an": 1}, {"q": "What did the attack do to Malala's voice and mission?", "ch": ["It silenced her permanently", "It made her afraid to speak", "It made her voice louder", "It changed her mind about education"], "an": 2}, {"q": "What record did Malala set in 2014?", "ch": ["First Pakistani to go to Oxford", "First girl to win a sports medal", "Youngest person to receive the Nobel Peace Prize", "First blogger to win an award"], "an": 2}, {"q": "What does Malala mean by education being a 'weapon against injustice'?", "ch": ["Schools should have security", "Education literally fights crime", "Knowledge gives people the power to stand up against unfairness", "Books can physically hurt people"], "an": 2}], "vocab": [{"w": "anonymous", "d": "done without identifying the author's name"}, {"w": "resilience", "d": "the ability to recover from difficulty"}]}, {"id": "4S6", "title": "The Secret of the Amber", "cat": "Science & Mystery", "text": "Scientists sometimes call amber 'windows into the past.'\nAmber is fossilized tree resin — a sticky substance that oozed from ancient trees millions of years ago.\nAs the resin flowed, it trapped insects, pollen, feathers, and even small animals inside.\nOver millions of years, the resin hardened into glowing golden stone.\nThe creatures inside were preserved with extraordinary detail.\nIn 2017, scientists discovered a piece of amber from Myanmar containing a dinosaur tail — complete with feathers — dating back 99 million years.\nThis find confirmed what scientists had long suspected: many dinosaurs had feathers, just like modern birds.\nIn another famous piece of amber, researchers found a 100-million-year-old insect so well preserved that they could see the individual hairs on its legs.\nAmber fossils have revealed ancient ecosystems that no other evidence could show.\nIn the movie Jurassic Park, scientists extract dinosaur DNA from a mosquito preserved in amber to clone dinosaurs.\nReal scientists say this is not possible — DNA breaks down too quickly over millions of years.\nBut the story captures something true: amber really does contain secrets from prehistoric worlds.", "qs": [{"q": "What is amber made from?", "ch": ["Melted rock", "Fossilized tree resin", "Ancient bones", "Compressed sand"], "an": 1}, {"q": "What was special about the 2017 discovery in Myanmar?", "ch": ["It contained a full dinosaur skeleton", "It was amber containing a dinosaur tail with feathers", "It was the oldest amber ever found", "It held a living creature"], "an": 1}, {"q": "What did the 2017 discovery confirm about dinosaurs?", "ch": ["They were all enormous", "They lived in trees", "Many dinosaurs had feathers like birds", "They could swim long distances"], "an": 2}, {"q": "Why can't scientists clone dinosaurs from amber as in Jurassic Park?", "ch": ["The amber is too hard to open", "DNA breaks down too quickly", "No one has tried yet", "Scientists don't want to"], "an": 1}, {"q": "Why do scientists call amber 'windows into the past'?", "ch": ["It is clear like glass", "It shows us what ancient life looked like in extraordinary detail", "It is found near old buildings", "It reflects light like mirrors"], "an": 1}], "vocab": [{"w": "fossilized", "d": "preserved in rock or a similar substance over millions of years"}, {"w": "preserved", "d": "kept in original condition without decay"}]}, {"id": "4S7", "title": "The Great Barrier Reef", "cat": "Nature & Environment", "text": "Off the coast of Queensland, Australia, lies the world's largest living structure: the Great Barrier Reef.\nStretching over 2,300 kilometers, it is so large it can be seen from space.\nThe reef is not a single object but a system of nearly 3,000 individual reefs and 900 islands, built by billions of tiny animals called coral polyps.\nCoral polyps are related to jellyfish and sea anemones.\nThey secrete hard calcium carbonate skeletons that accumulate over thousands of years to form reefs.\nThe reef is home to more than 1,500 species of fish, 4,000 types of mollusks, 240 species of birds, and six of the world's seven species of marine turtles.\nBut the reef is in crisis.\nRising ocean temperatures cause coral bleaching — a stress response where coral expels the colorful algae living inside it and turns white.\nWithout the algae, the coral eventually dies.\nBetween 2016 and 2017, back-to-back bleaching events killed about half the coral on the reef's northern sections.\nScientists warn that without urgent action on climate change, large portions of the reef may be lost within decades.", "qs": [{"q": "What makes the Great Barrier Reef special?", "ch": ["It is the deepest part of the ocean", "It is the world's largest living structure", "It was built by ancient humans", "It is always the same temperature"], "an": 1}, {"q": "What are coral polyps?", "ch": ["A type of fish", "Tiny animals that build coral reefs", "A species of turtle", "Plants found underwater"], "an": 1}, {"q": "What causes coral bleaching?", "ch": ["Overfishing", "Pollution from boats", "Rising ocean temperatures that make coral expel its algae", "Too many tourists diving"], "an": 2}, {"q": "What happened between 2016 and 2017?", "ch": ["The reef grew significantly", "Scientists discovered new species", "Back-to-back bleaching killed half the northern reef's coral", "The Australian government protected the reef"], "an": 2}, {"q": "What does the passage suggest is needed to protect the reef?", "ch": ["Building underwater walls", "Moving the reef", "Urgent action on climate change", "More scientific research only"], "an": 2}], "vocab": [{"w": "bleaching", "d": "losing color; in coral, expelling algae due to stress"}, {"w": "accumulate", "d": "to gradually gather or build up over time"}]}], "5": [{"id": "5S1", "title": "The Deep Ocean: Earth's Last Frontier", "text": "If you could drain all the water from Earth's oceans, you would reveal a landscape stranger than any alien planet.\nThe deep ocean—below 1,000 meters—covers more of Earth's surface than all the continents combined, yet remains largely unexplored.\nLess than 20 percent of the ocean floor has been mapped in detail.\nThe deep sea presents extreme conditions: crushing pressure, near-freezing temperatures, and total darkness.\nAt these depths, the weight of all the water above creates pressure more than 600 times that at the surface.\nDespite these seemingly impossible conditions, life thrives in the deep ocean.\nScientists have discovered creatures that have evolved remarkable adaptations.\nThe anglerfish uses a bioluminescent lure—a built-in glowing light—to attract prey in the darkness.\nGiant tube worms, which can grow up to eight feet long, live near hydrothermal vents and derive energy from chemicals rather than sunlight.\nThe barreleye fish has transparent, barrel-shaped eyes that rotate to spot bioluminescent prey above it.\nPerhaps most astonishing are the creatures found at hadal zones—ocean trenches deeper than 6,000 meters.\nIn the Mariana Trench, the deepest known point on Earth at nearly 11,000 meters, scientists have found snailfish, shrimp, and single-celled organisms called foraminifera.\nEvery expedition to the deep sea returns with species never before seen by humans.\nThe deep ocean may hold answers to questions about the origins of life on Earth—and possibly the conditions needed for life on other planets.", "qs": [{"q": "What percentage of the ocean floor has been mapped in detail?", "ch": ["Less than 20 percent", "About 50 percent", "Over 75 percent", "Nearly 100 percent"], "an": 0}, {"q": "How does the anglerfish survive in total darkness?", "ch": ["It has very large eyes", "It uses echolocation", "It uses a bioluminescent lure", "It feels its way along the ocean floor"], "an": 2}, {"q": "How do giant tube worms get energy?", "ch": ["From sunlight filtered through water", "From photosynthesis", "From chemicals near hydrothermal vents", "From eating fish"], "an": 2}, {"q": "What is significant about the Mariana Trench?", "ch": ["It is the longest trench", "It is the widest trench", "It is the deepest known point on Earth", "It has the most sea life"], "an": 2}, {"q": "According to the passage, why might the deep ocean be important to science?", "ch": ["It contains valuable minerals", "It may hold answers about the origins of life", "It helps predict weather", "It controls ocean temperature"], "an": 1}], "vocab": [{"w": "bioluminescent", "d": "producing light through a chemical process within a living organism"}, {"w": "adaptation", "d": "a change in an organism that helps it survive in its environment"}]}, {"id": "5S2", "title": "The Columbian Exchange", "text": "When Christopher Columbus arrived in the Americas in 1492, he set in motion one of the biggest changes in world history.\nThe meeting of the Eastern and Western hemispheres led to a massive exchange of plants, animals, diseases, and ideas.\nHistorians call this the Columbian Exchange.\nFrom the Americas, new foods traveled to Europe and Asia.\nPotatoes became a key food for poor people across Europe.\nTomatoes transformed Italian cooking forever.\nChocolate, corn, and chili peppers all crossed the Atlantic heading east.\nFrom Europe and Africa came horses, cattle, wheat, and sugar cane heading west.\nHorses changed the lives of Native American peoples on the Great Plains.\nWith horses, they could hunt buffalo more effectively and travel farther.\nBut the Columbian Exchange also brought disaster.\nEuropean diseases like smallpox and measles spread to the Americas.\nNative peoples had never been exposed to these illnesses before.\nTheir bodies had no protection against them.\nHistorians believe that between half and nine-tenths of the indigenous population died within a century of contact.\nThis enormous loss of life made European colonization easier.\nThe Columbian Exchange is a reminder that when two worlds connect, the results can be both helpful and deeply harmful at the same time.", "qs": [{"q": "What does the term 'Columbian Exchange' refer to?", "ch": ["Columbus's trade routes", "The exchange of goods, plants, animals, and diseases between hemispheres", "A treaty between Spain and the Americas", "Columbus's maps of the New World"], "an": 1}, {"q": "Which food from the Americas transformed Italian cooking?", "ch": ["Corn", "Chocolate", "Tomatoes", "Potatoes"], "an": 2}, {"q": "How did horses affect Native American cultures on the Great Plains?", "ch": ["They were used only as pets", "They enabled new forms of hunting and warfare", "Horses were already present", "They caused problems for native people"], "an": 1}, {"q": "What was the most devastating consequence of the Columbian Exchange for the Americas?", "ch": ["Loss of food sources", "European animals destroyed crops", "Up to 90% of indigenous people died from disease", "Wars over trade routes"], "an": 2}, {"q": "What does the author mean when they say 'history is rarely simple'?", "ch": ["History is hard to study", "Even positive events can have terrible consequences", "Columbus was not important", "History books are unreliable"], "an": 1}], "vocab": [{"w": "indigenous", "d": "originally from or native to a particular place"}, {"w": "demographic", "d": "relating to the study of human populations, including birth, death, and migration"}]}, {"id": "5S3", "title": "How Animation Works", "text": "Before computers, every animated film was a painstaking labor.\nAnimators drew each frame of film by hand—at 24 frames per second, a single minute of animation required 1,440 individual drawings.\nSnow White and the Seven Dwarfs (1937), Disney's first feature-length animated film, took about 750 artists working for three years to complete.\nThey produced over two million drawings.\nThe illusion of movement comes from a phenomenon called persistence of vision.\nThe human eye retains an image for about 1/30th of a second after it disappears.\nWhen still images change fast enough, the brain fills in the gaps and perceives smooth movement.\nThis is the same principle behind flip books: when you flip through pages quickly, still drawings seem to animate.\nModern CGI (computer-generated imagery) has transformed animation.\nInstead of drawing on paper, artists build three-dimensional digital models and program their movements.\nA single frame of a CGI film like Monsters University can take up to 100 hours of computer processing time to render.\nThe movie has about 110,000 frames.\nDespite this technological shift, the fundamental challenge remains: creating movement and emotion so convincing that audiences forget they're watching a machine-made illusion.\nPixar animator John Lasseter once said the goal is always to make audiences cry at toys.", "qs": [{"q": "How many drawings are needed for one minute of traditional animation?", "ch": ["720", "1,440", "2,880", "24"], "an": 1}, {"q": "What is persistence of vision?", "ch": ["How long a movie lasts", "The eye briefly retaining an image after it disappears", "The brain creating new images", "How animators plan their drawings"], "an": 1}, {"q": "How long can one frame of a CGI film take to render?", "ch": ["One second", "One hour", "Up to 100 hours", "One minute"], "an": 2}, {"q": "What does Lasseter mean by 'make audiences cry at toys'?", "ch": ["Animation should be sad", "The goal is to create such convincing emotion that audiences connect with fictional characters", "Toys are the best subject for animation", "Pixar only makes movies about toys"], "an": 1}, {"q": "What has remained constant despite changes in animation technology?", "ch": ["The number of artists needed", "Drawing by hand", "Creating convincing movement and emotion", "The cost of production"], "an": 2}], "vocab": [{"w": "painstaking", "d": "requiring great care and effort"}, {"w": "render", "d": "to process digital information into a final image"}]}, {"id": "5S4", "title": "Serena Williams: Built Different", "cat": "Sports Biography", "text": "Serena Williams grew up in Compton, California, practicing tennis on cracked public courts where sometimes drug deals happened nearby.\nHer father Richard Williams had a plan: he would turn his daughters into champions using instructional videos and sheer determination, despite having no formal tennis background.\nSerena turned professional at fourteen.\nOver the next three decades, she would win 23 Grand Slam singles titles — more than any other player in the Open Era — and redefine what athletic excellence could look like.\nShe played through injuries that would have ended most careers: a pulmonary embolism in 2011, a knee surgery in 2017, and dangerous health complications after the birth of her daughter.\nShe returned to competition months after each setback.\nWilliams also fought battles beyond the court.\nShe spoke openly about experiencing racial bias in tennis and in American healthcare.\nShe advocated for equal pay and equal treatment.\nSports analysts note that she raised the technical ceiling of women's tennis — her serve speeds, groundstroke power, and mental fortitude were previously thought impossible for women.\nWhen she announced her retirement in 2022, she chose to call it an 'evolution' rather than a farewell.\nHer legacy is not just the trophies — it is the generation of players she inspired and the doors she refused to let stay closed.", "qs": [{"q": "Where did Serena grow up practicing tennis?", "ch": ["Private tennis academies", "Cracked public courts in Compton", "A country club", "Her backyard"], "an": 1}, {"q": "What was unusual about how Richard Williams trained his daughters?", "ch": ["He hired famous coaches", "He had no formal tennis background but used videos and determination", "He sent them to tennis schools in Europe", "He focused only on Serena"], "an": 1}, {"q": "How many Grand Slam singles titles did Serena win?", "ch": ["15", "19", "23", "30"], "an": 2}, {"q": "Why did Serena call her retirement an 'evolution' rather than a farewell?", "ch": ["She planned to return to playing", "She wasn't truly retiring", "She was moving to a new phase of life, not an ending", "She disliked the word retirement"], "an": 2}, {"q": "According to the passage, what is Serena's legacy beyond trophies?", "ch": ["Her service speed records", "Her fashion line", "The players she inspired and the doors she refused to let stay closed", "Her coaching career"], "an": 2}], "vocab": [{"w": "embolism", "d": "a blockage in a blood vessel, often life-threatening"}, {"w": "fortitude", "d": "mental and emotional strength in the face of difficulty"}]}, {"id": "5S5", "title": "Einstein's Thought Experiments", "cat": "Science & Biography", "text": "Albert Einstein did not make his greatest discoveries in a laboratory.\nHe made them in his imagination.\nEinstein developed the practice of what he called Gedankenexperiment — German for 'thought experiment.' He would imagine a scenario in vivid detail and think through its consequences using pure logic and mathematics.\nWhen he was sixteen, he imagined riding alongside a beam of light.\nWhat would light look like if you could keep up with it?\nThis question troubled him for nine years.\nThe answer — that light always travels at the same speed regardless of the observer's motion — became the foundation of his Special Theory of Relativity, published in 1905.\nThe equation that emerged, E=mc², revealed that mass and energy are interchangeable.\nA tiny amount of matter contains an enormous amount of energy.\nEinstein also imagined a person in a falling elevator: they would feel weightless.\nThis led to his General Theory of Relativity, which redefined gravity not as a force but as a curvature in the fabric of space and time.\nHis theories have been confirmed by experiments again and again — including, in 2015, the first detection of gravitational waves.\nEinstein showed that imagination can be more powerful than knowledge — but only when disciplined imagination is guided by rigorous mathematics.", "qs": [{"q": "What is a Gedankenexperiment?", "ch": ["A German physics laboratory", "A type of scientific equipment", "A thought experiment Einstein used", "A mathematical formula"], "an": 2}, {"q": "What question troubled Einstein for nine years?", "ch": ["What is the speed of sound", "What would light look like if you could keep up with it", "How does gravity work", "What is E=mc²"], "an": 1}, {"q": "What does E=mc² reveal?", "ch": ["The speed of light", "That mass and energy are interchangeable", "How gravity curves space", "The age of the universe"], "an": 1}, {"q": "What did imagining a person in a falling elevator lead Einstein to discover?", "ch": ["The Special Theory of Relativity", "That gravity is a force", "The General Theory of Relativity", "That light has no mass"], "an": 2}, {"q": "What does the passage say about imagination and knowledge?", "ch": ["Knowledge is always more powerful", "Imagination without math is useless", "Imagination disciplined by mathematics can be more powerful than knowledge", "Einstein didn't need mathematics"], "an": 2}], "vocab": [{"w": "interchangeable", "d": "able to be used in place of each other"}, {"w": "curvature", "d": "the state of being bent or curved"}]}, {"id": "5S6", "title": "The Raven: Edgar Allan Poe", "cat": "Literature & Mystery", "text": "Edgar Allan Poe was born in Boston in 1809 and became one of the most influential writers in American literary history.\nHe is credited with inventing the modern detective story, with tales like 'The Murders in the Rue Morgue' featuring the brilliant investigator C. Auguste Dupin.\nPoe's life was shadowed by tragedy.\nHis father abandoned the family when Poe was young, his mother died of tuberculosis when he was two, and he was taken in but never officially adopted by John Allan of Richmond, Virginia.\nHis most famous poem, 'The Raven,' published in 1845, tells the story of a grieving man visited at midnight by a talking raven that answers every question with the single word 'Nevermore.'\nThe poem became a sensation.\nPoe carefully described his writing process in an essay called 'The Philosophy of Composition' — he claimed to have written 'The Raven' backwards, starting with the effect he wanted and working toward the cause.\nPoe died mysteriously in 1849 at age forty.\nHe was found on a Baltimore street, delirious and wearing someone else's clothes.\nThe cause of his death remains unknown — theories include rabies, alcohol, murder, and heart disease.\nEven in death, Poe maintained the mystery he wrote about so brilliantly.", "qs": [{"q": "What type of story is Poe credited with inventing?", "ch": ["Science fiction", "Horror novels", "Modern detective stories", "Epic poetry"], "an": 2}, {"q": "What single word does the raven say in Poe's famous poem?", "ch": ["Forever", "Nevermore", "Darkness", "Nevermore"], "an": 1}, {"q": "How did Poe claim to write 'The Raven'?", "ch": ["Starting from the beginning and writing forward", "Getting inspiration from a dream", "Starting with the effect and working backward", "Copying from an old poem"], "an": 2}, {"q": "What is mysterious about Poe's death?", "ch": ["He disappeared", "He was found under strange circumstances and the cause is still unknown", "He died at sea", "He died during a writing session"], "an": 1}, {"q": "What does the last sentence mean?", "ch": ["Poe planned his own mysterious death", "Even his death had the mystery his writing was famous for", "Poe was always mysterious in life", "Death is always mysterious"], "an": 1}], "vocab": [{"w": "tuberculosis", "d": "a contagious bacterial disease mainly affecting the lungs"}, {"w": "delirious", "d": "in a state of extreme mental confusion, often from fever"}]}], "6": [{"id": "6S1", "title": "The Paradox of Choice", "text": "In the summer of 2000, psychologist Sheena Iyengar set up a jam-tasting booth at a grocery store in California.\nOn some days, she offered shoppers a selection of 6 jams to taste.\nOn other days, she offered 24 jams.\nThe large display attracted more shoppers—60 percent of people stopped when 24 jams were available, compared to 40 percent when only 6 were offered.\nBut here is the surprising result: people who stopped at the table with 6 choices were ten times more likely to buy jam.\nThis experiment revealed what psychologist Barry Schwartz later called 'the paradox of choice.'\nThe theory suggests that while humans seek out more options, having too many choices can actually prevent us from making decisions.\nToo many options lead to 'analysis paralysis'—we become so overwhelmed evaluating possibilities that we make no choice at all.\nEven when we do choose, we feel less satisfied, because we are haunted by all the options we didn't pick.\nThis phenomenon appears in many areas of modern life.\nResearch shows that retirement accounts with fewer fund options have higher enrollment rates.\nOnline stores that show fewer products often sell more.\nNetflix found that a shorter list of recommendations led to more viewing than an overwhelming catalog.\nThe lesson isn't that choice is bad—having some control over our lives is essential to wellbeing.\nRather, as Schwartz argues, when it comes to options, more is not always better.", "qs": [{"q": "What was the surprising result of the jam experiment?", "ch": ["People bought more from the large display", "People bought more when given fewer choices", "People preferred expensive jams", "People did not buy any jam"], "an": 1}, {"q": "What does 'analysis paralysis' mean?", "ch": ["Making a quick decision", "Being unable to decide because of too many options", "Choosing the wrong option", "Ignoring all choices"], "an": 1}, {"q": "What does the Netflix finding suggest?", "ch": ["People want more shows to watch", "Fewer recommendations led to more viewing", "Quality matters more than quantity", "People don't watch enough TV"], "an": 1}, {"q": "What is the main message of the passage?", "ch": ["More choices always make people happier", "Choice is harmful and should be avoided", "Having too many options can reduce satisfaction and decision-making", "People are bad at making decisions"], "an": 2}, {"q": "Which word best describes the 'paradox' in the title?", "ch": ["A confusing contradiction", "A scientific experiment", "A type of food choice", "A mathematical problem"], "an": 0}], "vocab": [{"w": "paradox", "d": "a statement that seems contradictory but may be true"}, {"w": "phenomenon", "d": "a fact or event that can be observed, especially one that is unusual"}]}, {"id": "6S2", "title": "The Psychology of Color", "text": "Colors are never just colors.\nFor centuries, painters, designers, marketers, and scientists have recognized that colors have powerful psychological effects—influencing mood, behavior, perception, and even physical responses.\nRed is the most stimulating color in the visible spectrum.\nResearch shows that people in red rooms have elevated heart rates and perceive time as moving faster.\nRed is used in restaurants because it can stimulate appetite and encourage faster eating—which turns tables more quickly.\nBlue has nearly opposite effects: it is calming, associated with trust and reliability, which is why so many corporations, banks, and social media platforms use it in their logos.\nExposure to blue light actually lowers blood pressure.\nYellow is the first color detected by the human eye—it triggers the release of serotonin, producing feelings of happiness.\nBut too much yellow can cause anxiety; studies show babies cry more in yellow rooms.\nGreen is easiest on the eyes because it requires no adjustment from the lens.\nIt is associated with nature and balance.\nHospital walls were repainted green in the 1990s when research showed patients recovered faster in green environments.\nHowever, color psychology is not universal.\nCultural associations vary dramatically: white symbolizes purity in Western cultures but mourning in many East Asian cultures.\nRed means luck in China but danger in many Western contexts.\nThis means that understanding color psychology requires understanding the culture of your audience as well as the science.", "qs": [{"q": "What effect does red have on people?", "ch": ["Calming and relaxing", "Elevated heart rate and sense of faster time", "Feelings of sadness", "Trust and reliability"], "an": 1}, {"q": "Why is blue used by many corporations and banks?", "ch": ["It is the cheapest color", "It stimulates productivity", "It is associated with trust and reliability", "It looks better on screens"], "an": 2}, {"q": "What warning does the passage give about yellow?", "ch": ["Yellow fades quickly", "Too much yellow can cause anxiety", "Yellow doesn't work in design", "Yellow is hard to see"], "an": 1}, {"q": "Why was green chosen for hospital walls?", "ch": ["It is the cheapest paint", "Patients recovered faster in green environments", "Doctors requested it", "It matches hospital equipment"], "an": 2}, {"q": "What does the last paragraph's message suggest about applying color psychology?", "ch": ["Color science applies the same way everywhere", "Red should always be avoided", "Cultural context must be considered alongside science", "Green is the most important color"], "an": 2}], "vocab": [{"w": "perception", "d": "the way something is understood or interpreted through the senses"}, {"w": "stimulating", "d": "causing activity or excitement; energizing"}]}, {"id": "6S3", "title": "The Physics of Music", "cat": "Science & Arts", "text": "Music and physics are more closely related than most people realize — in fact, music is physics made beautiful.\nEvery sound, including musical notes, is a vibration: a rapid back-and-forth movement that travels through the air as a wave.\nThe frequency of vibration — how many times per second it oscillates — determines the pitch we hear.\nHigh frequency means high pitch; low frequency means low pitch.\nA concert pitch A note vibrates at exactly 440 cycles per second (Hertz).\nWhen two notes are played together, the relationship between their frequencies determines whether they sound harmonious or dissonant.\nThe ancient Greek mathematician Pythagoras discovered that notes whose frequencies have simple ratios — like 2:1 or 3:2 — sound pleasing together.\nThis is why the octave (2:1 frequency ratio) sounds so natural to human ears.\nDifferent instruments produce the same note differently.\nA guitar string vibrates in a complex pattern that creates not just the fundamental frequency but also overtones — higher frequencies that color the sound.\nThese overtones are why a violin and a flute playing the same note sound completely different.\nIn modern music production, engineers use equalizers to adjust the balance of frequencies, literally sculpting sound using physics.\nEvery song you hear is a carefully constructed architecture of vibrations — physics in its most emotional form.", "qs": [{"q": "What determines the pitch of a sound?", "ch": ["The volume of the sound", "The frequency of vibration", "The material the instrument is made from", "The size of the room"], "an": 1}, {"q": "What did Pythagoras discover about music?", "ch": ["The fastest instruments sound best", "Notes with simple frequency ratios sound pleasing", "Louder music is more harmonious", "Greek music is mathematically perfect"], "an": 1}, {"q": "Why do a violin and flute sound different playing the same note?", "ch": ["They are different sizes", "One is louder", "Different overtones color the sound", "One uses strings and one uses air"], "an": 2}, {"q": "What do music engineers use equalizers for?", "ch": ["To make music louder", "To adjust the balance of frequencies", "To record music more quickly", "To tune instruments automatically"], "an": 1}, {"q": "What does the author mean by 'physics in its most emotional form'?", "ch": ["Physics makes people sad", "Music uses physical principles to create feelings and beauty", "Physics is more important than music", "Emotions are not physical"], "an": 1}], "vocab": [{"w": "frequency", "d": "the number of vibrations per second; determines pitch"}, {"w": "dissonant", "d": "producing a harsh or unpleasant sound when notes are combined"}]}, {"id": "6S4", "title": "The Boy Who Harnessed the Wind", "cat": "Biography & Technology", "text": "William Kamkwamba was born in 1987 in Malawi, one of the poorest countries in sub-Saharan Africa.\nWhen he was thirteen, a devastating famine struck the country, and his family could no longer afford the eighty-dollar school fee required to continue his education.\nForced to drop out, William refused to abandon his desire to learn.\nHe visited the local library and discovered a tattered textbook called Using Energy, which contained a diagram of a windmill generating electricity.\nWith no budget, no tools, and no formal training in engineering, William began gathering scrap materials — a broken bicycle, blue gum trees, strips of PVC pipe, and pieces of metal salvaged from junkyards.\nNeighbors mocked him and called him misala — crazy.\nHis own family questioned whether he had lost his mind.\nNevertheless, after months of trial and error, William connected his handmade windmill to a car battery, which in turn powered a single light bulb.\nWhen the bulb illuminated, his family's home had electricity for the first time.\nHe later built a second windmill to pump water for irrigation, transforming his village's capacity to survive future droughts.\nWilliam's story reached an international audience when he described his work at a TED conference in 2007, leading to scholarships that allowed him to study in South Africa and the United States.\nHis autobiography, The Boy Who Harnessed the Wind, became a bestselling book and Netflix film.\nWilliam's journey illustrates a principle that transcends his specific circumstances: genuine curiosity and persistence can create solutions that experts with far more resources fail to imagine.", "qs": [{"q": "Why did William drop out of school?", "ch": ["He wasn't interested", "His family couldn't afford the fees", "His school closed", "He preferred to work"], "an": 1}, {"q": "What gave William the idea to build a windmill?", "ch": ["A TV show", "His teacher told him about it", "He found a diagram in a library book", "He saw one in a neighboring village"], "an": 2}, {"q": "What did William's neighbors think of his project?", "ch": ["They were supportive", "They were curious", "They called him crazy", "They tried to help"], "an": 2}, {"q": "How did William's windmill help his village beyond providing electricity?", "ch": ["It attracted tourists", "It powered a school", "He built one to pump water for crops during drought", "It helped build roads"], "an": 2}, {"q": "What is the main message of William's story?", "ch": ["Money is needed to succeed", "Poverty and lack of education make success impossible", "Curiosity and determination can overcome poverty", "Africa needs more foreign help"], "an": 2}], "vocab": [{"w": "famine", "d": "an extreme scarcity of food affecting a large area"}, {"w": "determined", "d": "having firm resolve to achieve something despite obstacles"}]}, {"id": "6S5", "title": "Black Holes: Where Physics Breaks Down", "cat": "Space & Science", "text": "A black hole is a region of space where gravity is so extreme that nothing — not even light — can escape.\nThey form when massive stars collapse at the end of their lives in an explosion called a supernova.\nThe star's core is crushed into an impossibly dense point called a singularity, surrounded by a boundary called the event horizon.\nAnything that crosses the event horizon cannot return.\nBlack holes cannot be seen directly — we detect them by observing their effects on surrounding matter and light.\nNearby gas spirals inward, heating to millions of degrees and glowing brightly, forming an accretion disk.\nIn 2019, scientists published the first image of a black hole — the supermassive black hole at the center of galaxy M87, 6.5 billion times the mass of our sun.\nThe image was created by linking radio telescopes across the Earth to form a planet-sized telescope called the Event Horizon Telescope.\nBlack holes challenge our understanding of physics.\nAt the singularity, Einstein's general relativity and quantum mechanics both break down — they give incompatible answers.\nSolving this incompatibility is one of the great unsolved problems in physics.\nHawking radiation — proposed by Stephen Hawking — suggests black holes slowly emit energy and eventually evaporate, but this has never been directly observed.", "qs": [{"q": "What is a singularity?", "ch": ["The event horizon of a black hole", "An impossibly dense point at the core of a black hole", "A type of star explosion", "The boundary no light can cross"], "an": 1}, {"q": "How do scientists detect black holes?", "ch": ["By directly photographing them", "By measuring their temperature", "By observing their effects on surrounding matter and light", "By sending probes inside them"], "an": 2}, {"q": "What was significant about the 2019 scientific achievement?", "ch": ["The first spacecraft reached a black hole", "Scientists traveled into a black hole", "The first image of a black hole was published", "A new type of black hole was discovered"], "an": 2}, {"q": "What great scientific problem do black holes create?", "ch": ["How to travel faster than light", "General relativity and quantum mechanics give incompatible answers at the singularity", "How to prevent black holes from forming", "Whether black holes create new universes"], "an": 1}, {"q": "What does Hawking radiation propose?", "ch": ["Black holes grow forever", "Black holes slowly emit energy and eventually evaporate", "Black holes are hollow inside", "Black holes can be used for time travel"], "an": 1}], "vocab": [{"w": "singularity", "d": "a point of infinite density where known physics breaks down"}, {"w": "quantum mechanics", "d": "the branch of physics dealing with behavior at the atomic and subatomic scale"}]}, {"id": "6S6", "title": "The Gladiators of Rome", "cat": "History", "text": "The Colosseum in Rome, completed in 80 CE, could hold between 50,000 and 80,000 spectators who came to watch gladiatorial combat.\nBut the reality of gladiatorial life was far more complex than the Hollywood image of constant slaughter.\nMost gladiators were enslaved people, prisoners of war, or criminals sentenced to the arena.\nSome, however, were free volunteers who chose gladiatorial life for fame and money — similar in some ways to professional athletes today.\nGladiators were trained in special schools called ludi, where they received good food, medical care, and expert coaching.\nPromoters wanted skilled entertainers, not dead fighters — dead gladiators were expensive to replace and failed to provide the dramatic spectacle crowds craved.\nResearch on gladiatorial remains shows that most died from single decisive blows rather than drawn-out battles, suggesting fights ended at specific dramatic moments.\nThe crowd's opinion influenced outcomes: a downed gladiator could appeal to the crowd, who would signal mercy or death to the organizing official.\nThe famous thumbs-up and thumbs-down symbols are actually a modern invention — ancient sources describe the crowd's signal as waving handkerchiefs or pressing thumbs against fists.\nGladiatorial combat ended in 404 CE when Emperor Honorius banned it, reportedly after a monk died trying to stop a fight.", "qs": [{"q": "How many people could the Colosseum hold?", "ch": ["10,000-20,000", "50,000-80,000", "100,000-150,000", "30,000-40,000"], "an": 1}, {"q": "Why did promoters prefer gladiators not to die?", "ch": ["They were too valuable as friends", "Dead gladiators were expensive and reduced future entertainment", "It was against Roman law", "The crowd preferred bloodless fights"], "an": 1}, {"q": "What does research on gladiatorial remains show?", "ch": ["Gladiators were always poorly nourished", "They were injured constantly", "Most died from single decisive blows, not drawn-out battles", "All gladiators were enslaved people"], "an": 2}, {"q": "What is surprising about the thumbs-up thumbs-down signals?", "ch": ["Romans didn't use hand signals", "They were invented by modern filmmakers, not used in ancient Rome", "Only emperors could use them", "They had the opposite meaning in ancient times"], "an": 1}, {"q": "When and why did gladiatorial combat end?", "ch": ["100 CE, due to public outcry", "404 CE, after a monk died trying to stop a fight", "500 CE, when Rome fell", "300 CE, when Christianity spread"], "an": 1}], "vocab": [{"w": "spectators", "d": "people who watch an event"}, {"w": "decisive", "d": "settling something conclusively; having a clear result"}]}, {"id": "6S7", "title": "The Language of Mathematics", "cat": "Math & Philosophy", "text": "In 1623, Galileo Galilei wrote that the universe 'is written in the language of mathematics.'\nNearly four centuries later, physicists continue to discover just how right he was.\nMathematics is the only human activity that produces absolute certainty.\nA mathematical proof, once verified, is true forever — unlike scientific theories, which can always be revised by new evidence.\nYet mathematics also creates its own mysteries.\nIn 1931, Kurt Gödel proved his Incompleteness Theorems — among the most shocking results in the history of human thought.\nGödel showed that any sufficiently complex mathematical system contains true statements that cannot be proven within that system.\nIn other words, mathematics contains truths that are forever beyond proof.\nMathematics also appears in nature with uncanny consistency.\nThe Fibonacci sequence — 1, 1, 2, 3, 5, 8, 13... — appears in sunflower seed patterns, nautilus shells, hurricane shapes, and galaxy spirals.\nPrime numbers, once thought to be purely abstract, turned out to underpin modern encryption and internet security.\nThe unreasonable effectiveness of mathematics — as physicist Eugene Wigner called it — remains deeply mysterious.\nWhy should symbols invented to count sheep be the same symbols that describe black holes and quantum mechanics?\nNo one fully knows.", "qs": [{"q": "What makes mathematics unique compared to scientific theories?", "ch": ["It never changes", "It is more complex", "Mathematical proofs, once verified, are true forever", "Mathematics was invented before science"], "an": 2}, {"q": "What did Gödel's Incompleteness Theorems prove?", "ch": ["All mathematical statements can be proven", "Mathematics contains true statements that cannot be proven", "Mathematics is not useful for science", "Simple math systems are incomplete"], "an": 1}, {"q": "Where does the Fibonacci sequence appear in nature?", "ch": ["Only in flowers", "Sunflower seeds, nautilus shells, hurricanes, and galaxy spirals", "Only in plants", "In oceans and rivers"], "an": 1}, {"q": "What practical application do prime numbers have?", "ch": ["Measuring distances in space", "Building bridges", "Modern encryption and internet security", "Counting populations"], "an": 2}, {"q": "What does Wigner's phrase 'unreasonable effectiveness of mathematics' refer to?", "ch": ["Mathematics is too hard to learn", "The mysterious way math invented for simple tasks perfectly describes complex nature", "Mathematics is unreliable", "Physicists use math incorrectly"], "an": 1}], "vocab": [{"w": "theorem", "d": "a mathematical statement that has been proven to be true"}, {"w": "encryption", "d": "converting data into a code to prevent unauthorized access"}]}], "7": [{"id": "7S1", "title": "The Science of Habits", "text": "Every day, without realizing it, you repeat hundreds of behaviors automatically.\nYou brush your teeth in the same order, take the same route to school, and reach for your phone at the same moments.\nThese automatic patterns are habits, and understanding how they form can help you build better ones—and break harmful ones.\nAccording to MIT researcher Ann Graybiel, habits are formed through a three-part neurological loop: cue, routine, and reward.\nThe cue is a trigger that tells your brain to enter automatic mode.\nThe routine is the behavior itself.\nThe reward is what satisfies the craving and tells the brain this pattern is worth remembering.\nOver time, this loop becomes so automatic that your brain barely has to engage.\nIn experiments, rats trained to run a maze showed dramatically reduced brain activity once the maze became routine—the brain had essentially 'chunked' the sequence into a single habit.\nThis efficiency is why habits are so hard to break: the neural pathways are deeply carved.\nCharles Duhigg, author of 'The Power of Habit,' argues that you cannot eliminate a bad habit—you can only replace it.\nThe key is to keep the same cue and reward but change the routine.\nFor example, if stress (cue) leads to eating junk food (routine) to feel better (reward), you can replace junk food with a walk or calling a friend.\nResearch also shows that habits are easier to change during major life transitions—starting college, moving, beginning a new job—when old cues are disrupted.\nKnowing the structure of habits gives you the power to redesign them deliberately.", "qs": [{"q": "According to the passage, what are the three parts of the habit loop?", "ch": ["Start, middle, end", "Cue, routine, reward", "Think, act, feel", "Plan, execute, reflect"], "an": 1}, {"q": "What did the rat maze experiments demonstrate?", "ch": ["Rats learn quickly with rewards", "Brain activity increases as habits form", "Brain activity decreases as actions become habits", "Rats cannot form habits"], "an": 2}, {"q": "What does Duhigg argue about bad habits?", "ch": ["They can be eliminated with enough willpower", "You cannot eliminate them, only replace them", "Bad habits always lead to worse habits", "Exercise removes all bad habits"], "an": 1}, {"q": "When does research suggest habits are easiest to change?", "ch": ["During summer break", "When you are young", "During major life transitions", "When you are tired"], "an": 2}, {"q": "What is the main purpose of this passage?", "ch": ["To warn about dangerous habits", "To explain the science behind habits and how to change them", "To prove that all habits are bad", "To describe a famous psychology experiment"], "an": 1}], "vocab": [{"w": "neurological", "d": "relating to the nervous system and brain"}, {"w": "deliberately", "d": "done intentionally and carefully, with full awareness"}]}, {"id": "7S2", "title": "The Game That Conquered the World", "cat": "Sports & Culture", "text": "Football — known as soccer in the United States — is the world's most popular sport by almost any measure.\nAn estimated four billion people, more than half the human population, consider themselves fans.\nThe FIFA World Cup is the most watched sporting event in history: the 2018 final alone attracted 1.1 billion television viewers.\nBut football's global dominance raises an interesting question: what makes a sport spread across cultures rather than remain local?\nSociologists point to several factors that explain football's reach.\nFirst, the equipment requirements are minimal — all you need is a round object, which explains why children worldwide play with rolled socks, coconuts, or tin cans.\nSecond, the rules are simple to learn but endlessly complex to master, creating accessible entry points for beginners and deep engagement for experts.\nThird, football's low scoring makes each goal a dramatic, game-changing event — creating shared emoti
