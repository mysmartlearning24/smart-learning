<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SMART v3.1</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap');

/* ── DESIGN TOKENS ─────────────────────────── */
:root {
  --white: #FFFFFF;
  --bg: #F6F7F9;
  --bg-subtle: #ECEEF2;
  --surface: #FFFFFF;
  --surface-raised: #FFFFFF;
  --border: #E4E7EC;
  --border-strong: #D0D5DD;

  --text-primary: #0F172A;
  --text-secondary: #475569;
  --text-tertiary: #94A3B8;
  --text-inverse: #FFFFFF;

  --brand: #FF5C35;
  --brand-light: #FFF1EE;
  --brand-dark: #CC3D1F;
  --brand-shadow: rgba(255,92,53,0.25);

  --green: #10B981;
  --green-light: #ECFDF5;
  --gold: #F59E0B;
  --gold-light: #FFFBEB;
  --red: #EF4444;
  --red-light: #FEF2F2;
  --blue: #3B82F6;
  --blue-light: #EFF6FF;
  --purple: #8B5CF6;
  --purple-light: #F5F3FF;

  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;
  --radius-full: 9999px;

  --shadow-xs: 0 1px 2px rgba(15,23,42,0.06);
  --shadow-sm: 0 1px 3px rgba(15,23,42,0.08), 0 1px 2px rgba(15,23,42,0.04);
  --shadow-md: 0 4px 12px rgba(15,23,42,0.08), 0 2px 4px rgba(15,23,42,0.04);
  --shadow-lg: 0 8px 24px rgba(15,23,42,0.1), 0 4px 8px rgba(15,23,42,0.06);
  --shadow-xl: 0 20px 48px rgba(15,23,42,0.12), 0 8px 16px rgba(15,23,42,0.06);
  --shadow-brand: 0 4px 16px var(--brand-shadow);

  --font-display: 'Sora', sans-serif;
  --font-body: 'DM Sans', sans-serif;

  --transition-fast: 120ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-spring: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ── RESET & BASE ───────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

/* ── LAYOUT ─────────────────────────────────── */
.screen { display: none; min-height: 100vh; padding: 20px 16px 100px; }
.screen.active { display: block; }
.container { max-width: 480px; margin: 0 auto; }
.sp { height: 12px; }
.cf::after { content: ''; display: table; clear: both; }

/* ── TYPOGRAPHY ─────────────────────────────── */
.t-display { font-family: var(--font-display); font-size: 42px; font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; }
.t-h1 { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.t-h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; }
.t-h3 { font-family: var(--font-display); font-size: 17px; font-weight: 600; }
.t-body { font-size: 15px; line-height: 1.6; }
.t-caption { font-size: 12px; letter-spacing: 0.3px; }
.t-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-tertiary); }

/* ── CARDS ──────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 20px;
  width: 100%;
  max-width: 480px;
  margin: 0 auto 12px;
  box-shadow: var(--shadow-sm);
}
.card-flat { box-shadow: none; border-color: var(--border); }
.card-raised { box-shadow: var(--shadow-md); }

/* ── BUTTONS ────────────────────────────────── */
.btn {
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: var(--radius-md);
  padding: 14px 24px;
  cursor: pointer;
  display: block;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  transition: all var(--transition-base);
  letter-spacing: -0.1px;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--brand);
  color: var(--text-inverse);
  box-shadow: var(--shadow-brand);
}
.btn-primary:active { background: var(--brand-dark); box-shadow: none; }
.btn-secondary {
  background: var(--surface);
  color: var(--text-primary);
  border: 1.5px solid var(--border-strong);
  box-shadow: var(--shadow-xs);
}
.btn-danger {
  background: var(--red-light);
  color: var(--red);
  border: 1.5px solid #FECACA;
}
.bbtn {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  cursor: pointer;
  box-shadow: var(--shadow-xs);
  transition: all var(--transition-fast);
}
.bbtn:active { transform: scale(0.96); }

/* ── HEADER ─────────────────────────────────── */
.hdr {
  width: 100%;
  max-width: 480px;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.hdr-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  flex: 1;
  text-align: center;
}

/* ── PROGRESS BARS ──────────────────────────── */
.pbar {
  width: 100%;
  max-width: 480px;
  height: 3px;
  background: var(--border);
  border-radius: var(--radius-full);
  overflow: hidden;
  margin: 0 auto 24px;
}
.pbar-f {
  height: 100%;
  border-radius: var(--radius-full);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.psm { background: var(--bg-subtle); border-radius: var(--radius-full); height: 4px; overflow: hidden; }
.psf { height: 100%; border-radius: var(--radius-full); }

/* ── XP BAR ─────────────────────────────────── */
.xpbar { width: 100%; max-width: 480px; margin: 0 auto 12px; }
.xpbar-track { background: var(--bg-subtle); border-radius: var(--radius-full); height: 4px; overflow: hidden; }
.xpbar-fill {
  height: 100%;
  background: var(--brand);
  border-radius: var(--radius-full);
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── PROBLEM CARD ───────────────────────────── */
.pc {
  width: 100%;
  max-width: 480px;
  margin: 0 auto 20px;
  border-radius: var(--radius-xl);
  padding: 36px 28px 28px;
  text-align: center;
  background: var(--surface);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-md);
  transition: all 200ms ease;
  position: relative;
  overflow: hidden;
}
.pc::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--brand);
  border-radius: var(--radius-full) var(--radius-full) 0 0;
}
.pc.correct { border-color: var(--green); box-shadow: 0 4px 20px rgba(16,185,129,0.12); }
.pc.correct::before { background: var(--green); }
.pc.wrong { border-color: var(--red); box-shadow: 0 4px 20px rgba(239,68,68,0.12); }
.pc.wrong::before { background: var(--red); }
.pn {
  font-family: var(--font-display);
  font-size: 56px;
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 1.1;
  color: var(--text-primary);
}
.pa {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 800;
  min-height: 60px;
  color: var(--brand);
  letter-spacing: -1.5px;
  margin-top: 4px;
}

/* ── NUMPAD ─────────────────────────────────── */
.np { width: 100%; max-width: 360px; margin: 0 auto; }
.nr { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
.nb {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  border-radius: var(--radius-md);
  padding: 18px 0;
  cursor: pointer;
  text-align: center;
  box-shadow: 0 4px 0 var(--border-strong), var(--shadow-xs);
  transition: transform 80ms ease, box-shadow 80ms ease;
  user-select: none;
  -webkit-user-select: none;
}
.nb:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 var(--border-strong), var(--shadow-xs);
}
.nb-del {
  background: var(--red-light);
  border-color: #FECACA;
  color: var(--red);
  box-shadow: 0 4px 0 #FECACA, var(--shadow-xs);
}
.nb-del:active { box-shadow: 0 1px 0 #FECACA; }
.nb-ok {
  background: var(--brand);
  border-color: var(--brand-dark);
  color: #fff;
  font-size: 18px;
  box-shadow: 0 4px 0 var(--brand-dark), var(--shadow-brand);
}
.nb-ok:active { box-shadow: 0 1px 0 var(--brand-dark); }

/* ── MODALS ─────────────────────────────────── */
.mo {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  overflow-y: auto;
  padding: 16px;
}
.mi {
  background: var(--surface);
  border-radius: var(--radius-xl);
  padding: 28px;
  max-width: 480px;
  width: 100%;
  margin: 20px auto;
  box-shadow: var(--shadow-xl);
}
.sb {
  background: var(--bg);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  margin: 10px 0;
  font-size: 15px;
  line-height: 1.8;
  border-left: 3px solid var(--brand);
}
.hl { color: var(--gold); font-family: var(--font-display); font-size: 20px; font-weight: 700; }
.ah { color: var(--green); font-family: var(--font-display); font-size: 26px; font-weight: 700; }
.cm {
  font-family: 'Courier New', monospace;
  font-size: 20px;
  background: var(--bg);
  border-radius: var(--radius-md);
  padding: 16px 22px;
  display: inline-block;
  line-height: 1.7;
  text-align: right;
  white-space: pre;
  color: var(--text-primary);
  border: 1px solid var(--border);
}

/* ── LEVEL GRID ─────────────────────────────── */
.lg { width: 100%; max-width: 480px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.lt {
  border-radius: var(--radius-md);
  padding: 14px 8px;
  text-align: center;
  cursor: pointer;
  border: 1.5px solid transparent;
  position: relative;
  min-height: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  box-shadow: var(--shadow-xs);
}
.lt:active { transform: scale(0.94); }
.lt.lk { opacity: 0.38; cursor: default; box-shadow: none; }

/* ── PROFILE/GRADE CARDS ────────────────────── */
.gc {
  display: block;
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  cursor: pointer;
  margin: 0 auto 10px;
  border: 1.5px solid var(--border);
  width: 100%;
  max-width: 480px;
  font-family: var(--font-body);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  transition: all var(--transition-base);
  text-align: left;
}
.gc:active { transform: scale(0.98); box-shadow: var(--shadow-xs); }

/* ── AVATAR GRID ────────────────────────────── */
.av-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 480px; margin: 0 auto; }
.av-item {
  border-radius: var(--radius-md);
  padding: 14px 4px;
  text-align: center;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--surface);
  transition: all var(--transition-fast);
  box-shadow: var(--shadow-xs);
}
.av-item:active { transform: scale(0.92); }
.av-item.selected { border-color: var(--brand); background: var(--brand-light); }

/* ── STAT BOXES ─────────────────────────────── */
.sg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.sx {
  border-radius: var(--radius-md);
  padding: 16px;
  text-align: center;
  background: var(--bg);
  border: 1px solid var(--border);
}

/* ── ANSWER GRID ────────────────────────────── */
.ag { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ai { border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; }

/* ── 2-BUTTON ROW ───────────────────────────── */
.rbx { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 480px; margin: 0 auto 12px; }
.hb {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 15px;
  border: none;
  border-radius: var(--radius-md);
  padding: 14px 0;
  cursor: pointer;
  text-align: center;
  transition: all var(--transition-fast);
}
.hb:active { transform: scale(0.97); }

/* ── TAGS & BADGES ──────────────────────────── */
.lbl { font-size: 11px; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 14px; text-transform: uppercase; color: var(--text-tertiary); }
.tag { display: inline-block; border-radius: var(--radius-full); padding: 4px 12px; font-size: 12px; font-weight: 600; }
.tb {
  background: var(--surface);
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  padding: 6px 14px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: var(--shadow-xs);
  border: 1px solid var(--border);
}
.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--brand-light);
  border: 1.5px solid #FFD4C2;
  border-radius: var(--radius-full);
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--brand);
  margin-bottom: 10px;
}

/* ── WORD PROBLEMS ──────────────────────────── */
.wp-card {
  width: 100%;
  max-width: 480px;
  margin: 0 auto 16px;
  border-radius: var(--radius-lg);
  padding: 22px;
  background: var(--surface);
  box-shadow: var(--shadow-md);
  border: 1.5px solid var(--border);
}
.wp-question { font-size: 16px; color: var(--text-primary); line-height: 1.7; margin-bottom: 18px; font-weight: 500; }
.wp-choice {
  display: block;
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--text-primary);
  border-radius: var(--radius-md);
  padding: 13px 16px;
  font-size: 16px;
  font-family: var(--font-body);
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 10px;
  text-align: left;
  transition: all var(--transition-fast);
}
.wp-choice:active { transform: scale(0.99); }
.wp-choice:hover { border-color: var(--brand); background: var(--brand-light); }
.wp-choice.correct { border-color: var(--green); background: var(--green-light); color: var(--green); font-weight: 700; }
.wp-choice.wrong { border-color: var(--red); background: var(--red-light); color: var(--red); }

/* ── CELEBRATION ────────────────────────────── */
.cel-ov {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 200;
}
.cel-inner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 88%;
  max-width: 420px;
}
.confetti-p {
  position: absolute;
  border-radius: 3px;
  animation: fall linear forwards;
}
.tpanim {
  font-size: 88px;
  animation: tpop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  display: inline-block;
  filter: drop-shadow(0 0 24px rgba(255,215,0,0.6));
}
.champ {
  font-family: var(--font-display);
  font-size: 44px;
  font-weight: 900;
  color: #FFD700;
  margin: 12px 0 8px;
  letter-spacing: -1.5px;
  filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
}
.cel-badge {
  display: inline-block;
  background: linear-gradient(135deg, #FF5C35, #FF8C42);
  border-radius: var(--radius-lg);
  padding: 14px 28px;
  margin: 8px 0;
  box-shadow: 0 8px 24px rgba(255,92,53,0.35);
}

/* ── INSIGHT CARD ───────────────────────────── */
.insight-card {
  background: var(--gold-light);
  border: 1.5px solid #FDE68A;
  border-radius: var(--radius-md);
  padding: 14px 18px;
  margin-bottom: 10px;
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.6;
}

/* ── PIN MODAL ──────────────────────────────── */
.pin-num-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  border-radius: var(--radius-md);
  padding: 18px;
  cursor: pointer;
  box-shadow: 0 3px 0 var(--border-strong), var(--shadow-xs);
  transition: all 80ms ease;
}
.pin-num-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--border-strong); }

/* ── ANIMATIONS ─────────────────────────────── */
@keyframes fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
@keyframes tpop {
  0% { transform: scale(0) rotate(-15deg); opacity: 0; }
  60% { transform: scale(1.15) rotate(5deg); opacity: 1; }
  80% { transform: scale(0.95) rotate(-2deg); }
  100% { transform: scale(1) rotate(0deg); }
}
@keyframes slidein {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes fadein {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}
@keyframes bounce {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}
@keyframes popIn {
  0% { transform: scale(0.85); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 0 var(--brand-shadow); }
  50% { box-shadow: 0 0 0 8px transparent; }
}

.slide-in { animation: slidein 0.22s cubic-bezier(0.34, 1.56, 0.64, 1); }
.fade-in { animation: fadein 0.28s ease; }
.do-shake { animation: shake 0.32s ease; }
.do-bounce { animation: bounce 0.28s ease; }
.pop-in { animation: popIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1); }

/* ── SMART LOGO ─────────────────────────────── */
.smart-logo {
  font-family: var(--font-display);
  font-size: 40px;
  font-weight: 900;
  letter-spacing: -2px;
  color: var(--brand);
  line-height: 1;
}
.smart-sub {
  color: var(--text-tertiary);
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 500;
  margin-top: 2px;
}

/* ── SCORE DISPLAY ──────────────────────────── */
.score-big {
  font-family: var(--font-display);
  font-size: 80px;
  font-weight: 900;
  letter-spacing: -4px;
  color: var(--text-primary);
  line-height: 1;
}
.score-denom {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 600;
  color: var(--text-tertiary);
}
</style>
</head>
<body>
<!-- SCREENS -->
<div id="s-home" class="screen active"></div>
<div id="s-avatar" class="screen"></div>
<div id="s-levels" class="screen"></div>
<div id="s-drill" class="screen"></div>
<div id="s-concept" class="screen"></div>
<div id="s-results" class="screen"></div>
<div id="s-reports" class="screen"></div>
<div id="s-parent" class="screen"></div>

<!-- Explanation modal -->
<div id="mo-xp" class="mo"><div class="mi" id="mo-body"></div></div>

<!-- Celebration overlay -->
<div id="cel-ov" class="cel-ov" onclick="closeCel()">

function getProfile(pid){
  var profiles=loadProfiles();
  for(var i=0;i<profiles.length;i++){if(profiles[i].id===pid)return profiles[i];}
  return null;
}

function addProfile(name,grade,avatar){
  var profiles=loadProfiles();
  var pid=name.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now();
  profiles.push({id:pid,name:name,grade:grade,grades:[grade],avatar:avatar});
  saveProfiles(profiles);
  return pid;
}

function getProfileGrades(pid){
  var prof=getProfile(pid);
  if(!prof)return[];
  /* support both old single grade and new grades array */
  if(prof.grades&&prof.grades.length){return prof.grades;}
  return prof.grade?[prof.grade]:[];
}

function addGradeToProfile(pid,grade){
  var profiles=loadProfiles();
  for(var i=0;i<profiles.length;i++){
    if(profiles[i].id===pid){
      if(!profiles[i].grades){profiles[i].grades=[profiles[i].grade||1];}
      if(profiles[i].grades.indexOf(grade)<0){profiles[i].grades.push(grade);}
      profiles[i].grades.sort(function(a,b){return a-b;});
      /* set primary grade to newest added */
      profiles[i].grade=grade;
      break;
    }
  }
  saveProfiles(profiles);
}

function removeGradeFromProfile(pid,grade){
  var profiles=loadProfiles();
  for(var i=0;i<profiles.length;i++){
    if(profiles[i].id===pid){
      if(!profiles[i].grades){profiles[i].grades=[profiles[i].grade||1];}
      profiles[i].grades=profiles[i].grades.filter(function(g){return g!==grade;});
      if(profiles[i].grades.length===0){profiles[i].grades=[grade];}/* can't remove all */
      if(profiles[i].grade===grade){profiles[i].grade=profiles[i].grades[0];}
      break;
    }
  }
  saveProfiles(profiles);
}

function updateProfile(pid,updates){
  var profiles=loadProfiles();
  for(var i=0;i<profiles.length;i++){
    if(profiles[i].id===pid){
      for(var k in updates){profiles[i][k]=updates[k];}
      break;
    }
  }
  saveProfiles(profiles);
}

function deleteProfile(pid){
  var profiles=loadProfiles();
  profiles=profiles.filter(function(p){return p.id!==pid;});
  saveProfiles(profiles);
  try{
    localStorage.removeItem(profileKey(pid,'p'));
    localStorage.removeItem(profileKey(pid,'h'));
    localStorage.removeItem(profileKey(pid,'av'));
  }catch(e){}
}

/* ═══════════════════════════════════════════
   ADAPTIVE TIME SYSTEM
═══════════════════════════════════════════ */
/* tier: 0=easy,1=med,2=hard,3=6th-drill,4=6th-concept */
var TL_START=[[195,225,270,300],[195,225,270,300],[195,225,300,300],[270,300,360,420],[600,600,600,600]];
var TL_FLOOR=[[120,150,180,180],[120,150,180,180],[120,150,180,180],[210,240,270,300],[360,360,360,360]];
var TL_CEIL =[[240,300,330,360],[240,300,330,360],[240,300,330,360],[360,420,480,540],[720,720,720,720]];

function getTLKey(lid){return 'smart_tl_'+lid;}
function getCurrentTL(lid,tier){
  try{
    var s=localStorage.getItem(getTLKey(lid));
    if(s)return parseInt(s,10);
  }catch(e){}
  /* default from tier 0-4, difficulty 0-3 — map lid to tier+diff */
  return defaultTL(lid,tier);
}
function defaultTL(lid,tier){
  if(tier===undefined)tier=0;
  var diff=levelDiff(lid);
  return TL_START[Math.min(tier,4)][Math.min(diff,3)];
}
function levelDiff(lid){
  var easy=['A1','A2','A3','A4','S1','S2','S3','M1','M2','M3','H1','H2','H3','H4'];
  var med=['A5','A6','A7','S4','S5','S6','M4','M5','M6','H5','H6','H7','D1','D2','I1','I2','F1','F2','R1','P1','E1'];
  var hard=['A8','A9','S7','S8','M7','M8','H8','D3','D4','D5','I3','F3','F4','R2','P2','E2','E3','G1','G2'];
  if(easy.indexOf(lid)>=0)return 0;
  if(med.indexOf(lid)>=0)return 1;
  if(hard.indexOf(lid)>=0)return 2;
  return 3;
}
function adaptTL(lid,tier,recentSessions){
  if(recentSessions.length<3)return;
  var last3=recentSessions.slice(0,3);
  /* check all 3 had 90%+ accuracy */
  var allAccurate=true;
  for(var i=0;i<last3.length;i++){if(last3[i].score<36)allAccurate=false;}
  if(!allAccurate)return; /* accuracy not there — don't touch time */
  var cur=getCurrentTL(lid,tier);
  var diff=levelDiff(lid);
  var floor=TL_FLOOR[Math.min(tier,4)][Math.min(diff,3)];
  var ceil=TL_CEIL[Math.min(tier,4)][Math.min(diff,3)];
  /* check if consistently fast (avg >30s to spare) */
  var avgTimeLeft=0;
  for(var i=0;i<last3.length;i++){avgTimeLeft+=(cur-last3[i].time);}
  avgTimeLeft=avgTimeLeft/3;
  /* check if timing out */
  var timingOut=0;
  for(var i=0;i<last3.length;i++){if(last3[i].time>=cur*0.97)timingOut++;}
  try{
    if(timingOut>=2&&cur<ceil){
      /* struggling with time — loosen by 20s */
      localStorage.setItem(getTLKey(lid),Math.min(cur+20,ceil));
    } else if(avgTimeLeft>30&&cur>floor){
      /* consistently fast — tighten by 15s */
      localStorage.setItem(getTLKey(lid),Math.max(cur-15,floor));
    }
  }catch(e){}
}
function tlabel(lid,tier){return fmt(getCurrentTL(lid,tier));}

/* ═══════════════════════════════════════════
   UNIQUE QUESTION POOLS
═══════════════════════════════════════════ */
/* Pool manager — shuffles all combos, returns next unique problem */
var POOLS={};
function getPoolKey(lid){return 'smart_pool_'+lid;}
function buildPool(lid,allProblems){
  /* shuffle Fisher-Yates */
  var arr=allProblems.slice();
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;
  }
  POOLS[lid]={problems:arr,idx:0};
}
function nextFromPool(lid,genFn,allProblems){
  if(!POOLS[lid]||POOLS[lid].idx>=POOLS[lid].problems.length){
    buildPool(lid,allProblems);
  }
  var p=POOLS[lid].problems[POOLS[lid].idx++];
  return p;
}

/* Generate all combinations for a level */
function allCombos(lid){

  else if(lid==='N3'){/* LCM */
    var pairs2=[[4,6],[3,5],[4,8],[6,9],[5,10],[3,7],[4,10],[6,8],[2,9],[5,6],[3,8],[4,7],[6,10],[8,12],[9,12]];
    for(var pi=0;pi<pairs2.length;pi++){
      var a=pairs2[pi][0],b=pairs2[pi][1];
      var g2=a,bb=b;while(bb){var t2=bb;bb=a%bb;a=t2;}
      combos.push({a:pairs2[pi][0],b:pairs2[pi][1],o:'lcm',an:pairs2[pi][0]*pairs2[pi][1]/a,display:'LCM of '+pairs2[pi][0]+' and '+pairs2[pi][1],eqQ:true});
    }
  }
  else if(lid==='N4'){/* prime factorization */
    var composites=[4,6,8,9,10,12,14,15,16,18,20,21,22,24,25,26,27,28,30,32,33,35,36,38,39,40,42,44,45,48,49,50];
    function isPrime(n){if(n<2)return false;for(var i=2;i<=Math.sqrt(n);i++){if(n%i===0)return false;}return true;}
    function smallestPrime(n){for(var i=2;i<=n;i++){if(n%i===0)return i;}return n;}
    for(var ci=0;ci<composites.length;ci++){
      var n=composites[ci];var sp=smallestPrime(n);
      combos.push({a:n,b:sp,o:'primefact',an:n/sp,display:'Divide '+n+' by its smallest prime factor '+sp+'. Result?',eqQ:true});
    }
  }
  else if(lid==='N5'){/* GCF and LCM mixed */
    var allPairs=[[12,18],[8,12],[15,25],[4,6],[3,5],[6,9],[5,10],[4,8]];
    for(var pi=0;pi<allPairs.length;pi++){
      var a=allPairs[pi][0],b=allPairs[pi][1];
      var g3=a,bc=b;while(bc){var t3=bc;bc=a%bc;a=t3;}
      var gcfVal=a;var lcmVal=allPairs[pi][0]*allPairs[pi][1]/gcfVal;
      combos.push({a:allPairs[pi][0],b:allPairs[pi][1],o:'gcf',an:gcfVal,display:'GCF of '+allPairs[pi][0]+' and '+allPairs[pi][1],eqQ:true});
      combos.push({a:allPairs[pi][0],b:allPairs[pi][1],o:'lcm',an:lcmVal,display:'LCM of '+allPairs[pi][0]+' and '+allPairs[pi][1],eqQ:true});
    }
  }
  /* EXPONENTS & ORDER OF OPERATIONS */
  else if(lid==='X1'){/* basic exponents */
    var bases=[2,3,4,5,6,7,8,9,10];var exps=[2,3,4];
    for(var bi=0;bi<bases.length;bi++){for(var ei=0;ei<exps.length;ei++){
      var val=Math.pow(bases[bi],exps[ei]);
      if(val<=10000)combos.push({a:bases[bi],b:exps[ei],o:'exp',an:val,display:bases[bi]+'^'+exps[ei]+' = ?',eqQ:true});
    }}
    /* square roots of perfect squares */
    var squares=[4,9,16,25,36,49,64,81,100,121,144];
    for(var si=0;si<squares.length;si++){combos.push({a:squares[si],b:0,o:'sqrt',an:Math.sqrt(squares[si]),display:'√'+squares[si]+' = ?',eqQ:true});}
  }
  else if(lid==='X2'){/* order of operations */
    /* 2 + 3 × 4 type problems */
    for(var a=1;a<=9;a++){for(var b=1;b<=9;b++){for(var c=1;c<=9;c++){
      combos.push({a:a,b:b,o:'pemdas',an:a+b*c,display:a+' + '+b+' × '+c+' = ?',eqQ:true});
      combos.push({a:a,b:b,o:'pemdas',an:a*b+c,display:a+' × '+b+' + '+c+' = ?',eqQ:true});
      if(a*b>c)combos.push({a:a,b:b,o:'pemdas',an:a*b-c,display:a+' × '+b+' - '+c+' = ?',eqQ:true});
    }}}
  }
  else if(lid==='X3'){/* PEMDAS with parentheses */
    for(var a=1;a<=9;a++){for(var b=1;b<=9;b++){for(var c=2;c<=6;c++){
      combos.push({a:a,b:b,o:'pemdas',an:(a+b)*c,display:'('+a+' + '+b+') × '+c+' = ?',eqQ:true});
      if(a>b)combos.push({a:a,b:b,o:'pemdas',an:(a-b)*c,display:'('+a+' - '+b+') × '+c+' = ?',eqQ:true});
    }}}
  }
  else if(lid==='X4'){/* scientific notation */
    var nums=[1200,3400,56000,780000,4500,23000,890000,12000,450,6700];
    for(var ni=0;ni<nums.length;ni++){
      var n=nums[ni];var exp=0;var base=n;
      while(base>=10){base=base/10;exp++;}
      base=Math.round(base*10)/10;
      combos.push({a:base,b:exp,o:'sci',an:exp,display:'Write '+n+' in scientific notation. What is the exponent?',eqQ:true});
    }
  }
  /* CONVERSIONS */
  else if(lid==='CV1'){/* fractions to decimals */
    var fracs=[[1,2],[1,4],[3,4],[1,5],[2,5],[3,5],[4,5],[1,8],[3,8],[5,8],[7,8],[1,10],[3,10],[7,10],[9,10],[1,3],[2,3]];
    for(var fi=0;fi<fracs.length;fi++){
      var dec=Math.round(fracs[fi][0]/fracs[fi][1]*1000)/1000;
      combos.push({a:fracs[fi][0]+'/'+fracs[fi][1],b:0,o:'todec',an:dec,display:fracs[fi][0]+'/'+fracs[fi][1]+' as a decimal',eqQ:true,fracAns:false});
    }
  }
  else if(lid==='CV2'){/* decimals to percents */
    var decs=[0.1,0.2,0.25,0.3,0.4,0.5,0.6,0.7,0.75,0.8,0.9,0.05,0.15,0.35,0.45,0.55,0.65,0.85,0.95,1.0];
    for(var di=0;di<decs.length;di++){combos.push({a:decs[di],b:0,o:'topct',an:Math.round(decs[di]*100),display:decs[di]+' as a percent',eqQ:true});}
  }
  else if(lid==='CV3'){/* fractions to percents */
    var fracs3=[[1,2],[1,4],[3,4],[1,5],[2,5],[3,5],[4,5],[1,10],[3,10],[7,10],[1,3],[2,3],[1,8],[3,8]];
    for(var fi=0;fi<fracs3.length;fi++){
      var pct=Math.round(fracs3[fi][0]/fracs3[fi][1]*100);
      combos.push({a:fracs3[fi][0]+'/'+fracs3[fi][1],b:0,o:'topct',an:pct,display:fracs3[fi][0]+'/'+fracs3[fi][1]+' as a percent',eqQ:true});
    }
  }
  else if(lid==='CV4'){/* all conversions mixed */
    var mixed=[[1,2,0.5,50],[1,4,0.25,25],[3,4,0.75,75],[1,5,0.2,20],[2,5,0.4,40],[3,5,0.6,60],[1,10,0.1,10],[3,10,0.3,30]];
    for(var mi=0;mi<mixed.length;mi++){
      combos.push({a:mixed[mi][0]+'/'+mixed[mi][1],b:0,o:'todec',an:mixed[mi][2],display:mixed[mi][0]+'/'+mixed[mi][1]+' as a decimal',eqQ:true});
      combos.push({a:mixed[mi][2],b:0,o:'topct',an:mixed[mi][3],display:mixed[mi][2]+' as a percent',eqQ:true});
    }
  }
  /* cap and deduplicate */
  if(combos.length>120)combos=combos.slice(0,120);
  return combos;
}
function gcd(a,b){return b===0?a:gcd(b,a%b);}

function getNextProblem(lid){
  if(!POOLS[lid]){
    var combos=allCombos(lid);
    if(combos.length>0)buildPool(lid,combos);
    else return fallbackGen(lid);
  }
  if(POOLS[lid].idx>=POOLS[lid].problems.length){
    buildPool(lid,POOLS[lid].problems);
  }
  return POOLS[lid].problems[POOLS[lid].idx++];
}
function buildPool(lid,arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  POOLS[lid]={problems:a,idx:0};
}
function fallbackGen(lid){
  var a=rnd(1,9),b=rnd(1,9);
  return{a:a,b:b,o:'+',an:a+b};
}

function getCats(grade){return CURRICULUM[grade]||[];}
function findLvl(grade,lid){
  var cats=getCats(grade);
  for(var i=0;i<cats.length;i++){for(var j=0;j<cats[i].lv.length;j++){if(cats[i].lv[j].id===lid)return{cat:cats[i],lv:cats[i].lv[j],ci:i,li:j};}}
  return null;
}
function isUnlocked(grade,lid,pid){
  pid=pid||ST.profileId;
  var r=findLvl(grade,lid);if(!r)return false;
  if(r.li===0)return true;
  var prev=r.cat.lv[r.li-1];
  var pp=loadProg(grade,pid)[prev.id];
  return !!(pp&&pp.passed);
}

function colMul(a,b,an){
  var w=Math.max(String(a).length,String(b).length,String(an).length)+2;
  function pd(s){s=String(s);while(s.length<w){s=' '+s;}return s;}
  var ln='';while(ln.length<w){ln+='-';}
  return '<div style="text-align:center;margin:12px 0"><span class="cm">'+pd(a)+'\nx '+String(b)+'\n'+ln+'\n<span style="color:#10B981">'+pd(an)+'</span></span></div>';
}
function colMulSteps(a,b){
  var aD=[];var aS=String(a).split('').reverse();
  for(var x=0;x<aS.length;x++){aD.push(parseInt(aS[x],10));}
  var names=['ones','tens','hundreds'];
  var out='<div class="sb" style="font-size:14px">',carry=0,i,prod,wr,nc;
  for(i=0;i<aD.length;i++){
    prod=aD[i]*b+carry;wr=prod%10;nc=Math.floor(prod/10);
    if(nc>0){out+='<div style="margin:4px 0"><b>'+(names[i]||'col')+':</b> '+aD[i]+'x'+b+(carry?'+'+carry+'(carry)':'')+'='+prod+' write <span style="color:#10B981">'+wr+'</span> carry <span style="color:#FFD700">'+nc+'</span></div>';}
    else{out+='<div style="margin:4px 0"><b>'+(names[i]||'col')+':</b> '+aD[i]+'x'+b+(carry?'+'+carry+'(carry)':'')+'=<span style="color:#10B981">'+prod+'</span></div>';}
    carry=nc;
  }
  if(carry){out+='<div style="margin:4px 0"><b>carry:</b> <span style="color:#10B981">'+carry+'</span></div>';}
  return out+'</div>';
}
function colAdd(a,b,an){
  var aD=String(a).split('').reverse().map(function(x){return parseInt(x,10);});
  var bD=String(b).split('').reverse().map(function(x){return parseInt(x,10);});
  var w=Math.max(String(a).length,String(b).length,String(an).length);
  var names=['ones','tens','hundreds'];var carry=0,out='<div class="sb" style="font-size:14px">',i,sm,wr,nc;
  for(i=0;i<w||carry;i++){
    var ad=aD[i]||0,bd=bD[i]||0;sm=ad+bd+carry;wr=sm%10;nc=Math.floor(sm/10);
    if(nc>0){out+='<div style="margin:4px 0"><b>'+(names[i]||'col')+':</b> '+ad+'+'+bd+(carry?'+1carry':'')+' = '+sm+' write <span style="color:#10B981">'+wr+'</span> carry <span style="color:#FFD700">1</span></div>';}
    else{out+='<div style="margin:4px 0"><b>'+(names[i]||'col')+':</b> '+ad+'+'+bd+(carry?'+1carry':'')+'=<span style="color:#10B981">'+sm+'</span></div>';}
    carry=nc;
  }
  return out+'</div>';
}
function colSub(a,b,an){
  var aD=String(a).split('').reverse().map(function(x){return parseInt(x,10);});
  var bD=String(b).split('').reverse().map(function(x){return parseInt(x,10);});
  var w=Math.max(String(a).length,String(b).length,String(an).length);
  var names=['ones','tens','hundreds'];var adj=aD.slice(),out='<div class="sb" style="font-size:14px">',i,ad,bd;
  for(i=0;i<w;i++){
    ad=adj[i]||0;bd=bD[i]||0;
    if(ad<bd){out+='<div style="margin:4px 0"><b>'+(names[i]||'col')+':</b> '+ad+' &lt; '+bd+' borrow! '+(ad+10)+'-'+bd+'=<span style="color:#10B981">'+(ad+10-bd)+'</span></div>';adj[i+1]=(adj[i+1]||0)-1;}
    else{out+='<div style="margin:4px 0"><b>'+(names[i]||'col')+':</b> '+ad+'-'+bd+'=<span style="color:#10B981">'+(ad-bd)+'</span></div>';}
  }
  return out+'</div>';
}

function xplain(pr){
  if(!pr)return '';
  var a=pr.a,b=pr.b,o=pr.o,an=pr.an,i,seq,sm,bg;
  /* missing factor */
  if(pr.mf){
    seq='';for(i=1;i<=an;i++){seq+='<span style="color:'+(i===an?'#00c864':'#FFD700')+'">'+(b*i)+'</span>'+(i<an?' &gt; ':'');}
    return '<div class="sb">The question is: <span class="hl">? x '+b+' = '+pr.ans2+'</span></div>'+
      '<div class="sb">Count by '+b+'s: '+seq+'</div>'+
      '<div class="sb" style="text-align:center"><span class="hl">'+an+'</span> x <span class="hl">'+b+'</span> = <span class="ah">'+pr.ans2+'</span></div>';
  }
  /* fraction problems — show the rule */
  if(pr.disp){
    return '<div class="sb">Multiply numerators together, denominators together</div>'+
      '<div class="sb" style="text-align:center"><span class="hl">'+pr.disp+'</span> = <span class="ah">'+an+'</span></div>';
  }
  /* percentage */
  if(pr.percQ){
    var dec=pr.pct/100;
    return '<div class="sb">To find '+pr.pct+'% of '+pr.val+':<br>Move decimal: '+pr.pct+'% = '+dec+'<br>'+dec+' x '+pr.val+' = <span class="ah">'+an+'</span></div>';
  }
  /* equation */
  if(pr.eqQ){
    return '<div class="sb">Work backwards to isolate n:<br><span class="hl">'+pr.display+'</span><br>Answer: n = <span class="ah">'+an+'</span></div>';
  }
  /* geometry */
  if(pr.geoQ){
    if(o==='tri'){return '<div class="sb">Triangle angles always add up to 180°<br>'+pr.a+' + '+pr.b+' + ? = 180<br>? = 180 - '+pr.a+' - '+pr.b+' = <span class="ah">'+an+'</span></div>';}
    if(o==='comp'){return '<div class="sb">Complementary angles add to 90°<br>90 - '+pr.a+' = <span class="ah">'+an+'</span>°</div>';}
    if(o==='supp'){return '<div class="sb">Supplementary angles add to 180°<br>180 - '+pr.a+' = <span class="ah">'+an+'</span>°</div>';}
  }
  /* integers */
  if(typeof a === 'number' && a < 0 || typeof b === 'number' && b < 0){
    return '<div class="sb">Integer rule: <span class="hl">'+a+' '+o+' '+b+'</span><br>'+
      (o==='x'?'Same signs → positive, different signs → negative<br>':'Use number line — negatives go left<br>')+
      'Answer: <span class="ah">'+an+'</span></div>';
  }
  /* addition */
  if(o==='+'){
    if(a<10&&b<10){
      bg=Math.max(a,b);sm=Math.min(a,b);seq='';
      for(i=1;i<=sm;i++){seq+='<span style="color:'+(i===sm?'#00c864':'#FFD700')+'">'+(bg+i)+'</span>'+(i<sm?' &gt; ':'');}
      return '<div class="sb">Start at <span class="hl">'+bg+'</span>, count up <span class="hl">'+sm+'</span>: '+seq+'</div>'+
        '<div class="sb" style="text-align:center"><span class="hl">'+a+'</span> + <span class="hl">'+b+'</span> = <span class="ah">'+an+'</span></div>';
    }
    var w=Math.max(String(a).length,String(b).length,String(an).length)+2;
    function pd(s){s=String(s);while(s.length<w){s=' '+s;}return s;}
    var ln='';while(ln.length<w){ln+='-';}
    return '<div style="text-align:center;margin:10px 0"><span class="cm">'+pd(a)+'\n+ '+String(b)+'\n'+ln+'\n<span style="color:#10B981">'+pd(an)+'</span></span></div>'+colAdd(a,b,an);
  }
  /* subtraction */
  if(o==='-'){
    if(a<=18&&b<=9){
      var lm=Math.min(b,6);seq='';
      for(i=1;i<=lm;i++){seq+='<span style="color:'+(i===b?'#00c864':'#FFD700')+'">'+(a-i)+'</span>'+(i<lm?' &gt; ':'');}
      if(b>6){seq+=' ... <span style="color:#10B981">'+an+'</span>';}
      return '<div class="sb">Count back from <span class="hl">'+a+'</span>: '+seq+'</div>'+
        '<div class="sb" style="text-align:center"><span class="hl">'+a+'</span> - <span class="hl">'+b+'</span> = <span class="ah">'+an+'</span></div>';
    }
    var w2=Math.max(String(a).length,String(b).length,String(an).length)+2;
    function pd2(s){s=String(s);while(s.length<w2){s=' '+s;}return s;}
    var ln2='';while(ln2.length<w2){ln2+='-';}
    return '<div style="text-align:center;margin:10px 0"><span class="cm">'+pd2(a)+'\n- '+String(b)+'\n'+ln2+'\n<span style="color:#10B981">'+pd2(an)+'</span></span></div>'+colSub(a,b,an);
  }
  /* multiplication */
  if(o==='x'){
    if(a<=12&&b<=12){
      sm=Math.min(a,b);bg=Math.max(a,b);seq='';
      for(i=1;i<=sm;i++){seq+='<span style="color:'+(i===sm?'#00c864':'#FFD700')+'">'+(bg*i)+'</span>'+(i<sm?' &gt; ':'');}
      return '<div class="sb"><span class="hl">'+a+'x'+b+'</span> = '+sm+' groups of <span class="hl">'+bg+'</span></div>'+
        '<div class="sb">Count by '+bg+'s: '+seq+'</div>'+
        '<div class="sb" style="text-align:center"><span class="hl">'+a+'</span> x <span class="hl">'+b+'</span> = <span class="ah">'+an+'</span></div>';
    }
    return colMul(a,b,an)+colMulSteps(a,b);
  }
  return '<div class="sb" style="text-align:center">Answer: <span class="ah">'+an+'</span></div>';
}

/* ═══════════════════════════════════════════
   WORD PROBLEM BANK (6th grade)
═══════════════════════════════════════════ */
var ITEMS=['shirt','jacket','book','toy','game','hat','pair of shoes','backpack','notebook','phone case','skateboard','soccer ball','pizza','sandwich','smoothie'];
var NAMES=['Alex','Jordan','Sam','Taylor','Casey','Morgan','Riley','Jamie','Drew','Quinn'];
var PLACES=['store','market','mall','shop','school store'];

function wpBank(){
  var bank=[];
  /* PERCENTAGES */
  var pcts=[10,15,20,25,30,40,50];
  var prices=[20,30,40,48,50,60,80,100,120,150,200];
  for(var pi=0;pi<pcts.length;pi++){
    for(var vi=0;vi<prices.length;vi++){
      var p=prices[vi],pct=pcts[pi];
      var disc=Math.round(p*pct/100);
      var sale=p-disc;
      var item=pick(ITEMS);
      bank.push({
        type:'pct_sale',
        q:'A '+item+' costs $'+p+'. It is '+pct+'% off. What is the sale price?',
        an:sale,unit:'$',
        choices:makeChoices(sale,[p,disc,p+disc,sale+5,sale-5])
      });
      bank.push({
        type:'pct_of',
        q:'What is '+pct+'% of '+p+'?',
        an:disc,unit:'',
        choices:makeChoices(disc,[p,sale,disc+10,disc-10,disc*2])
      });
    }
  }
  /* RATIOS */
  var ratios=[[1,2],[1,3],[2,3],[3,4],[1,4],[2,5],[3,5]];
  var totals=[12,15,18,20,24,25,30,35,36,40];
  for(var ri=0;ri<ratios.length;ri++){
    for(var ti=0;ti<totals.length;ti++){
      var r=ratios[ri],tot=totals[ti];
      var parts=r[0]+r[1];
      if(tot%parts===0){
        var a=tot*r[0]/parts,b=tot*r[1]/parts;
        var n1=pick(NAMES),n2=pick(NAMES);
        bank.push({
          type:'ratio',
          q:n1+' and '+n2+' share '+tot+' stickers in a ratio of '+r[0]+':'+r[1]+'. How many does '+n1+' get?',
          an:a,unit:'stickers',
          choices:makeChoices(a,[b,tot,a+2,a-2,Math.round(tot/2)])
        });
      }
    }
  }
  /* ONE-STEP EQUATIONS */
  for(var x=2;x<=25;x++){
    for(var b=1;b<=20;b++){
      var nm=pick(NAMES);
      bank.push({
        type:'eq1_add',
        q:nm+' has some marbles. After getting '+b+' more, '+nm+' has '+(x+b)+'. How many did '+nm+' start with?',
        an:x,unit:'marbles',
        choices:makeChoices(x,[x+b,b,x+2,x-2,x*2])
      });
    }
    for(var m=2;m<=12;m++){
      if(x*m<=144){
        var nm2=pick(NAMES);
        bank.push({
          type:'eq1_mul',
          q:nm2+' buys '+m+' packs of cards. Each pack has the same number. '+nm2+' has '+(x*m)+' cards total. How many per pack?',
          an:x,unit:'cards',
          choices:makeChoices(x,[x*m,m,x+2,x*2,x-1])
        });
      }
    }
  }
  /* TWO-STEP EQUATIONS */
  for(var x=1;x<=12;x++){
    for(var m=2;m<=8;m++){
      for(var b=2;b<=12;b++){
        if(m*x+b<=80){
          var nm3=pick(NAMES);
          bank.push({
            type:'eq2',
            q:nm3+' earns $'+m+' per hour plus a $'+b+' bonus. '+nm3+' made $'+(m*x+b)+'. How many hours did '+nm3+' work?',
            an:x,unit:'hours',
            choices:makeChoices(x,[m*x+b,b,x+2,x*2,m])
          });
        }
      }
    }
  }
  /* GEOMETRY — ANGLES */
  for(var a=10;a<=80;a+=10){
    for(var b=10;b<=80;b+=10){
      if(a+b<180){
        var c=180-a-b;
        bank.push({
          type:'tri_angle',
          q:'A triangle has angles of '+a+'° and '+b+'°. What is the third angle?',
          an:c,unit:'°',
          choices:makeChoices(c,[a,b,180-c,c+10,c-10])
        });
      }
    }
    bank.push({
      type:'comp',
      q:'Two angles are complementary. One angle is '+a+'°. What is the other angle?',
      an:90-a,unit:'°',
      choices:makeChoices(90-a,[a,180-a,90+a,90-a+10,90-a-10])
    });
    bank.push({
      type:'supp',
      q:'Two angles are supplementary. One angle is '+a+'°. What is the other angle?',
      an:180-a,unit:'°',
      choices:makeChoices(180-a,[a,90-a,180+a,180-a+10,180-a-10])
    });
  }
  /* INTEGERS WORD PROBLEMS */
  for(var a=-20;a<=20;a+=3){
    for(var b=-20;b<=20;b+=4){
      if(a!==0&&b!==0){
        var ctx=a>0?'gains':'loses';
        bank.push({
          type:'int_wp',
          q:'The temperature is '+a+'°. It changes by '+(b>0?'+':'')+b+'°. What is the new temperature?',
          an:a+b,unit:'°',
          choices:makeChoices(a+b,[a,b,a-b,a+b+5,a+b-5])
        });
      }
    }
  }
  /* shuffle bank */
  for(var i=bank.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=bank[i];bank[i]=bank[j];bank[j]=t;}
  return bank;
}

function makeChoices(correct,distractors){
  var choices=[correct];
  var used={};used[String(correct)]=true;
  /* add valid distractors */
  for(var i=0;i<distractors.length&&choices.length<4;i++){
    var d=distractors[i];
    if(d!==correct&&!used[String(d)]&&d!==null&&d!==undefined){
      choices.push(d);used[String(d)]=true;
    }
  }
  /* fill remaining with offsets — handles negative answers safely */
  var offsets=[1,-1,2,-2,3,-3,5,-5,7,-7,10,-10,4,-4,6,-6,8,-8,11,-11,13,-13];
  var oi=0;
  var safety=0;
  while(choices.length<4&&safety<50){
    safety++;
    var offset=offsets[oi%offsets.length];oi++;
    var c2=correct+offset;
    if(!used[String(c2)]){choices.push(c2);used[String(c2)]=true;}
  }
  /* shuffle choices */
  for(var i=choices.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=choices[i];choices[i]=choices[j];choices[j]=t;}
  return choices;
}

function getNextWP(){

}

function selectProfile(idx){

    h+='<div style="float:right;font-size:13px;color:#94A3B8">'+catPassed+'/'+cat.lv.length+'</div><div style="clear:both"></div></div>';

    h+='<div class="lg">';

      h+='<div style="font-size:11px;margin-top:4px;color:#FFD700">'+( wbest!==null?(wbest+'/20'):(wok?'Try it!':'Locked'))+'</div>';
      h+='</div>';
    }
    h+='</div>';
    h+='</div>';
  }
  h+='<div class="sp"></div><button class="btn btn-secondary" onclick="renderReports('+grade+',\''+pid+'\')">'+'&#128202; My Reports</button>';
  el('s-levels').innerHTML=h;go('s-levels');

function goLevel(grade,ci,li,pid){
  var cats=getCats(grade);
  var cat=cats[ci];var lv=cat.lv[li];
  if(!isUnlocked(grade,lv.id,pid))return;
  ST.grade=grade;ST.ci=ci;ST.lid=lv.id;ST.tier=lv.tier||0;ST.mode='drill';
  if(pid){ST.profileId=pid;}
  startDrill();
}

/* ═══════════════════════════════════════════
   DRILL MODE
═══════════════════════════════════════════ */
function startDrill(){
  var Q=Q_DRILL;
  ST.probs=[];ST.as=[];
  for(var i=0;i<Q;i++){ST.probs.push(getNextProblem(ST.lid));}
  for(var i=0;i<Q;i++){ST.as.push(null);}
  ST.q=0;ST.inp='';ST.t0=Date.now();ST.elapsed=0;ST.xp=0;ST.streak=0;
  clearInterval(ST.tint);
  ST.tint=setInterval(function(){
    ST.elapsed=Math.floor((Date.now()-ST.t0)/1000);
    var t=el('tmr');if(t){t.innerHTML='&#9203; '+fmt(ST.elapsed);}
  },500);
  renderDrill();
}

function renderDrill(){
  var gc=gradeConf(ST.grade);
  var pr=ST.probs[ST.q];
  var Q=Q_DRILL;
  var pct=Math.round(ST.q/Q*100);
  var tl=getCurrentTL(ST.lid,ST.tier);
  var r=findLvl(ST.grade,ST.lid);
  var catColor=r?r.cat.color:gc.color;

  /* build problem display */
  var probHTML;
  if(pr.mf){
    probHTML='<span style="color:#FFD700;font-size:52px;font-weight:700">?</span> <span style="color:'+catColor+'">x</span> '+pr.b+' = '+pr.display;
  } else if(pr.geoQ){
    probHTML='<div style="font-size:20px;line-height:1.6;color:#1E293B;padding:0 8px">'+pr.display+'</div>';
  } else if(pr.percQ){
    probHTML='<div style="font-size:22px;font-weight:700">'+pr.display+'</div>';
  } else if(pr.eqQ){
    probHTML='<div style="font-size:30px;font-weight:700;color:#1E293B">Solve: <span style="color:'+catColor+'">'+pr.display+'</span></div>';
  } else if(pr.disp){
    probHTML='<div style="font-size:30px;font-weight:700">'+pr.disp+'</div>';
  } else {
    probHTML=String(pr.a)+' <span style="color:'+catColor+'">'+pr.o+'</span> '+String(pr.b);
  }

  var h='<div class="hdr"><div style="float:left"><button class="bbtn" onclick="quitDrill()">Quit</button></div>';
  h+='<div style="float:right"><span class="tb" id="tmr">&#9203; '+fmt(ST.elapsed)+'</span></div>';
  h+='<div style="text-align:center;padding-top:6px;font-size:15px;font-weight:700;color:'+catColor+'">'+ST.lid+' &nbsp;·&nbsp; Q '+(ST.q+1)+'/'+Q+'</div>';
  h+='<div style="clear:both"></div></div>';
  /* streak badge */
  if(ST.streak>=3){h+='<div style="text-align:center;margin-bottom:8px"><span class="streak-badge">&#128293; '+ST.streak+' in a row!</span></div>';}
  /* XP bar */
  var xpPct=Math.round(ST.xp/Q*100);
  h+='<div class="xpbar"><div style="overflow:hidden;margin-bottom:4px"><span style="float:left;font-size:11px;color:#94A3B8">XP</span><span style="float:right;font-size:11px;color:#94A3B8">'+ST.xp+'/'+Q+'</span><div style="clear:both"></div></div>';
  h+='<div class="xpbar-track"><div class="xpbar-fill" style="width:'+xpPct+'%"></div></div></div>';
  /* progress bar */
  h+='<div class="pbar"><div class="pbar-f" style="width:'+pct+'%;background:'+catColor+'"></div></div>';
  /* problem card */
  h+='<div class="pc slide-in" id="pc"><div class="pn">'+probHTML+'</div>';
  if(!pr.geoQ&&!pr.eqQ&&!pr.percQ&&!pr.disp){h+='<div style="font-size:30px;color:#94A3B8;margin:6px 0">=</div>';}
  h+='<div class="pa" id="pa">'+(ST.inp||'?')+'</div></div>';
  /* numpad */
  var needNeg=(typeof pr.a==='number'&&pr.a<0)||(typeof pr.b==='number'&&pr.b<0)||(pr.o==='-'&&pr.an<0)||(pr.o==='+'&&pr.an<0);
  h+='<div class="np">';
  h+='<div class="nr"><button class="nb" style="color:#1E293B" onclick="ni(7)">7</button><button class="nb" style="color:#1E293B" onclick="ni(8)">8</button><button class="nb" style="color:#1E293B" onclick="ni(9)">9</button></div>';
  h+='<div class="nr"><button class="nb" style="color:#1E293B" onclick="ni(4)">4</button><button class="nb" style="color:#1E293B" onclick="ni(5)">5</button><button class="nb" style="color:#1E293B" onclick="ni(6)">6</button></div>';
  h+='<div class="nr"><button class="nb" style="color:#1E293B" onclick="ni(1)">1</button><button class="nb" style="color:#1E293B" onclick="ni(2)">2</button><button class="nb" style="color:#1E293B" onclick="ni(3)">3</button></div>';
  h+='<div class="nr"><button class="nb nb-del" style="color:#EF4444" onclick="nd()">Del</button><button class="nb" style="color:#1E293B" onclick="ni(0)">0</button><button class="nb nb-ok" style="background:'+catColor+'" onclick="subDrill()">OK</button></div>';
  if(needNeg){h+='<div class="nr"><button class="nb" style="width:66%;margin-right:0" onclick="toggleNeg()">+/- (negative)</button></div>';}
  h+='</div>';
  /* time limit indicator */
  h+='<div style="text-align:center;margin-top:12px;font-size:12px;color:#94A3B8">Time limit: '+fmt(tl)+'</div>';
  el('s-drill').innerHTML=h;go('s-drill');
}

function ni(v){
  if(ST.inp.length<6){ST.inp=ST.inp+String(v);}
  var e=el('pa');if(e){e.innerHTML=ST.inp||'?';}
}
function nd(){ST.inp=ST.inp.slice(0,-1);var e=el('pa');if(e){e.innerHTML=ST.inp||'?';}}
function toggleNeg(){
  if(ST.inp.charAt(0)==='-'){ST.inp=ST.inp.slice(1);}
  else if(ST.inp.length>0){ST.inp='-'+ST.inp;}
  var e=el('pa');if(e){e.innerHTML=ST.inp||'?';}
}

function subDrill(){
  if(!ST.inp)return;
  var pr=ST.probs[ST.q];
  var correctAns=pr.mf?pr.ans2:pr.an;
  /* handle string answers (fractions, ratios) */
  var ua;
  if(pr.fracAns||pr.ratioQ){ua=ST.inp;}
  else{ua=parseInt(ST.inp,10);}
  var ok=(String(ua)===String(correctAns));
  ST.as[ST.q]=ua;
  var pc2=el('pc'),pa=el('pa');
  if(ok){
    ST.xp++;ST.streak++;
    if(pc2){pc2.className='pc correct do-bounce';}
    if(pa){pa.style.color='#00c864';pa.innerHTML='&#10003;';}
    ST.inp='';setTimeout(nextDrillQ,420);
  } else {
    ST.streak=0;
    if(pc2){pc2.className='pc wrong do-shake';}
    if(pa){pa.style.color='#ff5050';pa.innerHTML=String(ua)+' &#10007;';}
    curPr=pr;setTimeout(showXP,720);
  }
}

function showXP(){
  var pr=curPr;if(!pr)return;
  var correctAns=pr.mf?pr.ans2:pr.an;
  el('mo-body').innerHTML='<div style="text-align:center;margin-bottom:16px">'+
    '<div style="font-size:38px">&#129300;</div>'+
    '<h2 style="font-size:21px;font-weight:700;margin:6px 0">Let\'s work it out!</h2>'+
    '<div style="background:#FFFFFF;border-radius:12px;padding:10px;margin-top:8px;font-size:17px">'+
    (pr.display||pr.a+' '+pr.o+' '+pr.b)+' = <span style="color:#10B981;font-size:21px;font-weight:700">'+correctAns+'</span></div></div>'+
    xplain(pr)+
    '<div style="height:14px"></div><button class="btn btn-primary" style="background:#6c5ce7" onclick="closeXP()">Got it! Next &#8594;</button>';
  el('mo-xp').style.display='block';
}
function closeXP(){el('mo-xp').style.display='none';ST.inp='';nextDrillQ();}
function nextDrillQ(){
  if(ST.q+1>=Q_DRILL){finishDrill();}
  else{ST.q++;ST.inp='';renderDrill();}
}
function quitDrill(){
  clearInterval(ST.tint);
  el('mo-xp').style.display='none';
  /* save partial session if at least 5 questions done */
  if(ST.q>=5){
    var score=0;
    for(var i=0;i<ST.q;i++){
      var correctAns=ST.probs[i].mf?ST.probs[i].ans2:ST.probs[i].an;
      if(String(ST.as[i])===String(correctAns))score++;
    }
    addHist(ST.grade,{date:new Date().toISOString(),lid:ST.lid,score:score,time:ST.elapsed,ans:[],mode:'drill',partial:true,qDone:ST.q,subject:'math'});
    syncToCloud(ST.grade);
  }
  renderCurriculum(ST.grade);
}

/* ═══════════════════════════════════════════
   FINISH DRILL
═══════════════════════════════════════════ */
function finishDrill(){
  clearInterval(ST.tint);
  var time=ST.elapsed,score=0,i;
  for(i=0;i<ST.probs.length;i++){
    var correctAns=ST.probs[i].mf?ST.probs[i].ans2:ST.probs[i].an;
    if(String(ST.as[i])===String(correctAns))score++;
  }
  var p=loadProg(ST.grade,ST.profileId);
  var lid=ST.lid;
  var prev=p[lid]||{attempts:0,bestScore:0,bestTime:9999,streak:0,passed:false};
  var tl=getCurrentTL(lid,ST.tier);
  var onTime=(time<=tl);
  var thisGood=(score>=36&&onTime);
  var isFirstAttempt=(prev.attempts===0);
  var streak=thisGood?(prev.streak||0)+1:0;
  /* first-time pass OR 3-in-a-row = unlock */
  var nowPassed=prev.passed||(isFirstAttempt&&thisGood)||(streak>=3);
  p[lid]={attempts:prev.attempts+1,bestScore:Math.max(prev.bestScore,score),bestTime:(score>prev.bestScore?time:prev.bestTime),streak:streak,passed:nowPassed,firstPassScore:isFirstAttempt&&thisGood?score:prev.firstPassScore};
  saveProg(ST.grade,p,ST.profileId);
  /* detailed answer log */
  var ansLog=[];
  for(i=0;i<ST.probs.length;i++){
    var correctAns2=ST.probs[i].mf?ST.probs[i].ans2:ST.probs[i].an;
    ansLog.push({a:ST.probs[i].a,b:ST.probs[i].b,o:ST.probs[i].o,correct:correctAns2,given:ST.as[i],ok:(String(ST.as[i])===String(correctAns2))});
  }
  addHist(ST.grade,{date:new Date().toISOString(),lid:lid,score:score,time:time,ans:ansLog,mode:'drill',subject:'math'});
  /* adaptive time */
  var recentSess=loadHist(ST.grade,ST.profileId).filter(function(x){return x.lid===lid;}).slice(0,5);
  adaptTL(lid,ST.tier,recentSess);
  /* sync AFTER addHist so current session is included */
  syncToCloud(ST.grade);
  /* build result screen */
  var stars=score>=36?'***':score>=30?'**':score>=20?'*':'';
  var icon=score>=36?'&#127942;':score>=30?'&#127775;':'&#128170;';
  var msg;
  if(score===40&&onTime){msg='PERFECT SCORE AND SPEED! You are a genius! &#127942;';}
  else if(score===40&&!onTime){msg='Perfect score! Now build your speed! &#127942;';}
  else if(score>=36&&onTime){msg='Amazing work! Speed and accuracy! &#127775;';}
  else if(score>=36&&!onTime){msg='Great accuracy! Work on speed! &#11088;';}
  else if(score>=30){msg='Good job! Aim for 36+ next time! &#128170;';}
  else if(score>=20){msg='Good try! Keep going! &#128170;';}
  else{msg='Practice makes perfect! You will get there!';}
  var streak2=(p[lid]&&p[lid].streak)||0;
  var unl;
  if(isFirstAttempt&&thisGood){unl='<div style="color:#10B981;font-weight:700;margin-top:10px;font-size:16px">&#127942; First try pass! Level unlocked!</div>';setTimeout(function(){showCelebration(lid,ST.grade);},800);}
  else if(streak2>=3){unl='<div style="color:#10B981;font-weight:700;margin-top:10px;font-size:16px">&#127942; Level mastered! Next unlocked!</div>';setTimeout(function(){showCelebration(lid,ST.grade);},800);}
  else if(thisGood){unl='<div style="color:#10B981;margin-top:10px;font-size:14px">Great session! Streak: '+streak2+'/3 &#128293;</div>';}
  else if(score>=36&&!onTime){unl='<div style="color:#FDB927;margin-top:10px;font-size:14px">Perfect accuracy! Need under '+fmt(tl)+' to count</div>';}
  else{unl='<div style="color:#ff5050;margin-top:10px;font-size:14px">Need 36/40 and under '+fmt(tl)+'</div>';}
  /* check if tl was adapted */
  var newTl=getCurrentTL(lid,ST.tier);
  var tlNote='';
  if(newTl!==tl){tlNote='<div style="color:#94A3B8;font-size:12px;margin-top:6px">Time limit adjusted to '+fmt(newTl)+'</div>';}
  var gc=gradeConf(ST.grade);
  var h='<div style="text-align:center;margin-bottom:16px"><div style="font-size:52px">'+icon+'</div>';
  h+='<h2 style="font-size:28px;font-weight:800;margin:6px 0">Done!</h2>';
  h+='<div style="color:#64748B">'+lid+' &nbsp;·&nbsp; '+fmt(time)+' &nbsp;·&nbsp; Limit: '+fmt(tl)+'</div></div>';
  h+='<div class="card" style="text-align:center">';
  h+='<div style="font-size:62px;font-weight:800;color:#FFD700">'+score+'<span style="font-size:30px;color:#94A3B8">/40</span></div>';
  h+='<div style="font-size:22px;margin:8px 0;color:#FFD700">'+(stars||'...')+'</div>';
  h+='<div style="font-size:16px;color:#1E293B">'+msg+'</div>'+unl+tlNote+'</div>';
  h+='<div class="card"><div class="lbl" style="color:#94A3B8">Answers</div><div class="ag">';
  for(i=0;i<ST.probs.length;i++){
    var pr2=ST.probs[i];var ua2=ST.as[i];
    var correctAns3=pr2.mf?pr2.ans2:pr2.an;
    var okI=(String(ua2)===String(correctAns3));
    var qlbl=pr2.display||(pr2.a+' '+pr2.o+' '+pr2.b);
    h+='<div class="ai" style="background:'+(okI?'rgba(0,200,100,0.08)':'rgba(255,80,80,0.08)')+';border:1px solid '+(okI?'#00c86420':'#ff505020')+'">';
    h+='<div style="color:#334155;font-size:11px">'+qlbl+'</div>';
    h+='<div style="font-weight:700;color:'+(okI?'#55efc4':'#ff7675')+'">'+( okI?correctAns3+' &#10003;':(ua2!==null?ua2:'?')+' &#10007;')+'</div>';
    h+='</div>';
  }
  h+='</div></div>';
  var ci2=ST.ci;var g2=ST.grade;
  h+='<div class="rbx"><button class="hb" style="background:'+gc.color+';color:#fff" onclick="startDrill()">&#8635; Try Again</button>';
  h+='<button class="hb btn-secondary" onclick="renderCurriculum('+g2+',\''+ST.profileId+'\')">&#128218; Levels</button></div>';
  h+='<div class="sp"></div><button class="btn btn-secondary" onclick="renderHome()">&#127968; Home</button>';
  el('s-results').innerHTML=h;go('s-results');
}

/* ═══════════════════════════════════════════
   CONCEPT MODE (6th grade word problems)
═══════════════════════════════════════════ */
/* Word problem banks by level */
function wpBankForLevel(lvlId){
  var bank=[];
  if(lvlId==='WP1'||lvlId==='WP6'){
    /* PERCENTAGES */
    var pcts=[10,15,20,25,30,40,50];
    var prices=[20,30,40,50,60,80,100,120,150,200];
    for(var pi=0;pi<pcts.length;pi++){
      for(var vi=0;vi<prices.length;vi++){
        var p=prices[vi],pct=pcts[pi];
        var disc=Math.round(p*pct/100);
        var sale=p-disc;
        var item=pick(ITEMS);
        bank.push({type:'pct',q:'A '+item+' costs $'+p+'. It is '+pct+'% off. What is the sale price?',an:sale,unit:'$',choices:makeChoices(sale,[p,disc,p+disc,sale+5])});
        bank.push({type:'pct',q:'What is '+pct+'% of '+p+'?',an:disc,unit:'',choices:makeChoices(disc,[p,sale,disc+10,disc*2])});
      }
    }
  }
  if(lvlId==='WP2'||lvlId==='WP6'){
    /* RATIOS */
    var ratios=[[1,2],[1,3],[2,3],[3,4],[1,4],[2,5],[3,5]];
    var totals=[12,15,18,20,24,25,30,35,36,40];
    for(var ri=0;ri<ratios.length;ri++){
      for(var ti=0;ti<totals.length;ti++){
        var r=ratios[ri],tot=totals[ti];
        var parts=r[0]+r[1];
        if(tot%parts===0){
          var a=tot*r[0]/parts,b=tot*r[1]/parts;
          var n1=pick(NAMES),n2=pick(NAMES);
          bank.push({type:'ratio',q:n1+' and '+n2+' share '+tot+' stickers in a ratio of '+r[0]+':'+r[1]+'. How many does '+n1+' get?',an:a,unit:'stickers',choices:makeChoices(a,[b,tot,a+2,a-2])});
        }
      }
    }
  }
  if(lvlId==='WP3'||lvlId==='WP6'){
    /* EQUATIONS */
    for(var x=2;x<=25;x++){
      for(var b=1;b<=20;b++){
        var nm=pick(NAMES);
        bank.push({type:'eq',q:nm+' has some marbles. After getting '+b+' more, '+nm+' has '+(x+b)+'. How many did '+nm+' start with?',an:x,unit:'marbles',choices:makeChoices(x,[x+b,b,x+2,x-2])});
      }
      for(var m=2;m<=12;m++){
        if(x*m<=144){
          var nm2=pick(NAMES);
          bank.push({type:'eq',q:nm2+' buys '+m+' packs of cards with '+x+' each. Total cards?',an:x*m,unit:'cards',choices:makeChoices(x*m,[x,m,x*m+2,x*m-2])});
        }
      }
    }
  }
  if(lvlId==='WP4'||lvlId==='WP6'){
    /* GEOMETRY */
    for(var a=10;a<=80;a+=10){
      for(var b=10;b<=80;b+=10){
        if(a+b<180){
          bank.push({type:'geo',q:'A triangle has angles of '+a+'° and '+b+'°. What is the third angle?',an:180-a-b,unit:'°',choices:makeChoices(180-a-b,[a,b,180-a-b+10,180-a-b-10])});
        }
      }
      bank.push({type:'geo',q:'Two angles are complementary. One is '+a+'°. What is the other?',an:90-a,unit:'°',choices:makeChoices(90-a,[a,180-a,90+a,90-a+5])});
      bank.push({type:'geo',q:'Two angles are supplementary. One is '+a+'°. What is the other?',an:180-a,unit:'°',choices:makeChoices(180-a,[a,90-a,180+a,180-a+5])});
    }
  }
  if(lvlId==='WP5'||lvlId==='WP6'){
    /* INTEGERS */
    for(var a=-20;a<=20;a+=3){
      for(var b=-20;b<=20;b+=4){
        if(a!==0&&b!==0){
          bank.push({type:'int',q:'The temperature is '+a+'°. It changes by '+(b>0?'+':'')+b+'°. New temperature?',an:a+b,unit:'°',choices:makeChoices(a+b,[a,b,a-b,a+b+5])});
        }
      }
    }
  }
  /* shuffle */
  for(var i=bank.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=bank[i];bank[i]=bank[j];bank[j]=t;}
  return bank.slice(0,60);
}

function startConceptLevel(pid,lvlId){
  if(pid){ST.profileId=pid;}
  ST.mode='concept';ST.grade=6;
  ST.conceptLvlId=lvlId;
  ST.conceptBank=wpBankForLevel(lvlId);
  ST.conceptBank=ST.conceptBank.slice(0,Q_CONCEPT);
  ST.conceptIdx=0;ST.as=[];
  for(var i=0;i<Q_CONCEPT;i++){ST.as.push(null);}
  ST.t0=Date.now();ST.elapsed=0;ST.xp=0;ST.streak=0;
  clearInterval(ST.tint);
  ST.tint=setInterval(function(){
    ST.elapsed=Math.floor((Date.now()-ST.t0)/1000);
    var t=el('tmr2');if(t){t.innerHTML='&#9203; '+fmt(ST.elapsed);}
  },500);
  ST.curWP=ST.conceptBank[0];ST.wpAnswered=false;
  renderConcept();
}

function startConceptMode(pid){
  startConceptLevel(pid,'WP1');
}

function renderConcept(){
  var wp=ST.conceptBank[ST.conceptIdx];
  var pct=Math.round(ST.conceptIdx/Q_CONCEPT*100);
  var xpPct=Math.round(ST.xp/Q_CONCEPT*100);
  var tl=600; /* 10 min starting */
  var h='<div class="hdr"><div style="float:left"><button class="bbtn" onclick="quitConcept()">Quit</button></div>';
  h+='<div style="float:right"><span class="tb" id="tmr2">&#9203; '+fmt(ST.elapsed)+'</span></div>';
  h+='<div style="text-align:center;padding-top:6px;font-size:15px;font-weight:700;color:#48CAE4">Word Problems &nbsp;·&nbsp; '+(ST.conceptIdx+1)+'/'+Q_CONCEPT+'</div>';
  h+='<div style="clear:both"></div></div>';
  h+='<div class="xpbar"><div class="xpbar-track"><div class="xpbar-fill" style="width:'+xpPct+'%"></div></div></div>';
  h+='<div class="pbar"><div class="pbar-f" style="width:'+pct+'%;background:#48CAE4"></div></div>';
  h+='<div class="wp-card"><div class="wp-question">'+wp.q+'</div>';
  if(wp.unit){h+='<div style="font-size:13px;color:#94A3B8;margin-bottom:12px">Answer in: '+wp.unit+'</div>';}
  h+='<div class="wp-choices">';
  for(var i=0;i<wp.choices.length;i++){
    h+='<button class="wp-choice" id="wpc'+i+'" data-val="'+wp.choices[i]+'" onclick="answerWP('+i+','+wp.choices[i]+','+wp.an+')">'+(wp.unit==='$'?'$':'')+wp.choices[i]+(wp.unit&&wp.unit!=='$'?' '+wp.unit:'')+'</button>';
  }
  h+='</div></div>';
  h+='<div class="sp"></div>';
  el('s-concept').innerHTML=h;go('s-concept');
}

function answerWP(idx,chosen,correct){
  if(ST.wpAnswered)return;
  ST.wpAnswered=true;
  ST.as[ST.conceptIdx]=chosen;
  var ok=(Number(chosen)===Number(correct));
  if(ok){ST.xp++;ST.streak++;}else{ST.streak=0;}
  /* highlight buttons */
  for(var i=0;i<4;i++){
    var btn=el('wpc'+i);if(!btn)continue;
    var btnVal=Number(btn.getAttribute('data-val'));
    if(btnVal===Number(correct)){btn.className='wp-choice correct';}
    else if(i===idx&&!ok){btn.className='wp-choice wrong';}
  }
  setTimeout(function(){
    if(ST.conceptIdx+1>=Q_CONCEPT){finishConcept();}
    else{ST.conceptIdx++;ST.curWP=ST.conceptBank[ST.conceptIdx];ST.wpAnswered=false;renderConcept();}
  },900);
}

function finishConcept(){
  clearInterval(ST.tint);
  var time=ST.elapsed,score=0,i;
  for(i=0;i<ST.conceptBank.length;i++){if(Number(ST.as[i])===Number(ST.conceptBank[i].an))score++;}
  var lvlId=ST.conceptLvlId||'WP1';
  addHist(6,{date:new Date().toISOString(),lid:lvlId,score:score,time:time,mode:'concept',subject:'math'});
  var p=loadProg(6,ST.profileId);
  var prev=p[lvlId]||{attempts:0,bestScore:0,streak:0,passed:false};
  var passed=(score>=18);
  var streak=passed?(prev.streak||0)+1:0;
  p[lvlId]={attempts:prev.attempts+1,bestScore:Math.max(prev.bestScore||0,score),streak:streak,passed:(prev.passed||(streak>=3))};
  saveProg(6,p,ST.profileId);
  syncToCloud(6);
  var pct=Math.round(score/Q_CONCEPT*100);
  var stars=pct>=90?'***':pct>=75?'**':pct>=60?'*':'';
  var wlvNames={WP1:'Percentages',WP2:'Ratios',WP3:'Equations',WP4:'Geometry',WP5:'Integers',WP6:'Mixed Challenge'};
  var lvlName=wlvNames[lvlId]||'Word Problems';
  var masteryNote='';
  if(streak>=3&&!prev.passed){
    masteryNote='<div style="color:#10B981;font-weight:700;margin-top:10px;font-size:16px">&#127942; '+lvlName+' mastered! Next level unlocked!</div>';
    setTimeout(function(){showCelebration(lvlId,6);},800);
  } else if(passed){
    masteryNote='<div style="color:#10B981;margin-top:10px;font-size:14px">Great! Streak: '+streak+'/3 &#128293;</div>';
  } else {
    masteryNote='<div style="color:#EF4444;margin-top:10px;font-size:14px">Need 18/20 to progress</div>';
  }
  var h='<div style="text-align:center;margin-bottom:16px">';
  h+='<div style="font-size:52px">'+(pct>=90?'&#127942;':pct>=75?'&#127775;':'&#128170;')+'</div>';
  h+='<h2 style="font-size:28px;font-weight:800;margin:6px 0;font-family:Sora,sans-serif">'+lvlName+'</h2>';
  h+='<div style="color:#64748B">Time: '+fmt(time)+'</div></div>';
  h+='<div class="card" style="text-align:center">';
  h+='<div class="score-big">'+score+'<span style="font-size:32px;color:#94A3B8">/'+Q_CONCEPT+'</span></div>';
  h+='<div style="font-size:22px;color:#F59E0B;margin:8px 0">'+(stars||'...')+'</div>';
  h+='<div style="font-size:16px;color:#1E293B;font-weight:600">'+(pct>=90?'Outstanding! &#127942;':pct>=75?'Great work! &#127775;':'Keep practicing! &#128170;')+'</div>';
  h+=masteryNote;
  h+='</div>';
  h+='<div class="sp"></div>';
  h+='<div class="rbx"><button class="hb" style="background:#48CAE4;color:#fff" onclick="startConceptLevel(ST.profileId,ST.conceptLvlId)">&#8635; Try Again</button>';
  h+='<button class="hb btn-secondary" onclick="renderCurriculum(6,ST.profileId)">&#128218; Levels</button></div>';
  h+='<div class="sp"></div><button class="btn btn-secondary" onclick="renderHome()">&#127968; Home</button>';
  el('s-results').innerHTML=h;go('s-results');
}

function quitConcept(){
  clearInterval(ST.tint);
  if(ST.conceptIdx>=3){
    var score=0;
    for(var i=0;i<ST.conceptIdx;i++){if(ST.as[i]===ST.conceptBank[i].an)score++;}
    addHist(6,{date:new Date().toISOString(),lid:'CONCEPT',score:score,time:ST.elapsed,mode:'concept',partial:true,qDone:ST.conceptIdx});
  }
  renderCurriculum(6);
}

function renderReports(grade,pid){
  pid=pid||ST.profileId;
  requirePin(function(){renderReportsInner(grade,pid);});
}
function renderReportsInner(grade,pid){
  try{
  pid=pid||ST.profileId;
  var gc=gradeConf(grade);
  /* data already loaded from cloud by parent dashboard — just render */
  var h=loadHist(grade,pid||ST.profileId);
  var p=loadProg(grade,pid);
  var cats=getCats(grade);

  /* daily usage last 10 days */
  var dayMap={};

/* ═══════════════════════════════════════════
   PROGRESS INTELLIGENCE
═══════════════════════════════════════════ */
function analyzeProgressForGrade(grade,pid){
  pid=pid||ST.profileId;
  var h=loadHist(grade,pid),p=loadProg(grade,pid),i,j,k;
  var result={sentiment:{},insights:[],missedProblems:[]};
  var cats=getCats(grade);
  for(i=0;i<cats.length;i++){
    for(j=0;j<cats[i].lv.length;j++){
      var lv=cats[i].lv[j];var pp=p[lv.id];
      if(!pp||!pp.attempts){result.sentiment[lv.id]='not_started';continue;}
      if(pp.passed){result.sentiment[lv.id]='mastered';continue;}
      var recent=[];for(k=0;k<h.length&&recent.length<5;k++){if(h[k].lid===lv.id)recent.push(h[k]);}
      if(recent.length===0){result.sentiment[lv.id]='not_started';continue;}
      var avgS=0;for(k=0;k<recent.length;k++){avgS+=recent[k].score;}avgS=avgS/recent.length;
      var improving=recent.length>=2&&recent[0].score>recent[recent.length-1].score;
      if(avgS>=36){result.sentiment[lv.id]='on_fire';}
      else if(avgS>=28&&improving){result.sentiment[lv.id]='progressing';}
      else if(avgS>=20){result.sentiment[lv.id]='needs_work';}
      else{result.sentiment[lv.id]='struggling';}
    }
  }
  var wrongByNum={};var above20w=0,above20t=0,below20w=0,below20t=0;
  var fatigueF=0,fatigueL=0,fatTotal=0;
  for(k=0;k<h.length;k++){
    var sess=h[k];if(!sess.ans)continue;
    var ans=sess.ans;
    for(var ai=0;ai<ans.length;ai++){
      var pr=ans[ai];if(!pr||pr.a===null||pr.a===undefined)continue;
      var key=pr.a+' '+pr.o+' '+pr.b;
      if(!wrongByNum[key]){wrongByNum[key]={wrong:0,total:0,a:pr.a,b:pr.b,o:pr.o};}
      wrongByNum[key].total++;if(!pr.ok){wrongByNum[key].wrong++;}
      if(pr.o==='+'){if(pr.correct>20){above20t++;if(!pr.ok)above20w++;}else{below20t++;if(!pr.ok)below20w++;}}
      fatTotal++;var hl=Math.floor(ans.length/2);
      if(ai<hl){if(!pr.ok)fatigueF++;}else{if(!pr.ok)fatigueL++;}
    }
  }
  var missed=[];var keys2=Object.keys(wrongByNum);
  for(k=0;k<keys2.length;k++){
    var d=wrongByNum[keys2[k]];
    if(d.total>=3){var pct=Math.round(d.wrong/d.total*100);if(pct>=40){missed.push({key:keys2[k],pct:pct,wrong:d.wrong,total:d.total,a:d.a,b:d.b,o:d.o});}}
  }
  missed.sort(function(a,b){return b.pct-a.pct;});result.missedProblems=missed.slice(0,5);
  if(above20t>=10&&below20t>=10){
    var pa=Math.round(above20w/above20t*100),pb=Math.round(below20w/below20t*100);
    if(pa>pb+20){result.insights.push('Sums above 20 have a '+pa+'% miss rate vs '+pb+'% below 20 — needs more practice crossing 20');}
  }
  if(fatTotal>=40){
    var fL=Math.round(fatigueL/fatTotal*100),fF=Math.round(fatigueF/fatTotal*100);
    if(fL>fF+15){result.insights.push('Accuracy drops in the second half of sessions ('+fL+'% errors vs '+fF+'%) — possible fatigue after question 20');}
  }
  if(h.length>=10){
    var r10=h.slice(0,10),p10=h.slice(10,20);
    var r10a=0;for(k=0;k<r10.length;k++){r10a+=r10[k].score;}r10a=r10a/r10.length;
    var p10a=0;for(k=0;k<p10.length;k++){p10a+=p10[k].score;}p10a=p10a/Math.max(p10.length,1);
    if(r10a>p10a+3){result.insights.push('Scores trending UP — improved from '+p10a.toFixed(1)+' to '+r10a.toFixed(1)+' in last 10 sessions');}
    else if(r10a<p10a-3){result.insights.push('Scores have dipped recently ('+r10a.toFixed(1)+' vs previous '+p10a.toFixed(1)+') — consider reviewing recent levels');}
  }
  return result;
}

function sentimentIcon(s){
  if(s==='mastered')return'<span style="color:#10B981;font-size:11px">&#10003; Done</span>';
  if(s==='on_fire')return'<span style="color:#FFD700;font-size:11px">&#128293; Hot</span>';
  if(s==='progressing')return'<span style="color:#7C3AED;font-size:11px">&#8679; Rising</span>';
  if(s==='needs_work')return'<span style="color:#FFA500;font-size:11px">&#9888; Work</span>';
  if(s==='struggling')return'<span style="color:#ff5050;font-size:11px">&#8595; Hard</span>';
  return'<span style="color:#B0BAC8;font-size:11px">Not started</span>';
}

/* ═══════════════════════════════════════════
   KEYBOARD SUPPORT
═══════════════════════════════════════════ */
document.addEventListener('keydown', function(e){
  var screen = document.querySelector('.screen.active');
  if(!screen) return;
  var sid = screen.id;
  /* Drill mode keyboard */
  if(sid === 's-drill'){
    if(e.key >= '0' && e.key <= '9'){ni(parseInt(e.key,10));e.preventDefault();}
    else if(e.key === 'Backspace'){nd();e.preventDefault();}
    else if(e.key === 'Enter'){subDrill();e.preventDefault();}
    else if(e.key === '-'){toggleNeg();e.preventDefault();}
  }
  /* Concept mode keyboard */
  if(sid === 's-concept'){
    if(e.key === '1' || e.key === 'a') answerByKey(0);
    else if(e.key === '2' || e.key === 'b') answerByKey(1);
    else if(e.key === '3' || e.key === 'c') answerByKey(2);
    else if(e.key === '4' || e.key === 'd') answerByKey(3);
  }
  /* PIN modal keyboard */
  var pinModal = document.getElementById('pin-modal');
  if(pinModal){
    if(e.key >= '0' && e.key <= '9'){pinPress(parseInt(e.key,10));e.preventDefault();}
    else if(e.key === 'Backspace'){pinClear();e.preventDefault();}
    else if(e.key === 'Escape'){pinCancel();e.preventDefault();}
  }
});

function answerByKey(idx){
  var btn = document.getElementById('wpc'+idx);
  if(btn && !ST.wpAnswered){
    var val = Number(btn.getAttribute('data-val'));
    var wp = ST.conceptBank[ST.conceptIdx];
    if(wp) answerWP(idx, val, wp.an);
  }
}

try{renderHome();}
catch(e){
  document.body.style.cssText='background:#0d1117;color:#fff;padding:30px;font-family:sans-serif;';
  document.body.innerHTML='<h2 style="color:#ff5050">Error</h2><pre style="color:#FFD700;font-size:11px;margin-top:12px;white-space:pre-wrap">'+String(e)+'\n'+(e.stack||'')+'</pre>';
}
